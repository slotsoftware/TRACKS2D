                                    alert("Solo puedes cambiar el sentido antes de empezar la carrera o en prácticas libres.");
                                }
                            }} className={`w-[115px] px-2 py-1.5 rounded-full font-black text-[10px] uppercase tracking-wider transition-all duration-300 flex items-center justify-center gap-1.5 border-2 ${isReversed ? 'bg-[#39ff14] text-black border-[#39ff14] shadow-[0_0_40px_#39ff14] scale-105' : 'bg-[#39ff14]/20 text-[#39ff14] border-[#39ff14] shadow-[0_0_20px_rgba(57,255,20,0.6),inset_0_0_10px_rgba(57,255,20,0.3)] [text-shadow:0_0_8px_#39ff14] hover:bg-[#39ff14]/40 hover:shadow-[0_0_35px_#39ff14]'}`} title="Cambiar Polaridad">
                                <Repeat size={12} className={`shrink-0 ${isReversed ? "animate-[spin_4s_linear_infinite]" : ""}`} /> 
                                <span className="truncate">{isReversed ? t('polarityI') : t('polarityN')}</span>
                            </button>
                        </div>
                    </div>
                </div> 
            );
        };
        
        function Slot3DPlayer() {
          const [lang, setLang] = useState(() => localStorage.getItem('slot_lang') || 'es');
          const [fatalError, setFatalError] = useState(null); // NUEVO ESTADO PARA ERRORES DE VALIDACIÓN
          
          const t = (key) => {
              if (TRANSLATIONS[lang] && TRANSLATIONS[lang][key]) return TRANSLATIONS[lang][key];
              return key;
          };

          const handleLangChange = (newLang) => {
              setLang(newLang);
              localStorage.setItem('slot_lang', newLang);
          };

          useEffect(() => {
              const syncLang = (e) => {
                  if (e.key === 'slot_lang' && e.newValue) {
                      setLang(e.newValue);
                  }
              };
              window.addEventListener('storage', syncLang);
              return () => window.removeEventListener('storage', syncLang);
          }, []);

          const [circuitData, setCircuitData] = useState(null);
          const [carSettings, setCarSettings] = useState(Array(8).fill(null).map((_, i) => ({ id: i + 1, name: `PILOTO ${i + 1}`, color: ['#ef4444', '#3b82f6', '#22c55e', '#eab308', '#a855f7', '#ec4899', '#f97316', '#64748b'][i % 8] })));
          const [customCarAssets, setCustomCarAssets] = useState(Object.fromEntries(Array.from({length: 8}, (_, i) => [i + 1, { obj: null, rotation: [0, 180, 0], yOffset: 0 }])));

          // --- NUEVO: VALIDACIÓN ESTRICTA DEL CIRCUITO (MULTICARRIL > 2 CARRIL Y NO ROTONDAS) ---
          useEffect(() => {
              if (circuitData) {
                  let isMultilane = false;
                  if (circuitData.numLanes > 2) isMultilane = true;
                  else if (circuitData.lanes && Array.isArray(circuitData.lanes) && circuitData.lanes.length > 1) isMultilane = true;
                  else if (Array.isArray(circuitData.pieces)) {
                      if (circuitData.pieces.some(p => p.lane > 0 || p.groupId > 0)) isMultilane = true;
                  }

                  const checkRotonda = (data) => {
                      if (!data) return false;
                      if (Array.isArray(data.pieces)) {
                          if (Array.isArray(data.pieces[0])) return data.pieces[0].some(p => p.subtype === 'rotonda' || p.name === 'Rotonda');
                          return data.pieces.some(p => p.subtype === 'rotonda' || p.name === 'Rotonda');
                      }
                      if (Array.isArray(data.lanes) && Array.isArray(data.lanes[0])) {
                          return data.lanes.some(lane => lane.some(p => p.subtype === 'rotonda' || p.name === 'Rotonda'));
                      }
                      return false;
                  };

                  const hasRotonda = checkRotonda(circuitData);

                  if (!isMultilane || hasRotonda) {
                      const msg = hasRotonda 
                          ? (lang === 'en' ? "Circuits with roundabouts are not supported in this viewer." : "Los circuitos con rotondas no están soportados en este visor multicarril.")
                          : (lang === 'en' ? "This viewer is exclusively for multilane circuits (more than 2 lanes)." : "Este visor es exclusivo para circuitos multicarril (más de 2 carriles).");
                      
                      setFatalError(msg);
                      setTimeout(() => {
                          window.location.href = 'circuitos.html';
                      }, 5000);
                  } else {
                      setFatalError(null);
                  }
              }
          }, [circuitData, lang]);

          useEffect(() => {
              const autoLoadCloudCar = async () => {
                  try {
                      let ghConfig = { owner: 'slotsoftware', repo: 'Telemetria', path: 'coches', branch: 'main' };
                      const saved = localStorage.getItem('slot_gh_config');
                      if (saved) {
                          const parsed = JSON.parse(saved);
                          if (parsed.owner && parsed.repo) {
                              ghConfig = parsed;
                              if (ghConfig.owner === 'slotcarhome-star' && ghConfig.repo === 'Circuitos3d') {
                                  ghConfig.owner = 'slotsoftware';
                                  ghConfig.repo = 'Telemetria';
                                  ghConfig.path = 'coches';
                              }
                          }
                      }
                      
                      const apiUrl = `https://api.github.com/repos/${ghConfig.owner}/${ghConfig.repo}/contents/${ghConfig.path ? ghConfig.path : ''}`;
                      const res = await fetch(apiUrl);
                      if (!res.ok) return;
                      const data = await res.json();
                      
                      if (Array.isArray(data)) {
                          const glbFiles = data.filter(f => f.name.toLowerCase().endsWith('.glb') || f.name.toLowerCase().endsWith('.gltf'));
                          const targetFile = glbFiles[0]; 
                          
                          if (targetFile) {
                              let rawUrl = `https://raw.githubusercontent.com/${ghConfig.owner}/${ghConfig.repo}/${ghConfig.branch}/${ghConfig.path ? ghConfig.path + '/' : ''}${targetFile.name}`;
                              if(ghConfig.owner === 'slotsoftware' && ghConfig.repo === 'Telemetria') {
                                   rawUrl = `https://slotsoftware.github.io/Telemetria/${ghConfig.path ? ghConfig.path + '/' : ''}${targetFile.name}`;
                              }
                              
                              setCustomCarAssets(prev => ({
                                  ...prev,
                                  1: { ...prev[1], glb: rawUrl, glbName: targetFile.name }
                              }));
                              console.log("Auto-cargado primer coche desde la nube:", targetFile.name);
                          }
                      }
                  } catch (e) {
                      console.warn("No se pudo auto-cargar el coche de la nube:", e);
                  }
              };
              autoLoadCloudCar();
          }, []);

          const handleCarAssetUpdate = (file, targetId, transformData) => {
              if (file && targetId) {
                  const url = URL.createObjectURL(file);
                  setCustomCarAssets(prev => ({
                      ...prev,
                      [targetId]: { ...prev[targetId], glb: url, glbName: file.name }
                  }));
                  console.log(`Modelo asignado a coche ${targetId}`);
              }
              else if (targetId && transformData) {
                  setCustomCarAssets(prev => ({
                      ...prev,
                      [targetId]: { ...prev[targetId], ...transformData }
                  }));
              }
          };

          useEffect(() => { 
              const ls = document.getElementById('loading-screen'); 
              
              const transferData = localStorage.getItem('slot_circuit_transfer');
              
              if (transferData) {
                  try {
                      const d = JSON.parse(transferData);
                      if (d.brand && d.pieces) {
                          setCircuitData(d);
                          console.log("⚡ Circuito importado desde el Diseñador 2D.");
                          
                          localStorage.setItem('slot_last_circuit', transferData);
                          
                          localStorage.removeItem('slot_circuit_transfer');
                      }
                  } catch (e) {
                      console.error("Error al leer datos del diseñador 2D:", e);
                  }
              } 
              else {
                  const savedCircuit = localStorage.getItem('slot_last_circuit');
                  if (savedCircuit) {
                      try {
                          const d = JSON.parse(savedCircuit);
                          if (d.brand && d.pieces) {
                              setCircuitData(d);
                              console.log("⚡ Circuito recuperado del historial.");
                          }
                      } catch (e) {
                          console.warn("No se pudo recuperar el circuito guardado.");
                      }
                  }
              }

              if (ls) { ls.style.opacity = '0'; setTimeout(() => ls.style.display = 'none', 1000); } 
          }, []);

          const loadCircuit = (e) => { 
            const f = e.target.files[0]; if (!f) return; 
            const r = new FileReader(); 
            r.onload = (ev) => { 
                try { 
                    const d = JSON.parse(ev.target.result); 
                    if (d.brand && d.pieces) { 
                        setCircuitData({ brand: d.brand, pieces: d.pieces }); 
                        localStorage.setItem('slot_last_circuit', JSON.stringify({ brand: d.brand, pieces: d.pieces }));
                    } else {
                        alert("Formato de circuito inválido");
                    }
                } catch (err) { alert("Error al leer JSON"); } 
            }; 
            r.readAsText(f); 
          };

          if (circuitData) {
            if (fatalError) {
                return (
                    <div className="flex flex-col h-[100dvh] w-full bg-[#0a0a0a] justify-center items-center font-sans text-center px-4 z-[9999] absolute inset-0">
                        <AlertTriangle size={80} className="text-red-500 mb-6 animate-bounce" />
                        <h2 className="text-3xl font-black text-white uppercase tracking-widest mb-4">Circuito no compatible</h2>
                        <p className="text-red-400 font-mono text-xl mb-8 max-w-lg leading-relaxed">{fatalError}</p>
                        <p className="text-gray-500 text-sm animate-pulse tracking-widest uppercase">Redirigiendo al diseñador en 5 segundos...</p>
                    </div>
                );
            }

            return (
                <LanguageContext.Provider value={{ lang, t, setLang: handleLangChange }}>
                    <Telemetry3DViewer 
                        circuitData={circuitData} 
                        carSettings={carSettings} 
                        customCarAssets={customCarAssets} 
                        onCarAssetUpdate={handleCarAssetUpdate}
                        onClose={() => setCircuitData(null)} 
                    />
                </LanguageContext.Provider>
            );
          }

          return (
            <LanguageContext.Provider value={{ lang, t, setLang: handleLangChange }}>
                <div className="flex flex-col h-[100dvh] w-full bg-[#0a0a0a] overflow-hidden font-sans select-none text-gray-200 justify-center items-center relative">
                    
                    <div className="absolute top-6 right-6 z-50 flex gap-3 bg-black/50 p-2 rounded-full border border-white/10 backdrop-blur-md">
                        <button onClick={() => handleLangChange('es')} className={`text-2xl transition-all ${lang === 'es' ? 'scale-125 drop-shadow-[0_0_10px_rgba(255,255,255,0.8)] grayscale-0' : 'opacity-50 grayscale hover:grayscale-0 hover:opacity-100'}`} title="Español">🇪🇸</button>
                        <button onClick={() => handleLangChange('en')} className={`text-2xl transition-all ${lang === 'en' ? 'scale-125 drop-shadow-[0_0_10px_rgba(255,255,255,0.8)] grayscale-0' : 'opacity-50 grayscale hover:grayscale-0 hover:opacity-100'}`} title="English">🇬🇧</button>
                    </div>

                    <div className="absolute inset-0 opacity-20 pointer-events-none" style={{backgroundImage: 'radial-gradient(#39ff14 1px, transparent 1px)', backgroundSize: '40px 40px'}}></div>
                    <div className="z-10 flex flex-col items-center gap-8 animate-in w-full max-w-4xl px-4">
                        <div className="text-center">
                            <Activity size={80} className="text-[#39ff14] mx-auto mb-4 animate-pulse drop-shadow-[0_0_30px_rgba(57,255,20,0.6)]"/>
                            <h1 className="text-5xl md:text-7xl font-black italic tracking-tighter text-white uppercase drop-shadow-xl">TRACKS & TELEMETRY</h1>
                            <p className="text-[#39ff14] font-mono text-xl tracking-[0.5em] mt-2 font-bold">3D MULTICARRIL</p>
                        </div>

                        <div className="bg-black/50 p-10 rounded-3xl border border-white/10 backdrop-blur-xl shadow-2xl flex flex-col items-center gap-6 w-full">
                            <div className="text-center space-y-2 mb-4">
                                <h2 className="text-2xl font-bold text-white">{t('lobbyTitle')}</h2>
                                <p className="text-gray-400 text-sm">{t('lobbySub')}</p>
                            </div>
                            
                            <div className="flex flex-col md:flex-row gap-6 w-full justify-center">
                                <label className="group relative cursor-pointer flex-1 max-w-xs">
                                    <div className="absolute -inset-1 bg-gradient-to-r from-[#39ff14] to-emerald-600 rounded-xl blur opacity-25 group-hover:opacity-75 transition duration-1000 group-hover:duration-200"></div>
                                    <div className="relative px-6 py-8 bg-gray-900 ring-1 ring-gray-900/5 rounded-xl leading-none flex flex-col items-center justify-center gap-4 h-full hover:bg-gray-800 transition-colors">
                                        <CloudUpload className="w-12 h-12 text-[#39ff14] group-hover:scale-110 transition-transform duration-300" />
                                        <span className="text-gray-300 group-hover:text-white transition-colors font-bold uppercase tracking-wider text-center text-sm">{t('btnLoad')}</span>
                                    </div>
                                    <input type="file" accept=".json" onChange={loadCircuit} className="hidden" />
                                </label>

                                <button onClick={() => window.location.href = 'circuitos.html'} className="group relative flex-1 max-w-xs">
                                    <div className="absolute -inset-1 bg-gradient-to-r from-blue-600 to-cyan-500 rounded-xl blur opacity-25 group-hover:opacity-75 transition duration-1000 group-hover:duration-200"></div>
                                    <div className="relative px-6 py-8 bg-gray-900 ring-1 ring-gray-900/5 rounded-xl leading-none flex flex-col items-center justify-center gap-4 h-full hover:bg-gray-800 transition-colors">
                                        <PenTool className="w-12 h-12 text-cyan-400 group-hover:scale-110 transition-transform duration-300" />
                                        <span className="text-gray-300 group-hover:text-white transition-colors font-bold uppercase tracking-wider text-center text-sm">{t('btn2D')}</span>
                                    </div>
                                </button>
                            </div>
                            
                            <button onClick={() => { localStorage.removeItem('slot_last_circuit'); sessionStorage.removeItem('slot_last_circuit'); alert("Memoria de circuito borrada."); }} className="text-[10px] text-gray-600 hover:text-red-400 mt-6 uppercase tracking-widest transition-colors border-b border-transparent hover:border-red-400/50 pb-0.5">
                                {t('clearCache')}
                            </button>
                        </div>

                        <div className="text-[10px] text-gray-600 font-mono absolute bottom-4">V.2.0 PLAYER - POWERED BY REACT & THREE.JS</div>
                    </div>
                </div>
            </LanguageContext.Provider>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<Slot3DPlayer />);
    </script>
</body>
</html>
