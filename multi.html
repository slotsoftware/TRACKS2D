            );
        });
        const TireSVG = memo(({ type, rimColor, label, compoundColor }) => (<svg viewBox="0 0 60 60" className="w-full h-full drop-shadow-md transform transition-transform hover:scale-110"><defs><radialGradient id={`rim-${label}`} cx="50%" cy="50%" r="50%"><stop offset="0%" stopColor="#fff"/><stop offset="100%" stopColor={rimColor}/></radialGradient></defs><circle cx="30" cy="30" r="28" fill="#1a1a1a" stroke="#000" strokeWidth="1" />{type === 'Lluvia' && <path d="M10,10 L50,50 M50,10 L10,50 M30,5 L30,55 M5,30 L55,30" stroke="#333" strokeWidth="1" opacity="0.3" />}<circle cx="30" cy="30" r="18" fill={`url(#rim-${label})`} stroke="#444" strokeWidth="1" /><circle cx="30" cy="30" r="3" fill="#111" /><text x="30" y="54" fontSize="7" fontWeight="900" fill={compoundColor} textAnchor="middle" style={{textShadow:'0 1px 1px black'}}>{label}</text></svg>));
        const GearSVG = memo(({ teeth, color, material }) => (<svg viewBox="0 0 60 60" className="w-full h-full transform transition-transform hover:rotate-90 duration-500"><path d="M30,2 L32,6 L36,6 L38,2 L42,4 L42,8 L46,10 L48,6 L52,9 L50,14 L54,16 L58,14 L58,19 L54,22 L56,26 L60,28 L58,32 L54,34 L56,38 L58,41 L54,44 L50,42 L48,46 L52,50 L48,54 L44,52 L42,56 L38,58 L36,54 L32,54 L30,58 L26,56 L24,52 L20,54 L16,50 L20,46 L18,42 L14,44 L10,41 L12,37 L8,34 L4,32 L2,28 L6,26 L8,22 L4,19 L4,14 L8,16 L12,14 L10,9 L14,6 L16,10 L20,8 L20,4 L24,2 L26,6 L30,6 Z" fill={color} stroke="#000" strokeWidth="0.5"/><circle cx="30" cy="30" r="10" fill={material==='Bronce'?'#92400e':(material==='Dural'?'#94a3b8':'#e2e8f0')} stroke="#000" strokeWidth="1"/><circle cx="30" cy="30" r="3" fill="#000"/></svg>));
        const PinionSVG = memo(({ teeth, material, diameter }) => (<svg viewBox="0 0 40 40" className="w-full h-full transform transition-transform hover:rotate-180 duration-500"><circle cx="20" cy="20" r="18" fill="none" stroke="#666" strokeWidth="2" strokeDasharray="3,1"/><path d="M20,2 L23,5 L28,5 L30,8 L35,10 L35,15 L32,18 L35,22 L35,28 L30,32 L25,32 L22,35 L18,35 L15,32 L10,32 L5,28 L5,22 L8,18 L5,15 L5,10 L10,8 L12,5 L17,5 Z" fill={material==='Latón'?'#fbbf24':(material==='Nylon'?'#fff':'#94a3b8')} stroke="#000" strokeWidth="0.5"/><circle cx="20" cy="20" r="4" fill="#000"/></svg>));
        
        /* --- COMPONENTE GLB VIEWER (HOMO) --- */
        const GLBViewer = ({ onClose, onLoad, onTransform, carAssets, carNames, onNameChange }) => { 
            const { t } = useTranslation();
            const mountRef = useRef(null); 
            const inputRef = useRef(null); 
            const [status, setStatus] = useState("ESPERANDO..."); 
            const [targetCarId, setTargetCarId] = useState(1); 
            const [showCarMenu, setShowCarMenu] = useState(false); 
            
            const [rotY, setRotY] = useState(180);
            const [yOff, setYOff] = useState(0);
            
            // ESTADO PARA ENTRADA MANUAL DE ARCHIVO
            const [manualFileName, setManualFileName] = useState("");

            const displayCarName = (name) => name?.startsWith('PILOTO ') ? name.replace('PILOTO', t('pilot')) : (name || '');

            const rendererRef = useRef(null); 
            const sceneRef = useRef(null); 
            const cameraRef = useRef(null); 
            const controlsRef = useRef(null); 
            const modelRef = useRef(null);
        
        // GITHUB STATE CON PERSISTENCIA
        const [ghConfig, setGhConfig] = useState(() => {
            const saved = localStorage.getItem('slot_gh_config');
            if (saved) {
                let parsed = JSON.parse(saved);
                // Auto-migración al nuevo directorio si se usaba el anterior
                if (parsed.owner === 'slotcarhome-star' && parsed.repo === 'Circuitos3d') {
                    parsed.owner = 'slotsoftware';
                    parsed.repo = 'Telemetria';
                    parsed.path = 'coches';
                    localStorage.setItem('slot_gh_config', JSON.stringify(parsed));
                }
                return parsed;
            }
            return { owner: 'slotsoftware', repo: 'Telemetria', path: 'coches', branch: 'main' };
        });
        const [isEditingConfig, setIsEditingConfig] = useState(false);
        const [onlineFiles, setOnlineFiles] = useState([]);
        const [showFileMenu, setShowFileMenu] = useState(false);

        // Actualizar controles si cambias de coche
        useEffect(() => {
            if (carAssets && carAssets[targetCarId]) {
                const asset = carAssets[targetCarId];
                if (asset.rotation && asset.rotation[1] !== undefined) {
                    setRotY(asset.rotation[1]);
                }
                if (asset.yOffset !== undefined) {
                    setYOff(parseFloat(asset.yOffset));
                }
                // Si ya hay modelo cargado, actualizar visualmente
                if (modelRef.current) {
                    modelRef.current.rotation.y = (asset.rotation ? asset.rotation[1] : 180) * Math.PI / 180;
                    modelRef.current.position.y = (asset.yOffset !== undefined ? parseFloat(asset.yOffset) : 0) + (modelRef.current.userData.initialY || 0);
                }
            }
        }, [targetCarId, carAssets]);

        // Fetch archivos de GitHub
        useEffect(() => {
            if (!showFileMenu) return;
            if (!ghConfig.owner || !ghConfig.repo) {
                setIsEditingConfig(true); // Forzar edición si no hay config
                return;
            }
            // Si hay config y no estamos editando, cargar
            if (!isEditingConfig) {
                setStatus("BUSCANDO EN GITHUB...");
                const path = ghConfig.path ? `/${ghConfig.path}` : '';
                const apiUrl = `https://api.github.com/repos/${ghConfig.owner}/${ghConfig.repo}/contents${path}`;
                
                fetch(apiUrl)
                    .then(res => {
                        if (res.status === 404) throw new Error("Repo no encontrado");
                        // Si nos da error de tasa (rate limit), lanzamos error para mostrar botón manual
                        if (res.status === 403) throw new Error("Límite API excedido");
                        return res.json();
                    })
                    .then(data => {
                        if (Array.isArray(data)) {
                            const glbFiles = data.filter(f => f.name.toLowerCase().endsWith('.glb') || f.name.toLowerCase().endsWith('.gltf'));
                            setOnlineFiles(glbFiles);
                            setStatus(glbFiles.length > 0 ? "ARCHIVOS ENCONTRADOS" : "SIN ARCHIVOS 3D");
                        } else {
                            setOnlineFiles([]);
                            setStatus("CARPETA VACÍA");
                        }
                    })
                    .catch(err => {
                        console.error("Error GitHub:", err);
                        setStatus("ERROR CONEXIÓN (VER LOG)");
                        setOnlineFiles([]); // Asegura lista vacía para mostrar fallback
                    });
            }
        }, [showFileMenu, ghConfig, isEditingConfig]);

        const saveGithubConfig = (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const newConfig = {
                owner: formData.get('owner').trim(),
                repo: formData.get('repo').trim(),
                path: formData.get('path').trim(),
                branch: formData.get('branch').trim() || 'main'
            };
            
            if (newConfig.owner && newConfig.repo) {
                localStorage.setItem('slot_gh_config', JSON.stringify(newConfig));
                setGhConfig(newConfig);
                setIsEditingConfig(false);
                setStatus("CONFIGURACIÓN GUARDADA");
            }
        };

        useEffect(() => { 
            if (!mountRef.current) return; 
            if (rendererRef.current) return; // GUARDA DEFENSIVA: Evitar doble inicialización

            if (typeof THREE === 'undefined') { setStatus("ERROR: THREE.JS NO CARGADO"); return; } 
            if (typeof THREE.GLTFLoader === 'undefined') { setStatus("ERROR: GLTFLOADER NO CARGADO"); return; } 
            
            const width = mountRef.current.clientWidth || 300; 
            const height = mountRef.current.clientHeight || 300; 
            const scene = new THREE.Scene(); 
            sceneRef.current = scene; 
            
            // --- GRUPO SEGURO PARA MODELOS ---
            // Creamos un contenedor específico para los coches.
            // Al recargar, limpiaremos SOLO este grupo, sin tocar luces ni helpers.
            const modelGroup = new THREE.Group();
            modelGroup.name = "MODEL_CONTAINER";
            scene.add(modelGroup);
            modelRef.current = modelGroup;

            const camera = new THREE.PerspectiveCamera(50, width / height, 0.01, 1000); 
            camera.position.set(0, 2, 4); 
            cameraRef.current = camera; 
            
            const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true, preserveDrawingBuffer: true, powerPreference: "high-performance" }); 
            renderer.setSize(width, height); 
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.5)); 
            renderer.outputEncoding = THREE.sRGBEncoding; 
            mountRef.current.appendChild(renderer.domElement); 
            rendererRef.current = renderer; 
            
            // ELEMENTOS ESTÁTICOS (Nunca se eliminan)
            const hemiLight = new THREE.HemisphereLight(0xffffff, 0x444444, 1.5); 
            hemiLight.userData = { keep: true };
            scene.add(hemiLight); 
            
            const dirLight = new THREE.DirectionalLight(0xffffff, 2); 
            dirLight.position.set(2, 5, 3); 
            dirLight.castShadow = true; 
            dirLight.userData = { keep: true };
            scene.add(dirLight); 
            
            const grid = new THREE.GridHelper(10, 10, 0x39ff14, 0x333333); 
            grid.userData = { keep: true };
            scene.add(grid); 
            
            const axes = new THREE.AxesHelper(1); 
            axes.userData = { keep: true };
            scene.add(axes); 
            
            if (typeof THREE.OrbitControls !== 'undefined' && !controlsRef.current) { 
                const controls = new THREE.OrbitControls(camera, renderer.domElement); 
                controls.enableDamping = true; 
                controls.autoRotate = true; 
                controls.target.set(0, 0.5, 0); 
                controlsRef.current = controls; 
            } 
            
            const resizeObserver = new ResizeObserver(entries => { 
                window.requestAnimationFrame(() => { 
                    for (let entry of entries) { 
                        const { width, height } = entry.contentRect; 
                        if (width && height && renderer && camera) { 
                            camera.aspect = width / height; 
                            camera.updateProjectionMatrix(); 
                            renderer.setSize(width, height); 
                        } 
                    } 
                }); 
            }); 
            resizeObserver.observe(mountRef.current); 
            
            let frameId; 
            const animate = () => { 
                frameId = requestAnimationFrame(animate); 
                if (controlsRef.current) controlsRef.current.update(); 
                renderer.render(scene, camera); 
            }; 
            animate(); 
            
            return () => { 
                cancelAnimationFrame(frameId); 
                resizeObserver.disconnect(); 
                if (controlsRef.current) {
                    controlsRef.current.dispose();
                    controlsRef.current = null;
                }
                if (rendererRef.current) { 
                    rendererRef.current.dispose(); 
                    if (mountRef.current && rendererRef.current.domElement) {
                        mountRef.current.removeChild(rendererRef.current.domElement);
                    }
                    rendererRef.current = null;
                } 
            }; 
        }, []); 
        
        const applyTransform = (newRot, newY) => {
            setRotY(newRot);
            setYOff(newY);
            if (modelRef.current) {
                modelRef.current.rotation.y = newRot * Math.PI / 180;
                modelRef.current.position.y = newY + (modelRef.current.userData.initialY || 0);
            }
            if (onTransform) {
                onTransform(targetCarId, { rotation: [0, newRot, 0], yOffset: newY });
            }
        };

        const rotate90 = (dir) => {
            // Rotar 90 grados exactos
            let next = rotY + (90 * dir);
            applyTransform(next, yOff);
        }

        const adjustHeight = (direction) => { 
            const next = yOff + (direction * 0.05);
            applyTransform(rotY, next);
        }; 

        const processLoadedModel = (model, fileName, url) => {
            if (!sceneRef.current || !modelRef.current) return;

            const modelGroup = modelRef.current;

            // LIMPIEZA SEGURA SOLO DEL GRUPO (Deep cleanup)
            while (modelGroup.children.length > 0) {
                const oldObj = modelGroup.children[0];
                oldObj.traverse(c => {
                    if (c.isMesh) {
                        if (c.geometry) c.geometry.dispose();
                        if (c.material) {
                            const disposeMat = (m) => {
                                for (const key in m) {
                                    if (m[key] && m[key].isTexture) m[key].dispose();
                                }
                                m.dispose();
                            };
                            if (Array.isArray(c.material)) c.material.forEach(disposeMat);
                            else disposeMat(c.material);
                        }
                    }
                });
                modelGroup.remove(oldObj);
            }

            model.traverse(child => {
                if (child.isMesh) {
                    // OPTIMIZACIÓN EXTREMA: Desactivar sombras en modelos importados
                    // Calcular sombras dinámicas en modelos GLB de alta resolución colapsa los FPS
                    child.castShadow = false;
                    child.receiveShadow = false; 
                    if (child.material) {
                        // Eliminado DoubleSide: Multiplicaba x2 la carga gráfica de los modelos
                        child.material.needsUpdate = true;
                    }
                }
            });

            const box = new THREE.Box3().setFromObject(model);
            const size = box.getSize(new THREE.Vector3());
            const center = box.getCenter(new THREE.Vector3());

            model.position.sub(center);

            const maxDim = Math.max(size.x, size.y, size.z);
            const scale = maxDim > 0 ? 2.5 / maxDim : 1;
            model.scale.setScalar(scale);

            const initialY = (size.y * scale) / 2;
            model.userData.initialY = initialY;
            model.position.y += initialY + yOff;
            model.rotation.y = rotY * Math.PI / 180;

            modelGroup.add(model);

            setStatus(`CARGADO: ${fileName.toUpperCase()}`);

            if (url) {
                fetch(url)
                    .then(r => r.blob())
                    .then(blob => {
                        const file = new File([blob], fileName, { type: 'model/gltf-binary' });
                        if (onLoad) onLoad(file, targetCarId);
                    });
            }

            if (onTransform) {
                onTransform(targetCarId, { rotation: [0, rotY, 0], yOffset: yOff });
            }
        };

        const loadFromGitHub = (fileData) => {
            setShowFileMenu(false);
            setStatus(`DESCARGANDO: ${fileData.name}...`);
            
            let rawUrl = `https://raw.githubusercontent.com/${ghConfig.owner}/${ghConfig.repo}/${ghConfig.branch}/${ghConfig.path ? ghConfig.path + '/' : ''}${fileData.name}`;
            
            // OPTIMIZACIÓN: Usar GitHub Pages si es el repo configurado (Más rápido y sin CORS)
            if(ghConfig.owner === 'slotsoftware' && ghConfig.repo === 'Telemetria') {
                 rawUrl = `https://slotsoftware.github.io/Telemetria/${ghConfig.path ? ghConfig.path + '/' : ''}${fileData.name}`;
            }

            console.log("Intentando cargar:", rawUrl); // Debug para ver URL real

            // USAR EL CARGADOR OPTIMIZADO COMPARTIDO
            const loader = getSharedGLTFLoader();
            loader.load(rawUrl, (gltf) => processLoadedModel(gltf.scene, fileData.name, rawUrl), (xhr) => setStatus(`BAJANDO ${(xhr.loaded / xhr.total * 100).toFixed(0)}%`), (err) => { console.error(err); setStatus("ERROR: NO ENCONTRADO (404)"); });
        };

        const loadDirectFile = (fileName) => {
            // Helper para cargar archivo directo sin pasar por el listado de API
            if(!fileName) return;
            const cleanName = fileName.trim();
            loadFromGitHub({ name: cleanName });
        };

        const handleFileChange = (e) => { 
            const file = e.target.files[0]; if (!file) return; 
            
            // VALIDACIÓN EXTENSIÓN
            const lowerName = file.name.toLowerCase();
            if (!lowerName.endsWith('.glb') && !lowerName.endsWith('.gltf')) {
                setStatus("FICHERO INCORRECTO");
                e.target.value = '';
                return;
            }

            setStatus("PROCESANDO LOCAL..."); 
            const reader = new FileReader(); 
            reader.onload = (event) => { 
                // USAR EL CARGADOR OPTIMIZADO COMPARTIDO
                const loader = getSharedGLTFLoader(); 
                loader.parse(event.target.result, '', (gltf) => { processLoadedModel(gltf.scene, file.name, null); if (onLoad) onLoad(file, targetCarId); }, (err) => { console.error(err); setStatus("ERROR PARSE GLB"); }); 
            }; 
            reader.readAsArrayBuffer(file); e.target.value = ''; 
        }; 
        
        const triggerFileSelect = () => { if (inputRef.current) inputRef.current.click(); }; 
        
        return ( 
            <div className="w-[480px] h-[460px] bg-[#0f172a] border-2 border-[#39ff14] rounded-xl shadow-[0_0_40px_rgba(57,255,20,0.2)] flex flex-col overflow-hidden animate-in z-50 pointer-events-auto relative">
                <div className="bg-[#39ff14]/10 p-3 flex flex-col border-b border-[#39ff14]/30 gap-2 shrink-0">
                    <div className="flex justify-between items-center w-full">
                        <div className="flex items-center gap-2 shrink-0"><span className="w-3 h-3 bg-[#39ff14] rounded-full animate-pulse"></span><h3 className="text-xs font-black text-white tracking-[0.2em]">VISOR 3D</h3></div> 
                        <div className="relative"><button onClick={() => setShowCarMenu(!showCarMenu)} className="flex items-center gap-2 bg-black/60 border border-[#39ff14]/30 hover:border-[#39ff14] rounded px-3 py-1.5 transition-all group" ><span className="text-[10px] font-bold text-gray-400 group-hover:text-gray-300">{t('assign')}:</span><span className="text-xs font-mono font-bold text-[#39ff14] group-hover:text-white">{t('car')} {targetCarId}</span><ChevronDown size={14} className="text-[#39ff14] opacity-50 group-hover:opacity-100 transition-transform duration-300" style={{ transform: showCarMenu ? 'rotate(180deg)' : 'rotate(0deg)' }}/></button> 
                            {showCarMenu && ( <div className="absolute top-full left-0 mt-1 w-36 bg-[#0a0a0a] border border-[#39ff14] shadow-[0_0_15px_rgba(57,255,20,0.2)] z-[100] flex flex-col max-h-48 overflow-y-auto custom-scrollbar rounded-md animate-in origin-top"> {[1,2,3,4,5,6,7,8].map(id => ( <button key={id} onClick={() => { setTargetCarId(id); setShowCarMenu(false); }} className={`px-3 py-2 text-xs font-mono text-left transition-all border-b border-[#39ff14]/10 flex justify-between items-center ${targetCarId === id ? 'bg-[#39ff14] text-black font-black' : 'text-[#39ff14] hover:bg-[#39ff14]/20 hover:pl-4'}`} ><span>{t('car')} {id}</span> {targetCarId === id && <span className="w-2 h-2 bg-black rounded-full"></span>} </button> ))} </div> )} 
                        </div>
                        <button onClick={onClose} className="text-[#39ff14] hover:text-white transition hover:scale-125 bg-black/20 p-1.5 rounded-full ml-auto"><X size={16} /></button>
                    </div>
                    
                    {/* BARRA DE HERRAMIENTAS MEJORADA CON TEXTOS Y EDICIÓN DE PILOTO */}
                    <div className="flex flex-col gap-1.5 w-full mt-1">
                        <div className="flex gap-1.5 items-center bg-black/40 p-1.5 rounded border border-[#39ff14]/20 w-full">
                            <span className="text-[9px] text-gray-400 font-bold mr-1 shrink-0">{t('pilot')}</span>
                            <input 
                                type="text" 
                                value={displayCarName(carNames ? carNames[targetCarId]?.name : '')} 
                                onChange={(e) => onNameChange && onNameChange(targetCarId, e.target.value)} 
                                className="flex-1 bg-black/60 border border-[#39ff14]/30 rounded px-2 py-1 text-[10px] text-white font-bold focus:border-[#39ff14] focus:bg-black outline-none transition-all"
                                placeholder={`${t('pilot')} ${targetCarId}`}
                                maxLength={20}
                            />
                        </div>

                        <div className="flex items-center gap-2 w-full justify-between"> 
                            <div className="flex gap-1.5 items-center bg-black/40 p-1.5 rounded border border-[#39ff14]/20">
                                <span className="text-[9px] text-gray-400 font-bold mr-1">{t('rotate')}</span>
                                <button onClick={() => rotate90(-1)} className="hover:bg-[#39ff14] text-[#39ff14] hover:text-black px-2 py-1 rounded transition flex items-center gap-1" title="-90 Grados"><RotateCcw size={14}/><span className="text-[10px] font-mono font-bold">-90º</span></button>
                                <button onClick={() => rotate90(1)} className="hover:bg-[#39ff14] text-[#39ff14] hover:text-black px-2 py-1 rounded transition flex items-center gap-1" title="+90 Grados"><span className="text-[10px] font-mono font-bold">+90º</span><RotateCw size={14}/></button>
                            </div>

                            <div className="flex gap-1.5 items-center bg-black/40 p-1.5 rounded border border-[#39ff14]/20">
                                <span className="text-[9px] text-gray-400 font-bold mr-1">{t('height')}</span>
                                <button onClick={() => adjustHeight(1)} className="hover:bg-[#39ff14] text-[#39ff14] hover:text-black px-2 py-1 rounded transition flex items-center gap-1" title="Subir"><ArrowUp size={14}/><span className="text-[10px] font-bold">{t('up')}</span></button>
                                <button onClick={() => adjustHeight(-1)} className="hover:bg-[#39ff14] text-[#39ff14] hover:text-black px-2 py-1 rounded transition flex items-center gap-1" title="Bajar"><ArrowDown size={14}/><span className="text-[10px] font-bold">{t('down')}</span></button>
                            </div>
                            
                            <div className="flex gap-2">
                                <button className="bg-purple-500/20 hover:bg-purple-500 text-purple-400 hover:text-white px-3 py-1.5 rounded text-[10px] font-bold transition border border-purple-500/50 shadow-[0_0_5px_rgba(168,85,247,0.2)] h-8 flex items-center gap-1.5" title="Decoración"><Layers size={14} /><span>{t('decor')}</span></button>
                                <button onClick={() => setShowFileMenu(!showFileMenu)} className="bg-[#3b82f6]/20 hover:bg-[#3b82f6] text-[#3b82f6] hover:text-white px-3 py-1.5 rounded text-[10px] font-bold transition border border-[#3b82f6]/50 shadow-[0_0_5px_rgba(59,130,246,0.2)] h-8 flex items-center gap-1.5" title="Cargar desde GitHub"><CloudDownload size={14} /><span>{t('cloud')}</span></button>
                                <button onClick={triggerFileSelect} className="bg-[#39ff14]/20 hover:bg-[#39ff14] text-[#39ff14] hover:text-black px-3 py-1.5 rounded text-[10px] font-bold transition border border-[#39ff14]/50 shadow-[0_0_5px_rgba(57,255,20,0.1)] h-8 flex items-center gap-1.5" title="Local"><FolderOpen size={14} /><span>{t('pc')}</span></button>
                            </div>
                        </div>

                        {/* MENU GITHUB FLOTANTE */}
                        {showFileMenu && (
                            <div className="absolute top-24 right-2 w-80 bg-[#0a0a0a] border border-[#39ff14] shadow-[0_0_30px_rgba(57,255,20,0.4)] z-[100] flex flex-col max-h-80 overflow-hidden rounded-md animate-in origin-top-right">
                                <div className="px-3 py-2 text-[10px] font-bold text-gray-500 border-b border-gray-800 bg-gray-900 uppercase tracking-widest flex justify-between items-center">
                                    <span>{t('cloudFiles')}</span>
                                    <button onClick={() => setIsEditingConfig(!isEditingConfig)} className="text-[#39ff14] hover:text-white bg-black/50 p-1 rounded hover:bg-[#39ff14]/20 transition-colors"><Settings size={14}/></button>
                                </div>
                                
                                {isEditingConfig ? (
                                    <div className="p-3 bg-gray-900">
                                        <form onSubmit={saveGithubConfig} className="flex flex-col gap-3">
                                            <input name="owner" placeholder={t('ghUser')} defaultValue={ghConfig.owner} className="bg-black border border-gray-700 text-xs text-white px-2 py-2 rounded focus:border-[#39ff14] outline-none" required />
                                            <input name="repo" placeholder={t('ghRepo')} defaultValue={ghConfig.repo} className="bg-black border border-gray-700 text-xs text-white px-2 py-2 rounded focus:border-[#39ff14] outline-none" required />
                                            <input name="branch" placeholder={t('ghBranch')} defaultValue={ghConfig.branch || 'main'} className="bg-black border border-gray-700 text-xs text-white px-2 py-2 rounded focus:border-[#39ff14] outline-none" />

        const LapTimeChart = memo(({ results, carSetups }) => {
            const width = 800, height = 300, padding = 40;
            const carIds = Object.keys(results).map(Number);
            
            const allPoints = [];
            carIds.forEach(id => {
                results[id].forEach(lap => {
                    if(lap.time > 0) allPoints.push(lap.time);
                });
            });
            
            if (allPoints.length === 0) return null;

            const minTime = Math.min(...allPoints) * 0.95; // Un poco de margen abajo
            const maxTime = Math.max(...allPoints) * 1.05; // Un poco de margen arriba
            const timeRange = maxTime - minTime || 1;
            
            const maxLap = Math.max(...carIds.map(id => results[id].length));
            const lapRange = Math.max(1, maxLap - 1);

            const getX = (lapIdx) => padding + (lapIdx / lapRange) * (width - padding * 2);
            const getY = (time) => height - padding - ((time - minTime) / timeRange) * (height - padding * 2);

            const formatTime = (ms) => (ms/1000).toFixed(2);

            return (
                <div className="w-full bg-[#050a05] border border-gray-700 rounded-xl p-4 relative">
                    <h4 className="text-xs font-bold text-gray-400 uppercase tracking-widest mb-2 text-center">ANÁLISIS DE RITMO VUELTA A VUELTA</h4>
                    <svg viewBox={`0 0 ${width} ${height}`} className="w-full h-auto overflow-visible">
                        {[0, 0.25, 0.5, 0.75, 1].map((pct, i) => {
                            const y = height - padding - pct * (height - padding * 2);
                            const val = minTime + pct * timeRange;
                            return (
                                <g key={i}>
                                    <line x1={padding} y1={y} x2={width - padding} y2={y} stroke="#333" strokeWidth="1" strokeDasharray="4,4" />
                                    <text x={padding - 5} y={y + 3} textAnchor="end" className="text-[10px] fill-gray-500 font-mono">{formatTime(val)}s</text>
                                </g>
                            );
                        })}
                        <line x1={padding} y1={height - padding} x2={width - padding} y2={height - padding} stroke="#666" strokeWidth="1" />
                        <line x1={padding} y1={padding} x2={padding} y2={height - padding} stroke="#666" strokeWidth="1" />
                        {carIds.map(id => {
                            const data = results[id];
                            if (data.length < 1) return null;
                            let d = "";
                            data.forEach((lap, i) => {
                                const x = getX(i);
                                const y = getY(lap.time);
                                if (i === 0) d += `M ${x} ${y}`;
                                else d += ` L ${x} ${y}`;
                            });

                            return (
                                <g key={id}>
                                    <path d={d} fill="none" stroke={carSetups[id]?.color || '#fff'} strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" />
                                    {data.map((lap, i) => (
                                        <circle key={i} cx={getX(i)} cy={getY(lap.time)} r="4" fill="#000" stroke={carSetups[id]?.color} strokeWidth="2" />
                                    ))}
                                </g>
                            );
                        })}
                        {Array.from({length: maxLap}).map((_, i) => (
                            <text key={i} x={getX(i)} y={height - padding + 15} textAnchor="middle" className="text-[10px] fill-gray-400 font-mono">V{i+1}</text>
                        ))}
                    </svg>
                </div>
            );
        });

        // --- COMPONENTE TELEMETRÍA MOVIBLE Y COMPACTO ---

        /* --- 3. VISOR 3D (CORE LOGIC) --- */
        const Telemetry3DViewer = ({ circuitData, carSettings, customCarAssets, onCarAssetUpdate, onClose }) => {

            const [paused, setPaused] = useState(false);

            const displayCarName = (name) => name?.startsWith('PILOTO ') ? name.replace('PILOTO', t('pilot')) : (name || '');

            const [telemetryPos, setTelemetryPos] = useState({ x: 24, y: window.innerHeight - 280 });

            const dragOffset = useRef({ x: 0, y: 0 });

            const [laneChangeActive, setLaneChangeActive] = useState(false); // Siempre false en multicarril analógico
            const [raceState, setRaceState] = useState('grid');

            const [activeLights, setActiveLights] = useState(0); 
            
            // --- OPTIMIZACIÓN EXTREMA: Desacoplar el cronómetro de React para evitar 30 re-renders por segundo ---
            const formatRaceTime = (ms) => { if (!ms || ms === Infinity || isNaN(ms)) return "00:00.000"; const m = Math.floor(ms / 60000); const s = Math.floor((ms % 60000) / 1000); const sms = Math.floor(ms % 1000); return `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}.${sms.toString().padStart(3,'0')}`; };
            const elapsedTimeRef = useRef(0);
            const updateTimerDOM = (ms) => {
                elapsedTimeRef.current = ms;
                const el = document.getElementById('main-race-timer');
                if (el) el.innerText = formatRaceTime(ms);
            };
            
            const [targetLaps, setTargetLaps] = useState(10);
            
            const [cameraMode, setCameraMode] = useState('ORBIT'); 
            const cameraModeRef = useRef('ORBIT');
            useEffect(() => { cameraModeRef.current = cameraMode; }, [cameraMode]);

            // --- NUEVO: ESTADO DE PUENTES ---
            const bridgeMode = 'Básico'; // Optimizado para máximo rendimiento
            
            // --- NUEVO: ESTADO SENTIDO INVERTIDO ---
            const [isReversed, setIsReversed] = useState(false);
            const isReversedRef = useRef(isReversed);
            useEffect(() => { isReversedRef.current = isReversed; }, [isReversed]);

            const [validationError, setValidationError] = useState(null);
            const [trackVoltage, setTrackVoltage] = useState(12.0);
            const [activeButton, setActiveButton] = useState('GRID');
            const [isFullscreen, setIsFullscreen] = useState(false);
            const [manualThrottle, setManualThrottle] = useState(0);
            const [sceneReady, setSceneReady] = useState(false);
            
            // --- NUEVO: ESTADO DE NIVEL IA ---
            const [aiLevel, setAiLevel] = useState(3);
            const aiLevelRef = useRef(aiLevel);
            useEffect(() => { aiLevelRef.current = aiLevel; }, [aiLevel]);
            
            // --- NUEVAS REF PARA LOCUTORA AVANZADA ---
            const globalBestLapRef = useRef(Infinity);
            const hasAnnouncedLastLapRef = useRef(false);
            const lastPositionsRef = useRef({});
            const nextHypeTimeRef = useRef(0);
            const nextOvertakeTimeRef = useRef(0);
            const nextLeaderTimeRef = useRef(0);
            const leaderHoldRef = useRef({ id: null, count: 0 }); // NUEVO: Estabilidad del líder

            // CORRECCIÓN: Evitar "stale closure" del idioma en la locutora (Bucle en tiempo real)
            const langRef = useRef(lang);
            useEffect(() => { langRef.current = lang; }, [lang]);

            // --- LOCUTORA DIVERTIDA STATE ---
            const [announcerEnabled, setAnnouncerEnabled] = useState(true);
            const announcerEnabledRef = useRef(announcerEnabled); // REF PARA EL BUCLE 3D
            const lastCommentTime = useRef(0);
            
            // Sincronizar estado con la referencia y silenciar al instante si se apaga
            useEffect(() => { 
                announcerEnabledRef.current = announcerEnabled; 
                if (!announcerEnabled) {
                    window.speechSynthesis.pause(); // Hack para asegurar que se detiene en WebKit/Móviles
                    window.speechSynthesis.cancel(); 
                }
            }, [announcerEnabled]);

            const playCommentary = (type, extraData) => {
                if (!announcerEnabledRef.current) {
                    window.speechSynthesis.cancel(); // Seguridad extra para silenciarla
                    return; 
                }
                const now = Date.now();
                const isPriority = ['winner', 'start', 'green', 'crash', 'last_lap', 'overtake_leader', 'fastest'].includes(type);
                
                // Si está hablando y es una frase genérica, no pisamos el audio (flujo natural)
                if (window.speechSynthesis.speaking && !isPriority) return;

                // Cancelamos el audio anterior si es algo muy urgente
                if (isPriority) {
                    window.speechSynthesis.cancel();
                } else if (now - lastCommentTime.current < 1500) {
                    // Cooldown para frases menores para no saturar
                    return;
                }
                
                const currentLang = langRef.current; // USAR SIEMPRE LA REFERENCIA ACTUALIZADA
                let text = "";
                const phrases = currentLang === 'en' ? {
                    start: ["Drivers, start your engines!", "Attention on the grid!", "This is going to be legendary!", "Warming up tires, here we go!"],
                    countdown: ["Watch the lights!", "Maximum concentration!", "Stay awake!"],
                    green: ["GREEN LIGHT! Go go go!", "And they are off!", "Full throttle!", "We are racing!"],
                    crash: ["Whoa! Off the track!", "Brutal crash!", "What a hit!", "Careful on that corner!", "Someone bought a plot of land!", "Oh my goodness, what a smash!"],
                    fastest: ["Flying low!", "What a rhythm!", "Fastest lap absolute!", "Going like a rocket!", "Personal record pulverized!"],
                    winner: ["We have a winner!", "Spectacular victory!", "Flawless race!", "Straight to the podium!"],
                    pit: ["Entering the pits...", "Mechanics ready!", "Strategic stop!", "Time to refuel!"],
                    fuel_low: ["You are running dry!", "Reserve! Box box box!", "The tank is shivering!"],
                    session_end: ["Session completed!", "Testing finished!", "Returning to pits!", "Data successfully saved!"],
                    overtake: ["What an overtake!", "Changing positions!", "On the inside!", "Fighting neck and neck!", "Incredible maneuver!"],
                    overtake_leader: ["We have a new leader!", "He takes the first position!", "What an overtake for the lead!"],
                    last_lap: ["Last lap!", "This is ending!", "Everything to be decided in the final meters!"],
                    hype: ["What a race we are witnessing!", "The tension can be cut with a knife!", "The crowd is going wild!", "Nobody yields a millimeter!", "Maximum equality on the track!", "This pace is insane!", "The smell of burning rubber is real!"]
                } : {
                    start: ["¡Pilotos, enciendan motores!", "¡Atención en la parrilla!", "¡Esto va a ser legendario!", "¡Calentando neumáticos, que esto empieza!"],
                    countdown: ["¡Ojo al semáforo!", "¡Concentración máxima!", "¡Que nadie se duerma!"],
                    green: ["¡Semáforo VERDE! ¡Gaaaas!", "¡Salida, salida, salida!", "¡A fondo!", "¡Arrancamos con todo!"],
                    crash: ["¡Uyyy! ¡Salida de pista!", "¡Accidente brutal!", "¡Menudo golpe!", "¡Cuidado en esa curva!", "¡Alguien ha comprado una parcela!", "¡Ay mi madre, qué tortazo!", "¡Golpetazo contra las protecciones!"],
                    fastest: ["¡Vuela bajo!", "¡Qué ritmo lleva!", "¡Vuelta rápida absoluta!", "¡Va como un cohete!", "¡Récord pulverizado!", "¡Menudo tiempazo acaba de marcar!"],
                    winner: ["¡Tenemos ganador!", "¡Victoria espectacular!", "¡Carrera impecable!", "¡Directo al podio!"],
                    pit: ["Entrando en boxes...", "¡Mecánicos listos!", "¡Parada estratégica!", "¡A repostar!"],
                    fuel_low: ["¡Te quedas seco!", "¡Reserva! ¡Entra en boxes!", "¡El depósito está tiritando!"],
                    session_end: ["¡Sesión completada!", "¡Pruebas finalizadas!", "¡Volvemos a boxes!", "¡Datos guardados con éxito!"],
                    overtake: ["¡Vaya pasada!", "¡Espectacular adelantamiento!", "¡Cambio de posiciones!", "¡Por el interior!", "¡Luchando cuerpo a cuerpo!", "¡Se tira con todo!"],
                    overtake_leader: ["¡Tenemos nuevo líder de carrera!", "¡Se coloca en primera posición!", "¡Adelantamiento por el liderato!", "¡Golpe de autoridad en la cabeza!"],
                    last_lap: ["¡Última vuelta!", "¡Esto se acaba, señores!", "¡Todo por decidir en los últimos metros!", "¡Campana y se acabó, entramos en la última vuelta!"],
                    hype: ["¡Qué carrera estamos viviendo!", "¡La tensión se corta con un cuchillo!", "¡El público está enloquecido!", "¡Nadie cede ni un milímetro!", "¡Igualdad máxima en la pista!", "¡El ritmo es de infarto!", "¡Qué maravilla de competición!"]
                };

                const list = phrases[type] || [];
                if (list.length > 0) {
                    text = list[Math.floor(Math.random() * list.length)];
                    if (extraData) {
                        if (type === 'winner') text = currentLang === 'en' ? `Incredible! ${extraData} wins the race! ` + text : `¡Increíble! ¡${extraData} gana la carrera! ` + text;
                        if (type === 'fastest') text = currentLang === 'en' ? `${extraData} sets the fastest lap! ` + text : `¡${extraData} acaba de marcar vuelta rápida! ` + text;
                        if (type === 'overtake') text = currentLang === 'en' ? `${extraData} is overtaking! ` + text : `¡${extraData} está atacando! ` + text;
                        if (type === 'overtake_leader') text = currentLang === 'en' ? `${extraData} takes the lead! ` + text : `¡${extraData} asume el liderato! ` + text;
                    }
                }

                if (text) {
                    lastCommentTime.current = now;
                    const utterance = new SpeechSynthesisUtterance(text);
                    // Damos un poco de aleatoriedad a la voz para que suene excitada
                    utterance.rate = 1.25 + (Math.random() * 0.1); 
                    utterance.pitch = 1.3 + (Math.random() * 0.15); 
                    utterance.volume = 1.0;
                    
                    // 1. FORZAMOS AL NAVEGADOR A CAMBIAR SU MOTOR FONÉTICO
                    utterance.lang = currentLang === 'en' ? 'en-US' : 'es-ES';
                    
                    const voices = window.speechSynthesis.getVoices();
                    
                    if (voices.length > 0) {
                        // 2. Filtramos ESTRICTAMENTE por español de España (es-ES) o inglés estándar (en-US / en-GB)
                        let exactVoices = voices.filter(v => {
                            const l = v.lang.toLowerCase();
                            return currentLang === 'es' ? (l === 'es-es' || l === 'es_es') : (l === 'en-us' || l === 'en_us' || l === 'en-gb' || l === 'en_gb');
                        });

                        // Fallback por si el navegador o SO no especifica región
                        if (exactVoices.length === 0) {
                            exactVoices = voices.filter(v => v.lang.toLowerCase().startsWith(currentLang));
                        }
                        
                        if (exactVoices.length > 0) {
                            // 3. Buscamos voces conocidas de España (Helena, Laura, Monica, Google España) y de USA/UK (Samantha, Zira)
                            let selectedVoice = exactVoices.find(v => {
                                const n = v.name.toLowerCase();
                                if (currentLang === 'es') {
                                    return n.includes('helena') || n.includes('laura') || n.includes('monica') || n.includes('españa') || n.includes('jorge');
                                } else {
                                    return n.includes('samantha') || n.includes('zira') || n.includes('hazel') || n.includes('google us') || n.includes('google uk');
                                }
                            });
                            
                            // 4. Si no encuentra las Premium, coge la primera del idioma exacto (garantizando es-ES o en-US)
                            if (!selectedVoice) {
                                selectedVoice = exactVoices[0];
                            }
                            utterance.voice = selectedVoice;
                        }
                    }
                    
                    window.speechSynthesis.speak(utterance);

            };

            const [laneChangePressed, setLaneChangePressed] = useState(false);

            const [autoLaneChange, setAutoLaneChange] = useState(false);
            const [numCars, setNumCars] = useState(2);

            const rallyDistancesRef = useRef([]);

                    // --- AUTO BRIDGE ELEVATION LOGIC (OPTIMIZED & SMOOTH) ---
                    const applyBridgeElevations = () => {

                                    const rallyLookAhead = Math.min(15.0, Math.max(4.0, car.speed * 0.04));
                                    getRallyPositionByDist(car.distance, _rallyPos);
                                    getRallyPositionByDist(car.distance + (rallyLookAhead * moveDir), _rallyTangent); 
                                    _dir.subVectors(_rallyTangent, _rallyPos).normalize();
                                    car.worldPos.copy(_rallyPos); 
                                    
                                    _rallyPos.add(_rallyOffset);
                                    if (!pg.userData.initPos || Math.abs(pg.position.y - _rallyPos.y) > 2.0) {
                                        pg.position.copy(_rallyPos);
                                        pg.userData.initPos = true;
                                    } else {
                                        pg.position.x = _rallyPos.x;
                                        pg.position.z = _rallyPos.z; 
                                        pg.position.y += (_rallyPos.y - pg.position.y) * lerpFactor;
                                    }

                                    _flook.copy(_rallyPos).add(_dir);
                                    _targetMatrix.lookAt(_rallyPos, _flook, _up);
                                    _targetRotation.setFromRotationMatrix(_targetMatrix);
                                    
                                    if (car.speed < 5.0) {
                                        pg.quaternion.copy(_targetRotation);
                                    } else {
                                        pg.quaternion.slerp(_targetRotation, lerpFactor);
                                    }
                                } else {
                                    
                                    if (shouldMove) {
                                        if (moveDir === 1) {
                                            if (oldDist <= finishLineDist && rawNewDist >= finishLineDist) {
                                                crossedFinish = true;
                                            } else if (rawNewDist >= totalDist && (rawNewDist - totalDist) >= finishLineDist) {
                                                crossedFinish = true; 
                                            }
                                            car.distance = rawNewDist % totalDist;
                                        } else {
                                            if (oldDist >= finishLineDist && rawNewDist <= finishLineDist) {
                                                crossedFinish = true;
                                            } else if (rawNewDist < 0 && (rawNewDist + totalDist) <= finishLineDist) {
                                                crossedFinish = true;
                                            }
                                            car.distance = rawNewDist < 0 ? rawNewDist + totalDist : rawNewDist;
                                        }
                                    }

                                    const lookAhead = Math.min(15.0, Math.max(4.0, car.speed * 0.04)); 
                                    let nxt = car.distance + (lookAhead * moveDir);
                                    if (nxt < 0) nxt += totalDist;
                                    else nxt = nxt % totalDist;

                                    for(let j=0; j<numLanes; j++) {
                                        getPositionAtDistance(rails.lanes[j], car.distance, _posLanes[j]);
                                    }
                                    let ppit = getPositionAtDistance(rails.pit, car.distance, _posPit);
                                    if (!ppit && rails.pit.length > 0) ppit = _posLanes[numLanes - 1];

                                    let mf = 0, mf_look = 0; 
                                    if (car.isChanging && cp) { 
                                        const len = cp.distEnd - cp.distStart; const local = car.distance - cp.distStart; car.changeProgress = local / len; mf = easeSine(car.changeProgress); 
                                        const localLook = local + lookAhead; if (localLook < len) { mf_look = easeSine(localLook / len); } else { mf_look = 1; }
                                    }
                                    const glv = (l) => l===LANE_PIT?ppit:(_posLanes[l % numLanes] || _posLanes[0]);
                                    
                                    const vecCur = glv(car.currentLane);
                                    const vecTar = glv(car.targetLane);
                                    if (vecCur && vecTar) _fpos.lerpVectors(vecCur, vecTar, mf);
                                    else if (vecCur) _fpos.copy(vecCur);
                                    else _fpos.set(0,0,0);

                                    for(let j=0; j<numLanes; j++) {
                                        getPositionAtDistance(rails.lanes[j], nxt, _posFLanes[j]);
                                    }
                                    let fpit = getPositionAtDistance(rails.pit, nxt, _posFPit);
                                    if (!fpit && rails.pit.length > 0) fpit = _posFLanes[numLanes - 1];

                                    const glvf = (l) => l===LANE_PIT?fpit:(_posFLanes[l % numLanes] || _posFLanes[0]);
                                    
                                    const vecFCur = glvf(car.currentLane);
                                    const vecFTar = glvf(car.targetLane);
                                    if (vecFCur && vecFTar) _flook.lerpVectors(vecFCur, vecFTar, mf_look);
                                    else if (vecFCur) _flook.copy(vecFCur);
                                    else _flook.copy(_fpos);

                                    const lerpFactor = 1.0 - Math.exp(-25.0 * dt); // Suavizado exponencial independiente de FPS

                                    _tan.subVectors(_flook, _fpos).normalize(); 
                                    car.worldPos.copy(_fpos); 
                                    
                                    _fpos.add(_yOffset); 
                                    if (!pg.userData.initPos || Math.abs(pg.position.y - _fpos.y) > 2.0) {
                                        pg.position.copy(_fpos); 
                                        pg.userData.initPos = true;
                                    } else {
                                        pg.position.x = _fpos.x;
                                        pg.position.z = _fpos.z; 
                                        pg.position.y += (_fpos.y - pg.position.y) * lerpFactor; 
                                    }
                                    
                                    if (_tan.lengthSq() > 0.0001) {
                                        _dir.copy(_fpos).sub(_tan); 
                                        _targetMatrix.lookAt(_fpos, _dir, _up);
                                        _targetRotation.setFromRotationMatrix(_targetMatrix);
                                        
                                        if (car.speed < 5.0) {
                                            pg.quaternion.copy(_targetRotation);
                                        } else {
                                            pg.quaternion.slerp(_targetRotation, lerpFactor); 
                                        }
                                    } else {
                                        _targetRotation.setFromUnitVectors(_zAxis, _tan);
                                        pg.quaternion.slerp(_targetRotation, lerpFactor);
                                    }
                                    
                                    if (cp) {
                                        if (car.lastPieceIndex !== cp.index) { 
                                            car.lastPieceIndex = cp.index; 
                                            if (car.isChanging) { car.isChanging = false; car.currentLane = car.targetLane; }
                                            if (car.currentLane === LANE_PIT && !cp.isPitSection) { car.currentLane = (car.targetLane === LANE_PIT) ? 1 : car.targetLane; car.targetLane = car.currentLane; }
                                            if (car.targetLane === LANE_PIT && cp.isPitSection) car.currentLane = LANE_PIT; else if (car.currentLane !== LANE_PIT) car.currentLane = car.targetLane;
                                        }
                                        const distInPiece = car.distance - cp.distStart;
                                        const pieceLen = cp.distEnd - cp.distStart;
                                        
                                        if (!isReversedRef.current) {
                                            const isEarlyInPiece = distInPiece < (pieceLen * 0.35); 
                                            if (!car.isChanging && laneActiveRef.current && cp.canChangeLane && shouldMove) {
                                                let nl = car.currentLane, sc = false, isPlayer = (car.id === selectedCarIdRef.current && activeButtonRef.current === 'DIGITAL');
                                                if (car.currentLane !== LANE_PIT && isEarlyInPiece) {
                                                    if (isPlayer) {
                                                        const wc = laneChangePressedRef.current || (autoLaneChangeRef.current && Math.random()>0.5);
                                                        const wp = car.wantsToPit; 
                                                        if (cp.type === 'pit_entry') { if (car.currentLane === (cp.invert?0:1) && wp) { nl = LANE_PIT; sc = true; } }
                                                        else if (wc) { if (cp.subtype === 'digital_x' || cp.subtype === 'pit_parallel_double_x') { nl = (car.currentLane===0?1:0); sc = true; } else if (cp.subtype === 'change_right' && car.currentLane === 0) { nl = 1; sc = true; } else if (cp.subtype === 'change_left' && car.currentLane === 1) { nl = 0; sc = true; } }
                                                    } else { 
                                                        const pitEntryPiece = pieceMapRef.current.find(p => p.type === 'pit_entry');
                                                        const targetPitLane = pitEntryPiece ? (pitEntryPiece.invert ? 0 : 1) : 1;
                                                        
                                                        if (cp.type === 'pit_entry' && car.currentLane === targetPitLane && car.wantsToPit) { 
                                                            nl = LANE_PIT; sc = true; 
                                                        } else if (car.wantsToPit && car.currentLane !== targetPitLane) {
                                                            if (cp.subtype === 'digital_x' || cp.subtype === 'pit_parallel_double_x') { 
                                                                nl = targetPitLane; sc = true; 
                                                            } else if (cp.subtype === 'change_right' && car.currentLane === 0 && targetPitLane === 1) {
                                                                nl = targetPitLane; sc = true;
                                                            } else if (cp.subtype === 'change_left' && car.currentLane === 1 && targetPitLane === 0) {
                                                                nl = targetPitLane; sc = true;
                                                            }
                                                        } else if (!car.wantsToPit && (cp.subtype === 'digital_x' || cp.subtype === 'pit_parallel_double_x') && Math.random()>0.8) {
                                                            nl = (car.currentLane===0?1:0); sc = true;
                                                        }
                                                    }
                                                }
                                                if (cp.type === 'pit_exit' && car.currentLane === LANE_PIT) { nl = cp.invert?0:1; sc = true; }
                                                if (sc) { car.isChanging = true; car.targetLane = nl % numLanes; car.changeProgress = distInPiece / pieceLen; }
                                            }
                                        }
                                    }
                                }

                                if (crossedFinish && shouldMove && (raceStateRef.current === 'racing' || raceStateRef.current === 'idle')) {
                                    if (!car.crossedStartLine) {
                                        car.crossedStartLine = true;
                                        car.lapStartTime = nowTime;
                                    } else {
                                        const lapTime = nowTime - car.lapStartTime;
                                        if (lapTime > 2000) {

                                            if (lapTime < globalBestLapRef.current && raceStateRef.current === 'racing' && car.completedLaps > 0) {

                                            car.lapStartTime = nowTime;
                                            
                                            if (!sessionDataRef.current[car.id]) sessionDataRef.current[car.id] = [];
                                            sessionDataRef.current[car.id].push({ lap: car.completedLaps, time: lapTime });

                                for (let i=0; i<ac.length; i++) {

                                            });
                                        }
                                    }
                                }
                            }
                        } 

                        if (hasTrackedCar) {
                            const worldOffset = trackGroup.position; 
                            _worldP1.copy(_trackedP1).add(worldOffset); 

                            if (cameraModeRef.current === 'PILOT') {
                                _targetPos.copy(_worldP1).addScaledVector(_trackedDir, 1.5);
                                _targetPos.y += 2.8;
                                _lookTarget.copy(_targetPos).addScaledVector(_trackedDir, 50);
                                camera.position.lerp(_targetPos, 1 - Math.exp(-15 * dt)); 
                                camera.lookAt(_lookTarget);
                            } else if (cameraModeRef.current === 'CHASE') {
                                _targetPos.copy(_worldP1).addScaledVector(_trackedDir, -50);
                                _targetPos.y += 30;
                                camera.position.lerp(_targetPos, 1 - Math.exp(-5 * dt));

                                camera.position.copy(cameraTarget).add(_camPos);

                            camera.lookAt(cameraTarget);
                        }

                        renderer.render(scene, camera); 
                    };
                    animate(); 

                    const telemetryInterval = setInterval(() => {
                        const totalDist = accumulatedDist;
                        const currentTrackLen = (hasRotonda && rallyDistancesRef.current.length > 0) ? rallyDistancesRef.current[rallyDistancesRef.current.length - 1] : totalDist;
                        
                        const finishPiece = pieceMapRef.current.find(p => ['analog_connect', 'connection', 'starting_grid'].includes(p.subtype)) || pieceMapRef.current[0];
                        const finishLineDist = finishPiece ? (finishPiece.distStart + (finishPiece.distEnd - finishPiece.distStart) * 0.5) : 0;
                        
                        const ac = physicsState.current.filter(c => c.id <= numCarsRef.current);
                        
                        const sc = ac.map(c => {
                            let lapDist = c.distance - finishLineDist;
                            if (isReversedRef.current) lapDist = finishLineDist - c.distance;
                            
                            if (lapDist < 0) lapDist += currentTrackLen;
                            if (lapDist >= currentTrackLen) lapDist -= currentTrackLen;

                            const completedLaps = raceStateRef.current !== 'idle' ? targetLapsRef.current - c.laps : c.laps;
                            return { ...c, sc: completedLaps + (lapDist / currentTrackLen) };
                        }).sort((a,b)=>b.sc-a.sc);
                        
                        if (raceStateRef.current === 'racing') {
                            const now = Date.now();
                            const currentLeader = sc[0]?.id;
                            
                            if (currentLeader !== leaderHoldRef.current.id) {
                                leaderHoldRef.current = { id: currentLeader, count: 1 };
                            } else {
                                leaderHoldRef.current.count++;

                            if (Object.keys(lastPositionsRef.current).length > 0 && sc.length > 1) {

                                if (leaderHoldRef.current.count === 3 && oldLeaderId && String(currentLeader) !== String(oldLeaderId)) {

                    }, 250);

                };
