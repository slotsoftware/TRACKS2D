                outNodes.push({ x: exitX + laneOff * Math.sin(exitAngle), y: exitY - laneOff * Math.cos(exitAngle), angle: exitAngle, role: 'rail' });

                outNodes.push({ x: exitX - laneOff * Math.sin(exitAngle), y: exitY + laneOff * Math.cos(exitAngle), angle: exitAngle, role: 'rail' });
            }

            return {
                inX: p.x, inY: p.y, inZ: z, inAngle: rot,
                outX: exitX, outY: exitY, outZ: z, outAngle: exitAngle,
                localDx: dx, localDy: dy, localDa: da,
                midX, midY, hitRadius, inNodes, outNodes, isSingleLane
            };
        };

        const migrateToAbsolute = (piecesList, circuitOrigin = {x:0, y:0}) => {
            let cx = circuitOrigin.x || 0, cy = circuitOrigin.y || 0, currentAngle = 0;
            const endPos = {};

            return piecesList.map((p, index) => {
                if (!p) return null;
                
                if (p.type === 'set_origin') {
                    cx = circuitOrigin.x + (p.x || 0);
                    cy = circuitOrigin.y + (p.y || 0);
                    currentAngle = p.angle || 0;
                    endPos[p.uid] = { cx, cy, currentAngle };
                    return { ...p, x: cx, y: cy, rot: currentAngle };
                }

                if (p.type === 'goto') {
                    if (endPos[p.targetUid]) {
                        cx = endPos[p.targetUid].cx;
                        cy = endPos[p.targetUid].cy;
                        currentAngle = endPos[p.targetUid].currentAngle;
                    }
                    endPos[p.uid] = { cx, cy, currentAngle };
                    return { ...p, x: cx, y: cy, rot: currentAngle };
                }

                if (p.x !== undefined && p.rot !== undefined) return p; 
                
                const brand = TRACK_DEFINITIONS[p.brandKey || 'NINCO'] || TRACK_DEFINITIONS['NINCO'];
                const laneOff = brand.laneSpacing / 2;
                
                let pX = cx, pY = cy, pRot = currentAngle;
                if (p.invert && p.subtype !== 'rotonda') pRot += Math.PI;

                let dx = 0, dy = 0, dAngle = 0;
                if (p.type === 'rotonda' || p.subtype === 'rotonda') { dAngle = Math.PI; }
                else if (p.type === 'straight' || (p.type && p.type.includes('pit'))) { 
                    dx = p.length; 
                    if (p.shiftY) dy = p.shiftY;
                }
                else if (p.type === 'compound_curve_change') {
                    let effectiveRadius = Math.abs(p.radius);
                    const aRad = (p.angle * Math.PI) / 180;
                    if (p.direction === 'left') { dx = p.length + effectiveRadius * Math.sin(aRad); dy = -effectiveRadius * (1 - Math.cos(aRad)); dAngle = -aRad; }
                    else { dx = p.length + effectiveRadius * Math.sin(aRad); dy = effectiveRadius * (1 - Math.cos(aRad)); dAngle = aRad; }
                }
                else if (p.type === 'curve') {
                    let effectiveRadius = Math.abs(p.radius);
                    if (p.subtype === 'single_lane_1') effectiveRadius = p.direction === 'left' ? effectiveRadius - laneOff : effectiveRadius + laneOff;
                    else if (p.subtype === 'single_lane_2') effectiveRadius = p.direction === 'left' ? effectiveRadius + laneOff : effectiveRadius - laneOff;
                    
                    const r = effectiveRadius;
                    const aRad = (p.angle * Math.PI) / 180;
                    if (p.direction === 'left') { dx = r * Math.sin(aRad); dy = -r * (1 - Math.cos(aRad)); dAngle = -aRad; }
                    else { dx = r * Math.sin(aRad); dy = r * (1 - Math.cos(aRad)); dAngle = aRad; }
                }
                if (p.invert && p.subtype !== 'rotonda') { dx = -dx; dy = -dy; }

                cx += dx * Math.cos(currentAngle) - dy * Math.sin(currentAngle);
                cy += dx * Math.sin(currentAngle) + dy * Math.cos(currentAngle);
                currentAngle += dAngle;

                endPos[p.uid] = { cx, cy, currentAngle };

                return { ...p, x: pX, y: pY, rot: pRot, invert: false }; 
            }).filter(p => p && p.type !== 'goto' && p.type !== 'set_origin'); 
        };

        const getAngleDiff = (a1, a2) => {
            let diff = Math.abs((a1 - a2) % (Math.PI * 2));
            if (diff > Math.PI) diff = Math.PI * 2 - diff;
            return diff;
        };

        // Redirección súper inteligente para circuitos antiguos o con marca dañada
        const getResolvedBrand = (brandStr, pieces = []) => {
            let bStr = brandStr;
            
            // Si falta la marca, intentamos adivinarla mirando el código de la primera pieza
            if ((!bStr || bStr === 'undefined' || bStr === 'null') && pieces && pieces.length > 0) {
                const firstP = pieces.find(p => p && p.brandKey) || pieces[0];
                bStr = firstP.brandKey;
                if (!bStr || bStr === 'undefined' || bStr === 'null') {
                    const firstId = firstP.id || '';
                    if (firstId.startsWith('c_')) bStr = 'SCX_CLASSIC';
                    else if (firstId.startsWith('s_')) bStr = 'SCX_ANALOG';
                    else if (firstId.startsWith('adv_')) bStr = 'SCX_ADVANCE';
                    else if (firstId.startsWith('n_')) bStr = 'NINCO';
                    else if (firstId.startsWith('sca_')) bStr = 'SCALEAUTO';
                    else if (firstId.startsWith('pol_')) bStr = 'POLICAR';
                    else if (firstId.startsWith('suk_')) bStr = 'SCALEXTRIC_UK';
                    else if (firstId.startsWith('car_')) bStr = 'CARRERA';
                }
            }

            if (!bStr || bStr === 'undefined' || bStr === 'null') return 'NINCO';
            if (TRACK_DEFINITIONS[bStr]) return bStr;
            
            const upperStr = String(bStr).toUpperCase();
            if (upperStr.includes('UNIVERSAL') || upperStr === 'SCX_UNIVERSAL_GRISES' || upperStr === 'SCX_ANALOG') return 'SCX_ANALOG';
            // Si el circuito se etiquetó como "SCALEXTRIC" genérico (sin matizar clásico), asume SCX_ANALOG (Scalextric Gris)
            if (upperStr === 'SCALEXTRIC' || upperStr === 'SCX') return 'SCX_ANALOG'; 
            if (upperStr === 'SCX_ORIGINAL' || upperStr === 'SCX_CLASSIC' || upperStr === 'SCX CLÁSICO (NEGRO)' || upperStr === 'SCX_CLASSIC_NEGRAS') return 'SCX_CLASSIC';
            if (upperStr.includes('UK') || upperStr === 'SUPER_SLOT') return 'SCALEXTRIC_UK';
            if (upperStr.includes('ADVANCE')) return 'SCX_ADVANCE';
            
            const foundKey = Object.keys(TRACK_DEFINITIONS).find(k => TRACK_DEFINITIONS[k].name.toUpperCase() === upperStr);
            if (foundKey) return foundKey;

            return 'NINCO'; 
        };

        // Compilador 3D MEJORADO: ENCADENAMIENTO ESTRICTO Y CONTINUO
        // Transforma un "puzzle" caótico en un circuito perfecto dibujado "del tirón"
        const compileCircuitFor3D = (rawPieces) => {
            if (!rawPieces || rawPieces.length === 0) return [];
            
            const finalCompiled = [];
            const lanes = {};
            
            // 0. ANTI-FANTASMAS: Eliminamos piezas superpuestas en las mismas coordenadas exactas
            const uniquePiecesMap = new Map();
            rawPieces.forEach(rawP => {
                if (!rawP) return;
                const p = JSON.parse(JSON.stringify(rawP));
                // Clave basada en posición con precisión de 1mm
                const key = `${Math.round(p.x * 10) / 10}_${Math.round(p.y * 10) / 10}_${Math.round((p.rot || 0) * 10) / 10}_${p.lane || 0}`;
                // Guardamos la pieza. Si hay un fantasma superpuesto, se sobreescribe, dejando solo 1 pieza real en ese espacio.
                uniquePiecesMap.set(key, p);
            });
            
            // 1. Clonamos profundamente las piezas para no corromper la memoria de React
            const expandedPieces = [];

            Array.from(uniquePiecesMap.values()).forEach(p => {
                
                // Mantenemos los subtypes originales para que el motor 3D dibuje las curvas 
                // digitales exactamente igual que en 2D, sin alterar su comportamiento.
                if (p.subtype === 'crossing_curve') {
                    p.subtype = 'crossing'; // Adaptamos para que el motor 3D la dibuje sin dejar un hueco y cruce los carriles
                }

                // SANITIZACIÓN PARA 3D: Chicanes especiales SCX y Deslizantes
                const currentBrandKey = p.brandKey || (rawPieces.find(rp => rp.brandKey)?.brandKey) || 'NINCO';
                const brandDef = TRACK_DEFINITIONS[currentBrandKey] || TRACK_DEFINITIONS['NINCO'];

                if (p.subtype === 'squeeze') {
                    // EXPLICACIÓN DEL FALLO EN 3D:
                    // El simulador 3D NO tiene programado el modelo "squeeze". Cuando lo lee, se rinde y dibuja una recta normal.
                    // SOLUCIÓN MÁGICA: Dividimos el "squeeze" de 35cm en DOS piezas virtuales de 17.5cm (Entrada + Salida).
                    // El motor 3D SÍ sabe dibujar entradas y salidas, así que ahora la pista se estrechará perfectamente.
                    const p1 = { ...p, uid: p.uid + "_1", id: 'n_chicane_in', subtype: 'chicane_entry', length: p.length / 2, width: brandDef.width, laneSpacing: brandDef.laneSpacing };
                    const p2 = { ...p, uid: p.uid + "_2", id: 'n_chicane_out', subtype: 'chicane_exit', length: p.length / 2, width: brandDef.width, laneSpacing: brandDef.laneSpacing };
                    
                    // Posicionamos la segunda pieza justo en la mitad
                    p2.x = p1.x + (p.length / 2) * Math.cos(p.rot || 0);
                    p2.y = p1.y + (p.length / 2) * Math.sin(p.rot || 0);
                    
                    delete p1.groupId; delete p1.cat; delete p1.brandKey;
                    delete p2.groupId; delete p2.cat; delete p2.brandKey;
                    
                    expandedPieces.push(p1, p2);
                    return; // Saltamos la original
                }

                if (p.subtype === 'chicane3_entry' || p.subtype === 'chicane_entry') {
                    p.subtype = 'chicane_entry';
                    p.id = 'n_chicane_in';
                    p.width = brandDef.width;
                    p.laneSpacing = brandDef.laneSpacing;
                } else if (p.subtype === 'chicane3_middle' || p.subtype === 'chicane_middle') {
                    p.subtype = 'chicane_middle';
                    p.id = 'n_chicane_mid';
                    p.width = brandDef.width;
                    p.laneSpacing = brandDef.laneSpacing;
                } else if (p.subtype === 'chicane3_exit' || p.subtype === 'chicane_exit') {
                    p.subtype = 'chicane_exit';
                    p.id = 'n_chicane_out';
                    p.width = brandDef.width;
                    p.laneSpacing = brandDef.laneSpacing;
                } else if (p.subtype === 'crossing') {
                    // Forzar a que cualquier cruce X use el ID de Ninco para que el motor 3D no falle
                    p.id = 'n_cross';
                    p.width = brandDef.width;
                    p.laneSpacing = brandDef.laneSpacing;
                }

                // SANITIZACIÓN PARA 3D: Cambios en Curva de Carrera.
                // A petición del piloto, queremos que el cambio de carril ocurra EN LA CURVA.
                // Para que el motor 3D no se vuelva loco con el "compound spline" original, 
                // transformamos la recta de entrada en una recta normal, y le asignamos 
                // la orden matemática de "cambio de carril" directamente al arco de la curva.
                if (p.subtype === 'digital_str_curve_in' || p.subtype === 'digital_str_curve_out') {
                    // La recta previa actúa solo de aproximación (recta estándar 34.5cm)
                    delete p.subtype;
                    p.id = 'car_345'; 
                    p.direction = 'left'; // Normalizamos rectas para el 3D
                } else if (p.subtype === 'digital_arc_curve_in') {
                    // La curva ejecuta dinámicamente el cambio hacia el INTERIOR mientras gira
                    p.subtype = p.direction === 'left' ? 'change_left' : 'change_right';
                } else if (p.subtype === 'digital_arc_curve_out') {
                    // La curva ejecuta dinámicamente el cambio hacia el EXTERIOR mientras gira
                    p.subtype = p.direction === 'left' ? 'change_right' : 'change_left';
                }

                // Limpieza de seguridad: las rectas no giran, forzamos left para evitar cuelgues
                if (p.type === 'straight' || (p.type && p.type.includes('pit'))) {
                    p.direction = 'left'; 
                }

                // SANITIZAR PROPIEDADES EXTRAS (Elimina variables de control 2D que pueden crashear el parser JSON estricto del motor 3D)
                delete p.groupId;
                delete p.cat;
                delete p.brandKey;

                expandedPieces.push(p);
            });

            expandedPieces.forEach(p => {
                const laneId = p.lane || 0;
                if (!lanes[laneId]) lanes[laneId] = [];
                lanes[laneId].push(p);
            });

            Object.keys(lanes).sort((a,b)=>a-b).forEach(laneId => {
                let pool = lanes[laneId];
                if (pool.length === 0) return;

                const origGeos = new Map();
                pool.forEach(p => {
                    origGeos.set(p.uid, getPieceGeometry(p));
                });

                const findNextPiece = (searchPointNodes, availablePool) => {
                    let bestIdx = -1;
                    let bestDist = Infinity;
                    let connectedToIn = true;
                    let targetSearchNode = null;
                    let targetPieceNodeIndex = -1;

                    for (let i = 0; i < availablePool.length; i++) {
                        const cand = availablePool[i];
                        const ep = origGeos.get(cand.uid);
                        
                        searchPointNodes.forEach(sNode => {
                            ep.inNodes.forEach((inNode, idx) => {
                                const dist = Math.hypot(sNode.x - inNode.x, sNode.y - inNode.y);
                                const aDiff = getAngleDiff(sNode.angle, inNode.angle);
                                if (dist < 15.0 && aDiff < 0.5 && dist < bestDist) {
                                    bestDist = dist; bestIdx = i; connectedToIn = true;
                                    targetSearchNode = sNode; targetPieceNodeIndex = idx;
                                }
                            });
                            
                            const isCandRotonda = cand.type === 'rotonda' || cand.subtype === 'rotonda' || cand.subtype === 'rotonda_connect';
                            if (!isCandRotonda) {
                                ep.outNodes.forEach((outNode, idx) => {
                                    const dist = Math.hypot(sNode.x - outNode.x, sNode.y - outNode.y);
                                    const aDiff = getAngleDiff(sNode.angle, (outNode.angle + Math.PI) % (Math.PI*2));
                                    if (dist < 15.0 && aDiff < 0.5 && dist < bestDist) {
                                        bestDist = dist; bestIdx = i; connectedToIn = false;
                                        targetSearchNode = sNode; targetPieceNodeIndex = idx;
                                    }
                                });
                            }
                        });
                    }

                    return { bestIdx, connectedToIn, targetSearchNode, targetPieceNodeIndex };
                };

                let bestChainForLane = [];

                while(pool.length > 0) {
                    let currentChain = [];

                    let startIdx = pool.findIndex(p => p.type === 'rotonda' || p.subtype === 'rotonda' || p.subtype === 'rotonda_connect');
                    if (startIdx === -1) startIdx = pool.findIndex(p => p.subtype === 'analog_connect' || p.subtype === 'connection' || p.subtype === 'starting_grid' || p.subtype === 'digital_console');
                    
                    if (startIdx === -1) {
                        startIdx = pool.findIndex(p => {
                            const ep = origGeos.get(p.uid);
                            let hasIncoming = false;
                            for (const other of pool) {
                                if (other.uid === p.uid) continue;
                                const oEp = origGeos.get(other.uid);
                                const distFromOut = Math.hypot(ep.inX - oEp.outX, ep.inY - oEp.outY);
                                const distFromIn = Math.hypot(ep.inX - oEp.inX, ep.inY - oEp.inY);
                                if ((distFromOut < 15.0 && getAngleDiff(ep.inAngle, oEp.outAngle) < 0.5) || 
                                    (distFromIn < 15.0 && getAngleDiff(ep.inAngle, (oEp.inAngle + Math.PI)) < 0.5)) {
                                    hasIncoming = true;
                                    break;
                                }
                            }
                            return !hasIncoming;
                        });
                    }
                    if (startIdx === -1) startIdx = 0;

                    let current = pool.splice(startIdx, 1)[0];
                    current.inZ = current.elevation || 0;
                    current.outZ = current.elevation || 0;
                    currentChain.push(current);
                    
                    let firstGeo = getPieceGeometry(current);
                    let currentSearchExitNodes = firstGeo.outNodes.map(n => ({ ...n, z: current.outZ }));

                    let chainContinues = true;
                    while (chainContinues && pool.length > 0) {
                        const { bestIdx, connectedToIn, targetSearchNode } = findNextPiece(currentSearchExitNodes, pool);

                        if (bestIdx !== -1) {
                            let nextPiece = pool.splice(bestIdx, 1)[0];

                            // 2. RECONSTRUCCIÓN MATEMÁTICA FÍSICA PARA EVITAR EL TELETRANSPORTE
                            if (!connectedToIn) {
                                // Si se montó al revés, físicamente la volvemos del derecho
                                if (nextPiece.type === 'curve' || nextPiece.subtype === 'chicane_curve' || nextPiece.type === 'rotonda' || nextPiece.subtype === 'rotonda' || nextPiece.subtype === 'rotonda_connect') {
                                    nextPiece.direction = nextPiece.direction === 'left' ? 'right' : 'left';
                                }
                                const tmpL = nextPiece.borderLeft;
                                nextPiece.borderLeft = nextPiece.borderRight;
                                nextPiece.borderRight = tmpL;
                                
                                // Intercambiamos Entradas por Salidas para que el 3D no choque
                                if (nextPiece.subtype === 'chicane_entry') {
                                    nextPiece.subtype = 'chicane_exit';
                                    if (nextPiece.id === 'n_chicane_in') nextPiece.id = 'n_chicane_out';
                                } else if (nextPiece.subtype === 'chicane_exit') {
                                    nextPiece.subtype = 'chicane_entry';
                                    if (nextPiece.id === 'n_chicane_out') nextPiece.id = 'n_chicane_in';
                                }
                                
                                if (nextPiece.type === 'pit_entry') nextPiece.type = 'pit_exit';
                                else if (nextPiece.type === 'pit_exit') nextPiece.type = 'pit_entry';
                                
                                // Invertir propiedades de pistas de adaptación para que el motor 3D entienda el cambio de ancho
                                if (nextPiece.subtype === 'adapter_ninco_scx') nextPiece.subtype = 'adapter_scx_ninco';
                                else if (nextPiece.subtype === 'adapter_scx_ninco') nextPiece.subtype = 'adapter_ninco_scx';
                                else if (nextPiece.subtype === 'adapter_ninco_suk') nextPiece.subtype = 'adapter_suk_ninco';
                                else if (nextPiece.subtype === 'adapter_suk_ninco') nextPiece.subtype = 'adapter_ninco_suk';
                                else if (nextPiece.subtype === 'adapter_scx_adv') nextPiece.subtype = 'adapter_adv_scx';
                                else if (nextPiece.subtype === 'adapter_adv_scx') nextPiece.subtype = 'adapter_scx_adv';

                                if (nextPiece.widthIn !== undefined) {
                                    const tw = nextPiece.widthIn; nextPiece.widthIn = nextPiece.widthOut; nextPiece.widthOut = tw;
                                }
                                if (nextPiece.laneSpacingIn !== undefined) {
                                    const tls = nextPiece.laneSpacingIn; nextPiece.laneSpacingIn = nextPiece.laneSpacingOut; nextPiece.laneSpacingOut = tls;
                                }
                            }

                            nextPiece.invert = false;
                            nextPiece.rot = targetSearchNode.angle;
                            
                            const ep = getPieceGeometry(nextPiece);
                            let bestLocalDist = Infinity;
                            let alignNode = ep.inNodes[0];
                            ep.inNodes.forEach(n => {
                                const d = Math.hypot(targetSearchNode.x - n.x, targetSearchNode.y - n.y);
                                if (d < bestLocalDist) { bestLocalDist = d; alignNode = n; }
                            });
                            
                            const newDx = targetSearchNode.x - alignNode.x;
                            const newDy = targetSearchNode.y - alignNode.y;
                            
                            nextPiece.x += newDx;
                            nextPiece.y += newDy;
                            nextPiece.inZ = targetSearchNode.z;
                            nextPiece.outZ = nextPiece.elevation || 0;
                            
                            const finalEp = getPieceGeometry(nextPiece);
                            currentSearchExitNodes = finalEp.outNodes.map(n => ({ ...n, z: nextPiece.outZ }));
                            
                            currentChain.push(nextPiece);
                        } else {
                            chainContinues = false; // Fin de este tren
                        }
                    }
                    
                    // Nos quedamos estrictamente con la cadena más larga (elimina basura suelta y ramales fallidos)
                    if (currentChain.length > bestChainForLane.length) {
                        bestChainForLane = currentChain;
                    }
                }
                
                // IMPORTANTE: ELIMINADA LA SUBDIVISIÓN DE PIEZAS.
                // Al subdividir pistas largas (como Carrera y Scalextric UK), el motor de físicas 3D 
                // creaba múltiples colliders invisibles. Las ruedas del coche chocaban con estas 
                // juntas internas ("Ghost Collisions"), causando los temidos trompicones.
                // Ahora cada pista se envía como UN ÚNICO bloque físico sólido, permitiendo que el
                // coche se deslice con fluidez extrema sin enganchones.

                finalCompiled.push(...bestChainForLane);
            });

            // 3. MAGIA FINAL PARA EL MOTOR 3D:
            // Engañamos al motor 3D reescribiendo los "uid" (DNI de la pista) en estricto orden secuencial.
            // Así el motor cree que se ha construido seguido (como en tu archivo 222.json)
            let fakeTimestamp = Date.now() - 1000000;
            finalCompiled.forEach((p, idx) => {
                p.uid = fakeTimestamp + (idx * 1000) + 0.1234; 
            });

            return finalCompiled;
        };

        const DrawEngine2D = {
            drawRails: (ctx, l, off, brand) => {
                ctx.strokeStyle = brand.railColor; ctx.lineWidth = 3; ctx.beginPath(); ctx.moveTo(0, -off); ctx.lineTo(l, -off); ctx.stroke(); ctx.beginPath(); ctx.moveTo(0, off); ctx.lineTo(l, off); ctx.stroke();
                ctx.strokeStyle = brand.slotColor; ctx.lineWidth = 1; ctx.beginPath(); ctx.moveTo(0, -off); ctx.lineTo(l, -off); ctx.stroke(); ctx.beginPath(); ctx.moveTo(0, off); ctx.lineTo(l, off); ctx.stroke();
            },
            drawDigitalWedge: (ctx, l, startLaneY, directionY, s) => {
               ctx.fillStyle = '#d1d5db'; ctx.strokeStyle = '#6b7280'; ctx.lineWidth = 1; ctx.beginPath(); const xStart = l * 0.15, xEnd = l * 0.40, indent = 3 * (s/5), yStraight = startLaneY + (directionY * 1.5), wedgeW = 12 * (s/5); 
               ctx.moveTo(xStart, yStraight); ctx.lineTo(xEnd, yStraight); ctx.lineTo(xEnd - indent, (yStraight + yStraight + directionY*wedgeW)/2); ctx.lineTo(xEnd, yStraight + directionY*wedgeW); ctx.quadraticCurveTo(xStart + (xEnd-xStart)*0.5, yStraight + (directionY * wedgeW * 0.3), xStart, yStraight); ctx.fill(); ctx.stroke();
            },
            drawHazardZone: (ctx, pathFn, s, color = '#facc15') => { ctx.save(); ctx.beginPath(); pathFn(ctx); ctx.clip(); ctx.strokeStyle = color; ctx.lineWidth = 2; const diagSpace = 8 * (s/5); for(let dx = -1000; dx < 1000; dx += diagSpace) { ctx.beginPath(); ctx.moveTo(dx, -500); ctx.lineTo(dx - 500, 500); ctx.stroke(); } ctx.restore(); },
            drawBorder: (ctx, p, l, trueR, startA, sweep, hw, bWidth, isRightSide, s, brand) => {
                const isLeft = p.direction === 'left';
                const isSingle1 = p.subtype === 'single_lane_1';
                const isSingle2 = p.subtype === 'single_lane_2';
                const isSingle = isSingle1 || isSingle2;
                const laneOff = (brand.laneSpacing / 2) * s;
                
                if (p.type.includes('pit') || p.type === 'rotonda' || p.subtype === 'rotonda' || (p.subtype && p.subtype.startsWith('chicane3_'))) return; 
                ctx.beginPath();
                
                let effectiveTrueR = trueR;
                let trackWidthHalf = hw;

                if (isSingle) {
                    if (isSingle1) effectiveTrueR = isLeft ? trueR - laneOff : trueR + laneOff;
                    if (isSingle2) effectiveTrueR = isLeft ? trueR + laneOff : trueR - laneOff;
                    trackWidthHalf = hw / 2;
                }

                if (p.type === 'straight') {
                    const shift = p.shiftY ? (p.shiftY * s) : 0;
                    const y = isRightSide ? trackWidthHalf + bWidth/2 : -trackWidthHalf - bWidth/2;
                    ctx.moveTo(0, y);
                    if (shift !== 0) {
                        ctx.bezierCurveTo(l*0.5, y, l*0.5, y + shift, l, y + shift);
                    } else {
                        ctx.lineTo(l, y);
                    }

                  )}

                  {showBridgesTools && ( 
                      <div onPointerDown={(e)=>e.stopPropagation()} className="fixed top-24 right-4 bg-[#0f172a]/95 border border-indigo-500 shadow-[0_0_30px_rgba(99,102,241,0.3)] p-3 rounded-xl w-60 backdrop-blur-xl z-[100] animate-in origin-top-right"> 
                          <div className="flex justify-between items-center mb-3 pb-2 border-b border-indigo-500/30"> 
                              <h3 className="text-xs font-black text-indigo-400 flex gap-2 drop-shadow-[0_0_5px_rgba(99,102,241,0.8)] items-center tracking-widest"><Layers size={14}/> {t.bridges.title}</h3> 
                              <button onClick={()=>{setShowBridgesTools(false); setIsPaintElevationMode(false);}} className="text-indigo-500 hover:text-white transition hover:scale-110 bg-indigo-500/10 p-0.5 rounded"><X size={14}/></button> 
                          </div> 
                          
                          <div className="mb-4">
                              <div className="text-[8px] text-indigo-300/70 font-black mb-1 uppercase tracking-[0.1em]">{t.bridges.workLevel}</div>
                              <div className="text-[8px] text-gray-400 mb-2 uppercase leading-tight">{t.bridges.workLevelDesc}</div>
                            <div className="flex items-center justify-between bg-black/60 rounded-lg border border-indigo-500/30 p-1">
                                <button onClick={() => setWorkingElevation(Math.round((workingElevation - 0.25) * 100) / 100)} className="w-10 h-8 flex items-center justify-center bg-gray-800 hover:bg-purple-900/80 text-white rounded transition-colors active:scale-95"><Minus size={14}/></button>
                                <div className="flex flex-col items-center justify-center"><span className={`text-lg font-black ${workingElevation > 0 ? 'text-cyan-400' : (workingElevation < 0 ? 'text-purple-400' : 'text-white')}`}>{workingElevation > 0 ? `+${workingElevation}` : workingElevation}</span></div>
                                <button onClick={() => setWorkingElevation(Math.round((workingElevation + 0.25) * 100) / 100)} className="w-10 h-8 flex items-center justify-center bg-gray-800 hover:bg-cyan-900/80 text-white rounded transition-colors active:scale-95"><Plus size={14}/></button>
                            </div>
                        </div>

                        <button onClick={() => setIsPaintElevationMode(!isPaintElevationMode)} className={`w-full py-2 mb-4 font-bold rounded text-[10px] flex items-center justify-center gap-2 transition-all uppercase tracking-widest border ${isPaintElevationMode ? 'bg-indigo-600 text-white border-indigo-400 shadow-[0_0_15px_rgba(99,102,241,0.6)]' : 'bg-indigo-900/20 text-indigo-400 border-indigo-500/30 hover:bg-indigo-900/40'}`}><PenTool size={14}/> {isPaintElevationMode ? t.bridges.paintActive : t.bridges.paintMode}</button>

                          {selectedPieceIds.length > 0 && (
                              <div className="pt-3 border-t border-indigo-500/30">
                                  <div className="text-[8px] text-indigo-300/70 font-black mb-2 uppercase tracking-[0.1em]">{t.bridges.current}: {selectedPieceIds.length > 1 ? `${selectedPieceIds.length} PIEZAS` : (pieces.find(p=>p && p.uid===selectedPieceIds[0]) ? tp(pieces.find(p=>p && p.uid===selectedPieceIds[0]).label) : '')}</div>
                                  <button onClick={() => setPieceElevation(workingElevation)} className="w-full py-1.5 bg-cyan-600 hover:bg-cyan-500 text-black font-black rounded text-[9px] transition-all uppercase tracking-wider transform active:scale-95 shadow-[0_0_10px_rgba(6,182,212,0.3)]">{t.bridges.apply} ({workingElevation > 0 ? `+${workingElevation}` : workingElevation})</button>
                              </div>
                          )}
                          <div className="mt-4 pt-3 border-t border-indigo-500/30"><button onClick={()=>{setShowBridgesTools(false); setIsPaintElevationMode(false);}} className="w-full py-1.5 bg-gray-800/50 hover:bg-gray-700 text-gray-400 font-bold rounded text-[9px] border border-gray-700 transition-all uppercase tracking-widest hover:text-white">{t.bridges.close}</button></div>
                      </div> 
                  )}

                  {showBordersTools && (
                      <div onPointerDown={(e)=>e.stopPropagation()} className="fixed top-24 right-4 bg-[#0f172a]/95 border border-red-500 shadow-[0_0_30px_rgba(239,68,68,0.3)] p-3 rounded-xl w-60 backdrop-blur-xl z-[100] animate-in origin-top-right">
                          <div className="flex justify-between items-center mb-3 pb-2 border-b border-red-500/30">
                              <h3 className="text-xs font-black text-red-400 flex gap-2 drop-shadow-[0_0_5px_rgba(239,68,68,0.8)] items-center tracking-widest"><Shield size={14}/> {t.borders.title}</h3>
                              <button onClick={()=>{setShowBordersTools(false); setPaintBorderMode('none');}} className="text-red-500 hover:text-white transition hover:scale-110 bg-red-500/10 p-0.5 rounded"><X size={14}/></button>
                          </div>
                          <div className="mb-4">
                              <label className="flex items-center gap-2 cursor-pointer p-2 bg-red-900/20 rounded border border-red-500/30 hover:border-red-400 transition-colors">
                                  <input type="checkbox" checked={autoBorders} onChange={(e) => setAutoBorders(e.target.checked)} className="w-4 h-4 accent-red-500 cursor-pointer" />
                                  <span className="text-[10px] font-bold text-red-100">{t.borders.auto}</span>
                              </label>
                              <p className="text-[8px] text-gray-400 mt-1 pl-1 leading-tight">{t.borders.autoDesc}</p>
                          </div>
                          <div className="space-y-2 pt-3 border-t border-red-500/30">
                              <button onClick={() => setPaintBorderMode(paintBorderMode === 'left' ? 'none' : 'left')} className={`w-full py-2 font-bold rounded text-[10px] flex items-center justify-center gap-2 transition-all uppercase tracking-widest border ${paintBorderMode === 'left' ? 'bg-red-600 text-white border-red-400 shadow-[0_0_15px_rgba(239,68,68,0.6)]' : 'bg-red-900/20 text-red-400 border-red-500/30 hover:bg-red-900/40'}`}><PenTool size={14}/> {t.borders.paintLeft}</button>
                              <button onClick={() => setPaintBorderMode(paintBorderMode === 'right' ? 'none' : 'right')} className={`w-full py-2 font-bold rounded text-[10px] flex items-center justify-center gap-2 transition-all uppercase tracking-widest border ${paintBorderMode === 'right' ? 'bg-red-600 text-white border-red-400 shadow-[0_0_15px_rgba(239,68,68,0.6)]' : 'bg-red-900/20 text-red-400 border-red-500/30 hover:bg-red-900/40'}`}><PenTool size={14}/> {t.borders.paintRight}</button>
                              <button onClick={() => pushHistory(pieces.map(p => ({ ...p, borderLeft: undefined, borderRight: undefined })))} className="w-full py-2 mt-2 font-bold rounded text-[9px] bg-gray-800 text-gray-400 hover:bg-gray-700 hover:text-white transition uppercase border border-gray-700 active:scale-95"><Trash2 size={12} className="inline mr-1"/> {t.borders.clear}</button>
                          </div>
                      </div>
                  )}

                  {showChat && (
                      <div onPointerDown={(e)=>e.stopPropagation()} className="absolute bottom-24 right-4 bg-[#0f172a]/95 border border-cyan-500 shadow-[0_0_30px_rgba(6,182,212,0.3)] rounded-xl w-80 h-96 flex flex-col backdrop-blur-xl z-[90] animate-in origin-bottom-right">
                          <div className="flex justify-between items-center p-3 border-b border-cyan-500/30 bg-cyan-900/20 rounded-t-xl">
                              <h3 className="text-xs font-black text-cyan-400 flex gap-2 items-center tracking-widest"><MessageSquare size={14}/> {t.chat.title}</h3>
                              <button onClick={()=>setShowChat(false)} className="text-cyan-500 hover:text-white transition hover:scale-110 bg-cyan-500/10 p-0.5 rounded"><X size={14}/></button>
                          </div>
                          <div className="flex-1 overflow-y-auto p-3 flex flex-col gap-3 hide-scrollbar bg-black/40">
                              {isChatLoading ? (
                                  <div className="flex flex-col items-center justify-center h-full gap-2 opacity-50"><div className="w-5 h-5 border-2 border-cyan-500 border-t-transparent rounded-full animate-spin"></div></div>
                              ) : messages.length === 0 ? (
                                  <div className="flex flex-col items-center justify-center h-full gap-2 opacity-40"><MessageSquare size={32} className="text-cyan-600"/><span className="text-[10px] font-bold tracking-widest text-center text-gray-400 uppercase">{t.chat.empty}</span></div>
                              ) : (
                                  messages.map((msg, i) => {
                                      const isMe = user && msg.authorId === user.uid;
                                      return (
                                          <div key={msg.id || i} className={`flex flex-col max-w-[85%] ${isMe ? 'self-end items-end' : 'self-start items-start'}`}>
                                              <span className="text-[9px] text-gray-500 mb-0.5 px-1 font-bold">{msg.authorName}</span>
                                              <div className={`px-3 py-2 text-xs shadow-md ${isMe ? 'bg-cyan-600 text-white rounded-2xl rounded-tr-sm' : 'bg-gray-800 text-gray-200 border border-gray-700 rounded-2xl rounded-tl-sm'}`} style={{ wordBreak: 'break-word' }}>
                                                  {msg.text}
                                              </div>
                                          </div>
                                      )
                                  })
                              )}
                              <div ref={messagesEndRef} />
                          </div>
                          <div className="relative">
                              <form onSubmit={handleSendMessage} className="p-2 border-t border-cyan-500/30 bg-black/60 rounded-b-xl flex gap-2 z-20 relative">
                                  <input type="text" value={newMessage} onChange={(e)=>setNewMessage(e.target.value)} onKeyDown={(e)=>e.stopPropagation()} placeholder={t.chat.placeholder} className="flex-1 bg-gray-900 border border-gray-700 rounded-lg px-3 py-2 text-xs text-white focus:border-cyan-400 outline-none transition-colors select-text cursor-text" style={{ userSelect: 'text' }} disabled={!user || user.isAnonymous || !user.emailVerified}/>
                                  <button type="submit" disabled={!newMessage.trim() || !user || user.isAnonymous || !user.emailVerified} className="bg-cyan-600 hover:bg-cyan-500 text-black px-3 py-2 rounded-lg transition-colors disabled:opacity-50 disabled:cursor-not-allowed active:scale-95"><MessageSquare size={14} className="fill-current"/></button>
                              </form>
                              {(!user || user.isAnonymous || !user.emailVerified) && (
                                  <div className="absolute inset-0 bg-black/80 backdrop-blur-[2px] rounded-b-xl flex flex-col items-center justify-center z-30 cursor-default">
                                      <div className="px-4 text-center mb-3"><span className="text-[10px] text-gray-300 font-bold uppercase tracking-wider">{t.chat.loginReq}</span></div>
                                      <button onClick={async (e) => { 
                                          e.preventDefault(); 
                                          if (user && !user.isAnonymous) {
                                              try {
                                                  const auth = window.FirebaseAPI.getAuth();
                                                  await auth.currentUser.reload();
                                                  setUser({ ...auth.currentUser });
                                                  if (auth.currentUser.emailVerified) return;
                                              } catch(err) {}
                                          }
                                          alert(t.auth.reqVerify); 
                                          setShowAuthModal(true); 
                                      }} className="px-4 py-1.5 bg-cyan-600 hover:bg-cyan-500 text-black font-black text-[10px] rounded uppercase tracking-widest transition-colors shadow-[0_0_10px_rgba(6,182,212,0.3)]">{(!user || user.isAnonymous) ? t.auth.loginBtn : t.auth.verifyCheck}</button>
                                  </div>
                              )}
                          </div>
                      </div>
                  )}

                  {(() => {
                      const selectedPieces = selectedPieceIds.map(id => pieces.find(p=>p && p.uid===id)).filter(Boolean);
                      if (selectedPieces.length === 0) return null;
                      
                      if (selectedPieces.length > 1) {
                          return (
                              <div onPointerDown={(e)=>e.stopPropagation()} style={propPanelPos ? { left: `${propPanelPos.x}px`, top: `${propPanelPos.y}px`, right: 'auto', bottom: 'auto', transform: 'none' } : {}} className={`prop-panel fixed z-[100] top-[240px] right-6 bg-[#0f172a]/90 p-5 rounded-2xl shadow-2xl border w-72 backdrop-blur-md ${neonClass}`}> 
                                  <div onPointerDown={startPropPanelDrag} className="flex justify-between items-start mb-4 border-b border-white/10 pb-3 cursor-move group" title="Arrastrar Panel">
                                      <div><h3 className="text-lg font-black text-white pointer-events-none">{selectedPieces.length} PIEZAS</h3></div>
                                      <button onPointerDown={(e)=>e.stopPropagation()} onClick={()=>{setSelectedPieceIds([]); setPropPanelPos(null);}} className="hover:text-white text-gray-500 transition"><X size={20}/></button>
                                  </div> 
                                  
                                  <div className="bg-black/40 rounded-xl p-3 mb-4 border border-white/10 shadow-inner text-center">
                                      <span className="text-[10px] text-gray-400 font-bold uppercase tracking-widest mb-3 block flex items-center justify-center gap-2"><Layers size={14} className="text-cyan-400"/> ELEVACIÓN GRUPAL</span>
                                    <div className="flex items-center justify-between bg-black/60 rounded-lg border border-white/5 p-1">
                                        <button onClick={() => pushHistory(pieces.map(p => selectedPieceIds.includes(p.uid) ? { ...p, elevation: Math.round(((p.elevation || 0) - 0.25) * 100) / 100 } : p))} className="w-12 h-10 flex items-center justify-center bg-gray-800 hover:bg-purple-900/80 text-white rounded-md transition-colors border border-transparent hover:border-purple-500/50 active:scale-95"><Minus size={16}/></button>
                                        <div className="flex flex-col items-center justify-center min-w-[60px]"><span className="text-xl font-black text-cyan-400">+/-</span></div>
                                        <button onClick={() => pushHistory(pieces.map(p => selectedPieceIds.includes(p.uid) ? { ...p, elevation: Math.round(((p.elevation || 0) + 0.25) * 100) / 100 } : p))} className="w-12 h-10 flex items-center justify-center bg-gray-800 hover:bg-cyan-900/80 text-white rounded-md transition-colors border border-transparent hover:border-cyan-500/50 active:scale-95"><Plus size={16}/></button>
                                    </div>
                                </div>
        
                                <div className="bg-black/40 rounded-xl p-3 mb-4 border border-white/10 shadow-inner">
                                    <span className="text-[10px] text-gray-400 font-bold uppercase tracking-widest mb-3 block flex items-center justify-center gap-2"><Shield size={14} className="text-red-400"/> {t.tools.borders}</span>
                                    <div className="flex gap-2">
                                        <button onClick={() => pushHistory(pieces.map(p => selectedPieceIds.includes(p.uid) ? { ...p, borderLeft: true } : p))} className="flex-1 py-2 rounded text-[9px] font-bold border transition-colors bg-gray-800 border-gray-600 text-gray-400 hover:text-white hover:bg-red-600">+ {t.piece.left}</button>
                                        <button onClick={() => pushHistory(pieces.map(p => selectedPieceIds.includes(p.uid) ? { ...p, borderRight: true } : p))} className="flex-1 py-2 rounded text-[9px] font-bold border transition-colors bg-gray-800 border-gray-600 text-gray-400 hover:text-white hover:bg-red-600">+ {t.piece.right}</button>
                                    </div>
                                    <button onClick={() => pushHistory(pieces.map(p => selectedPieceIds.includes(p.uid) ? { ...p, borderLeft: false, borderRight: false } : p))} className="w-full mt-2 py-2 rounded text-[9px] font-bold bg-gray-800 text-gray-400 hover:bg-gray-700 hover:text-white transition uppercase border border-gray-700 active:scale-95">QUITAR BORDES</button>
                                </div>
        
                                <div className="space-y-4"> 
                                    <button onClick={toggleInvertPiece} className="w-full flex items-center justify-center gap-3 px-4 py-4 rounded-xl text-xs font-bold bg-[#1e293b] text-gray-400 border border-[#334155] hover:bg-[#334155] transition shadow-[0_0_10px_rgba(255,255,255,0.1)] hover:shadow-[0_0_15px_rgba(255,255,255,0.2)] mb-4"><Repeat size={18}/> INVERTIR GRUPO</button> 
                                </div> 
                                  
                                  <div className="pt-3 mt-4 border-t border-white/10 space-y-2">
                                      <button onClick={removePiece} className="w-full flex items-center justify-center gap-2 px-4 py-3 bg-red-900/20 text-red-500 border border-red-900/50 rounded-xl text-xs font-bold hover:bg-red-900/40 transition shadow-[0_0_10px_rgba(239,68,68,0.2)] hover:shadow-[0_0_20px_rgba(239,68,68,0.4)]">
                                          <Trash2 size={18}/> ELIMINAR GRUPO
                                      </button>
                                  </div>
                              </div> 
                          );
                      }

                      const selectedPiece = selectedPieces[0];
                      return ( 
                          <div onPointerDown={(e)=>e.stopPropagation()} style={propPanelPos ? { left: `${propPanelPos.x}px`, top: `${propPanelPos.y}px`, right: 'auto', bottom: 'auto', transform: 'none' } : {}} className={`prop-panel fixed z-[100] top-[240px] right-6 bg-[#0f172a]/90 p-5 rounded-2xl shadow-2xl border w-72 backdrop-blur-md ${neonClass}`}> 
                              <div onPointerDown={startPropPanelDrag} className="flex justify-between items-start mb-4 border-b border-white/10 pb-3 cursor-move group" title="Arrastrar Panel">
                                  <div><h3 className="text-lg font-black text-white pointer-events-none">{tp(selectedPiece.label)}</h3></div>
                                  <button onPointerDown={(e)=>e.stopPropagation()} onClick={()=>{setSelectedPieceIds([]); setPropPanelPos(null);}} className="hover:text-white text-gray-500 transition"><X size={20}/></button>
                              </div> 
                              
                              <div className="bg-black/40 rounded-xl p-3 mb-4 border border-white/10 shadow-inner text-center">
                                  <span className="text-[10px] text-gray-400 font-bold uppercase tracking-widest mb-3 block flex items-center justify-center gap-2"><Layers size={14} className="text-cyan-400"/> {t.piece.elevation}</span>
                                <div className="flex items-center justify-between bg-black/60 rounded-lg border border-white/5 p-1">
                                    <button onClick={() => setPieceElevation(Math.round(((selectedPiece.elevation || 0) - 0.25) * 100) / 100)} className="w-12 h-10 flex items-center justify-center bg-gray-800 hover:bg-purple-900/80 text-white rounded-md transition-colors border border-transparent hover:border-purple-500/50 active:scale-95 disabled:opacity-30 disabled:cursor-not-allowed"><Minus size={16}/></button>
                                    <div className="flex flex-col items-center justify-center min-w-[60px]"><span className={`text-xl font-black ${selectedPiece.elevation > 0 ? 'text-cyan-400' : (selectedPiece.elevation < 0 ? 'text-purple-400' : 'text-white')}`}>{selectedPiece.elevation > 0 ? `+${selectedPiece.elevation}` : (selectedPiece.elevation || 0)}</span><span className="text-[8px] text-gray-500 uppercase tracking-wider">{selectedPiece.elevation === 0 ? t.piece.ground : t.piece.level}</span></div>
                                    <button onClick={() => setPieceElevation(Math.round(((selectedPiece.elevation || 0) + 0.25) * 100) / 100)} className="w-12 h-10 flex items-center justify-center bg-gray-800 hover:bg-cyan-900/80 text-white rounded-md transition-colors border border-transparent hover:border-cyan-500/50 active:scale-95 disabled:opacity-30 disabled:cursor-not-allowed"><Plus size={16}/></button>
                                </div>
                            </div>
    
                            <div className="bg-black/40 rounded-xl p-3 mb-4 border border-white/10 shadow-inner">
                                <span className="text-[10px] text-gray-400 font-bold uppercase tracking-widest mb-3 block flex items-center justify-center gap-2"><Shield size={14} className="text-red-400"/> {t.tools.borders}</span>
                                <div className="flex gap-2">
                                    <button onClick={() => pushHistory(applyToPiece(selectedPiece.uid, { borderLeft: !selectedPiece.borderLeft }))} className={`flex-1 py-2 rounded text-[9px] font-bold border transition-colors ${selectedPiece.borderLeft ? 'bg-red-600 border-red-400 text-white' : 'bg-gray-800 border-gray-600 text-gray-400 hover:text-white'}`}>{t.piece.left} {selectedPiece.borderLeft ? 'ON' : 'OFF'}</button>
                                    <button onClick={() => pushHistory(applyToPiece(selectedPiece.uid, { borderRight: !selectedPiece.borderRight }))} className={`flex-1 py-2 rounded text-[9px] font-bold border transition-colors ${selectedPiece.borderRight ? 'bg-red-600 border-red-400 text-white' : 'bg-gray-800 border-gray-600 text-gray-400 hover:text-white'}`}>{t.piece.right} {selectedPiece.borderRight ? 'ON' : 'OFF'}</button>
                                </div>
                            </div>
    
                            <div className="space-y-4"> 
                                <button onClick={toggleInvertPiece} className="w-full flex items-center justify-center gap-3 px-4 py-4 rounded-xl text-xs font-bold bg-[#1e293b] text-gray-400 border border-[#334155] hover:bg-[#334155] transition shadow-[0_0_10px_rgba(255,255,255,0.1)] hover:shadow-[0_0_15px_rgba(255,255,255,0.2)] mb-4"><Repeat size={18}/> {t.piece.invert}</button> 
                            </div> 
                              
                              <div className="pt-3 mt-4 border-t border-white/10 space-y-2">
                                  <button onClick={removePiece} className="w-full flex items-center justify-center gap-2 px-4 py-3 bg-red-900/20 text-red-500 border border-red-900/50 rounded-xl text-xs font-bold hover:bg-red-900/40 transition shadow-[0_0_10px_rgba(239,68,68,0.2)] hover:shadow-[0_0_20px_rgba(239,68,68,0.4)]">
                                      <Trash2 size={18}/> {t.piece.delete}
                                  </button>
                              </div>
                          </div> 
                      );
                  })()}
              </div>
            </div>
          );
        }

        const rootElement = document.getElementById('root');
        if (rootElement) {
            try { const root = ReactDOM.createRoot(rootElement); root.render(<SlotDesigner />); } 
            catch (error) { console.error("Error al renderizar:", error); document.getElementById('loading-screen').innerHTML = `<h2 class="text-xl text-red-500 font-bold">Error fatal</h2><p class="text-white">${error.message}</p>`; }
        }
    </script>
</body>
</html>
