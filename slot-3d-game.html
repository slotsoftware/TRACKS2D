                                    if (child.geometry.attributes.uv) cleanGeo.setAttribute('uv', child.geometry.attributes.uv);
                                    if (child.geometry.index) cleanGeo.setIndex(child.geometry.index);
                                    
                                    if (!cleanGeo.attributes.normal) cleanGeo.computeVertexNormals();
                                    
                                    const oldGeo = child.geometry;
                                    child.geometry = cleanGeo;
                                    oldGeo.dispose();

                                    if (child.material) { 
                                        if (child.material.isMeshStandardMaterial || child.material.isMeshPhysicalMaterial) { 
                                            const newMat = new THREE.MeshLambertMaterial({ map: child.material.map, color: child.material.color, transparent: child.material.transparent, opacity: child.material.opacity, alphaTest: child.material.alphaTest, side: THREE.FrontSide }); 
                                            child.material.dispose(); 
                                            child.material = newMat; 
                                        } else { 
                                            child.material.side = THREE.FrontSide; 
                                        } 
                                    } 
                                } 
                            });

                            // --- NUEVO: BOSQUE MASIVO USANDO TUS PROPIOS MODELOS GLB ---
                            if (isDecor && sceneRef.current && sceneRef.current.userData.getTerrainHeight && !sceneRef.current.userData.hasMassiveForest) {
                                sceneRef.current.userData.hasMassiveForest = true;
                                
                                const baseW = sceneRef.current.userData.terrainW;
                                const baseD = sceneRef.current.userData.terrainD;
                                const trackRadius = sceneRef.current.userData.trackRadius;
                                const area = baseW * baseD;
                                
                                // CANTIDADES DINÁMICAS: Dependen de los m2 del tablero maqueta
                                const treeCount = Math.min(80, Math.max(5, Math.floor(area / 2500))); // OPTIMIZADO: Menos árboles
                                const bushCount = Math.min(150, Math.max(10, Math.floor(area / 800))); // OPTIMIZADO: Menos arbustos
                                
                                const treeMeshes = [];
                                const bushMeshes = [];
                                
                                const tempBox = new THREE.Box3().setFromObject(model);
                                const tSize = tempBox.getSize(new THREE.Vector3());
                                const maxD = Math.max(tSize.x, tSize.y, tSize.z);
                                
                                // Escala ajustada a tamaño maqueta (árboles realistas para slot, no gigantes)
                                const baseTreeScale = maxD > 0 ? 25.0 / maxD : 1; 
                                const baseBushScale = maxD > 0 ? 8.0 / maxD : 0.25;

                                // Replicamos exactamente las mallas y materiales del GLB original
                                model.traverse((c) => {
                                    if (c.isMesh) {
                                        const iTree = new THREE.InstancedMesh(c.geometry, c.material, treeCount);
                                        // APAGAMOS SOMBRAS (Principal asesino de FPS)
                                        iTree.receiveShadow = false;
                                        iTree.castShadow = false; 
                                        sceneRef.current.add(iTree);
                                        treeMeshes.push(iTree);
                                        
                                        const iBush = new THREE.InstancedMesh(c.geometry, c.material, bushCount);
                                        iBush.receiveShadow = false;
                                        iBush.castShadow = false; 
                                        sceneRef.current.add(iBush);
                                        bushMeshes.push(iBush);
                                    }
                                });

                                const dummy = new THREE.Object3D();
                                const getH = sceneRef.current.userData.getTerrainHeight;

                                // 1. Plantar Árboles Grandes (OPTIMIZADO)
                                let validTreeCount = 0;
                                for (let i = 0; i < treeCount * 4 && validTreeCount < treeCount; i++) {
                                    const rx = (Math.random() - 0.5) * baseW;
                                    const rz = (Math.random() - 0.5) * baseD;
                                    const dist = Math.sqrt(rx*rx + rz*rz);

                                    if (dist < trackRadius + 12) continue; // Mantener lejos de la pista

                                    const ry = getH(rx, rz, dist) - 0.5; // Ajustar nivel de raíz
                                    if (ry > 0.5) { 
                                        const scaleVar = baseTreeScale * (0.8 + Math.random() * 0.6); // Variación de escala real
                                        dummy.position.set(rx, ry, rz);
                                        dummy.rotation.y = Math.random() * Math.PI * 2;
                                        // Inclinación orgánica
                                        dummy.rotation.x = (Math.random() - 0.5) * 0.1;
                                        dummy.rotation.z = (Math.random() - 0.5) * 0.1;
                                        dummy.scale.set(scaleVar, scaleVar, scaleVar);
                                        dummy.updateMatrix();

                                        treeMeshes.forEach(im => im.setMatrixAt(validTreeCount, dummy.matrix));
                                        validTreeCount++;
                                    }
                                }
                                treeMeshes.forEach(im => {
                                    im.count = validTreeCount;
                                    im.instanceMatrix.needsUpdate = true;
                                });
                                
                                // 2. Plantar Arbustos Pequeños (OPTIMIZADO)
                                let validBushCount = 0;
                                for (let i = 0; i < bushCount * 4 && validBushCount < bushCount; i++) {
                                    const rx = (Math.random() - 0.5) * baseW;
                                    const rz = (Math.random() - 0.5) * baseD;
                                    const dist = Math.sqrt(rx*rx + rz*rz);

                                    if (dist < trackRadius + 3) continue; // Los arbustos pueden pegarse mucho más a la pista

                                    const ry = getH(rx, rz, dist);
                                    if (ry > 0.1) { 
                                        const scaleVar = baseBushScale * (0.6 + Math.random() * 0.8); 
                                        // Hundir la malla en el suelo y achatarla para crear el aspecto de un arbusto redondo
                                        dummy.position.set(rx, ry - (scaleVar * maxD * 0.2), rz);
                                        dummy.rotation.set((Math.random() - 0.5) * 0.4, Math.random() * Math.PI * 2, (Math.random() - 0.5) * 0.4);
                                        dummy.scale.set(scaleVar, scaleVar * 0.7, scaleVar); 
                                        dummy.updateMatrix();

                                        bushMeshes.forEach(im => im.setMatrixAt(validBushCount, dummy.matrix));
                                        validBushCount++;
                                    }
                                }
                                bushMeshes.forEach(im => {
                                    im.count = validBushCount;
                                    im.instanceMatrix.needsUpdate = true;
                                });
                            }

                            container.userData.originalModel = model.clone(); applyScatter(container, model, count, isDecor);
                        }, undefined, (err) => {
                            container.userData.isLoading = false;
                            console.warn("Error loading GLB in main scene", err);
                        });
                    } else if (needsScatter && container.userData.originalModel) { applyScatter(container, container.userData.originalModel.clone(), count, isDecor); }
                });
                
                return () => { isActive = false; };
            }, [customCarAssets, sceneReady]); 

            // ACTUALIZACIÓN DE LUCES Y ENTORNO NOCTURNO
            useEffect(() => {
                if (!sceneRef.current) return;
                const scene = sceneRef.current;
                const isNight = isNightMode;

                if (scene.userData.ambientLight) {
                    scene.userData.ambientLight.intensity = isNight ? 0.05 : 0.4;
                    scene.userData.ambientLight.color.setHex(isNight ? 0x223355 : 0xffedd5); 
                }

                if (dirLightRef.current) {
                    dirLightRef.current.intensity = isNight ? 0.1 : 1.2;
                    dirLightRef.current.color.setHex(isNight ? 0x64748b : 0xfffae8); 
                }

                if (scene.userData.updateSky) {
                    scene.userData.updateSky(isNight);
                }

                carMeshesRef.current.forEach(pg => {
                    const vg = pg.children[0];
                    if (vg) {
                        vg.traverse(child => {
                            if (child.name === "HEADLIGHT") child.intensity = isNight ? 3.0 : 0;
                            if (child.name === "TAILLIGHT") child.intensity = isNight ? 1.5 : 0;
                            if (child.material && child.material.name === "GLOW_HEAD") child.material.opacity = isNight ? 0.9 : 0;
                            if (child.material && child.material.name === "GLOW_TAIL") child.material.opacity = isNight ? 0.9 : 0;
                        });
                    }
                });
            }, [isNightMode]);

            const applyScatter = (container, rawModel, count, isDecor) => {
                while(container.children.length > 0){ container.remove(container.children[0]); }
                
                // Reset de base
                rawModel.position.set(0,0,0);
                rawModel.rotation.set(0,0,0);
                rawModel.scale.set(1,1,1);
                rawModel.updateMatrixWorld(true);

                const box = new THREE.Box3().setFromObject(rawModel); 
                const size = box.getSize(new THREE.Vector3()); 
                
                let scale = 1;
                if (!isDecor) {
                    const maxDim = Math.max(size.x, size.z);
                    scale = maxDim > 0 ? 14.0 / maxDim : 1; 
                    rawModel.rotation.y = getAutoCarRotation(rawModel);
                } else { 
                    const maxDim = Math.max(size.z, size.x, size.y);
                    scale = maxDim > 0 ? 45.0 / maxDim : 1;
                    if (size.z > size.y * 1.5) rawModel.rotation.x = -Math.PI / 2; else rawModel.rotation.y = Math.PI; 
                }
                
                rawModel.scale.setScalar(scale); 
                rawModel.updateMatrixWorld(true);

                const finalBox = new THREE.Box3().setFromObject(rawModel);
                const finalCenter = finalBox.getCenter(new THREE.Vector3());
                const finalSize = finalBox.getSize(new THREE.Vector3());
                
                rawModel.position.x -= finalCenter.x;
                rawModel.position.z -= finalCenter.z;

                if (!isDecor) {
                    const smartBottomY = getSmartBottomY(rawModel);
                    rawModel.position.y -= smartBottomY; // Las ruedas tocan la moqueta exactamente
                    rawModel.position.z -= finalSize.z * 0.25;
                } else {
                    rawModel.position.y -= finalBox.min.y; 
                }

                // WRAPPER PARA INDEPENDIZAR LA SOMBRA DE LAS ROTACIONES DEL MODELO
                const templateGroup = new THREE.Group();
                const fakeTex = getFakeShadowTexture();

                if (isDecor) {
                    // --- SOMBRA FALSA OPTIMIZADA: PLANO CON TEXTURA (Cero cálculos de geometría) ---
                    const shadowW = finalSize.x * 2.0;
                    const shadowL = finalSize.z * 2.0;
                    const shadowGeo = new THREE.PlaneGeometry(shadowW, shadowL);
                    shadowGeo.rotateX(-Math.PI / 2);
                    
                    const shadowMat = new THREE.MeshBasicMaterial({ 
                        map: fakeTex, 
                        transparent: true, 
                        opacity: 0.8, 
                        depthWrite: false, 
                        color: 0x000000,
                        clippingPlanes: shadowClippingPlanesRef.current
                    });
                    
                    const shadowMesh = new THREE.Mesh(shadowGeo, shadowMat);
                    shadowMesh.position.set(0, 0.55, 0);  // Sobre el suelo
                    shadowMesh.name = "FAKE_SHADOW";
                    templateGroup.add(shadowMesh);

                    rawModel.name = "REAL_MODEL";
                    rawModel.position.y += 0.5;
                    // Apagar sombras reales
                    rawModel.traverse(child => { if (child.isMesh) { child.castShadow = false; child.receiveShadow = false; } });
                    templateGroup.add(rawModel);

                } else {
                    // --- SOMBRA FALSA PARA COCHES ---
                    templateGroup.add(rawModel);

                    const shadowW = finalSize.x * 1.4;
                    const shadowL = finalSize.z * 1.3;
                    const shadowGeo = new THREE.PlaneGeometry(shadowW, shadowL);
                    shadowGeo.rotateX(-Math.PI / 2);
                    const shadowMat = new THREE.MeshBasicMaterial({ map: fakeTex, transparent: true, opacity: 0.9, depthWrite: false, color: 0x000000 });
                    const shadowMesh = new THREE.Mesh(shadowGeo, shadowMat);
                    
                    shadowMesh.position.set(0, 0.1, -finalSize.z * 0.25);
                    templateGroup.add(shadowMesh);

                    // --- LUCES PARA LOS COCHES (FAROS Y FRENOS) ---
                    const lightsGroup = new THREE.Group();
                    lightsGroup.name = "CarLightsGroup";

                    const isNight = isNightModeRef.current;
                    const hlIntensity = isNight ? 3.0 : 0;
                    const tlIntensity = isNight ? 1.5 : 0;

                    // Focos Delanteros (SpotLight para iluminar la pista)
                    const hl1 = new THREE.SpotLight(0xffffee, hlIntensity, 80, Math.PI/5, 0.6, 1.5);
                    hl1.position.set(finalSize.x * 0.35, finalSize.y * 0.4, -finalSize.z * 0.4);
                    hl1.name = "HEADLIGHT";
                    const t1 = new THREE.Object3D(); t1.position.set(finalSize.x * 0.35, 0, -finalSize.z * 4.0);
                    hl1.target = t1;
                    lightsGroup.add(hl1); lightsGroup.add(t1);

                    const hl2 = new THREE.SpotLight(0xffffee, hlIntensity, 80, Math.PI/5, 0.6, 1.5);
                    hl2.position.set(-finalSize.x * 0.35, finalSize.y * 0.4, -finalSize.z * 0.4);
                    hl2.name = "HEADLIGHT";
                    const t2 = new THREE.Object3D(); t2.position.set(-finalSize.x * 0.35, 0, -finalSize.z * 4.0);
                    hl2.target = t2;
                    lightsGroup.add(hl2); lightsGroup.add(t2);

                    // Luz Trasera (PointLight roja)
                    const tl = new THREE.PointLight(0xff0000, tlIntensity, 8);
                    tl.position.set(0, finalSize.y * 0.5, finalSize.z * 0.4);
                    tl.name = "TAILLIGHT";
                    lightsGroup.add(tl);

                    // Pilotos brillantes visuales (esferitas emisivas)
                    const glowGeo = new THREE.SphereGeometry(0.08, 8, 8);
                    const headGlowMat = new THREE.MeshBasicMaterial({ color: 0xffffee, transparent: true, opacity: isNight ? 0.9 : 0 });
                    headGlowMat.name = "GLOW_HEAD";
                    const tailGlowMat = new THREE.MeshBasicMaterial({ color: 0xff0000, transparent: true, opacity: isNight ? 0.9 : 0 });
                    tailGlowMat.name = "GLOW_TAIL";
                    
                    const hg1 = new THREE.Mesh(glowGeo, headGlowMat); hg1.position.copy(hl1.position); lightsGroup.add(hg1);
                    const hg2 = new THREE.Mesh(glowGeo, headGlowMat); hg2.position.copy(hl2.position); lightsGroup.add(hg2);
                    
                    const tg1 = new THREE.Mesh(glowGeo, tailGlowMat); tg1.position.set(finalSize.x * 0.35, tl.position.y, tl.position.z); lightsGroup.add(tg1);
                    const tg2 = new THREE.Mesh(glowGeo, tailGlowMat); tg2.position.set(-finalSize.x * 0.35, tl.position.y, tl.position.z); lightsGroup.add(tg2);

                    templateGroup.add(lightsGroup);

                    rawModel.traverse(child => { if (child.isMesh) { child.castShadow = false; child.receiveShadow = false; } });
                }

                templateGroup.userData.baseScale = new THREE.Vector3(1, 1, 1);
                templateGroup.userData.carSize = finalSize;
                
                if (count <= 1) { 
                    container.add(templateGroup); 
                } else {
                    const bRef = boardSettingsRef.current; const centers = pathPointsRef.current || []; const minSafeDistSq = 24.0 * 24.0; 
                    for(let i=0; i<count; i++) {
                        const clone = templateGroup.clone(); let validPos = false; let attempts = 0; let rX = 0, rZ = 0;
                        while(!validPos && attempts < 150) { 
                            rX = bRef.x + (Math.random() - 0.5) * bRef.width; rZ = bRef.z + (Math.random() - 0.5) * bRef.depth; validPos = true;
                            for (let j = 0; j < centers.length; j += 5) { const c = centers[j]; if (!c) continue; const dx = rX - c.x; const dz = rZ - c.z; if (dx * dx + dz * dz < minSafeDistSq) { validPos = false; break; } }
                            attempts++;
                        }
                        if(validPos) { 
                            clone.position.x = rX; 
                            clone.position.z = rZ; 
                            
                            const randRot = Math.random() * Math.PI * 2;
                            
                            if (isDecor) {
                                // Gira el árbol real para dar variación visual al bosque
                                const treeMesh = clone.children.find(c => c.name === "REAL_MODEL");
                                if (treeMesh) treeMesh.rotation.y = randRot;
                                
                                // Gira el interior de la sombra para que coincida exactamente con la postura del árbol
                                // (Pero el contenedor de sombra FAKE_SHADOW no gira, para que TODAS apunten hacia el mismo sol)
                                const shadowGrp = clone.children.find(c => c.name === "FAKE_SHADOW");
                                if (shadowGrp && shadowGrp.children[0]) {
                                    shadowGrp.children[0].rotation.y = randRot; 
                                }
                            } else {
                                clone.rotation.y = randRot; 
                            }
                            
                            clone.userData.baseScale = new THREE.Vector3(1, 1, 1); 
                            container.add(clone); 
                        }
                    }
                }
            };
            
            const mySetupInfo = customCarAssets[1]?.setup;

            const carbonFiberStyle = { backgroundColor: '#111', backgroundImage: 'linear-gradient(45deg, #000 25%, transparent 25%, transparent 75%, #000 75%, #000), linear-gradient(45deg, #000 25%, transparent 25%, transparent 75%, #000 75%, #000)', backgroundSize: '8px 8px', backgroundPosition: '0 0, 4px 4px' };

            return ( 
                <div className="absolute inset-0 z-50 bg-[#3b5f7d] text-white font-sans overflow-hidden animate-in"> 
                    <div ref={containerRef} className="absolute inset-0 w-full h-full" /> 
                    
                    {/* SEMÁFORO ESTILO F1 (Top Center) */}
                    {countdown !== null && (
                        <div className="absolute inset-0 z-[100] flex flex-col items-center justify-start pt-[15vh] pointer-events-none bg-black/40 backdrop-blur-sm transition-all duration-500">
                            <div className="bg-[#111] p-6 rounded-[2rem] border-4 border-gray-800 shadow-[0_40px_100px_rgba(0,0,0,1)] flex gap-6 relative overflow-hidden">
                                <div className="absolute inset-0 opacity-20" style={{backgroundImage: 'repeating-linear-gradient(45deg, transparent, transparent 10px, rgba(255,255,255,0.1) 10px, rgba(255,255,255,0.1) 20px)'}}></div>
                                
                                {[1, 2, 3, 4, 5].map(num => {
                                    let active = false;
                                    let isGreen = countdown === 0;
                                    
                                    // Encender rojas consecutivamente (countdown: 5 -> 1 luz, 1 -> 5 luces)
                                    if (countdown > 0 && (6 - countdown) >= num) active = true;
                                    // Encender todas verdes al final
                                    if (countdown === 0) active = true;

                                    return (
                                        <div key={num} className="relative z-10 flex flex-col items-center gap-2">
                                            {/* Chasis de la luz */}
                                            <div className={`w-24 h-24 rounded-full border-4 transition-all duration-100 relative overflow-hidden
                                                ${!active ? 'bg-[#1a0505] border-black/80 shadow-[inset_0_10px_20px_rgba(0,0,0,0.9)]' : 
                                                  isGreen ? 'bg-[#39ff14] border-white shadow-[0_0_80px_#39ff14,inset_0_0_30px_white] scale-110' : 
                                                  'bg-red-600 border-white shadow-[0_0_80px_#ef4444,inset_0_0_30px_white] scale-110'
                                                }
                                            `}>
                                                {/* Efecto de cristal/reflexión */}
                                                <div className="absolute top-2 left-1/2 -translate-x-1/2 w-12 h-6 bg-white/40 rounded-full blur-[2px] z-20"></div>
                                                {/* Textura interior del LED */}
                                                <div className="absolute inset-0 opacity-30" style={{backgroundImage: 'radial-gradient(circle at center, transparent 30%, black 100%), repeating-radial-gradient(circle at center, transparent, transparent 4px, rgba(0,0,0,0.4) 4px, rgba(0,0,0,0.4) 5px)'}}></div>
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                            
                            {countdown === 0 && (
                                <div className="mt-16 font-digital text-[180px] leading-none text-[#39ff14] font-black italic drop-shadow-[0_0_120px_#39ff14] animate-[pulse_0.2s_ease-in-out_infinite] transform scale-125 tracking-[0.1em]">
                                    GO!
                                </div>
                            )}
                        </div>
                    )}

                    {/* TOP LEFT: COMPREHENSIVE TELEMETRY & SPECS DASHBOARD */}
                    <div className="absolute top-6 left-6 z-[85] flex flex-col gap-2 pointer-events-auto w-[420px]">
                        <div className="w-full border-t-4 border-[#00f0ff] rounded-t-2xl rounded-b-lg p-4 shadow-[0_15px_30px_rgba(0,0,0,0.9)] flex flex-col relative overflow-hidden" style={carbonFiberStyle}>
                            <div className="absolute inset-0 bg-gradient-to-b from-black/20 to-black/80 pointer-events-none"></div>
                            
                            {/* LAPS & TIMING */}
                            <div className="relative z-10 flex gap-4 mb-3 border-b border-gray-700/80 pb-3">
                                {/* LAPS CONTROLLER */}
                                <div className="flex flex-col items-center justify-center bg-black/60 p-2 rounded-lg border border-gray-800 shrink-0 w-[110px] shadow-inner">
                                    <span className="text-[10px] text-[#00f0ff] font-black uppercase tracking-widest mb-1">{t.lap}</span>
                                    <div className="flex items-baseline gap-1">
                                        <span ref={telemetryRefs.lap} className="font-digital text-4xl text-white leading-none drop-shadow-[0_0_10px_rgba(0,240,255,0.6)]">0</span>
                                        <span className="text-gray-500 font-bold text-lg">/</span>
                                        <span className="font-digital text-2xl text-gray-300">{targetLaps}</span>
                                    </div>
                                    <div className="flex items-center gap-2 mt-2 w-full px-1">
                                        <button onClick={() => setTargetLaps(Math.max(1, targetLaps - 1))} className="flex-1 bg-gray-800 hover:bg-[#00f0ff] hover:text-black hover:border-[#00f0ff] text-gray-300 rounded text-sm font-bold py-0.5 border border-gray-600 transition-colors active:scale-95">-</button>
                                        <button onClick={() => setTargetLaps(targetLaps + 1)} className="flex-1 bg-gray-800 hover:bg-[#00f0ff] hover:text-black hover:border-[#00f0ff] text-gray-300 rounded text-sm font-bold py-0.5 border border-gray-600 transition-colors active:scale-95">+</button>
                                    </div>
                                </div>

                                {/* TIMERS */}
                                <div className="flex-1 flex flex-col gap-2">
                                    <div className="flex justify-between items-end bg-black/40 p-2 rounded-lg border border-gray-800 shadow-inner">
                                        <span className="text-[9px] text-gray-400 font-bold tracking-widest uppercase">{t.totalTime}</span>
                                        <span ref={telemetryRefs.totalTime} className="text-3xl font-digital tabular-nums tracking-tighter text-white leading-none font-bold drop-shadow-[0_0_8px_rgba(255,255,255,0.4)]">0.00</span>
                                    </div>
                                    <div className="flex gap-2">
                                        <div className="flex-1 flex flex-col justify-center items-center bg-black/40 p-1.5 rounded-lg border border-gray-800 shadow-inner">
                                            <span className="text-[8px] text-[#39ff14] font-bold tracking-widest uppercase mb-0.5">{t.currentLap}</span>
                                            <span ref={telemetryRefs.currentLap} className="text-xl font-digital tabular-nums tracking-tight text-[#39ff14] font-bold">0.00</span>
                                        </div>
                                        <div className="flex-1 flex flex-col justify-center items-center bg-yellow-500/10 p-1.5 rounded-lg border border-yellow-500/30 shadow-[inset_0_0_10px_rgba(234,179,8,0.1)]">
                                            <span className="text-[8px] text-yellow-500 font-bold tracking-widest uppercase mb-0.5">{t.bestLap}</span>
                                            <span ref={telemetryRefs.bestTime} className="text-xl font-digital tabular-nums tracking-tight text-yellow-400 font-bold drop-shadow-[0_0_8px_#eab308]">--.--</span>
                                        </div>
                                    </div>
                                </div>
                            </div>

                            {/* SPECS BOARD */}
                            <div className="relative z-10 flex flex-col">
                                <div className="flex justify-between items-center mb-1">
                                    <span className="text-[10px] font-black text-gray-400 tracking-widest uppercase">{t.carSpecs}</span>
                                    <span className="text-[9px] font-black text-black bg-[#39ff14] px-2 py-0.5 rounded-sm shadow-[0_0_5px_#39ff14]">{mySetupInfo?.name || 'STOCK'}</span>
                                </div>
                                <div className="text-sm font-black text-[#00f0ff] truncate mb-2 drop-shadow-[0_0_5px_#00f0ff]">
                                    {customCarAssets[1]?.glbName ? customCarAssets[1].glbName.replace(/\.glb|\.gltf/gi, '').toUpperCase() : 'HOLO CHASIS'}
                                </div>
                                
                                <div className="grid grid-cols-4 gap-2">
                                    <div className="col-span-2 bg-gray-900/80 border border-gray-700 p-2 rounded-lg flex flex-col shadow-inner">
                                        <span className="text-[8px] text-gray-500 font-bold uppercase tracking-wider">{t.motor || 'MOTOR'}</span>
                                        <span className="text-[11px] text-white font-bold truncate mt-0.5">{mySetupInfo?.motorName || 'V8 STANDARD'}</span>
                                        <div className="flex justify-between mt-1">
                                            <span className="text-[9px] text-[#00f0ff] font-mono">{mySetupInfo?.motorRPM || '18000'} RPM</span>
                                            <span className="text-[9px] text-orange-400 font-mono">{mySetupInfo?.motorTorque || '150'} g·cm</span>
                                        </div>
                                    </div>
                                    
                                    <div className="bg-gray-900/80 border border-gray-700 p-2 rounded-lg flex flex-col justify-between shadow-inner">
                                        <span className="text-[8px] text-gray-500 font-bold uppercase tracking-wider">{t.tires || 'TIRES'}</span>
                                        <span className="text-[10px] text-[#39ff14] font-bold truncate">{mySetupInfo?.tireName || 'STD'}</span>
                                        <span className="text-[9px] text-gray-400 font-mono">G: {mySetupInfo?.tireGrip || '80'}</span>
                                    </div>

                                    <div className="bg-gray-900/80 border border-gray-700 p-2 rounded-lg flex flex-col justify-between shadow-inner">
                                        <div className="flex flex-col">
                                            <span className="text-[8px] text-gray-500 font-bold uppercase tracking-wider">{t.ratio || 'RATIO'}</span>
                                            <span className="text-[10px] text-white font-mono">{mySetupInfo?.gearRatio || '3.0'}</span>
                                        </div>
                                        <div className="flex flex-col mt-1">
                                            <span className="text-[8px] text-gray-500 font-bold uppercase tracking-wider">{t.weight || 'WGT'}</span>
                                            <span className="text-[10px] text-white font-mono">{mySetupInfo?.weight || '85'}g</span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                            
                            {/* FINISH OVERLAY */}
                            <div ref={telemetryRefs.finishOverlay} className="absolute inset-0 bg-black/80 z-20 flex flex-col items-center justify-center opacity-0 pointer-events-none transition-opacity duration-500 backdrop-blur-sm">
                                <span className="font-digital text-5xl text-[#39ff14] font-black italic drop-shadow-[0_0_30px_#39ff14]">FINISHED!</span>
                                <span className="text-white text-sm font-bold tracking-widest mt-2">{lang === 'es' ? 'CARRERA COMPLETADA' : 'RACE COMPLETED'}</span>
                                <button onClick={handleRestartRace} className="mt-8 px-8 py-3 bg-gradient-to-b from-[#39ff14] to-green-600 hover:from-[#00f0ff] hover:to-blue-600 text-black font-black uppercase tracking-widest rounded-xl shadow-[0_0_20px_rgba(57,255,20,0.5)] transition-all active:scale-95 flex items-center gap-3">
                                    <Repeat size={20} /> {t.btnRestart}
                                </button>
                            </div>
                        </div>

                        {/* PROGRESS BAR */}
                        <div className="w-full h-3 bg-gray-900 rounded-full overflow-hidden shadow-[0_0_10px_rgba(0,0,0,0.8)] border border-gray-800">
                            <div ref={telemetryRefs.progress} className="h-full bg-gradient-to-r from-[#00f0ff] to-[#39ff14] w-0 transition-all duration-100 shadow-[0_0_15px_#39ff14]"></div>
                        </div>
                    </div>

                    {/* BOTTOM LEFT: LEADERBOARD & AI DASHBOARD (Sim-Racing Style) */}
                    <div className="absolute bottom-6 left-6 z-[85] flex flex-col gap-3 pointer-events-auto w-[340px]">
                        {peerConn && peerConn.open ? (
                            <div className="w-full border-t-4 border-blue-500 rounded-t-2xl rounded-b-lg p-5 shadow-[0_15px_30px_rgba(0,0,0,0.9)] flex flex-col relative overflow-hidden" style={carbonFiberStyle}>
                                <div className="absolute inset-0 bg-gradient-to-b from-black/20 to-black/80 pointer-events-none"></div>
                                <div className="relative z-10">
                                    <span className="text-[10px] text-gray-400 font-black uppercase tracking-widest mb-3 block border-b border-gray-700/80 pb-1">
                                        LEADERBOARD
                                    </span>
                                    <div className="flex flex-col gap-2">
                                        <div className="flex justify-between items-center bg-blue-900/30 px-3 py-2 rounded-lg border border-blue-500/50 shadow-inner">
                                            <span className="text-blue-400 font-black italic text-sm">P1</span>
                                            <span className="text-white text-sm font-black">{lang === 'en' ? 'YOU' : 'TÚ'}</span>
                                        </div>
                                        <div className="flex justify-between items-center bg-gray-900/80 px-3 py-2 rounded-lg border border-gray-700 shadow-inner">
                                            <span className="text-gray-500 font-black italic text-sm">P2</span>
                                            <span className="text-gray-400 text-sm font-bold truncate max-w-[120px]">{multiplayerSession?.rivalName || 'RIVAL'}</span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        ) : (
                            <div className="w-full border-t-4 border-[#39ff14] rounded-t-2xl rounded-b-lg p-5 shadow-[0_15px_30px_rgba(0,0,0,0.9)] flex flex-col relative overflow-hidden" style={carbonFiberStyle}>
                                <div className="absolute inset-0 bg-gradient-to-b from-black/20 to-black/80 pointer-events-none"></div>
                                <div className="relative z-10">
                                    <span className="text-[10px] text-gray-400 font-black uppercase tracking-widest mb-3 flex items-center justify-between border-b border-gray-700/80 pb-1">
                                        <span>VS IA (RIVAL)</span>
                                        {aiDifficulty > 0 && <span className="text-[#39ff14] animate-pulse">ON</span>}
                                    </span>
                                    <div className="flex items-center gap-1.5 mt-2">
                                        <button onClick={() => setAiDifficulty(0)} className={`flex-1 py-2 text-[11px] font-black rounded-lg transition-all ${aiDifficulty === 0 ? 'bg-red-500 text-white shadow-[0_0_15px_rgba(239,68,68,0.5)]' : 'bg-gray-800 border border-gray-700 text-gray-500 hover:bg-gray-700'}`}>OFF</button>
                                        <button onClick={() => setAiDifficulty(1)} className={`flex-1 py-2 text-[11px] font-black rounded-lg transition-all ${aiDifficulty === 1 ? 'bg-[#39ff14] text-black shadow-[0_0_15px_rgba(57,255,20,0.5)]' : 'bg-gray-800 border border-gray-700 text-gray-400 hover:bg-gray-700'}`}>1</button>
                                        <button onClick={() => setAiDifficulty(2)} className={`flex-1 py-2 text-[11px] font-black rounded-lg transition-all ${aiDifficulty === 2 ? 'bg-[#39ff14] text-black shadow-[0_0_15px_rgba(57,255,20,0.5)]' : 'bg-gray-800 border border-gray-700 text-gray-400 hover:bg-gray-700'}`}>2</button>
                                        <button onClick={() => setAiDifficulty(3)} className={`flex-1 py-2 text-[11px] font-black rounded-lg transition-all ${aiDifficulty === 3 ? 'bg-[#39ff14] text-black shadow-[0_0_15px_rgba(57,255,20,0.5)]' : 'bg-gray-800 border border-gray-700 text-gray-400 hover:bg-gray-700'}`}>3</button>
                                        <button onClick={() => setAiDifficulty(4)} className={`flex-1 py-2 text-[11px] font-black rounded-lg transition-all ${aiDifficulty === 4 ? 'bg-[#39ff14] text-black shadow-[0_0_15px_rgba(57,255,20,0.5)]' : 'bg-gray-800 border border-gray-700 text-gray-400 hover:bg-gray-700'}`}>4</button>
                                        <button onClick={() => setAiDifficulty(5)} className={`flex-1 py-2 text-[11px] font-black rounded-lg transition-all ${aiDifficulty === 5 ? 'bg-yellow-400 text-black shadow-[0_0_15px_rgba(250,204,21,0.5)]' : 'bg-gray-800 border border-gray-700 text-gray-400 hover:bg-gray-700'}`}>5</button>
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>

                    {/* TOP RIGHT: SETTINGS & CAMERAS */}
                    <div className="absolute top-6 right-6 z-[85] flex flex-col items-end gap-3 pointer-events-auto">
                        <div className="flex bg-black/90 p-1.5 rounded-xl border border-gray-800 shadow-[0_10px_20px_rgba(0,0,0,0.8)] gap-1 transform -skew-x-6">
                            <button onClick={() => setIsNightMode(!isNightMode)} title={isNightMode ? 'DÍA' : 'NOCHE'} className={`px-4 py-2 font-black text-[10px] tracking-widest uppercase transition-all rounded flex items-center gap-2 transform skew-x-6 ${isNightMode ? 'text-indigo-400 bg-gray-800' : 'text-yellow-400 hover:text-white hover:bg-gray-800'}`}>
                                {isNightMode ? <Moon size={14}/> : <Sun size={14}/>} {isNightMode ? 'NOCHE' : 'DÍA'}
                            </button>
                            <button onClick={toggleQuality} title={t.qualityTooltip} className={`px-4 py-2 font-black text-[10px] tracking-widest uppercase transition-all rounded flex items-center gap-2 transform skew-x-6 ${['LOW', 'MIN'].includes(qualityMode) ? 'text-orange-400 bg-gray-800' : (qualityMode === 'ULTRA' ? 'text-purple-400 bg-gray-800' : 'text-gray-500 hover:text-white hover:bg-gray-800')}`}>
                                <Zap size={14}/> {qualityMode}
                            </button>
                            <button onClick={toggleMusic} title={t.btnMusic} className={`px-4 py-2 font-black text-[10px] tracking-widest uppercase transition-all rounded flex items-center gap-2 transform skew-x-6 ${musicEnabled ? 'text-[#00f0ff] hover:bg-gray-800' : 'text-gray-500 hover:text-white hover:bg-gray-800'}`}>
                                {musicEnabled ? <Volume2 size={14}/> : <VolumeX size={14}/>}
                                {t.btnMusic}
                            </button>
                            <button onClick={toggleAudio} title={t.btnVoice} className={`px-4 py-2 font-black text-[10px] tracking-widest uppercase transition-all rounded flex items-center gap-2 transform skew-x-6 ${audioEnabled ? 'text-[#39ff14] hover:bg-gray-800' : 'text-gray-500 hover:text-white hover:bg-gray-800'}`}>
                                {audioEnabled ? <Volume2 size={14}/> : <VolumeX size={14}/>}
                                {t.btnVoice}
                            </button>
                            <a href="https://slotsoftware.github.io/Telemetria/circuitos.html" target="_blank" rel="noopener noreferrer" title={t.btn2d} className="px-4 py-2 font-black text-[10px] tracking-widest uppercase transition-all rounded text-gray-400 hover:text-white hover:bg-gray-800 flex items-center gap-2 transform skew-x-6 cursor-pointer">
                                <Layers size={14}/> 2D
                            </a>
                            <button onClick={toggleFullscreen} title={t.btnFullscreen} className="px-4 py-2 font-black text-[10px] tracking-widest uppercase transition-all rounded text-gray-400 hover:text-white hover:bg-gray-800 flex items-center gap-2 transform skew-x-6">
                                {isFullscreen ? <Minimize size={14}/> : <Maximize size={14}/>}
                                <span>{t.screen}</span>
                            </button>
                            <div className="w-px bg-gray-800 my-1 mx-1 transform skew-x-6"></div>
                            <button onClick={() => setLang('es')} title="Español" className={`px-3 py-2 font-black text-[10px] tracking-widest uppercase transition-all rounded flex items-center justify-center transform skew-x-6 ${lang === 'es' ? 'text-[#00f0ff] bg-gray-800' : 'text-gray-500 hover:text-white hover:bg-gray-800'}`}>
                                ES
                            </button>
                            <button onClick={() => setLang('en')} title="English" className={`px-3 py-2 font-black text-[10px] tracking-widest uppercase transition-all rounded flex items-center justify-center transform skew-x-6 ${lang === 'en' ? 'text-[#00f0ff] bg-gray-800' : 'text-gray-500 hover:text-white hover:bg-gray-800'}`}>
                                EN
                            </button>
                            <div className="w-px bg-gray-800 my-1 mx-1 transform skew-x-6"></div>
                            <button onClick={onClose} title={t.exit} className="px-4 py-2 font-black text-[10px] tracking-widest uppercase transition-all rounded text-red-500 hover:text-white hover:bg-red-600 flex items-center gap-2 transform skew-x-6">
                                <XIcon size={14}/> {t.exit}
                            </button>
                        </div>

                        <div className="flex bg-black/90 p-1.5 rounded-xl border border-gray-800 shadow-[0_10px_20px_rgba(0,0,0,0.8)] gap-1 transform -skew-x-6">
                            <button onClick={() => setCameraMode('BIRD')} title={t.camBird} className={`px-3 py-2 font-black text-[10px] tracking-widest uppercase transition-all rounded flex items-center gap-2 transform skew-x-6 ${cameraMode === 'BIRD' ? 'bg-[#00f0ff] text-black shadow-[0_0_10px_#00f0ff]' : 'text-gray-400 hover:text-white hover:bg-gray-800'}`}>
                                <Eye size={12}/> BIRD
                            </button>
                            <button onClick={() => setCameraMode('CHASE')} title={t.camChase} className={`px-3 py-2 font-black text-[10px] tracking-widest uppercase transition-all rounded flex items-center gap-2 transform skew-x-6 ${cameraMode === 'CHASE' ? 'bg-[#00f0ff] text-black shadow-[0_0_10px_#00f0ff]' : 'text-gray-400 hover:text-white hover:bg-gray-800'}`}>
                                <Video size={12}/> CHASE
                            </button>
                            <button onClick={() => setCameraMode('PILOT')} title={t.camPilot} className={`px-3 py-2 font-black text-[10px] tracking-widest uppercase transition-all rounded flex items-center gap-2 transform skew-x-6 ${cameraMode === 'PILOT' ? 'bg-[#00f0ff] text-black shadow-[0_0_10px_#00f0ff]' : 'text-gray-400 hover:text-white hover:bg-gray-800'}`}>
                                <Crosshair size={12}/> PILOT
                            </button>
                            <button onClick={() => setCameraMode('FRONT')} title={t.camFront} className={`px-3 py-2 font-black text-[10px] tracking-widest uppercase transition-all rounded flex items-center gap-2 transform skew-x-6 ${cameraMode === 'FRONT' ? 'bg-[#00f0ff] text-black shadow-[0_0_10px_#00f0ff]' : 'text-gray-400 hover:text-white hover:bg-gray-800'}`}>
                                <Car size={12}/> FRONT
                            </button>
                            <button onClick={() => setCameraMode('REAR')} title={t.camRear} className={`px-3 py-2 font-black text-[10px] tracking-widest uppercase transition-all rounded flex items-center gap-2 transform skew-x-6 ${cameraMode === 'REAR' ? 'bg-[#00f0ff] text-black shadow-[0_0_10px_#00f0ff]' : 'text-gray-400 hover:text-white hover:bg-gray-800'}`}>
                                <Undo2 size={12}/> REAR
                            </button>
                        </div>
                    </div>

                    {/* BOTTOM RIGHT: RACING WHEEL DASHBOARD & THROTTLE (SIM-RACING STYLE) */}
                    <div className="absolute bottom-6 right-6 z-[90] flex flex-col items-end gap-2 pointer-events-auto w-[380px]">
                        
                        {/* Speedometer & RPM Display Unit */}
                        <div className="w-full border-t-4 border-[#00f0ff] rounded-t-2xl rounded-b-lg p-5 shadow-[0_15px_30px_rgba(0,0,0,0.9)] flex flex-col relative overflow-hidden" style={carbonFiberStyle}>
                            <div className="absolute inset-0 bg-gradient-to-b from-black/20 to-black/80 pointer-events-none"></div>
                            
                            <div className="flex justify-between items-end z-10 mb-2">
                                <div className="flex flex-col">
                                    <span className="text-[10px] text-gray-400 font-black uppercase tracking-widest mb-1">{t.speed}</span>
                                    <div className="flex items-baseline gap-1">
                                        <span ref={telemetryRefs.speed} className="font-digital italic text-6xl text-white tracking-tighter tabular-nums drop-shadow-[0_0_20px_rgba(0,240,255,0.6)]">000</span>
                                        <span className="text-sm text-[#00f0ff] font-black italic ml-1">KM/H</span>
                                    </div>
                                </div>

                                <div className="flex flex-col items-end w-28 gap-1.5 bg-black/60 p-2 rounded-lg border border-gray-800">
                                    <div className="flex justify-between items-center text-[10px] font-black tracking-widest uppercase w-full">
                                        <span ref={telemetryRefs.fuelStatus} className="text-gray-400">FUEL</span>
                                        <span ref={telemetryRefs.fuelText} className="text-[#39ff14]">100%</span>
                                    </div>
                                    <div className="w-full h-3 bg-gray-950 rounded-[2px] overflow-hidden border border-gray-800 relative shadow-[inset_0_2px_5px_rgba(0,0,0,0.8)]">
                                        <div ref={telemetryRefs.fuelBar} className="absolute left-0 top-0 bottom-0 bg-[#39ff14] transition-all duration-75 shadow-[0_0_10px_#39ff14] z-10"></div>
                                        <div className="absolute inset-0 z-20 pointer-events-none" style={{backgroundImage: 'repeating-linear-gradient(to right, transparent, transparent 5px, #0a0a0a 5px, #0a0a0a 7px)'}}></div>
                                    </div>
                                </div>
                            </div>

                            <div className="w-full mt-2 z-10 bg-black/60 p-2 rounded-lg border border-gray-800">
                                <div className="flex justify-between text-[9px] font-black text-gray-500 mb-1.5 uppercase tracking-wider">
                                    <span>RPM</span><span className="text-red-500">MAX</span>
                                </div>
                                <div className="w-full h-3 bg-gray-950 rounded-[2px] overflow-hidden shadow-[inset_0_2px_5px_rgba(0,0,0,0.8)] border border-gray-800 relative flex items-center">
                                    <div ref={telemetryRefs.rpmBar} className="absolute left-0 top-0 bottom-0 bg-gradient-to-r from-blue-500 via-yellow-400 to-red-500 w-0 transition-all duration-75 z-10"></div>
                                    <div className="absolute inset-0 z-20 pointer-events-none" style={{backgroundImage: 'repeating-linear-gradient(to right, transparent, transparent 8px, #0a0a0a 8px, #0a0a0a 10px)'}}></div>
                                </div>
                            </div>
                        </div>

                        {/* Action Buttons Row */}
                        <div className="flex gap-2 w-full">
                            <button onClick={() => setIsPaused(!isPaused)} title={t.btnPlayPause} className={`px-4 min-w-[120px] h-14 flex items-center justify-center gap-2 rounded-xl border-b-4 transition-all active:translate-y-1 active:border-b-0 ${isPaused ? 'bg-red-500/20 border-red-600 text-red-400 shadow-[0_0_15px_rgba(239,68,68,0.4)]' : 'bg-gray-800 border-gray-900 text-white hover:bg-gray-700'}`}>
                                {isPaused ? <Play size={18} className="fill-current" /> : <Pause size={18} className="fill-current" />}
                                <span className="text-[10px] font-black uppercase tracking-widest">{isPaused ? t.play : t.pause}</span>
                            </button>
                            <button disabled={!isDigitalCircuit} onClick={() => setLaneChangeActive(!laneChangeActive)} title={t.btnLaneChange} className={`flex-1 h-14 flex items-center justify-center gap-2 rounded-xl border-b-4 transition-all ${!isDigitalCircuit ? 'opacity-50 cursor-not-allowed bg-gray-900 border-gray-950 text-gray-600' : (laneChangeActive ? 'bg-blue-500 border-blue-700 text-white shadow-[0_0_20px_rgba(59,130,246,0.6)] active:translate-y-1 active:border-b-0' : 'bg-gray-800 border-gray-900 text-gray-400 hover:bg-gray-700 hover:text-white active:translate-y-1 active:border-b-0')}`}>
                                <Zap size={20} className={laneChangeActive ? "animate-pulse fill-current" : ""} />
                                <span className="text-[11px] font-black uppercase tracking-widest">{t.laneChange}</span>
                            </button>
                            <button disabled={!isDigitalCircuit} onClick={() => setPitEntryActive(!pitEntryActive)} title={t.btnPit} className={`flex-1 h-14 flex items-center justify-center gap-2 rounded-xl border-b-4 transition-all ${!isDigitalCircuit ? 'opacity-50 cursor-not-allowed bg-gray-900 border-gray-950 text-gray-600' : (pitEntryActive ? 'bg-yellow-500 border-yellow-700 text-black shadow-[0_0_20px_rgba(234,179,8,0.6)] active:translate-y-1 active:border-b-0' : 'bg-gray-800 border-gray-900 text-gray-400 hover:bg-gray-700 hover:text-white active:translate-y-1 active:border-b-0')}`}>
                                <Fuel size={20} className={pitEntryActive ? "animate-pulse" : ""} />
                                <span className="text-[11px] font-black uppercase tracking-widest">{t.pitEntry}</span>
                            </button>
                        </div>

                        {/* Horizontal Throttle Pedal/Trigger */}
                        <div className="relative w-full h-24 bg-gray-900 rounded-2xl border-[3px] border-gray-800 shadow-[0_10px_25px_rgba(0,0,0,0.9)] overflow-hidden flex items-center group cursor-pointer mt-1">
                            <div className="absolute inset-0 opacity-20 pointer-events-none" style={{backgroundImage: 'repeating-linear-gradient(45deg, transparent, transparent 10px, rgba(255,255,255,0.5) 10px, rgba(255,255,255,0.5) 20px)'}}></div>
                            
                            {/* Visual Fill Glow */}
                            <div ref={throttleFillRef} className="absolute left-0 top-0 bottom-0 transition-all duration-75 z-10" style={{ width: `0%`, background: `linear-gradient(to right, #3b82f6 0%, #39ff14 50%, #ef4444 100%)`, boxShadow: `none` }}></div>
                            
                            <input ref={throttleInputRef} type="range" min="0" max="100" defaultValue="0" onInput={(e) => {
                                const val = parseFloat(e.target.value);
                                manualThrottleRef.current = val;
                                if (throttleFillRef.current) {
                                    throttleFillRef.current.style.width = `${val}%`;
                                    throttleFillRef.current.style.boxShadow = val > 10 ? `inset -5px 0 20px rgba(255,255,255,0.5)` : 'none';
                                }
                                if (throttleTextRef.current) {
                                    throttleTextRef.current.textContent = Math.round(val);
                                    throttleTextRef.current.className = `font-digital font-black text-5xl italic drop-shadow-[0_2px_4px_rgba(0,0,0,1)] ${val>90?'text-red-400':val>10?'text-white':'text-gray-700'}`;
                                }
                                if (throttleLabelRef.current) {
                                    throttleLabelRef.current.className = `text-[14px] font-black uppercase tracking-[0.2em] drop-shadow-[0_2px_4px_rgba(0,0,0,1)] ${val>10 ? 'text-white' : 'text-gray-600'}`;
                                }
                            }} className="absolute inset-0 w-full h-full opacity-0 cursor-pointer z-20"/>
                            
                            <div className="relative z-30 flex justify-between items-center w-full px-6 pointer-events-none">
                                <span ref={throttleLabelRef} className="text-[14px] font-black uppercase tracking-[0.2em] drop-shadow-[0_2px_4px_rgba(0,0,0,1)] text-gray-600">{t.controller}</span>
                                <span ref={throttleTextRef} className="font-digital font-black text-5xl italic drop-shadow-[0_2px_4px_rgba(0,0,0,1)] text-gray-700">0</span>
                            </div>
                        </div>

                    </div>

                    {/* MENÚS FLOTANTES (Right Side) */}
                    {showMultiMenu && (
                        <div className="absolute right-6 top-48 w-[24rem] bg-[#0f172a]/95 backdrop-blur-xl border-2 border-blue-500 rounded-xl shadow-[0_0_60px_rgba(59,130,246,0.3)] flex flex-col overflow-hidden animate-in z-[100] pointer-events-auto">
                            <div className="bg-blue-500/20 p-4 flex items-center justify-between border-b border-blue-500/30">
                                <h3 className="text-sm font-black text-white tracking-[0.2em] flex items-center gap-2 uppercase"><Gamepad2 size={18} className="text-blue-400"/> {t.multiTitle}</h3>
                                <button onClick={() => setShowMultiMenu(false)} className="text-blue-500 hover:text-white bg-black/40 p-1.5 rounded hover:bg-blue-500/40 transition"><XIcon size={16}/></button>
                            </div>
                            <div className="p-6 flex flex-col gap-4">
                                <p className="text-[11px] text-gray-300 text-center leading-relaxed font-bold mb-2">
                                    {lang === 'es' ? 'El anfitrión elige el circuito. ¡Crea una sala pública para que cualquiera pueda unirse!' : 'Host chooses the track. Create a public room so anyone can join!'}
                                </p>

                                {!(peerConn && peerConn.open) && !isSearching && !myPeerID && (
                                    <div className="flex flex-col gap-4">
                                        {/* BOTÓN GIGANTE CREAR PÚBLICA */}
                                        <button onClick={startPublicHost} className="relative w-full bg-blue-600 hover:bg-blue-500 text-white border-2 border-blue-400 font-black py-5 rounded-xl text-[14px] uppercase tracking-[0.2em] transition-all shadow-[0_0_20px_rgba(59,130,246,0.5)] hover:shadow-[0_0_30px_rgba(59,130,246,0.8)] active:scale-95 flex justify-center items-center gap-3 overflow-hidden group">
                                            <div className="absolute inset-0 bg-[url('data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSI0IiBoZWlnaHQ9IjQiPjxyZWN0IHdpZHRoPSI0IiBoZWlnaHQ9IjQiIGZpbGw9InRyYW5zcGFyZW50Ii8+PGxpbmUgeDE9IjAiIHkxPSIwIiB4Mj0iMCIgeTI9IjQiIHN0cm9rZT0icmdiYSgyNTUsMjU1LDI1NSwwLjEpIiBzdHJva2Utd2lkdGg9IjIiLz48L3N2Zz4=')] opacity-20 pointer-events-none group-hover:opacity-40"></div>
                                            <Plus size={24} className="group-hover:rotate-90 transition-transform duration-300 z-10"/> <span className="z-10">{t.createRoomPublic}</span>
                                        </button>
                                        
                                        {/* LISTA DE SALAS PÚBLICAS */}
                                        <div className="bg-black/60 rounded-xl border border-blue-500/30 p-3 min-h-[140px] flex flex-col max-h-[220px] overflow-y-auto hide-scrollbar shadow-[inset_0_0_20px_rgba(0,0,0,0.8)] relative">
                                            <div className="flex justify-between items-center mb-3 pb-2 border-b border-blue-500/30">
                                                <span className="text-[10px] font-black text-blue-400 uppercase tracking-widest">{t.publicRooms}</span>
                                                <span className="bg-blue-500/20 text-blue-300 px-2 py-0.5 rounded text-[8px] font-bold animate-pulse border border-blue-500/50">LIVE</span>
                                            </div>
                                            
                                            {publicRooms.length === 0 ? (
                                                <div className="flex-1 flex flex-col items-center justify-center opacity-50 py-4">
                                                    <Cloud size={24} className="mb-2 text-gray-500"/>
                                                    <span className="text-[10px] text-center uppercase tracking-wider font-bold text-gray-400">{t.noRooms}</span>
                                                </div>
                                            ) : (
                                                <div className="flex flex-col gap-2">
                                                    {publicRooms.map(room => (
                                                        <div key={room.id} className="flex justify-between items-center bg-gray-900/80 border border-gray-700 p-2.5 rounded-lg hover:border-blue-500 transition-colors shadow-md">
                                                            <div className="flex flex-col">
                                                                <span className="text-[8px] text-gray-500 font-bold uppercase tracking-widest">HOST</span>
                                                                <span className="text-xs font-black text-white">{room.hostName}</span>
                                                            </div>
                                                            <button onClick={() => joinPublicRoom(room)} className="bg-emerald-500 hover:bg-emerald-400 text-black border border-emerald-400 px-5 py-2 rounded text-[10px] font-black uppercase tracking-widest transition-all shadow-[0_0_10px_rgba(16,185,129,0.5)] active:scale-95">
                                                                {t.joinRoom}
                                                            </button>
                                                        </div>
                                                    ))}
                                                </div>
                                            )}
                                        </div>

                                        {/* SECCIÓN PRIVADA (PEQUEÑA ABAJO) */}
                                        <div className="mt-2 pt-4 border-t border-gray-800 flex flex-col gap-3">
                                            <span className="text-[9px] font-bold text-gray-500 uppercase tracking-widest text-center">{lang === 'es' ? 'Conexión Privada (Opcional)' : 'Private Connection (Optional)'}</span>
                                            <div className="flex gap-2">
                                                <button disabled={!!(peerConn && peerConn.open)} onClick={startHost} className="flex-1 bg-gray-800 hover:bg-gray-700 border border-gray-600 text-gray-300 font-bold py-2 rounded text-[10px] uppercase tracking-widest transition">
                                                    {t.createRoomPrivate}
                                                </button>
                                            </div>
                                            <div className="flex gap-2">
                                                <input disabled={!!(peerConn && peerConn.open)} type="text" placeholder={t.roomCode} value={joinID} onChange={e=>setJoinID(e.target.value.toUpperCase())} className="w-1/2 bg-black/60 border border-gray-600 rounded px-3 text-center font-mono font-bold text-white focus:border-blue-500 outline-none uppercase text-xs"/>
                                                <button disabled={!!(peerConn && peerConn.open)} onClick={startJoin} className="w-1/2 bg-gray-700 hover:bg-gray-600 border border-gray-500 text-white font-bold px-4 py-2 rounded text-[10px] transition uppercase tracking-widest">{t.joinRoom}</button>
                                            </div>
                                        </div>
                                    </div>
                                )}

                                {/* EL RADAR (CUANDO BUSCA PÚBLICA) */}
                                {isSearching && !(peerConn && peerConn.open) && (
                                    <div className="text-center w-full bg-black/60 p-8 rounded-2xl border-2 border-blue-500/50 shadow-[inset_0_0_30px_rgba(59,130,246,0.2)] animate-in flex flex-col items-center gap-4 relative overflow-hidden mt-2">
                                        <div className="absolute top-0 right-0 w-24 h-24 bg-blue-500/10 rounded-full blur-2xl pointer-events-none"></div>
                                        <div className="w-16 h-16 border-4 border-blue-500 border-t-transparent rounded-full animate-spin shadow-[0_0_15px_#3b82f6]"></div>
                                        <h3 className="text-sm font-black text-blue-400 tracking-widest uppercase animate-pulse drop-shadow-[0_0_8px_#3b82f6]">{t.waiting}</h3>
                                        <p className="text-[10px] text-gray-400 uppercase tracking-wider max-w-[80%] font-bold">
                                            {lang === 'es' ? 'Tú eres el anfitrión. Esperando a que otro piloto se una...' : 'You are the host. Waiting for a racer to join...'}
                                        </p>
                                        <button onClick={cancelSearch} className="mt-4 px-6 py-2 bg-red-900/20 hover:bg-red-600 text-red-500 hover:text-white border border-red-500 rounded text-[10px] font-black uppercase tracking-widest transition-all">
                                            {t.cancel}
                                        </button>
                                    </div>
                                )}

                                {/* WAITING FOR PRIVATE (CON CÓDIGO) */}
                                {myPeerID && !isSearching && !(peerConn && peerConn.open) && (

                    {/* MODAL CONFIGURACIÓN DE CARRERA (PRE-RACE) */}
                    {isPreRace && sceneReady && (

                                <div className="flex flex-col md:flex-row gap-6 w-full relative z-10">
                                    {/* Tarjeta Vueltas */}
                                    <div className="flex-1 bg-black/60 p-6 rounded-2xl border border-gray-700 flex flex-col items-center shadow-inner">

                                            <button onClick={() => setTargetLaps(Math.max(1, targetLaps - 1))} className="w-14 h-14 flex items-center justify-center bg-gray-800 hover:bg-[#39ff14] hover:text-black rounded-full font-black text-3xl transition-colors border border-gray-600 shadow-lg active:scale-90">-</button>
                                            <span className="font-digital text-6xl text-white w-24 text-center drop-shadow-[0_0_15px_rgba(255,255,255,0.5)]">{targetLaps}</span>

                                                {[1,2,3,4,5].map(level => (

            );
        };

        const parseCircuitData = (d) => {
            if (!d || !d.pieces) return null;
            
            // 1. Filtrado por propiedades explícitas de carriles paralelos
            let masterPieces = d.pieces.filter(p => 
                !p.isParallel && 
                !p.isOuter && 
                p.lane !== 2 && 
                p.lane !== 3 && 
                p.lane !== 4 &&
                p.lane !== 'outer' &&
                p.group !== 'parallel'
            );

            // 2. Cortar secuencias desconectadas (ej. un segundo 'set_origin' que inicia el carril exterior)
            const cleanPieces = [];
            let hasStarted = false;
            for (let i = 0; i < masterPieces.length; i++) {
                const p = masterPieces[i];
                if (p.type === 'set_origin') {
                    if (hasStarted) break; // Fin del trazado maestro, comienza un carril paralelo 4, 6 u 8
                    cleanPieces.push(p);
                } else if (p.type === 'goto') {
                    cleanPieces.push(p);
                } else {
                    hasStarted = true;
                    cleanPieces.push(p);
                }
            }

            return { ...d, pieces: cleanPieces };
        };

        function Slot3DPlayer() {
          const [circuitData, setCircuitData] = useState(null);
          const [carSettings, setCarSettings] = useState(Array(8).fill(null).map((_, i) => ({ id: i + 1, name: `PILOTO ${i + 1}`, color: ['#ef4444', '#3b82f6', '#22c55e', '#eab308', '#a855f7', '#ec4899', '#f97316', '#64748b'][i % 8] })));
          
          // DEFAULT QUALITY a MED en lugar de HIGH para mejorar el rendimiento inicial en portátiles
          const [qualityMode, setQualityMode] = useState(() => { try { const saved = localStorage.getItem('slot_quality'); return ['ULTRA','HIGH','MED','LOW','MIN'].includes(saved) ? saved : 'MED'; } catch(e) { return 'MED'; }});
          const toggleQuality = () => { const levels = ['ULTRA', 'HIGH', 'MED', 'LOW', 'MIN']; const n = levels[(levels.indexOf(qualityMode) + 1) % levels.length]; setQualityMode(n); try { localStorage.setItem('slot_quality', n); } catch(e){} };
          
          // Valores por defecto y carga automática de la configuración del coche desde el diseñador 2D
          const [customCarAssets, setCustomCarAssets] = useState(() => {
              const defaultSetups = {};
              for(let i=1; i<=8; i++) {
