                      const { collection, addDoc } = window.FirebaseAPI;
                      const colRef = collection(dbRef.current, 'artifacts', appIdRef.current, 'public', 'data', 'multiplayer_rooms');
                      const docRef = await addDoc(colRef, {
                          peerId: id,
                          hostName: user?.displayName || (user?.email ? user.email.split('@')[0] : 'Piloto'),
                          status: 'waiting',
                          timestamp: Date.now()
                      });
                      setMyPublicRoomId(docRef.id);
                  } catch(e) { }
              });
              p.on('connection', async (c) => {
                  c.on('open', async () => {
                      setPeerConn(c);
                      setSession({ role: 'HOST', id: p.id, isHost: true });
                      setupNetwork(c, true);
                      setIsSearching(false);
                      if (myPublicRoomId && dbRef.current) {
                          try {
                              const { doc, deleteDoc } = window.FirebaseAPI;
                              await deleteDoc(doc(dbRef.current, 'artifacts', appIdRef.current, 'public', 'data', 'multiplayer_rooms', myPublicRoomId));
                          } catch(e) {}
                      }
                  });
              });
              setPeer(p);
          };

          const joinPublicRoom = (room) => {
              setConnectingRoomId(room.id);
              const p = new Peer(getPeerConfig());
              
              const timeoutId = setTimeout(() => {
                  setConnectingRoomId(null);
                  setToastMsg(lang === 'pt' ? 'Erro: O anfitrião desligou-se ou a rede está muito lenta.' : 'Error: Host disconnected or slow network.');
                  if (p) p.destroy();
                  // IMPORTANTE: O cliente nunca deve apagar a sala se houver falha de timeout do seu lado.
              }, 8000); // Aumentado a 8s para redes mais lentas

              p.on('open', () => {
                  const c = p.connect(room.peerId, { reliable: true });
                  
                  c.on('open', () => {
                      clearTimeout(timeoutId);
                      setConnectingRoomId(null);
                      setPeerConn(c);
                      setSession({ role: 'CLIENT', id: room.peerId, isHost: false });
                      setupNetwork(c, false);
                      try {
                          const { doc, deleteDoc } = window.FirebaseAPI;
                          deleteDoc(doc(dbRef.current, 'artifacts', appIdRef.current, 'public', 'data', 'multiplayer_rooms', room.id));
                      } catch(e){}
                  });

                  c.on('error', () => {
                      clearTimeout(timeoutId);
                      setConnectingRoomId(null);
                      setToastMsg(lang === 'es' ? 'Error de red P2P.' : 'P2P network error.');
                  });
              });
              
              p.on('error', () => {
                  clearTimeout(timeoutId);
                  setConnectingRoomId(null);
                  setToastMsg(lang === 'es' ? 'Fallo en la comunicación.' : 'Communication failure.');
              });
              
              setPeer(p);
          };

          const cancelSearch = () => {
              if (peer) { peer.destroy(); setPeer(null); }
              if (myPublicRoomId && dbRef.current) {
                  try {
                      const { doc, deleteDoc } = window.FirebaseAPI;
                      deleteDoc(doc(dbRef.current, 'artifacts', appIdRef.current, 'public', 'data', 'multiplayer_rooms', myPublicRoomId));
                  } catch(e){}
              }
              setMyPeerID('');
              setIsSearching(false);
              setMyPublicRoomId(null);
          };

          useEffect(() => {
              const handleBeforeUnload = () => {
                  if (myPublicRoomId && dbRef.current) {
                      try {
                          const { doc, deleteDoc } = window.FirebaseAPI;
                          deleteDoc(doc(dbRef.current, 'artifacts', appIdRef.current, 'public', 'data', 'multiplayer_rooms', myPublicRoomId));
                      } catch(e){}
                  }
              };
              window.addEventListener('beforeunload', handleBeforeUnload);
              return () => window.removeEventListener('beforeunload', handleBeforeUnload);
          }, [myPublicRoomId]);

          const setupNetwork = (connection, isHost) => {
              const startSync = () => {
                  if (isHost) {
                      let circuitToSend = null;
                      try {
                          const saved = localStorage.getItem('slot_last_circuit');
                          if(saved) {
                              const d = JSON.parse(saved);
                              if (validateCircuit(d)) circuitToSend = parseCircuitData(d);
                          }
                      } catch(e) {}
                      if (!circuitToSend || !circuitToSend.pieces) {
                          circuitToSend = { brand: 'NINCO', pieces: [{type:'straight', length:100}, {type:'straight', length:100}] };
                      }
                      
                      setCircuitData(circuitToSend); 
                      connection.send({ type: 'HOST_INIT', playerName: user?.displayName || 'Piloto', circuit: circuitToSend, carUrl: myCarRef.current });
                  } else {
                      connection.send({ type: 'CLIENT_READY', playerName: user?.displayName || 'Piloto', carUrl: myCarRef.current });
                  }
              };

              if (connection.open) {
                  startSync();
              } else {
                  connection.on('open', startSync);
              }

              connection.on('data', data => {
                  if (data.type === 'CLIENT_READY' && isHost) {
                      setSession(prev => ({...prev, rivalName: data.playerName}));
                      if (data.carUrl) setCustomCarAssets(prev => ({ ...prev, 2: { ...prev[2], glb: data.carUrl, isDecor: false } }));
                  } else if (data.type === 'HOST_INIT' && !isHost) {
                      // O cliente recibe el circuito del anfitrión
                      setSession(prev => ({...prev, rivalName: data.playerName}));
                      if (data.carUrl) setCustomCarAssets(prev => ({ ...prev, 2: { ...prev[2], glb: data.carUrl, isDecor: false } }));
                      if (data.circuit) {
                          if (!validateCircuit(data.circuit)) return;
                          const parsed = parseCircuitData(data.circuit);
                          setCircuitData(parsed); 
                          try { 
                              localStorage.setItem('slot_last_circuit', JSON.stringify(parsed)); 
                              setHasSavedCircuit(true); 
                          } catch(e) {}
                      }
                  } else {
                      // Tráfico de Telemetría en carrera (Velocidad, vía, gasolina...)
                      setNetworkData(data);
                  }
              });
          };

          const handleCarAssetUpdate = (file, targetId, arg3) => {
              if (file && targetId) {
                  const url = URL.createObjectURL(file);
                  const isDecor = arg3 === 'decor';
                  setCustomCarAssets(prev => ({ ...prev, [targetId]: { ...prev[targetId], glb: url, glbName: file.name, isDecor: isDecor } }));
              } else if (targetId && arg3) {
                  setCustomCarAssets(prev => ({ ...prev, [targetId]: { ...prev[targetId], ...arg3 } }));
              }
          };

          const [hasSavedCircuit, setHasSavedCircuit] = useState(false);

          useEffect(() => { 
              const ls = document.getElementById('loading-screen'); 
              try {
                  const transferData = localStorage.getItem('slot_circuit_transfer');
                  const validateAndLoad = (dataStr) => { 
                      try { 
                          const d = JSON.parse(dataStr); 
                          if (d.brand && d.pieces) { 
                              if (!validateCircuit(d)) return false;
                              setCircuitData(parseCircuitData(d)); 
                              return true; 
                          } 
                      } catch (e) { } 
                      return false; 
                  };

                  let loaded = false;
                  if (transferData) { 
                      loaded = validateAndLoad(transferData); 
                      if (loaded) localStorage.setItem('slot_last_circuit', transferData); 
                      localStorage.removeItem('slot_circuit_transfer'); 
                  } 
                  
                  setHasSavedCircuit(!!localStorage.getItem('slot_last_circuit'));
              } catch(e) {}
              if (ls) { ls.style.opacity = '0'; setTimeout(() => ls.style.display = 'none', 1000); } 
          }, []);

          const loadLastCircuit = () => {
              try {
                  const saved = localStorage.getItem('slot_last_circuit');
                  if (saved) {
                      const d = JSON.parse(saved);
                      if (d.brand && d.pieces) {
                          if (!validateCircuit(d)) {
                              localStorage.removeItem('slot_last_circuit');
                              return;
                          }
                          setCircuitData(parseCircuitData(d));
                      }
                  }
              } catch(e){}
          };

          const loadCircuit = (e) => { 
            const f = e.target.files[0]; if (!f) return; const r = new FileReader(); 
            r.onload = (ev) => { 
                try { 
                    const d = JSON.parse(ev.target.result); 
                    if (d.brand && d.pieces) { 
                        if (!validateCircuit(d)) return;
                        const parsed = parseCircuitData(d);
                        setCircuitData(parsed); 
                        localStorage.setItem('slot_last_circuit', JSON.stringify(parsed)); 
                    } else { alert(t.invalidFormat); } 
                } catch (err) { alert(t.errorJson); } 
            }; r.readAsText(f); e.target.value = '';
          };

          const currentSetupInfo = customCarAssets[editingCarId]?.setup;

          return (
            <>
                {/* Audio Elements Persistentes (Bypass de Autoplay - SIN crossOrigin) */}
                <audio ref={menuMusicRef} loop preload="auto" src="https://slotsoftware.github.io/Game3d/Musica/1.mp3" />
                <audio ref={raceMusicRef} loop preload="auto" src="https://slotsoftware.github.io/Game3d/Musica/2.mp3" />

                {toastMsg && (
                    <div className="fixed top-10 left-1/2 -translate-x-1/2 z-[9999] bg-[#0f172a]/95 backdrop-blur-xl border border-cyan-500 text-cyan-400 px-6 py-3 rounded-xl shadow-[0_0_30px_rgba(0,240,255,0.4)] font-mono text-[10px] font-bold uppercase tracking-widest animate-in flex items-center gap-3 w-max max-w-[80vw]">
                        <AlertTriangle size={18} className="text-yellow-400 animate-pulse shrink-0" />
                        {toastMsg}
                    </div>
                )}

                {circuitData ? (
                    <Telemetry3DViewer circuitData={circuitData} carSettings={carSettings} customCarAssets={customCarAssets} onCarAssetUpdate={handleCarAssetUpdate} onClose={() => { setCircuitData(null); setSession(null); if(peerConn) peerConn.close(); try { setHasSavedCircuit(!!localStorage.getItem('slot_last_circuit')); } catch(e){} }} lang={lang} setLang={setLang} t={t} multiplayerSession={session} peerConn={peerConn} networkData={networkData} startHost={startHost} startJoin={startJoin} myPeerID={myPeerID} joinID={joinID} setJoinID={setJoinID} audioEnabled={audioEnabled} toggleAudio={toggleAudio} musicEnabled={musicEnabled} toggleMusic={toggleMusic} qualityMode={qualityMode} toggleQuality={toggleQuality} />
                ) : (
                    <div className="flex h-[100dvh] w-full bg-gradient-to-br from-blue-950 via-blue-900 to-cyan-900 overflow-hidden font-sans select-none text-gray-200 relative">
                        <Garage3DBackground carUrl={customCarAssets[editingCarId]?.glb} carRotation={customCarAssets[editingCarId]?.rotation} carOffset={customCarAssets[editingCarId]?.offset} qualityMode={qualityMode} />
                        <div className="absolute inset-0 bg-gradient-to-t from-black/60 via-transparent to-black/30 pointer-events-none z-10"></div>
                        
                        <div className="absolute top-6 right-6 z-50 flex gap-4 items-start">
                    <div className="flex gap-2">
                        <button onClick={toggleQuality} className={`px-3 md:px-4 h-10 flex items-center justify-center font-digital text-[10px] tracking-widest transform -skew-x-6 border-b-4 transition-all ${['LOW','MIN'].includes(qualityMode) ? 'bg-gradient-to-b from-orange-500/30 to-black/90 border-orange-500 text-orange-400 shadow-[0_5px_15px_rgba(249,115,22,0.4)]' : (qualityMode === 'ULTRA' ? 'bg-gradient-to-b from-purple-500/30 to-black/90 border-purple-500 text-purple-400 shadow-[0_5px_15px_rgba(168,85,247,0.4)]' : 'bg-gray-900 border-gray-700 text-gray-500 hover:text-white hover:border-gray-500')} rounded`} title={t.qualityTooltip}>
                            <span className="transform skew-x-6 flex items-center gap-2">
                                <Zap size={16}/>
                                <span className="font-black">{qualityMode}</span>
                            </span>
                        </button>
                        <button onClick={toggleMusic} className={`px-3 md:px-4 h-10 flex items-center justify-center font-digital text-[10px] tracking-widest transform -skew-x-6 border-b-4 transition-all ${musicEnabled ? 'bg-gradient-to-b from-[#00f0ff]/30 to-black/90 border-[#00f0ff] text-[#00f0ff] shadow-[0_5px_15px_rgba(0,240,255,0.4)]' : 'bg-gray-900 border-gray-700 text-gray-500 hover:text-white hover:border-gray-500'} rounded`} title={t.btnMusic}>
                            <span className="transform skew-x-6 flex items-center gap-2">
                                {musicEnabled ? <Volume2 size={16}/> : <VolumeX size={16}/>}
                                <span className="font-black">{t.btnMusic}</span>
                            </span>
                        </button>
                        <button onClick={toggleAudio} className={`px-3 md:px-4 h-10 flex items-center justify-center font-digital text-[10px] tracking-widest transform -skew-x-6 border-b-4 transition-all ${audioEnabled ? 'bg-gradient-to-b from-[#39ff14]/30 to-black/90 border-[#39ff14] text-[#39ff14] shadow-[0_5px_15px_rgba(57,255,20,0.4)]' : 'bg-gray-900 border-gray-700 text-gray-500 hover:text-white hover:border-gray-500'} rounded`} title={t.btnVoice}>
                            <span className="transform skew-x-6 flex items-center gap-2">
                                {audioEnabled ? <Volume2 size={16}/> : <VolumeX size={16}/>}
                                <span className="font-black">{t.btnVoice}</span>
                            </span>
                        </button>
                        <button onClick={toggleGarageFullscreen} className="px-3 md:px-4 h-10 flex items-center justify-center font-digital text-[10px] tracking-widest transform -skew-x-6 border-b-4 transition-all bg-gray-900 border-gray-700 text-gray-500 hover:text-white hover:border-gray-500 rounded" title={t.btnFullscreen}>
                            <span className="transform skew-x-6 flex items-center gap-2">
                                {isGarageFullscreen ? <Minimize size={14}/> : <Maximize size={14}/>}
                                <span className="font-black">{t.screen}</span>
                            </span>
                        </button>
                        <button onClick={() => setLang('es')} className={`w-10 h-10 flex items-center justify-center font-digital text-[10px] tracking-widest transform -skew-x-6 border-b-4 transition-all ${lang === 'es' ? 'bg-gradient-to-b from-[#00f0ff]/30 to-black/90 border-[#00f0ff] text-[#00f0ff] shadow-[0_5px_15px_rgba(0,240,255,0.4)]' : 'bg-gray-900 border-gray-700 text-gray-500 hover:text-white hover:border-gray-500'} rounded`} title="Español"><span className="transform skew-x-6 font-black">ES</span></button>
                        <button onClick={() => setLang('en')} className={`w-10 h-10 flex items-center justify-center font-digital text-[10px] tracking-widest transform -skew-x-6 border-b-4 transition-all ${lang === 'en' ? 'bg-gradient-to-b from-[#00f0ff]/30 to-black/90 border-[#00f0ff] text-[#00f0ff] shadow-[0_5px_15px_rgba(0,240,255,0.4)]' : 'bg-gray-900 border-gray-700 text-gray-500 hover:text-white hover:border-gray-500'} rounded`} title="English"><span className="transform skew-x-6 font-black">EN</span></button>
                    </div>

                    {user && !user.isAnonymous ? (
                        <div className="bg-[#0a0a0a] border-t-2 border-b-2 border-x-0 border-[#39ff14] rounded-tl-xl rounded-br-[2rem] px-5 py-2.5 shadow-[0_0_30px_rgba(57,255,20,0.5),inset_0_0_15px_rgba(57,255,20,0.3)] transform -skew-x-6 flex items-center gap-4 relative overflow-hidden group">
                            <div className="absolute inset-0 opacity-10 pointer-events-none" style={{backgroundImage: 'linear-gradient(#39ff14 1px, transparent 1px), linear-gradient(90deg, #39ff14 1px, transparent 1px)', backgroundSize: '10px 10px'}}></div>
                            <div className="flex flex-col items-end transform skew-x-6 z-10">
                                <span className="text-[7px] text-gray-500 uppercase tracking-widest leading-none font-bold mb-0.5">PILOTO</span>
                                <span className="font-digital text-sm font-black text-white drop-shadow-[0_0_8px_#39ff14] tracking-widest">{user.displayName || (user.email ? user.email.split('@')[0] : 'Piloto')}</span>
                            </div>
                            <button onClick={handleSignOut} title={t.auth.logoutBtn} className="w-8 h-8 flex items-center justify-center transform skew-x-6 rounded bg-red-500/20 border border-red-500 text-red-400 hover:bg-red-500 hover:text-white transition shadow-[0_0_10px_rgba(239,68,68,0.4)] z-10">
                                <XIcon size={14} />
                            </button>
                        </div>
                    ) : (
                        <button onClick={() => setShowAuthModal(true)} className="bg-[#0a0a0a] border-t-2 border-b-2 border-x-0 border-[#00f0ff] rounded-tl-xl rounded-br-[2rem] px-6 py-3 shadow-[0_0_30px_rgba(0,240,255,0.5),inset_0_0_15px_rgba(0,240,255,0.3)] transform -skew-x-6 hover:-translate-x-1 transition-all group flex items-center justify-center cursor-pointer relative overflow-hidden">
                            <div className="absolute inset-0 opacity-10 pointer-events-none" style={{backgroundImage: 'linear-gradient(#00f0ff 1px, transparent 1px), linear-gradient(90deg, #00f0ff 1px, transparent 1px)', backgroundSize: '10px 10px'}}></div>
                            <div className="flex items-center gap-3 transform skew-x-6 z-10">
                                <User size={18} className="text-[#00f0ff] group-hover:scale-110 transition-transform drop-shadow-[0_0_8px_#00f0ff]"/> 
                                <span className="font-digital font-black text-white text-xs tracking-[0.2em] group-hover:text-[#00f0ff] transition-colors drop-shadow-[0_0_5px_rgba(255,255,255,0.5)]">{t.auth.loginBtn}</span>
                            </div>
                        </button>
                    )}
                </div>

                {showAuthModal && (
                    <div className="absolute inset-0 z-[110] bg-black/80 backdrop-blur-md flex items-center justify-center animate-in" onClick={() => setShowAuthModal(false)}>
                        <div className="bg-[#0f172a] w-[400px] rounded-2xl border-t-4 border-[#00f0ff] shadow-[0_0_60px_rgba(0,240,255,0.2)] overflow-hidden" onClick={e => e.stopPropagation()}>
                            <div className="bg-black/40 p-6 text-center border-b border-white/10 relative">
                                <button onClick={() => setShowAuthModal(false)} className="absolute top-4 right-4 text-gray-500 hover:text-white"><XIcon size={20}/></button>
                                <User size={40} className="mx-auto text-[#00f0ff] mb-3 drop-shadow-[0_0_10px_rgba(0,240,255,0.8)]"/>
                                <h2 className="font-digital text-2xl font-black text-white tracking-widest uppercase">
                                    {authMode === 'login' ? t.auth.titleLogin : t.auth.titleReg}
                                </h2>
                            </div>
                            <form onSubmit={handleAuthSubmit} className="p-6 flex flex-col gap-4">
                                {authError && <div className="text-xs text-red-400 bg-red-900/20 border border-red-500/50 p-2 rounded text-center font-bold">{authError}</div>}
                                {authMessage && <div className="text-xs text-[#39ff14] bg-green-900/20 border border-green-500/50 p-2 rounded text-center font-bold">{authMessage}</div>}
                                
                                {authMode === 'register' && (
                                    <div>
                                        <label className="text-[10px] text-gray-400 uppercase tracking-widest font-black mb-1 block">{t.auth.name}</label>
                                        <input type="text" required value={authUsername} onChange={e=>setAuthUsername(e.target.value)} className="w-full bg-black/60 border border-gray-700 rounded px-4 py-2 text-sm text-white focus:border-[#00f0ff] outline-none" placeholder="Ej: Ayrton S."/>
                                    </div>
                                )}
                                <div>
                                    <label className="text-[10px] text-gray-400 uppercase tracking-widest font-black mb-1 block">{t.auth.email}</label>
                                    <input type="email" required value={authEmail} onChange={e=>{setAuthEmail(e.target.value); setAuthError(''); setAuthMessage('');}} className="w-full bg-black/60 border border-gray-700 rounded px-4 py-2 text-sm text-white focus:border-[#00f0ff] outline-none" placeholder="piloto@ejemplo.com"/>
                                </div>
                                <div>
                                    <div className="flex justify-between items-center mb-1">
                                        <label className="text-[10px] text-gray-400 uppercase tracking-widest font-black block">{t.auth.pass}</label>
                                        {authMode === 'login' && (
                                            <button type="button" onClick={handlePasswordReset} className="text-[9px] text-[#00f0ff] hover:text-white transition-colors uppercase tracking-widest font-bold">
                                                {t.auth.forgotPass}
                                            </button>
                                        )}
                                    </div>
                                    <input type="password" required value={authPassword} onChange={e=>setAuthPassword(e.target.value)} className="w-full bg-black/60 border border-gray-700 rounded px-4 py-2 text-sm text-white focus:border-[#00f0ff] outline-none" placeholder="******"/>
                                </div>
                                
                                <button type="submit" className="mt-2 w-full py-3 bg-gradient-to-b from-[#00f0ff] to-blue-600 hover:from-blue-400 hover:to-blue-700 border-b-4 border-blue-900 text-black font-digital font-black text-sm tracking-widest rounded transition-all active:translate-y-1 active:border-b-0 shadow-lg">
                                    {authMode === 'login' ? t.auth.submitLogin : t.auth.submitReg}
                                </button>
                                
                                <button type="button" onClick={() => { setAuthMode(authMode === 'login' ? 'register' : 'login'); setAuthError(''); setAuthMessage(''); }} className="mt-2 text-xs font-bold text-gray-500 hover:text-white transition-colors">
                                    {authMode === 'login' ? t.auth.switchReg : t.auth.switchLogin}
                                </button>
                            </form>
                        </div>
                    </div>
                )}

                <div className="absolute left-0 top-10 bottom-10 w-[21rem] xl:w-[24rem] z-20 flex flex-col gap-6 animate-in slide-in-left pointer-events-none">
                    
                    <div className="pointer-events-auto relative ml-10 w-max">
                        <div className="absolute top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 w-[120%] h-[120%] bg-[#00f0ff]/10 blur-[60px] rounded-full pointer-events-none z-0"></div>
                        
                        <h1 className="relative z-10 font-digital font-black uppercase tracking-widest leading-[1.05] text-left block">
                            <div className="text-glow-orange text-5xl md:text-6xl whitespace-nowrap">
                                3D SLOT
                            </div>
                            <div className="text-7xl md:text-8xl text-glow-cyan tracking-normal mt-[-5px]">
                                GAME
                            </div>
                        </h1>
                        
                        <div className="relative z-10 flex items-center gap-3 mt-4 w-full">
                            <div className="h-[2px] flex-1 bg-[#00f0ff] shadow-[0_0_10px_#00f0ff]"></div>
                            <p className="text-gray-300 font-mono text-[10px] tracking-[0.4em] font-bold uppercase shrink-0">BY ALBERT CLOSA</p>
                            <div className="h-[2px] flex-1 bg-[#00f0ff] shadow-[0_0_10px_#00f0ff]"></div>
                        </div>
                    </div>

                    <div className="bg-[#0a0a0a]/90 border-t-2 border-b-2 border-x-0 border-[#39ff14] rounded-tr-[3rem] rounded-br-xl p-1 shadow-[0_0_40px_rgba(57,255,20,0.5),inset_0_0_20px_rgba(57,255,20,0.3)] flex-1 pointer-events-auto flex flex-col transform -skew-x-6 relative overflow-hidden mt-2 -ml-16 w-[calc(100%+4rem)]">
                        
                        <div className="absolute inset-0 opacity-10 pointer-events-none" style={{backgroundImage: 'linear-gradient(#39ff14 1px, transparent 1px), linear-gradient(90deg, #39ff14 1px, transparent 1px)', backgroundSize: '20px 20px'}}></div>

                        <div className="transform skew-x-6 flex flex-col h-full p-4 pl-16 relative z-10 overflow-y-auto hide-scrollbar">
                            <div className="flex justify-between items-center border-b border-[#39ff14]/30 pb-2 mb-3">
                                <h2 className="text-2xl font-black uppercase tracking-widest neon-text-green flex items-center gap-3 drop-shadow-lg">
                                    <Car size={26} className="text-[#39ff14] drop-shadow-[0_0_15px_#39ff14]"/> {lang === 'es' ? 'GARAJE' : 'GARAGE'}
                                </h2>
                                <div className="flex gap-1 transform -skew-x-12 bg-gray-900 p-1 rounded-lg border border-gray-700 shadow-inner">
                                    <button onClick={() => setEditingCarId(1)} className={`px-4 py-1 rounded font-black text-[10px] tracking-widest transition-all ${editingCarId === 1 ? 'bg-[#39ff14] text-black shadow-[0_0_10px_#39ff14]' : 'text-gray-500 hover:text-white'}`}>P1 (TÚ)</button>
                                    <button onClick={() => setEditingCarId(2)} className={`px-4 py-1 rounded font-black text-[10px] tracking-widest transition-all ${editingCarId === 2 ? 'bg-blue-500 text-white shadow-[0_0_10px_#3b82f6]' : 'text-gray-500 hover:text-white'}`}>P2 (IA)</button>
                                </div>
                            </div>
                            
                            <div className="flex-1 flex flex-col justify-between gap-3">

                            <div className="flex-1 overflow-y-auto p-6 bg-[#0a0a0a]">
                                {isCommunityLoading ? (
                                    <div className="flex flex-col items-center justify-center h-full gap-4 opacity-50"><div className="w-10 h-10 border-4 border-purple-500 border-t-transparent rounded-full animate-spin"></div><span className="text-sm font-bold tracking-widest text-purple-400">{t.communityModal.loading}</span></div>
                                ) : communityCircuits.length === 0 ? (
                                    <div className="flex flex-col items-center justify-center h-full gap-4 opacity-40"><Cloud size={64} className="text-gray-600"/><span className="text-sm font-bold tracking-widest text-gray-400 uppercase">{t.communityModal.empty}</span></div>
                                ) : (
                                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
                                        {communityCircuits.map(circuit => (
                                            <div key={circuit.id} className="bg-gray-900/50 border border-gray-800 rounded-xl overflow-hidden hover:border-purple-500/50 hover:shadow-[0_0_20px_rgba(168,85,247,0.2)] transition-all group flex flex-col">
                                                <div className="p-3 border-b border-white/5 flex justify-between items-start bg-black/30">
                                                    <div><div className="text-[10px] text-gray-500 uppercase tracking-widest mb-1">{t.communityModal.author}</div><div className="text-xs font-mono text-[#39ff14] truncate w-32 font-bold">{circuit.authorName || circuit.authorId?.substring(0, 8)}</div></div>
                                                    <div className={`px-2 py-1 rounded text-[9px] font-bold border ${TRACK_DEFINITIONS[circuit.brand]?.uiClass || 'border-gray-600 text-gray-400'}`}>{circuit.brand}</div>
                                                </div>
                                                <div className="h-32 w-full bg-black/60 relative overflow-hidden flex items-center justify-center border-b border-white/5">
                                                    <MiniTrackPreview circuit={circuit} />
                                                    <div className="absolute bottom-2 right-2 bg-black/80 border border-white/10 px-2 py-1 rounded text-[9px] text-gray-300 font-mono shadow-md backdrop-blur-sm"><span className="text-purple-400 font-bold">{circuit.pieceCount || (circuit.pieces?.length || 0)}</span> {t.communityModal.pieces}</div>
                                                </div>
                                                <div className="p-3 bg-black/40 flex items-center justify-between gap-2">
                                                    <div className="text-[9px] text-gray-500 font-mono pl-1">{circuit.createdAt ? (circuit.createdAt.toDate ? new Date(circuit.createdAt.toDate()).toLocaleDateString() : new Date(circuit.createdAt).toLocaleDateString()) : ''}</div>
                                                    <button onClick={() => loadCommunityCircuit(circuit)} className="px-4 py-1.5 bg-purple-600/20 hover:bg-purple-600 text-purple-300 hover:text-white border border-purple-500/30 hover:border-purple-500 rounded flex items-center justify-center gap-2 transition-all font-bold text-[10px] uppercase tracking-wider"><Play size={12} className="fill-current"/> {t.communityModal.load}</button>
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>
                        </div>
                    </div>
                )}
                    </div>
                )}
            </>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<Slot3DPlayer />);
    </script>
</body>
</html>
