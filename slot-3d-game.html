    <script type="text/babel" data-presets="react">
        const { useState, useEffect, useRef, useMemo } = React;

        const getQualitySettings = (mode) => {
            switch(mode) {
                case 'ULTRA': return { pr: typeof window !== 'undefined' ? Math.min(window.devicePixelRatio, 1.5) : 1, aa: true, shadow: true };
                case 'HIGH': return { pr: typeof window !== 'undefined' ? Math.min(window.devicePixelRatio, 1.0) : 1, aa: true, shadow: true };
                case 'MED': return { pr: typeof window !== 'undefined' ? Math.min(window.devicePixelRatio, 0.9) : 0.9, aa: false, shadow: false };
                case 'LOW': return { pr: typeof window !== 'undefined' ? Math.min(window.devicePixelRatio, 0.7) : 0.7, aa: false, shadow: false };
                case 'MIN': return { pr: typeof window !== 'undefined' ? Math.min(window.devicePixelRatio, 0.5) : 0.5, aa: false, shadow: false };
                default: return { pr: 1.0, aa: false, shadow: false };
            }
        };

        // 1. OPTIMIZACIÓN CRÍTICA: Inicializar el Loader y la caché GLOBALMENTE una sola vez.
        // Esto evita crear docenas de Web Workers que congelan la pestaña al descargar de GitHub.
        THREE.Cache.enabled = true;
        let globalGLTFLoader = null;
        const getGLTFLoader = (renderer = null) => {
            if (!globalGLTFLoader) {
                globalGLTFLoader = new THREE.GLTFLoader();
                
                // Soporte para compresión DRACO
                if (typeof THREE.DRACOLoader !== 'undefined') {
                    const dracoLoader = new THREE.DRACOLoader();
                    dracoLoader.setDecoderPath('https://www.gstatic.com/draco/versioned/decoders/1.5.6/');
                    globalGLTFLoader.setDRACOLoader(dracoLoader);
                }
                
                // Soporte para compresión Meshopt (Común en glTF-Transform y Sketchfab)
                if (typeof MeshoptDecoder !== 'undefined') {
                    globalGLTFLoader.setMeshoptDecoder(MeshoptDecoder);
                }
            }
            
            // Soporte para texturas comprimidas KTX2
            if (renderer && !globalGLTFLoader.ktx2LoaderConfigured && typeof THREE.KTX2Loader !== 'undefined') {
                const ktx2Loader = new THREE.KTX2Loader();
                ktx2Loader.setTranscoderPath('https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/libs/basis/');
                ktx2Loader.detectSupport(renderer);
                globalGLTFLoader.setKTX2Loader(ktx2Loader);
                globalGLTFLoader.ktx2LoaderConfigured = true;
            }
            
            return globalGLTFLoader;
        };

        // Algoritmo de Inteligencia Geométrica para Auto-Alinear coches de cualquier origen
        const getAutoCarRotation = (model) => {
            model.updateMatrixWorld(true);
            const box = new THREE.Box3().setFromObject(model);
            const size = box.getSize(new THREE.Vector3());
            const center = box.getCenter(new THREE.Vector3());

            const isXLongest = size.x > size.z * 1.05;
            const longestAxis = isXLongest ? 'x' : 'z';

            let frontYSum = 0, frontCount = 0;
            let backYSum = 0, backCount = 0;

            model.traverse((child) => {
                if (child.isMesh && child.geometry && child.geometry.attributes.position) {
                    const pos = child.geometry.attributes.position;
                    const vec = new THREE.Vector3();
                    const wm = child.matrixWorld;

                    for (let i = 0; i < pos.count; i += 3) { // Muestreo rápido de 1 cada 3 vértices
                        vec.fromBufferAttribute(pos, i);
                        vec.applyMatrix4(wm);

                        if (vec[longestAxis] > center[longestAxis]) {
                            frontYSum += vec.y;
                            frontCount++;
                        } else {
                            backYSum += vec.y;
                            backCount++;
                        }
                    }
                }
            });

            const avgYPos = frontCount > 0 ? frontYSum / frontCount : 0;
            const avgYNeg = backCount > 0 ? backYSum / backCount : 0;

            // En el 95% de los coches, el morro (capó) es más bajo que la parte trasera (techo/alerón).
            // Si el lado positivo tiene menor altura media, el coche mira hacia el eje positivo.
            const facesPositiveAxis = avgYPos < avgYNeg;

            if (isXLongest) {
                // Si mira hacia el eje X (+X o -X), lo giramos 90º para que mire hacia adelante (-Z en Three.js)
                return facesPositiveAxis ? Math.PI / 2 : -Math.PI / 2;
            } else {
                // Si mira hacia el eje Z (+Z o -Z), corregimos si es necesario para mirar hacia adelante (-Z)
                return facesPositiveAxis ? Math.PI : 0;
            }
        };

        const getSmartBottomY = (model) => {
            model.updateMatrixWorld(true);
            let minWheelY = Infinity;
            let minOverallY = Infinity;
            
            const box = new THREE.Box3().setFromObject(model);
            const size = box.getSize(new THREE.Vector3());
            const center = box.getCenter(new THREE.Vector3());
            
            // Ignoramos el 35% central del coche (la franja del medio). 
            // Ahí es donde suele sobresalir la quilla/guía de slot hacia abajo.
            const thresholdX = size.x * 0.175; 

            model.traverse((child) => {
                if (child.isMesh && child.geometry && child.geometry.attributes.position) {
                    const pos = child.geometry.attributes.position;
                    const wm = child.matrixWorld;
                    const vec = new THREE.Vector3();
                    
                    let isTransparent = false;
                    if (child.material) {
                        if (Array.isArray(child.material)) {
                            isTransparent = child.material.some(m => m.transparent && m.opacity < 0.9);
                        } else {
                            isTransparent = child.material.transparent && child.material.opacity < 0.9;
                        }
                    }

                    if (!isTransparent) {
                        for (let i = 0; i < pos.count; i++) {
                            vec.fromBufferAttribute(pos, i);
                            vec.applyMatrix4(wm);
                            
                            if (vec.y < minOverallY) minOverallY = vec.y;
                            
                            // Si el vértice es lateral (supera el umbral del centro), pertenece a la rueda o talonera
                            if (Math.abs(vec.x - center.x) > thresholdX) {
                                if (vec.y < minWheelY) minWheelY = vec.y;
                            }
                        }
                    }
                }
            });

            // Si encontró ruedas/laterales, las usa para el suelo exacto. Si es un modelo atípico, usa el punto más bajo global.
            return (minWheelY !== Infinity) ? minWheelY : minOverallY;
        };

            if (window.fakeShadowTex) return window.fakeShadowTex;
            if (typeof document === 'undefined') return null;
            const canvas = document.createElement('canvas');
            canvas.width = 128; canvas.height = 128;
            const ctx = canvas.getContext('2d');
            const grad = ctx.createRadialGradient(64, 64, 0, 64, 64, 64);
            grad.addColorStop(0, 'rgba(0,0,0,0.9)'); 
            grad.addColorStop(0.5, 'rgba(0,0,0,0.5)'); 
            grad.addColorStop(1, 'rgba(0,0,0,0)');    
            ctx.fillStyle = grad; ctx.fillRect(0,0,128,128);
            window.fakeShadowTex = new THREE.CanvasTexture(canvas);
            return window.fakeShadowTex;
        };

        const { Trash2, Image: ImageIcon, Fuel, Move, Zap, Bluetooth, RotateCw, RotateCcw, X: XIcon, Repeat, PenTool, ArrowUp, ArrowDown, ArrowLeft, ArrowRight, Square, FolderOpen, Save, FileText, Activity, Play, Pause, Flag, GitCommit, ZoomIn, ZoomOut, Crosshair, Undo2, Redo2, Layers, Clock, Hash, Plus, Minus, AlertTriangle, Cloud, CloudUpload, CloudDownload, Settings, Battery, Scale, Trophy, Timer, Gauge, Maximize, Minimize, User, Users, ChevronDown, Mic, MicOff, Move3d, LayoutTemplate, TreePine, Cone, Fence, Grip, Video, Eye, Gamepad2, Copy, Car, Volume2, VolumeX, Moon, Sun } = icons;

        const getPieceGeometry = (p) => {
            if (!p || p.type === 'set_origin' || p.type === 'goto') return null;
            let dx = 0, dy = 0, da = 0;
            
            const isCurve = p.type === 'curve';
            const isRotonda = p.type === 'rotonda' || p.subtype === 'rotonda';
            const isStraight = !isCurve && !isRotonda && (p.type === 'straight' || p.length > 0 || (p.type && p.type.includes('pit')));

            if (isStraight) { 
                dx = p.length || 0; 
            } else if (isCurve) {
                const r = Math.abs(p.radius || 0);
                const aRad = ((p.angle || 0) * Math.PI) / 180;
                if (p.direction === 'left') { dx = r * Math.sin(aRad); dy = -r * (1 - Math.cos(aRad)); da = -aRad; } 
                else { dx = r * Math.sin(aRad); dy = r * (1 - Math.cos(aRad)); da = aRad; }

            const exitX = (p.x || 0) + dx * Math.cos(rot) - dy * Math.sin(rot);

        };

        const migrateToAbsolute = (piecesList, circuitOrigin = {x:0, y:0}) => {
            let cx = circuitOrigin.x || 0, cy = circuitOrigin.y || 0, currentAngle = 0;
            const endPos = {};
            return piecesList.map((p, index) => {
                if (!p) return null; 
                if (p.type === 'set_origin') { cx = circuitOrigin.x + (p.x || 0); cy = circuitOrigin.y + (p.y || 0); currentAngle = p.angle || 0; endPos[p.uid] = { cx, cy, currentAngle }; return { ...p, x: cx, y: cy, rot: currentAngle }; }
                if (p.type === 'goto') { if (endPos[p.targetUid]) { cx = endPos[p.targetUid].cx; cy = endPos[p.targetUid].cy; currentAngle = endPos[p.targetUid].currentAngle; } endPos[p.uid] = { cx, cy, currentAngle }; return { ...p, x: cx, y: cy, rot: currentAngle }; }
                
                // Forzamos el recálculo siempre para que coincida exactamente con el 3D y evite NaNs
                let pX = cx, pY = cy, pRot = currentAngle;
                
                let dx = 0, dy = 0, dAngle = 0;
                const isCurve = p.type === 'curve';
                const isRotonda = p.type === 'rotonda' || p.subtype === 'rotonda';
                const isStraight = !isCurve && !isRotonda && (p.type === 'straight' || p.length > 0 || (p.type && p.type.includes('pit')));

                if (isRotonda) { dAngle = Math.PI; }
                else if (isStraight) { dx = p.length || 0; }
                else if (isCurve) { 
                    const r = Math.abs(p.radius || 0); 
                    const aRad = ((p.angle || 0) * Math.PI) / 180; 
                    if (p.direction === 'left') { dx = r * Math.sin(aRad); dy = -r * (1 - Math.cos(aRad)); dAngle = -aRad; } 
                    else { dx = r * Math.sin(aRad); dy = r * (1 - Math.cos(aRad)); dAngle = aRad; } 
                }
                
                if (p.invert && !isRotonda) { dx = -dx; dy = -dy; pRot += Math.PI; }
                
                cx += dx * Math.cos(currentAngle) - dy * Math.sin(currentAngle); 
                cy += dx * Math.sin(currentAngle) + dy * Math.cos(currentAngle); 
                currentAngle += dAngle;
                
                endPos[p.uid] = { cx, cy, currentAngle };
                return { ...p, x: pX, y: pY, rot: pRot, invert: false }; 
            }).filter(p => p && p.type !== 'goto' && p.type !== 'set_origin'); 
        };

        const DrawEngine2D = {
            drawRails: (ctx, l, off, brand) => {
                ctx.strokeStyle = brand.railColor; ctx.lineWidth = 3; ctx.beginPath(); ctx.moveTo(0, -off); ctx.lineTo(l, -off); ctx.stroke(); ctx.beginPath(); ctx.moveTo(0, off); ctx.lineTo(l, off); ctx.stroke();
                ctx.strokeStyle = brand.slotColor; ctx.lineWidth = 1; ctx.beginPath(); ctx.moveTo(0, -off); ctx.lineTo(l, -off); ctx.stroke(); ctx.beginPath(); ctx.moveTo(0, off); ctx.lineTo(l, off); ctx.stroke();
            },
            renderTrack: (ctx, pieces, view, activeBrand, selectedPieceId, dragState, imageCache, boardPoints, boardClosed, options = {}) => {
                const brand = TRACK_DEFINITIONS[activeBrand] || TRACK_DEFINITIONS.NINCO;
                const pieceExtents = []; 
                pieces.forEach((basePiece) => {
                    if (!basePiece) return;
                    const p = basePiece;
                    if (p.x === undefined) return;
                    const geo = getPieceGeometry(p);
                    if (!geo) return;
                    pieceExtents.push({ uid: p.uid, ...geo });
                    
                    ctx.save(); 
                    ctx.translate(view.x + p.x * view.scale, view.y + p.y * view.scale);
                    ctx.rotate(p.rot || 0);
                    
                    const s = view.scale, w = brand.width * s, hw = w / 2, laneOff = (brand.laneSpacing / 2) * s;
                    
                    const isCurve = p.type === 'curve';
                    const isRotonda = p.type === 'rotonda' || p.subtype === 'rotonda';
                    const isStraight = !isCurve && !isRotonda && (p.type === 'straight' || p.length > 0 || (p.type && p.type.includes('pit')));

                    ctx.lineCap = 'butt'; ctx.lineJoin = 'round';
                    if (isStraight) {
                        const l = (p.length || 0) * s;
                        ctx.fillStyle = brand.trackColor; ctx.fillRect(0, -hw, l, w); 
                        ctx.strokeStyle = '#222'; ctx.lineWidth = 1; ctx.strokeRect(0, -hw, l, w); 
                        DrawEngine2D.drawRails(ctx, l, laneOff, brand);
                    } else if (isCurve) {
                        const trueR = Math.max(0.1, Math.abs((p.radius || 0) * s));
                        const isLeft = p.direction === 'left';
                        const startA = isLeft ? Math.PI/2 : -Math.PI/2;

                        const radiusLane1 = isLeft ? trueR - laneOff : trueR + laneOff;
                        const radiusLane2 = isLeft ? trueR + laneOff : trueR - laneOff;
                        ctx.strokeStyle = brand.railColor; ctx.lineWidth = 3; ctx.beginPath(); ctx.arc(0, isLeft ? -trueR : trueR, Math.max(0.1, radiusLane1), startA, startA + sweep, isLeft); ctx.stroke(); ctx.beginPath(); ctx.arc(0, isLeft ? -trueR : trueR, Math.max(0.1, radiusLane2), startA, startA + sweep, isLeft); ctx.stroke();
                        ctx.strokeStyle = brand.slotColor; ctx.lineWidth = 1; ctx.beginPath(); ctx.arc(0, isLeft ? -trueR : trueR, Math.max(0.1, radiusLane1), startA, startA + sweep, isLeft); ctx.stroke(); ctx.beginPath(); ctx.arc(0, isLeft ? -trueR : trueR, Math.max(0.1, radiusLane2), startA, startA + sweep, isLeft); ctx.stroke();
                    } else if (isRotonda) {
                        const r = (p.radius || 15) * s; const straightLen = 10.0 * s; const loopRadius = r; const loopCenterX = r * 1.3; const singleTrackWidth = (brand.width / 2) * s; 
                        ctx.fillStyle = brand.trackColor; ctx.fillRect(0, -hw, straightLen, w); ctx.strokeStyle = '#222'; ctx.lineWidth = 1; ctx.strokeRect(0, -hw, straightLen, w);
                        DrawEngine2D.drawRails(ctx, straightLen, laneOff, brand);

                    }
                    ctx.restore();

                return pieceExtents;
            }
        };

        const MiniTrackPreview = ({ circuit }) => {
            const canvasRef = useRef(null);
            useEffect(() => {
                if (!canvasRef.current || !circuit || !circuit.pieces) return;
                const ctx = canvasRef.current.getContext('2d'); const width = canvasRef.current.width; const height = canvasRef.current.height;
                ctx.clearRect(0, 0, width, height); const tempView = { x: 0, y: 0, scale: 1.0 }; const brandName = circuit.brand || 'NINCO';
                
                ctx.save(); ctx.globalAlpha = 0; 
                const absPieces = migrateToAbsolute(circuit.pieces);
                const positions = DrawEngine2D.renderTrack(ctx, absPieces, tempView, brandName, null, null, null, circuit.boardPoints, circuit.boardClosed); 
                ctx.restore();
                
                if (!positions || positions.length === 0) return;
                
                let minX = Infinity, maxX = -Infinity, minY = Infinity, maxY = -Infinity;
                let valid = false;
                positions.forEach(p => { 
                    if (Number.isFinite(p.inX) && Number.isFinite(p.inY)) {
                        if (p.inX < minX) minX = p.inX; 
                        if (p.inX > maxX) maxX = p.inX; 
                        if (p.inY < minY) minY = p.inY;

                            if (p.outX < minX) minX = p.outX; 
                            if (p.outX > maxX) maxX = p.outX; 
                            if (p.outY < minY) minY = p.outY; 
                            if (p.outY > maxY) maxY = p.outY;
                        }
                        valid = true;
                    }
                });
                
                if (!valid) return;

                const contentW = Math.max(maxX - minX, 10); 
                const contentH = Math.max(maxY - minY, 10); 
                const padding = 20;
                
                const scaleX = (width - padding * 2) / contentW; 
                const scaleY = (height - padding * 2) / contentH; 
                const fitScale = Math.min(scaleX, scaleY);

        /* --- GARAJE 3D BACKGROUND --- */

                        while (min <= max) {
                            let mid = Math.floor((min + max) / 2);
                            if (dists[mid] <= safeDist) { idx = mid; min = mid + 1; } else { max = mid - 1; }
                        }
                        if (idx >= dists.length - 1) idx = dists.length - 2;
                        const dStart = dists[idx]; const dEnd = dists[idx+1];
                        const segmentLen = dEnd - dStart;
                        const ratio = segmentLen > 0.00001 ? (safeDist - dStart) / segmentLen : 0;
                        const p1 = path[idx]; const p2 = path[idx+1];
                        
                        const p0 = path[(idx - 1 + path.length) % path.length];
                        const p3 = path[(idx + 2) % path.length];

                        const t2 = ratio * ratio; const t3 = t2 * ratio;

                        outVec.x = 0.5 * ((2 * p1.x) + (-p0.x + p2.x) * ratio + (2 * p0.x - 5 * p1.x + 4 * p2.x - p3.x) * t2 + (-p0.x + 3 * p1.x - 3 * p2.x + p3.x) * t3);
                        outVec.y = 0.5 * ((2 * p1.y) + (-p0.y + p2.y) * ratio + (2 * p0.y - 5 * p1.y + 4 * p2.y - p3.y) * t2 + (-p0.y + 3 * p1.y - 3 * p2.y + p3.y) * t3);
                        outVec.z = 0.5 * ((2 * p1.z) + (-p0.z + p2.z) * ratio + (2 * p0.z - 5 * p1.z + 4 * p2.z - p3.z) * t2 + (-p0.z + 3 * p1.z - 3 * p2.z + p3.z) * t3);

                        return outVec;

                    let lastNetTime = 0;
                    let displaySpeedHUD = 0;

                    const _worldP1 = new THREE.Vector3();
                    const _worldP2 = new THREE.Vector3();
                    const _dirW = new THREE.Vector3();
                    const _targetPos = new THREE.Vector3();
                    const _lookTarget = new THREE.Vector3();
                    const _zeroVec = new THREE.Vector3(0,0,0);
                    
                    // FIX MEMORIA: Pre-asignamos vectores para evitar crear miles de objetos por segundo (Lag/Crashes)
                    const _toOther = new THREE.Vector3();
                    const _forward = new THREE.Vector3();
                    const _right = new THREE.Vector3();
                    const _pushDir = new THREE.Vector3();

                    // OPTIMIZACIÓN CPU: Búsqueda Binaria de pistas (elimina el lag de Array.find en cada frame)
                    const getPieceFast = (d) => {
                        const arr = pieceMapRef.current;
                        if (!arr || arr.length === 0) return null;
                        let l = 0, r = arr.length - 1;
                        while(l <= r) {
                            let m = (l + r) >> 1;
                            if(d >= arr[m].distStart && d < arr[m].distEnd) return arr[m];
                            if(d < arr[m].distStart) r = m - 1;
                            else l = m + 1;
                        }
                        return arr[0];
                    };

                    const animate = () => { 
                        animationId = requestAnimationFrame(animate); 
                        // OPTIMIZACIÓN: Aumentamos el límite de delta-time a 0.1s para absorber lag de red sin tirones
                        const rawDt = clock.current.getDelta(); const dt = Math.min(rawDt, 0.05); // FIX: dt reducido a 0.05 max para evitar trompicones
                        const nowTime = performance.now() / 1000;
                        const totalDist = accumulatedDist; const currentTrackLen = (hasRotonda && rallyDistancesRef.current.length > 0) ? rallyDistancesRef.current[rallyDistancesRef.current.length - 1] : totalDist;

                        if (!raceStateRef.current.started && !isPreRaceRef.current) {
                            if (manualThrottleRef.current > 0 || (multiplayerSession && remoteStateRef.current.throttle > 0)) {
                                raceStateRef.current.started = true;
                                raceStateRef.current.lapStartTime = nowTime;
                                raceStateRef.current.totalStartTime = nowTime;
                                lapTimesRef.current.forEach(c => c.lastLapStart = nowTime);
                            }
                        }
                        
                        let currentLapTime = 0;
                        let totalRaceTime = 0;

                        if (raceStateRef.current.started && !raceStateRef.current.finished) {
                            if (isPausedRef.current) {
                                raceStateRef.current.lapStartTime += rawDt;
                                raceStateRef.current.totalStartTime += rawDt;
                            }
                            currentLapTime = nowTime - raceStateRef.current.lapStartTime;
                            totalRaceTime = nowTime - raceStateRef.current.totalStartTime;
                        } else if (raceStateRef.current.finished) {
                            totalRaceTime = raceStateRef.current.finishTime;
                        }

                        const numCars = 2; // SIEMPRE 2. El coche rival actuará como obstáculo físico si juegas solo.
                        if (carMeshesRef.current[1]) carMeshesRef.current[1].visible = true;

                        for (let ci = 0; ci < numCars; ci++) { 
                            const car = physicsState.current[ci];
                            const pg = carMeshesRef.current[ci];
                            if (!pg) continue;
                            const vg = pg.children[0];
                            let p1, p2;

                            // INTEGRACIÓN DE FÍSICAS BASADAS EN EL SETUP (JSON)
                            const cas = carAssetsRef.current[ci + 1];
                            const setup = cas?.setup;

                            let maxSpeed = 240;
                            let accelRate = 150;
                            let brakeRate = 220;

                            if (setup) {
                                // Ajuste dinámico de físicas basado en parámetros reales de slot
                                const speedFactor = (setup.motorRPM / 20000) * (2.5 / setup.gearRatio);
                                maxSpeed = 240 * speedFactor;

                                const accelFactor = (setup.motorTorque / 300) * (80 / setup.weight) * (setup.gearRatio / 2.5);
                                accelRate = 150 * accelFactor;

                                brakeRate = 220 * (setup.tireGrip / 80) * (80 / setup.weight);
                            }

                            const isLocalAI = (!multiplayerSession && aiDifficultyRef.current > 0 && ci === rivalIdx);

                            let targetSpeed = 0;
                            if (isPreRaceRef.current) {
                                targetSpeed = 0; // Bloquea totalmente durante la pre-carrera
                            } else if (countdownRef.current !== null && countdownRef.current > 0) {
                                targetSpeed = 0; // Bloquea el movimiento durante la cuenta atrás
                            } else {
                                if (ci === myCarIdx) {
                                    if (raceStateRef.current.finished) {
                                        targetSpeed = 0; // Frenar al terminar
                                    } else {
                                        targetSpeed = maxSpeed * (manualThrottleRef.current / 100.0);
                                    }
                                } else if (multiplayerSession) {
                                    targetSpeed = maxSpeed * ((remoteStateRef.current?.throttle || 0) / 100.0);
                                } else if (isLocalAI) {
                                    if (!raceStateRef.current.started || raceStateRef.current.finished) {
                                        targetSpeed = 0;
                                    } else {
                                        const diffLevel = aiDifficultyRef.current;
                                        // IA EXTREMA: Multiplicadores de velocidad máxima en recta disparados
                                        const diffFactors = [0, 0.75, 0.90, 1.05, 1.20, 1.35]; 
                                        
                                        // Aumentamos la visión de frenada porque ahora va muchísimo más rápido
                                        const lookAheadDist = car.speed > 120 ? 50 : (car.speed > 60 ? 25 : 15);
                                        const currentP = getPieceFast(car.distance);
                                        let nextDist = (car.distance + lookAheadDist) % currentTrackLen;
                                        const nextP = getPieceFast(nextDist);

                                        const gripFactor = (setup?.tireGrip || 80) / 80.0;
                                        const evalPiece = (p) => {
                                            if (p && p.type === 'curve') return Math.sqrt(Math.abs(p.radius || 20)) * gripFactor * 20.0;
                                            if (p && (p.type === 'rotonda' || p.subtype === 'rotonda')) return Math.sqrt(15) * gripFactor * 20.0;
                                            return maxSpeed;
                                        };

                                        const safe1 = evalPiece(currentP);
                                        const safe2 = evalPiece(nextP);
                                        const absoluteSafeLimit = Math.min(safe1, safe2);
                                        
                                        // Margen de riesgo muy agresivo en curvas. Nivel 3 = 100% límite. Nivel 5 = 108% (derrapes/accidentes probables)
                                        const safeMultiplier = 0.88 + (diffLevel * 0.04); 
                                        let calculatedTarget = Math.min(maxSpeed * diffFactors[diffLevel], absoluteSafeLimit * safeMultiplier);
                                        
                                        calculatedTarget *= (0.98 + Math.random() * 0.04);
                                        targetSpeed = calculatedTarget;
                                    }
                                }
                            }

                            // --- LÓGICA DE CINEMÁTICA LIBRE (COCHE ESTRELLADO VOLANDO) ---
                            if (car.crashed) {
                                car.crashTimer -= dt;
                                if (car.crashTimer <= 0) {
                                    // Respawn en pista
                                    car.crashed = false;
                                    car.speed = 0;
                                    car.distance -= 15.0; // Lo colocamos un poco más atrás de donde chocó
                                    if (car.distance < 0) car.distance += currentTrackLen;
                                    pg.userData.initPos = false; // Forza el reenganche sin animaciones raras
                                    pg.rotation.set(0,0,0);
                                } else {
                                    // Físicas de vuelo libre (Gravedad y Rebotes)
                                    car.crashVelocity.y -= 45.0 * dt; // Gravedad
                                    car.worldPos.addScaledVector(car.crashVelocity, dt);
                                    
                                    // Colisión con el suelo virtual de la habitación
                                    if (car.worldPos.y < -0.5) {
                                        car.worldPos.y = -0.5;
                                        car.crashVelocity.y *= -0.4; // Rebote vertical
                                        car.crashVelocity.x *= 0.8;  // Fricción suelo
                                        car.crashVelocity.z *= 0.8;
                                        car.crashAngularVelocity.multiplyScalar(0.7); // Frena los giros
                                    }

                                    // Aplicar transformación visual directa
                                    pg.position.copy(car.worldPos);
                                    pg.rotation.x += car.crashAngularVelocity.x * dt;
                                    pg.rotation.y += car.crashAngularVelocity.y * dt;
                                    pg.rotation.z += car.crashAngularVelocity.z * dt;
                                    
                                    // Fake targets para que la cámara lo siga mientras vuela
                                    p1 = car.worldPos.clone();
                                    p2 = car.worldPos.clone().add(car.crashVelocity.clone().normalize().multiplyScalar(5));
                                    _dir.copy(car.crashVelocity).normalize();
                                    if(_dir.lengthSq() < 0.1) _dir.set(0,0,1);
                                }
                            }

                            // --- LÓGICA NORMAL (EN CARRIL) ---
                            if (!car.crashed) {
                                // Lógica de Gasolina y Boxes
                                if (ci === myCarIdx || isLocalAI) {
                                    if (isDigitalCircuit) {
                                        if (car.currentLane === 2) { 
                                            let distInPit = car.distance - (car.pitEnteredDist || 0);
                                            if (distInPit < 0) distInPit += currentTrackLen;

                                            if (distInPit > 50 && car.fuel < 100 && !car.isRefueling && !car.hasRefueledThisPit) {
                                                car.isRefueling = true;
                                            }
                                            
                                            if (car.isRefueling) {
                                                targetSpeed = 0; 
                                                if (car.speed < 5.0) {
                                                    car.speed = 0; 
                                                    car.fuel = Math.min(100, car.fuel + 33.34 * dt); 
                                                    if (car.fuel >= 100) {
                                                        car.fuel = 100;

                                            } else {
                                                targetSpeed = Math.min(targetSpeed, maxSpeed * 0.35); 
                                            }
                                        } else {
                                            car.isRefueling = false;
                                            car.hasRefueledThisPit = false; 
                                            if (car.speed > 5.0) {
                                                car.fuel = Math.max(0, car.fuel - (car.speed / maxSpeed) * 1.5 * dt); 
                                            }
                                            if (isLocalAI) {
                                                if (car.fuel < 25) car.wantsPit = true;
                                                if (car.fuel > 95) car.wantsPit = false;
                                            }
                                        }
                                        if (car.fuel <= 0 && targetSpeed > 0 && !car.isRefueling) targetSpeed = maxSpeed * 0.15; 
                                    } else {
                                        // MODO ANALÓGICO: Gasolina Infinita y Sin Repostajes
                                        car.fuel = 100;
                                        car.isRefueling = false;
                                        car.hasRefueledThisPit = false;
                                    }
                                } else if (ci === rivalIdx && multiplayerSession) {
                                    car.fuel = remoteStateRef.current?.fuel ?? 100;
                                    car.isRefueling = remoteStateRef.current?.isRefueling ?? false;
                                }

                                const prevDist = car.distance;

                                if (!isPausedRef.current) {
                                    if (car.speed < targetSpeed) car.speed += accelRate * dt;
                                    else if (car.speed > targetSpeed) car.speed -= brakeRate * dt;
                                    if (car.speed < 0) car.speed = 0;
                                    
                                    if (car.speed > 0) {
                                        car.distance += car.speed * dt;
                                        if (ci === myCarIdx) {
                                            raceStateRef.current.totalDist += car.speed * dt;
                                            if (car.speed > raceStateRef.current.topSpeed) raceStateRef.current.topSpeed = car.speed;
                                        }
                                        
                                        if (ci === rivalIdx && multiplayerSession && !car.crashed) {
                                            const diff = (remoteStateRef.current?.distance || 0) - car.distance;
                                            if (Math.abs(diff) > 0.5 && Math.abs(diff) < currentTrackLen / 2) {
                                                car.distance += diff * 5.0 * dt; 
                                            } else if (Math.abs(diff) > currentTrackLen / 2) {
                                                car.distance = remoteStateRef.current?.distance || 0; 
                                            }
                                        }

                                        if (car.distance >= currentTrackLen) {
                                            car.distance -= currentTrackLen;
                                            
                                            // --- TRACKING TIEMPOS DE VUELTA ---
                                            const carLapData = lapTimesRef.current[ci];
                                            if (!carLapData.finished && raceStateRef.current.started) {
                                                const lapTime = nowTime - carLapData.lastLapStart;
                                                carLapData.laps.push(lapTime);
                                                carLapData.lastLapStart = nowTime;
                                                
                                                if (carLapData.laps.length >= targetLapsRef.current) {
                                                    carLapData.finished = true;
                                                    carLapData.totalTime = nowTime - raceStateRef.current.totalStartTime;
                                                }
                                            }

                                            if (ci === myCarIdx) {
                                                raceStateRef.current.laps++;
                                                raceStateRef.current.lastTime = currentLapTime;
                                                raceStateRef.current.completedLapsTotalTime += currentLapTime;
                                                if (currentLapTime < raceStateRef.current.bestTime && raceStateRef.current.laps > 0) {
                                                    raceStateRef.current.bestTime = currentLapTime;
                                                    playCommentary('fastest');
                                                }
                                                raceStateRef.current.lapStartTime = nowTime;
                                                currentLapTime = 0;
                                                
                                                if (raceStateRef.current.laps >= targetLapsRef.current && !raceStateRef.current.finished) {
                                                    raceStateRef.current.finished = true;
                                                    raceStateRef.current.finishTime = nowTime - raceStateRef.current.totalStartTime;
                                                    playCommentary('winner');

                                                    if (!raceStateRef.current.resultsShown) {
                                                        raceStateRef.current.resultsShown = true;
                                                        setTimeout(() => {
                                                            setRaceResultsData({
                                                                player1: { ...lapTimesRef.current[0] },
                                                                player2: { ...lapTimesRef.current[1] }
                                                            });
                                                            setShowResults(true);
                                                        }, 2500); // Aparece 2.5s después de la meta
                                                    }
                                                }
                                            }
                                        }
                                    } 
                                    
                                    if (car.fuel <= 0 && targetSpeed > 0 && !car.isRefueling) targetSpeed = maxSpeed * 0.15; 
                                    if (isDigitalCircuit && car.fuel < 10 && car.fuel > 9.8 && ci === myCarIdx) playCommentary('fuel_low');
                                }

                                const newDist = car.distance;
                                let laneChangedThisFrame = false; 

                                rails.changes.forEach(change => {
                                    if(change.isRotonda) return;
                                    const dStart = vertexDistances[change.refIdx];
                                    const dEnd = vertexDistances[change.refIdx + change.count] || (dStart + 50);
                                    
                                    const crossedStart = (prevDist <= dStart && newDist >= dStart && (newDist - prevDist) < currentTrackLen/2) ||
                                                    (prevDist > newDist && (dStart >= prevDist || dStart <= newDist)); 
                                                    
                                    const crossedEnd = (prevDist <= dEnd && newDist >= dEnd && (newDist - prevDist) < currentTrackLen/2) ||
                                                    (prevDist > newDist && (dEnd >= prevDist || dEnd <= newDist));
                                                    
                                    if (crossedStart && !laneChangedThisFrame && !car.activeChange) {
                                        const isLaneChangeReq = (ci === myCarIdx) ? laneChangeRef.current : (multiplayerSession ? (remoteStateRef.current?.laneChange || false) : false);
                                        const isPitReq = (ci === myCarIdx) ? pitEntryRef.current : (multiplayerSession ? (remoteStateRef.current?.pitEntry || false) : (isLocalAI ? car.wantsPit : false)); 
                                        
                                        if (change.isChange && car.currentLane === change.from && isLaneChangeReq) {
                                            car.activeChange = change;
                                            car.currentLane = change.to;
                                            laneChangedThisFrame = true; 
                                        } else if (change.isPitEntry && isPitReq) {
                                            const reqLane = change.reqLane !== undefined ? change.reqLane : (change.pitSide === 'right' ? 1 : 0);
                                            if (car.currentLane === reqLane) {
                                                car.currentLane = 2;

                                                laneChangedThisFrame = true;
                                            }
                                        }
                                    }
                                    
                                    if (crossedEnd && change.isPitExit && car.currentLane === 2) {
                                        car.currentLane = change.outLane !== undefined ? change.outLane : (change.pitSide === 'right' ? 1 : 0); 
                                    }
                                });
                                
                                if (car.activeChange) {
                                    const dEnd = vertexDistances[car.activeChange.refIdx + car.activeChange.count] || (vertexDistances[car.activeChange.refIdx] + 50);
                                    if ((prevDist <= dEnd && newDist >= dEnd && (newDist - prevDist) < currentTrackLen/2) ||
                                        (prevDist > newDist && (dEnd >= prevDist || dEnd <= newDist))) {
                                        car.activeChange = null;
                                    }
                                }

                                const getCarPos = (distQuery, outVec) => {
                                    if (car.activeChange) {
                                        const dStart = vertexDistances[car.activeChange.refIdx];
                                        const dEnd = vertexDistances[car.activeChange.refIdx + car.activeChange.count] || (dStart + 50);
                                        let queryNorm = distQuery;
                                        if (queryNorm < dStart && dStart > currentTrackLen - 100) queryNorm += currentTrackLen;
                                        
                                        if (queryNorm >= dStart && queryNorm <= dEnd) {
                                            const ratio = Math.max(0, Math.min(1, (queryNorm - dStart) / (dEnd - dStart)));
                                            const pts = car.activeChange.points;
                                            const fIdx = ratio * (pts.length - 1);
                                            const i0 = Math.floor(fIdx);
                                            const i1 = Math.min(pts.length - 1, Math.ceil(fIdx));
                                            if (i0 === i1) return outVec.copy(pts[i0]);
                                            return outVec.lerpVectors(pts[i0], pts[i1], fIdx - i0);
                                        }
                                    }
                                    
                                    let railToFollow = rails.lane1;
                                    let baseLane = rails.lane1;
                                    
                                    if (car.currentLane === 1) { 
                                        railToFollow = rails.lane2; 
                                        baseLane = rails.lane2; 
                                    } else if (car.currentLane === 2) { 
                                        railToFollow = rails.pit;
                                        // Determinamos a qué carril principal se unirá al salir del pitlane
                                        const exitChange = rails.changes.find(c => c.isPitExit);
                                        if (exitChange && exitChange.outLane === 1) {
                                            baseLane = rails.lane2;
                                        } else {
                                            baseLane = rails.lane1;
                                        }
                                    }
                                    
                                    let pos = getPositionAtDistance(railToFollow, distQuery % currentTrackLen, outVec);
                                    if (!pos) pos = getPositionAtDistance(baseLane, distQuery % currentTrackLen, outVec);
                                    
                                    // Fallback de seguridad extremo
                                    if (!pos && rails.lane1[0]) pos = outVec.copy(rails.lane1[0]);
                                    
                                    return pos;
                                };

                                // FIX STUTTER: LookAhead fijo evita que el vector direccional tiemble cuando el coche acelera o frena
                                const lookAhead = 8.0; 
                                
                                if (hasRotonda && rallyPathRef.current.length > 0 && rallyDistancesRef.current.length > 0) {
                                    p1 = getRallyPositionByDist(car.distance, _rallyPos);
                                    p2 = getRallyPositionByDist((car.distance + lookAhead) % currentTrackLen, _rallyTangent);
                                } else {
                                    p1 = getCarPos(car.distance, _posL1); 
                                    p2 = getCarPos((car.distance + lookAhead) % currentTrackLen, _posFL1);
                                }

                                if (p1 && p2) {
                                    _dir.subVectors(p2, p1).normalize();
                                    car.worldPos.copy(p1);
                                    
                                    // AQUI DEFINIMOS isDecor PARA EL RESTO DEL CÁLCULO
                                    const isDecor = cas?.isDecor;

                                    // --- EVENTOS DE CHOQUES FÍSICOS (ENTRE COCHES) ---
                                    if (numCars > 1 && !isDecor) {
                                        const otherCi = ci === 0 ? 1 : 0;
                                        const otherCar = physicsState.current[otherCi];
                                        
                                        if (!otherCar.crashed && otherCar.worldPos && (otherCar.worldPos.x !== 0 || otherCar.worldPos.z !== 0)) {
                                            // FIX MEMORIA: Reutilizamos variables en lugar de instanciar 'new THREE.Vector3' en el loop
                                            _toOther.subVectors(otherCar.worldPos, car.worldPos);
                                            const dist3D = _toOther.length();
                                            
                                            if (dist3D < 16.0) {
                                                _forward.copy(_dir).normalize();
                                                _right.set(_forward.z, 0, -_forward.x).normalize();
                                                const longDist = _toOther.dot(_forward);
                                                const latDist = Math.abs(_toOther.dot(_right));
                                                
                                                if (Math.abs(longDist) < 14.0 && latDist < 4.5) {
                                                    const speedDiff = car.speed - otherCar.speed;
                                                    
                                                    if (longDist > 0 && speedDiff > 25.0) { 
                                                        car.crashed = true;
                                                        car.crashTimer = 2.5;
                                                        car.crashVelocity.copy(_forward).multiplyScalar(car.speed * 0.15);
                                                        car.crashVelocity.y = Math.random() * 8 + 4; 
                                                        car.crashVelocity.x += (Math.random() - 0.5) * 8;
                                                        car.crashAngularVelocity.set((Math.random()-0.5)*15, (Math.random()-0.5)*15, (Math.random()-0.5)*15);

                                                        if (speedDiff > 40.0) {
                                                            otherCar.crashed = true;
                                                            otherCar.crashTimer = 2.5;
                                                            otherCar.crashVelocity.copy(_forward).multiplyScalar(car.speed * 0.1);
                                                            otherCar.crashVelocity.y = Math.random() * 5 + 2;
                                                            otherCar.crashAngularVelocity.set((Math.random()-0.5)*10, (Math.random()-0.5)*10, (Math.random()-0.5)*10);
                                                        }

                                                        const now = Date.now();
                                                        if (now - (car.lastBump || 0) > 1000) { playCommentary('crash'); car.lastBump = now; }
                                                    }
                                                    else if (longDist > 0 && speedDiff > 0) { 
                                                        car.speed = otherCar.speed * 0.8;
                                                        car.distance -= 2.0; 
                                                        if (car.distance < 0) car.distance += currentTrackLen;
                                                    }
                                                    else if (latDist < 4.5 && Math.abs(longDist) < 10.0) { 
                                                        if (car.speed > 55) { 
                                                            car.crashed = true;
                                                            car.crashTimer = 2.5;
                                                            _pushDir.copy(_toOther).normalize().negate();
                                                            car.crashVelocity.copy(_forward).multiplyScalar(car.speed * 0.1).addScaledVector(_pushDir, car.speed * 0.05);
                                                            car.crashVelocity.y = Math.random() * 5 + 2;
                                                            car.crashAngularVelocity.set((Math.random()-0.5)*10, (Math.random()-0.5)*10, (Math.random()-0.5)*10);
                                                            const now = Date.now();
                                                            if (now - (car.lastBump || 0) > 1000) { playCommentary('crash'); car.lastBump = now; }
                                                        } else {
                                                            car.speed *= 0.85; 
                                                        }
                                                    }
                                                }
                                            }
                                        }
                                    }

                                    // --- EVENTO DE SALIDA DE PISTA (POR VELOCIDAD EN CURVAS) ---
                                    if (!car.crashed && !isDecor) {
                                        const currentPiece = getPieceFast(car.distance);
                                        if (currentPiece && currentPiece.type === 'curve') {
                                            const r = Math.abs(currentPiece.radius || 20);
                                            const gripFactor = (setup?.tireGrip || 80) / 80.0;
                                            
                                            // Límite de velocidad en curva calculado por radio y agarre
                                            const maxV = Math.sqrt(r) * gripFactor * 20.0; 
                                            
                                            if (car.speed > maxV + 15) { 
                                                car.crashed = true;
                                                car.crashTimer = 2.0;
                                                
                                                // FIX MEMORIA: Reutilizar vector en las salidas de pista
                                                _forward.copy(_dir).normalize();
                                                car.crashVelocity.copy(_forward).multiplyScalar(car.speed * 0.15);
                                                car.crashVelocity.y = 1.0 + Math.random() * 2; // Ligero salto
                                                car.crashAngularVelocity.set((Math.random()-0.5)*5, (Math.random()-0.5)*5, (Math.random()-0.5)*5);
                                                
                                                const now = Date.now();
                                                if (now - (car.lastBump || 0) > 1000) { playCommentary('crash'); car.lastBump = now; }
                                            }
                                        }
                                    }

                                    // --- APLICAR POSICIÓN EN PISTA (SI NO HA CHOCADO) ---
                                    if (!car.crashed) {
                                        _fpos.copy(car.worldPos);
                                        if (!isDecor) _fpos.add(_yOffset);

                                        if (!pg.userData.initPos) {
                                            pg.position.copy(_fpos);
                                            pg.userData.initPos = true;
                                        } else {
                                            pg.position.x = _fpos.x;
                                            pg.position.z = _fpos.z;
                                            pg.position.y += (_fpos.y - pg.position.y) * (1 - Math.exp(-15 * dt));
                                        }

                                        _flook.copy(_dir); 
                                        _targetMatrix.lookAt(_origin, _flook, _up);
                                        _targetRotation.setFromRotationMatrix(_targetMatrix);
                                        
                                        // FIX STUTTER: Suavizados más rápidos evitan que el modelo "flote" detrás de la física
                                        if (car.speed < 5.0) pg.quaternion.slerp(_targetRotation, 1 - Math.exp(-15 * dt));
                                        else pg.quaternion.slerp(_targetRotation, 1 - Math.exp(-35 * dt));
                                    }
                                }
                            } // Fin de Lógica Normal

                            // --- ACTUALIZACIÓN DE CÁMARA (SIGUE AL COCHE INCLUSO SI VUELA) ---
                            if (p1 && p2 && ci === myCarIdx && vg) {
                                vg.visible = cameraModeRef.current !== 'PILOT';
                                _worldP1.copy(p1).add(trackGroup.position);
                                _worldP2.copy(p2).add(trackGroup.position);

                                // FIX STUTTER: Cámaras endurecidas. PILOT/REAR son ahora rígidas, las demás tienen Lerps agresivos.
                                if (cameraModeRef.current === 'PILOT') {
                                    _dirW.subVectors(_worldP2, _worldP1).normalize();
                                    _targetPos.copy(_worldP1).addScaledVector(_dirW, 1.5);
                                    _targetPos.y += 2.8;
                                    _lookTarget.copy(_targetPos).addScaledVector(_dirW, 50);
                                    camera.position.copy(_targetPos); 
                                    camera.lookAt(_lookTarget);
                                } else if (cameraModeRef.current === 'CHASE') {
                                    _dirW.subVectors(_worldP2, _worldP1).normalize();
                                    _targetPos.copy(_worldP1).addScaledVector(_dirW, -35);
                                    _targetPos.y += 20;
                                    camera.position.lerp(_targetPos, 1 - Math.exp(-15 * dt)); 
                                    cameraTarget.lerp(_worldP1, 1 - Math.exp(-20 * dt)); 
                                    camera.lookAt(cameraTarget); 
                                } else if (cameraModeRef.current === 'FRONT') {
                                    _dirW.subVectors(_worldP2, _worldP1).normalize();
                                    _targetPos.copy(_worldP1).addScaledVector(_dirW, 35);
                                    _targetPos.y += 12;
                                    camera.position.lerp(_targetPos, 1 - Math.exp(-15 * dt)); 
                                    cameraTarget.lerp(_worldP1, 1 - Math.exp(-20 * dt)); 
                                    camera.lookAt(cameraTarget); 
                                } else if (cameraModeRef.current === 'REAR') {
                                    _dirW.subVectors(_worldP2, _worldP1).normalize();
                                    _targetPos.copy(_worldP1).addScaledVector(_dirW, -4);
                                    _targetPos.y += 3.0;
                                    _lookTarget.copy(_targetPos).addScaledVector(_dirW, -50);
                                    camera.position.copy(_targetPos); 
                                    camera.lookAt(_lookTarget);
                                } else if (cameraModeRef.current === 'BIRD') {
                                    _targetPos.set(_worldP1.x, 180, _worldP1.z + 1);
                                    camera.position.lerp(_targetPos, 1 - Math.exp(-10 * dt)); 
                                    cameraTarget.lerp(_worldP1, 1 - Math.exp(-15 * dt)); 
                                    camera.lookAt(cameraTarget); 
                                } else {
                                    cameraTarget.lerp(_zeroVec, 1 - Math.exp(-10 * dt)); 
                                    _camPos.setFromSpherical(spherical);
                                    _targetPos.copy(cameraTarget).add(_camPos);
                                    camera.position.copy(_targetPos);
                                    camera.lookAt(cameraTarget);
                                }
                            }

                            // --- ROTACIÓN LOCAL DEL MODELO ---
                            if (cas && vg && !car.crashed) {
                                vg.rotation.x = (cas.rotation ? cas.rotation[0] : 0) * Math.PI / 180; 
                                vg.rotation.y = (cas.rotation ? cas.rotation[1] : 0) * Math.PI / 180; 
                                vg.rotation.z = (cas.rotation ? cas.rotation[2] : 0) * Math.PI / 180;
                                vg.position.set(cas.offset ? cas.offset[0] : 0, cas.offset ? cas.offset[1] : 0, cas.offset ? cas.offset[2] : 0);
                                if(cas.scale !== undefined && vg.children.length > 0) { 
                                    const model = vg.children[0]; 
                                    if(model.userData.baseScale) model.scale.copy(model.userData.baseScale).multiplyScalar(cas.scale); 
                                }
                            } else if (vg && car.crashed) {
                                 // Evita que las rotaciones locales alteren los giros del crash
                                 vg.rotation.set(0,0,0);
                                 vg.position.set(0,0,0);
                            }
                        }

                        if (peerConn && peerConn.open) {
                            // FIX: Reducido a 10Hz (0.1s) para no saturar WebRTC y causar lag
                            if (nowTime - lastNetTime > 0.1) { 
                                peerConn.send({ throttle: manualThrottleRef.current, distance: physicsState.current[myCarIdx].distance, speed: physicsState.current[myCarIdx].speed, laneChange: laneChangeRef.current, pitEntry: pitEntryRef.current, fuel: physicsState.current[myCarIdx].fuel, isRefueling: physicsState.current[myCarIdx].isRefueling });
                                lastNetTime = nowTime;
                            }
                        }
                        
                        for (const id in decorMeshesRef.current) {
                            const group = decorMeshesRef.current[id]; const cas = carAssetsRef.current[id];
                            if (group && cas) {
                                const count = cas.scatterCount || 1;
                                if (count <= 1) { group.rotation.set((cas.rotation ? cas.rotation[0] : 0) * Math.PI / 180, (cas.rotation ? cas.rotation[1] : 0) * Math.PI / 180, (cas.rotation ? cas.rotation[2] : 0) * Math.PI / 180); group.position.set(cas.offset ? cas.offset[0] : 0, cas.offset ? cas.offset[1] : 0, cas.offset ? cas.offset[2] : 0); } 
                                else { group.rotation.set(0, 0, 0); group.position.set(0, 0, 0); }
                                if(cas.scale !== undefined) { group.children.forEach(child => { if(child.userData.baseScale) child.scale.copy(child.userData.baseScale).multiplyScalar(cas.scale); }); }
                            }
                        }
                        
                        const myCarForHUD = physicsState.current[myCarIdx];
                        
                        const formatTime = (t, isTotal = false) => {
                            if (t >= 999999) return '--.--';
                            if (t === 0 && !isTotal) return '--.--';
                            const m = Math.floor(t / 60);
                            const s = (t % 60).toFixed(2).padStart(m > 0 ? 2 : 1, '0');
                            return m > 0 ? `${m}:${s}` : (t === 0 ? "0.00" : s);
                        };

                        const avgRaceTime = raceStateRef.current.laps > 0 ? (raceStateRef.current.completedLapsTotalTime / raceStateRef.current.laps) : 0;

                        if (raceStateRef.current.finished) {
                            if (telemetryRefs.finishOverlay.current) {
                                telemetryRefs.finishOverlay.current.style.opacity = "1";
                                telemetryRefs.finishOverlay.current.style.pointerEvents = "auto";
                            }
                        } else {
                            if (telemetryRefs.finishOverlay.current) {
                                telemetryRefs.finishOverlay.current.style.opacity = "0";
                                telemetryRefs.finishOverlay.current.style.pointerEvents = "none";
                            }
                        }

                        displaySpeedHUD += ((myCarForHUD.speed * 1.5) - displaySpeedHUD) * 15.0 * dt;
                        if (telemetryRefs.speed.current) telemetryRefs.speed.current.textContent = Math.floor(displaySpeedHUD).toString().padStart(3, '0');
                        
                        // Ajuste visual de la barra de RPM para que tenga sentido con la maxSpeed del setup
                        const currentSetup = carAssetsRef.current[1]?.setup;
                        const maxDisplaySpeed = currentSetup ? (240 * (currentSetup.motorRPM / 20000) * (2.5 / currentSetup.gearRatio)) : 240;
                        if (telemetryRefs.rpmBar.current) telemetryRefs.rpmBar.current.style.width = `${Math.min(100, (myCarForHUD.speed / maxDisplaySpeed) * 100)}%`;
                        
                        // Actualización visual HUD Gasolina (Adaptado al nuevo diseño Sim-Racing o Analógico)
                        if (isDigitalCircuit) {
                            if (telemetryRefs.fuelBar.current) telemetryRefs.fuelBar.current.style.width = `${myCarForHUD.fuel}%`;
                            if (telemetryRefs.fuelText.current) {
                                telemetryRefs.fuelText.current.textContent = `${Math.floor(myCarForHUD.fuel)}%`;
                                if (myCarForHUD.fuel < 15) {
                                    telemetryRefs.fuelText.current.className = 'text-red-500 animate-pulse';
                                    telemetryRefs.fuelBar.current.style.background = '#ef4444';
                                    telemetryRefs.fuelBar.current.style.boxShadow = '0 0 10px #ef4444';
                                } else if (myCarForHUD.fuel < 40) {
                                    telemetryRefs.fuelText.current.className = 'text-yellow-400';
                                    telemetryRefs.fuelBar.current.style.background = '#eab308';
                                    telemetryRefs.fuelBar.current.style.boxShadow = '0 0 10px #eab308';
                                } else {
                                    telemetryRefs.fuelText.current.className = 'text-[#39ff14]';
                                    telemetryRefs.fuelBar.current.style.background = '#39ff14';
                                    telemetryRefs.fuelBar.current.style.boxShadow = '0 0 10px #39ff14';
                                }
                            }
                            if (telemetryRefs.fuelStatus.current) {
                                if (myCarForHUD.currentLane === 2) {
                                    if (myCarForHUD.isRefueling) {
                                        telemetryRefs.fuelStatus.current.textContent = "REPOSTANDO";
                                        telemetryRefs.fuelStatus.current.className = "text-[#39ff14] animate-pulse font-black";
                                    } else {
                                        telemetryRefs.fuelStatus.current.textContent = "PIT LIMIT";
                                        telemetryRefs.fuelStatus.current.className = "text-yellow-400 animate-pulse font-black";
                                    }
                                } else if (myCarForHUD.fuel <= 0) {
                                    telemetryRefs.fuelStatus.current.textContent = "SIN GASOLINA";
                                    telemetryRefs.fuelStatus.current.className = "text-red-500 animate-pulse font-black";
                                } else {
                                    telemetryRefs.fuelStatus.current.textContent = "FUEL";
                                    telemetryRefs.fuelStatus.current.className = "text-gray-400 font-bold";
                                }
                            }
                        } else {
                            if (telemetryRefs.fuelBar.current) {
                                telemetryRefs.fuelBar.current.style.width = `100%`;
                                telemetryRefs.fuelBar.current.style.background = '#3b82f6';
                                telemetryRefs.fuelBar.current.style.boxShadow = 'none';
                            }
                            if (telemetryRefs.fuelText.current) {
                                telemetryRefs.fuelText.current.textContent = `N/A`;
                                telemetryRefs.fuelText.current.className = 'text-blue-400 font-bold';
                            }
                            if (telemetryRefs.fuelStatus.current) {
                                telemetryRefs.fuelStatus.current.textContent = "ANALÓGICO";
                                telemetryRefs.fuelStatus.current.className = "text-gray-500 font-bold tracking-widest";
                            }
                        }

                        if (telemetryRefs.progress.current) telemetryRefs.progress.current.style.width = `${(myCarForHUD.distance / currentTrackLen) * 100}%`;
                        if (telemetryRefs.lap.current) telemetryRefs.lap.current.textContent = `${raceStateRef.current.laps}`;
                        
                        if (telemetryRefs.totalTime.current) telemetryRefs.totalTime.current.textContent = formatTime(totalRaceTime, true);
                        if (telemetryRefs.currentLap.current) telemetryRefs.currentLap.current.textContent = formatTime(currentLapTime);
                        if (telemetryRefs.avgTime.current) telemetryRefs.avgTime.current.textContent = formatTime(avgRaceTime);
                        if (telemetryRefs.bestTime.current) telemetryRefs.bestTime.current.textContent = raceStateRef.current.bestTime < 999999 ? formatTime(raceStateRef.current.bestTime) : '--.--';
                        
                        // ¡LÍNEAS RESTAURADAS! Dibuja el fotograma 3D en pantalla
                        renderer.render(scene, camera); 
                    };
                    
                    // Inicia el bucle de animación
                    animate(); 

                    // Añade los controles de cámara y ratón que se habían borrado
                    window.addEventListener('resize', onResize); 
                    renderer.domElement.addEventListener('mousedown', onMouseDown); 
                    window.addEventListener('mousemove', onMouseMove); 
                    window.addEventListener('mouseup', onMouseUp); 
                    renderer.domElement.addEventListener('wheel', onWheel, {passive:false}); 
                    renderer.domElement.addEventListener('touchstart', onTouchStart, {passive: false}); 
                    window.addEventListener('touchmove', onTouchMove, {passive: false}); 
                    window.addEventListener('touchend', onTouchEnd);
                    
                    setSceneReady(true);

                    // Función de limpieza correcta al salir del 3D
                    return () => { 
                        window.removeEventListener('resize', onResize); 
                        if(renderer){ 
                            renderer.domElement.removeEventListener('mousedown', onMouseDown); 
                            if(animationId) cancelAnimationFrame(animationId); 
                            
                            // FIX: Limpieza profunda de memoria (evita que el PC/Móvil explote al entrar y salir del 3D)
                            if (sceneRef.current) {
                                sceneRef.current.traverse((child) => {
                                    if (child.isMesh) {
                                        if (child.geometry) child.geometry.dispose();
                                        if (child.material) {
                                            if (Array.isArray(child.material)) child.material.forEach(m => m.dispose());
                                            else child.material.dispose();
                                        }
                                    }
                                });
                            }
                            
                            renderer.dispose(); 
                            if (renderer.forceContextLoss) renderer.forceContextLoss(); // Liberar VRAM estricta
                        } 
                    };
                };
                const cleanup3D = init3D(); 
                return () => { 
                    if (cleanup3D) cleanup3D();
                };
            }, [circuitData]); 
            
            // ACTUALIZACIÓN DINÁMICA DE CALIDAD EN PLENA CARRERA
            useEffect(() => {
                if (rendererRef.current && sceneRef.current) {
                    const qs = getQualitySettings(qualityMode);
                    rendererRef.current.setPixelRatio(qs.pr);
                    rendererRef.current.shadowMap.enabled = qs.shadow;
                    if (dirLightRef.current) dirLightRef.current.castShadow = qs.shadow;
                    sceneRef.current.traverse(child => {
                        if (child.isMesh && child.material) {
                            if (Array.isArray(child.material)) {
                                child.material.forEach(m => m.needsUpdate = true);
                            } else {
                                child.material.needsUpdate = true;
                            }
                        }
                    });
                }
            }, [qualityMode]);
            
            const handleExportCSV = () => {
                if (!raceResultsData) return;
                let csv = "sep=,\n"; // Fuerza a Excel a usar la coma como separador de columnas
                csv += `VUELTA,P1 (${lang === 'en' ? 'YOU' : 'TU'}),P2 (${multiplayerSession?.rivalName || 'RIVAL'})\n`;
                
                const p1Laps = raceResultsData.player1.laps;
                const p2Laps = raceResultsData.player2.laps;
                const maxLaps = Math.max(p1Laps.length, p2Laps.length);
                
                for(let i=0; i<maxLaps; i++) {
                    const t1 = p1Laps[i] ? p1Laps[i].toFixed(3) : "";
                    const t2 = p2Laps[i] ? p2Laps[i].toFixed(3) : "";
                    csv += `${i+1},${t1},${t2}\n`;
                }
                
                const best1 = p1Laps.length > 0 ? Math.min(...p1Laps).toFixed(3) : "";
                const best2 = p2Laps.length > 0 ? Math.min(...p2Laps).toFixed(3) : "";
                csv += `${t.bestLap || 'MEJOR VUELTA'},${best1},${best2}\n`;
                
                const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
                const url = URL.createObjectURL(blob);
                const link = document.createElement("a");
                link.setAttribute("href", url);
                link.setAttribute("download", `Telemetria_Slot_${new Date().toISOString().slice(0,10)}.csv`);
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            };

            // --- NUEVO EFFECT: CARGA DE MODELOS 3D CUANDO CAMBIA customCarAssets ---
            useEffect(() => {
                let isActive = true; // FIX: Prevención de colapsos por descargas simultáneas en carrera
                if(!sceneReady || !customCarAssets) return;
                Object.entries(customCarAssets).forEach(([id, asset]) => {
                    const targetId = parseInt(id);
                    if (!asset || !asset.glb) return;
                    
                    const isDecor = targetId > 2; 
                    
                    let container;
                    if (!isDecor) {
                         if (carMeshesRef.current.length >= targetId) container = carMeshesRef.current[targetId - 1].children[0];
                    } else {
                        if (!sceneRef.current) return;
                        if (!decorMeshesRef.current[targetId]) { const group = new THREE.Group(); sceneRef.current.add(group); decorMeshesRef.current[targetId] = group; }
                        container = decorMeshesRef.current[targetId];
                    }
                    if (!container) return;
                    
                    const count = asset.scatterCount || 1;
                    const prevCount = container.userData.scatterCount || 0;
                    const needsLoad = container.userData.currentGLB !== asset.glb;
                    const needsScatter = count !== prevCount && isDecor;
                    
                    if (!needsLoad && !needsScatter) return;
                    
                    // FIX: Prevenir colapso si se cambia de modelo muy rápido dentro del juego
                    if (needsLoad && container.userData.isLoading) return;
                    if (needsLoad) container.userData.isLoading = true;
                    
                    container.userData.currentGLB = asset.glb; container.userData.scatterCount = count;
                    const loader = getGLTFLoader(rendererRef.current); // Usamos el loader global en la simulación 3D
                    
                    if (needsLoad) {
                         loader.load(asset.glb, (gltf) => {
                            if (!isActive) return; // FIX: Abortar si ya hemos seleccionado otro coche
                            container.userData.isLoading = false;
                            if (container.userData.currentGLB !== asset.glb) return; // Race condition protection
                            const model = gltf.scene;
                            model.traverse(child => { 
                                if (child.isMesh) { 
                                    child.castShadow = false; // OPTIMIZACIÓN: NINGÚN coche ni árbol genera sombras pesadas
                                    child.receiveShadow = false; 
                                    
                                    // ALTERNATIVA ROBUSTA: RECONSTRUCCIÓN LIMPIA DE GEOMETRÍA
                                    // Previene el crash de 'isGLBufferAttribute' en WebGLRenderer
                                    const cleanGeo = new THREE.BufferGeometry();
                                    if (child.geometry.attributes.position) cleanGeo.setAttribute('position', child.geometry.attributes.position);
                                    if (child.geometry.attributes.normal) cleanGeo.setAttribute('normal', child.geometry.attributes.normal);
