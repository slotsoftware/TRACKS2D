                </div>
            ); 
        });

        const WeightShowcase = memo(({ selectedCarId, currentConfig, onUpdate }) => {
            if (!currentConfig) return null;
            const { t } = useTranslation();
            
            const defaultWeights = { body: 24.5, chassis: 16.2, trans: 12.8, wheels: 8.4, cockpit: 2.1 };
            const currentWeights = currentConfig.weights || defaultWeights;
            const totalWeight = Object.values(currentWeights).reduce((a, b) => a + (parseFloat(b) || 0), 0);

            const weightLabels = { body: "CARROCERÍA", chassis: "CHASIS 3D", trans: "EJES/TRANS", wheels: "LLANTAS", cockpit: "COCKPIT" };
            
            const handleWeightChange = (id, value) => {
                const newWeights = { ...currentWeights, [id]: parseFloat(value) || 0 };
                onUpdate('weights', newWeights);
            };

            const adjustWeight = (id, delta) => {
                const currentVal = parseFloat(currentWeights[id]) || 0;
                let newVal = currentVal + delta;
                if (newVal < 0) newVal = 0;
                // Redondear para evitar decimales infinitos extraños (ej: 24.4000000001)
                newVal = Math.round(newVal * 10) / 10;
                const newWeights = { ...currentWeights, [id]: newVal };
                onUpdate('weights', newWeights);
            };

            return (
                <div className="w-64 h-40 flex flex-col rounded-sm overflow-hidden border border-[#39ff14]/30 shadow-[0_0_20px_rgba(57,255,20,0.1)] bg-[#050a05]/90 backdrop-blur-md animate-in z-50 transition-all hover:border-[#39ff14]/80 hover:shadow-[0_0_30px_rgba(57,255,20,0.2)] relative group" title="Modifica los pesos para ajustar la física">
                    <div className="absolute inset-0 opacity-10 pointer-events-none" style={{backgroundImage: 'radial-gradient(#39ff14 1px, transparent 1px)', backgroundSize: '10px 10px'}}></div>
                    <div className="p-2 border-b border-[#39ff14]/20 bg-[#39ff14]/5 flex justify-between items-center shrink-0 relative z-10">
                        <div className="flex items-center gap-2"> 
                            <Scale className="text-[#39ff14]" size={14} /> 
                            <h2 className="text-[10px] font-black text-white tracking-[0.2em] uppercase">{t('digitalScale')}</h2> 
                        </div>
                        <div className="flex items-center gap-1">
                            <div className="w-1 h-1 rounded-full bg-[#39ff14] animate-pulse"></div>
                            <span className="text-[8px] text-[#39ff14]/70 font-mono">C{selectedCarId}</span>
                        </div>
                    </div>
                    <div className="flex flex-row flex-1 p-2 gap-2 relative z-10 overflow-hidden">
                        <div className="flex-1 flex flex-col justify-between pr-1 border-r border-[#39ff14]/10">
                            {Object.entries(weightLabels).map(([id, label], i) => (
                                <div key={i} className="flex items-center justify-between group/row">
                                    <span className="text-[7px] text-gray-400 font-bold uppercase tracking-tighter group-hover/row:text-white transition-colors">{label}</span>
                                    <div className="flex items-center gap-0.5">
                                        <button onClick={() => adjustWeight(id, -0.5)} className="w-3.5 h-3.5 flex items-center justify-center bg-black/60 border border-gray-700 hover:border-[#39ff14] text-gray-400 hover:text-[#39ff14] rounded-sm transition-all active:scale-90"><Minus size={10}/></button>
                                        <input 
                                            type="number"
                                            step="0.1"
                                            min="0"
                                            value={currentWeights[id] === 0 ? '' : currentWeights[id]}
                                            onChange={(e) => handleWeightChange(id, e.target.value)}
                                            className="w-7 bg-transparent border-none text-center text-[9px] font-mono text-[#39ff14] outline-none px-0 hide-scrollbar transition-colors"
                                        />
                                        <button onClick={() => adjustWeight(id, 0.5)} className="w-3.5 h-3.5 flex items-center justify-center bg-black/60 border border-gray-700 hover:border-[#39ff14] text-gray-400 hover:text-[#39ff14] rounded-sm transition-all active:scale-90"><Plus size={10}/></button>
                                    </div>
                                </div>
                            ))}
                        </div>
                        <div className="w-[72px] flex flex-col justify-between items-end">
                            <div className="text-right mt-1">
                                <span className="text-[7px] text-[#39ff14]/60 font-bold tracking-widest uppercase block mb-0.5">PESO TOTAL</span>
                                <div className="relative inline-block bg-black/40 px-2 py-1 rounded border border-[#39ff14]/20 shadow-[inset_0_0_10px_rgba(0,0,0,1)]">
                                    <span className="font-digital text-xl font-black text-white drop-shadow-[0_0_10px_rgba(57,255,20,0.8)] leading-none block">{totalWeight.toFixed(1)}</span>
                                    <span className="absolute -bottom-1.5 -right-1 text-[8px] font-bold text-[#39ff14]">g</span>
                                </div>
                            </div>
                            <div className="w-full flex items-end gap-[2px] h-10 mt-2 opacity-80">
                                {Object.entries(weightLabels).map(([id, label], i) => {
                                    const val = parseFloat(currentWeights[id]) || 0;
                                    return (
                                        <div key={i} className="flex-1 bg-[#39ff14]/20 rounded-sm relative group/bar hover:bg-[#39ff14]/40 transition-colors" title={`${label}: ${val}g`}>
                                            <div className="absolute bottom-0 w-full bg-[#39ff14] rounded-sm transition-all duration-500 shadow-[0_0_5px_#39ff14]" style={{height: `${Math.min(100, (val / 30) * 100)}%`}}></div>
                                        </div>
                                    )
                                })}
                            </div>
                        </div>
                    </div>
                </div>
            ); 
        });

        /* --- COMPONENTE KRONO CAM LITE (INTEGRADO, SIN IFRAME) --- */
        const KronoModal = memo(({ onClose, onKronoEvent, targetLaps, raceState }) => {
            // Posición de la ventana
            const [pos, setPos] = useState({ x: Math.max(10, window.innerWidth / 2 - 180), y: Math.max(10, window.innerHeight / 2 - 250) });
            const [isDraggingWindow, setIsDraggingWindow] = useState(false);
            const dragOff = useRef({ x: 0, y: 0 });

            // Estado Krono Lite
            const [hasCamera, setHasCamera] = useState(false);
            const [isCamLoading, setIsCamLoading] = useState(false); // NUEVO: Bloqueo anti-cuelgues
            const [camError, setCamError] = useState(null); // NUEVO: Estado de error en lugar de alert()
            const [threshold, setThreshold] = useState(20);
            const [laps, setLaps] = useState({ count: 0, last: 0, best: Infinity });
            const [roi, setRoi] = useState({ x: 25, y: 25, w: 50, h: 50 });
            
            const videoRef = useRef(null);
            const canvasRef = useRef(null);
            const roiElementRef = useRef(null);
            const briDisplayRef = useRef(null);
            
            // Refs mutables para el bucle de cámara (evitar re-renders)
            const isCamActiveRef = useRef(false);
            const streamRef = useRef(null);
            const animFrameRef = useRef(null);
            const thresholdRef = useRef(threshold);
            const roiRef = useRef(roi);
            const baseBriRef = useRef(null);
            const lastTriggerRef = useRef(0);
            const lapStartRef = useRef(0);
            const isCalibratingRef = useRef(false);
            const wasCrossedRef = useRef(false);
            const onKronoEventRef = useRef(onKronoEvent);

            // Mantener sincronizados los refs con el state
            useEffect(() => { thresholdRef.current = threshold; }, [threshold]);
            useEffect(() => { roiRef.current = roi; }, [roi]);
            useEffect(() => { onKronoEventRef.current = onKronoEvent; }, [onKronoEvent]);

            // Función centralizada para detener la cámara
            const stopCamera = React.useCallback(() => {
                isCamActiveRef.current = false;
                if (animFrameRef.current) cancelAnimationFrame(animFrameRef.current);
                if (streamRef.current) {
                    streamRef.current.getTracks().forEach(t => t.stop());
                    streamRef.current = null;
                }
                if (videoRef.current) {
                    videoRef.current.pause();
                    videoRef.current.srcObject = null;
                }
                setHasCamera(false);
                if (onKronoEventRef.current) onKronoEventRef.current('stop');
            }, []);

            // APAGAR Y RESETEAR CUANDO ACABA LA CARRERA
            useEffect(() => {
                if (raceState === 'finished') {
                    stopCamera();
                    setLaps({ count: 0, last: 0, best: Infinity });
                    lapStartRef.current = 0;
                }
            }, [raceState, stopCamera]);

            // Manejo arrastre ventana principal
            const handleWindowDown = (e) => {
                if (e.target.closest('.no-drag')) return;
                const clientX = e.clientX || (e.touches && e.touches[0].clientX);
                const clientY = e.clientY || (e.touches && e.touches[0].clientY);
                if (clientX !== undefined) {
                    setIsDraggingWindow(true);
                    dragOff.current = { x: clientX - pos.x, y: clientY - pos.y };
                }
            };

            useEffect(() => {
                const onMove = (e) => {
                    if(!isDraggingWindow) return;
                    const clientX = e.clientX || (e.touches && e.touches[0].clientX);
                    const clientY = e.clientY || (e.touches && e.touches[0].clientY);
                    if(clientX !== undefined) {
                        setPos({ x: clientX - dragOff.current.x, y: clientY - dragOff.current.y });
                    }
                };
                const onUp = () => setIsDraggingWindow(false);
                if(isDraggingWindow) {
                    window.addEventListener('mousemove', onMove);
                    window.addEventListener('mouseup', onUp);
                    window.addEventListener('touchmove', onMove, {passive: false});
                    window.addEventListener('touchend', onUp);
                }
                return () => {
                    window.removeEventListener('mousemove', onMove);
                    window.removeEventListener('mouseup', onUp);
                    window.removeEventListener('touchmove', onMove);
                    window.removeEventListener('touchend', onUp);
                };
            }, [isDraggingWindow]);

            // Pitido simple
            const playBeep = () => {
                try {
                    const AudioContext = window.AudioContext || window.webkitAudioContext;
                    const ctx = new AudioContext();
                    const osc = ctx.createOscillator();
                    const gain = ctx.createGain();
                    osc.connect(gain);
                    gain.connect(ctx.destination);
                    osc.type = 'square';
                    osc.frequency.setValueAtTime(800, ctx.currentTime);
                    gain.gain.setValueAtTime(0.1, ctx.currentTime);
                    gain.gain.exponentialRampToValueAtTime(0.00001, ctx.currentTime + 0.1);
                    osc.start();
                    osc.stop(ctx.currentTime + 0.1);
                } catch(e) {}
            };

            // Bucle principal de visión artificial
            const processVideo = () => {
                if (!isCamActiveRef.current) return;
                const video = videoRef.current;
                const canvas = canvasRef.current;
                
                if (!video || !canvas || video.readyState !== video.HAVE_ENOUGH_DATA) {
                    animFrameRef.current = requestAnimationFrame(processVideo);
                    return;
                }

                const vw = video.videoWidth;
                const vh = video.videoHeight;
                if (!vw || !vh) {
                    animFrameRef.current = requestAnimationFrame(processVideo);
                    return;
                }

                const r = roiRef.current;
                const l = Math.floor(vw * (r.x / 100));
                const t = Math.floor(vh * (r.y / 100));
                const w = Math.max(1, Math.ceil(vw * (r.w / 100)));
                const h = Math.max(1, Math.ceil(vh * (r.h / 100)));

                // OPTIMIZACIÓN EXTREMA: Reducir resolución para no saturar memoria/CPU (Evita reseteos del navegador)
                const evalW = 32;
                const evalH = 32;
                canvas.width = evalW; canvas.height = evalH;
                const ctx = canvas.getContext('2d', { willReadFrequently: true });
                ctx.drawImage(video, l, t, w, h, 0, 0, evalW, evalH);

                try {
                    const data = ctx.getImageData(0, 0, evalW, evalH).data;
                    let sum = 0;
                    for (let i = 0; i < data.length; i += 4) { // Procesar píxeles escalados
                        sum += (data[i] + data[i+1] + data[i+2]);
                    }
                    const avgBri = (sum / 3) / (data.length / 4);

                    if (briDisplayRef.current) {
                        briDisplayRef.current.innerText = `Bri: ${avgBri.toFixed(0)}`;
                    }

                    if (baseBriRef.current === null || isCalibratingRef.current) {
                        baseBriRef.current = avgBri;
                        if(roiElementRef.current) roiElementRef.current.style.borderColor = 'white';
                    } else {
                        const diff = Math.abs(avgBri - baseBriRef.current);
                        const isCrossed = diff > thresholdRef.current;

                        if (isCrossed) {
                            if(roiElementRef.current) {
                                roiElementRef.current.style.backgroundColor = 'rgba(255, 69, 0, 0.3)';
                                roiElementRef.current.style.borderColor = '#ff4500';
                            }

                            const now = Date.now();
                            
                            // TRIGGER DE VUELTA: Solo al entrar (Flanco de subida) y con debounce de 3s.
                            // Esto evita que si te quedas repostando se cuenten vueltas falsas cada 3 segundos (que hacían que el coche saliera disparado).
                            if (!wasCrossedRef.current && (now - lastTriggerRef.current > 3000)) {
                                lastTriggerRef.current = now;
                                playBeep();
                                
                                if (lapStartRef.current > 0) {
                                    const lapTime = now - lapStartRef.current;
                                    setLaps(prev => {
                                        const isBest = lapTime < prev.best;
                                        const newBest = isBest ? lapTime : prev.best;
                                        const newCount = prev.count + 1;
                                        
                                        if (onKronoEvent) {
                                            setTimeout(() => {
                                                onKronoEvent('trigger', { isFirst: false, lapTime: lapTime, count: newCount, isBest: isBest });
                                            }, 0);
                                        }
                                        
                                        return { count: newCount, last: lapTime, best: newBest };
                                    });
                                } else {
                                    // Primera vez que cruza (Salida)
                                    setLaps({ count: 0, last: 0, best: Infinity });
                                    if (onKronoEvent) onKronoEvent('trigger', { isFirst: true });
                                }
                                lapStartRef.current = now;
                            }
                            wasCrossedRef.current = true;
                        } else {
                            wasCrossedRef.current = false;
                            if(roiElementRef.current) {
                                roiElementRef.current.style.backgroundColor = 'rgba(255, 69, 0, 0.05)';
                                roiElementRef.current.style.borderColor = 'rgba(255, 69, 0, 0.4)';
                            }
                            
                            // Adaptación ambiental lenta
                            baseBriRef.current = baseBriRef.current * 0.95 + avgBri * 0.05;
                        }
                    }
                } catch (e) {}

                animFrameRef.current = requestAnimationFrame(processVideo);
            };

            const toggleCamera = async (e) => {
                if (e) { e.preventDefault(); e.stopPropagation(); }
                if (isCamLoading) return; // BLOQUEO: Evita doble click mientras espera permisos
                setCamError(null);

                if (hasCamera) {
                    // Detener
                    stopCamera();
                } else {
                    // Iniciar
                    setIsCamLoading(true);
                    try {
                        if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) {
                            setCamError("Cámara no soportada o permisos denegados en este entorno.");
                            setIsCamLoading(false);
                            return;
                        }
                        
                        // OPTIMIZACIÓN EXTREMA MÓVILES: Forzar baja resolución (640x480) 
                        // Evita que el navegador cierre la pestaña por falta de memoria RAM (Cuelgue de iOS/Android)
                        const stream = await navigator.mediaDevices.getUserMedia({ 
                            video: { 
                                facingMode: "environment",
                                width: { ideal: 640 },
                                height: { ideal: 480 }
                            } 
                        });
                        
                        streamRef.current = stream;
                        if (videoRef.current) {
                            videoRef.current.srcObject = stream;
                            try {
                                await videoRef.current.play();
                            } catch(playErr) {
                                console.warn("Auto-play prevenido, esperando interacción", playErr);
                            }
                        }
                        isCamActiveRef.current = true;
                        setHasCamera(true);
                        lapStartRef.current = 0; // Reset tiempos al encender
                        setLaps({ count: 0, last: 0, best: Infinity });
                        if (onKronoEventRef.current) onKronoEventRef.current('start');
                        animFrameRef.current = requestAnimationFrame(processVideo);
                    } catch (err) {
                        setCamError(err.name === 'NotAllowedError' ? "Permiso de cámara denegado." : "Error: " + err.message);
                    } finally {
                        setIsCamLoading(false); // Liberar bloqueo
                    }
                }
            };

            const calibrate = () => {
                isCalibratingRef.current = true;
                setTimeout(() => { isCalibratingRef.current = false; }, 1000);
            };

            // Limpieza al desmontar
            useEffect(() => {
                return () => {
                    stopCamera();
                };
            }, [stopCamera]);

            // Lógica Drag ROI local
            const startRoiDrag = (e, type) => {
                e.preventDefault(); e.stopPropagation();
                if (!hasCamera) return;
                
                const startX = e.clientX || (e.touches && e.touches[0].clientX);
                const startY = e.clientY || (e.touches && e.touches[0].clientY);
                const startRoi = { ...roi };
                const videoRect = videoRef.current.getBoundingClientRect();

                const onMove = (ev) => {
                    const cx = ev.clientX || (ev.touches && ev.touches[0].clientX);
                    const cy = ev.clientY || (ev.touches && ev.touches[0].clientY);
                    const dxPct = ((cx - startX) / videoRect.width) * 100;
                    const dyPct = ((cy - startY) / videoRect.height) * 100;

                    setRoi(prev => {
                        let n = { ...startRoi };
                        if (type === 'move') {
                            n.x = Math.max(0, Math.min(startRoi.x + dxPct, 100 - startRoi.w));
                            n.y = Math.max(0, Math.min(startRoi.y + dyPct, 100 - startRoi.h));
                        } else if (type === 'br') {
                            n.w = Math.max(5, Math.min(startRoi.w + dxPct, 100 - startRoi.x));
                            n.h = Math.max(5, Math.min(startRoi.h + dyPct, 100 - startRoi.y));
                        } else if (type === 'tl') {
                            const maxW = startRoi.w + startRoi.x;
                            const maxH = startRoi.h + startRoi.y;
                            let nw = startRoi.w - dxPct;
                            let nh = startRoi.h - dyPct;
                            let nx = startRoi.x + dxPct;
                            let ny = startRoi.y + dyPct;
                            if (nw >= 5 && nx >= 0) { n.w = nw; n.x = nx; }
                            if (nh >= 5 && ny >= 0) { n.h = nh; n.y = ny; }
                        }
                        return n;
                    });
                };

                const onUp = () => {
                    document.removeEventListener('mousemove', onMove);
                    document.removeEventListener('mouseup', onUp);
                    document.removeEventListener('touchmove', onMove);
                    document.removeEventListener('touchend', onUp);
                };

                document.addEventListener('mousemove', onMove);
                document.addEventListener('mouseup', onUp);
                document.addEventListener('touchmove', onMove, {passive: false});
                document.addEventListener('touchend', onUp);
            };

            const formatTime = (ms) => {
                if (ms === Infinity || ms <= 0) return "--.---";
                const sec = Math.floor((ms % 60000) / 1000);
                const mil = Math.floor(ms % 1000);
                return `${String(sec).padStart(2,'0')}.${String(mil).padStart(3,'0')}`;
            };

            return (
                <div 
                    style={{ left: pos.x, top: pos.y, position: 'absolute', zIndex: 99999 }}
                    className="w-[360px] sm:w-[420px] bg-[#050505]/95 backdrop-blur-xl border border-orange-500 rounded-2xl shadow-[0_0_50px_rgba(255,69,0,0.3)] flex flex-col overflow-hidden animate-in zoom-in-95 pointer-events-auto relative"
                >
                    <div className="absolute inset-0 opacity-10 pointer-events-none" style={{backgroundImage: 'radial-gradient(#ff4500 1px, transparent 1px)', backgroundSize: '15px 15px'}}></div>
                    
                    {/* Header (Arrastrable) */}
                    <div 
                        onMouseDown={handleWindowDown}
                        onTouchStart={handleWindowDown}
                        className="bg-gradient-to-r from-orange-600/30 via-orange-900/10 to-transparent p-3 flex justify-between items-center cursor-move shrink-0 border-b border-orange-500/40 relative z-10"
                    >
                        <div className="flex items-center gap-2 pointer-events-none">
                            <Crosshair size={16} className="text-orange-500 animate-[spin_4s_linear_infinite]" />
                            <span className="text-[14px] font-black text-white tracking-[0.3em] drop-shadow-[0_0_8px_rgba(255,69,0,0.8)]">KRONO<span className="text-orange-500">LITE</span></span>
                        </div>
                        <button type="button" onClick={onClose} className="no-drag text-red-500 hover:text-white bg-red-900/30 p-2 rounded-full transition-colors hover:bg-red-500 hover:shadow-[0_0_15px_red]" title="Cerrar Krono"><X size={18}/></button>
                    </div>
                    
                    {/* Contenido */}
                    <div className="flex-1 p-3 flex flex-col gap-3 no-drag relative z-10">
                        {/* Controles Cámara */}
                        <div className="flex justify-between items-center bg-black/60 rounded-xl p-2 border border-orange-500/20 shadow-[inset_0_0_15px_rgba(0,0,0,0.8)]">
                            <div className="flex gap-2">
                                <button type="button" onClick={toggleCamera} disabled={isCamLoading} className={`px-3 py-1.5 text-[9px] font-bold uppercase rounded-lg flex items-center gap-1.5 transition-all border ${isCamLoading ? 'bg-orange-500/20 text-orange-500 border-orange-500/50 cursor-wait' : (hasCamera ? 'bg-red-900/40 text-red-500 border-red-500/50 hover:bg-red-500 hover:text-white hover:shadow-[0_0_15px_red]' : 'bg-orange-500/20 text-orange-400 border-orange-500/50 hover:bg-orange-500 hover:text-black hover:shadow-[0_0_15px_#ff4500]')}`}>
                                    {isCamLoading ? 'INICIANDO...' : (hasCamera ? 'DETENER CÁMARA' : 'ENCENDER CÁMARA')}
                                </button>
                                <button type="button" onClick={calibrate} disabled={!hasCamera || isCamLoading} className="px-3 py-1.5 text-[9px] font-bold uppercase rounded-lg bg-black text-gray-300 border border-gray-600 hover:border-orange-500 hover:text-orange-500 transition-all disabled:opacity-30 disabled:hover:border-gray-600 disabled:hover:text-gray-300">
                                    CALIBRAR
                                </button>
                            </div>
                            <div className="flex items-center gap-1.5">
                                <span className={`w-2 h-2 rounded-full ${hasCamera ? 'bg-red-500 animate-pulse shadow-[0_0_8px_red]' : 'bg-gray-700'}`}></span>
                                <span className={`text-[8px] font-mono font-bold ${hasCamera ? 'text-red-500' : 'text-gray-600'}`}>{hasCamera ? 'REC' : 'OFF'}</span>
                            </div>
                        </div>

                        {/* Visor Video */}
                        <div className="relative w-full h-[280px] bg-[#050505] rounded-xl border border-orange-500/30 overflow-hidden select-none touch-none shadow-[inset_0_0_30px_rgba(255,69,0,0.15)]">
                            <div className="absolute top-0 left-0 w-6 h-6 border-t-2 border-l-2 border-orange-500 rounded-tl-xl pointer-events-none z-20"></div>
                            <div className="absolute top-0 right-0 w-6 h-6 border-t-2 border-r-2 border-orange-500 rounded-tr-xl pointer-events-none z-20"></div>
                            <div className="absolute bottom-0 left-0 w-6 h-6 border-b-2 border-l-2 border-orange-500 rounded-bl-xl pointer-events-none z-20"></div>
                            <div className="absolute bottom-0 right-0 w-6 h-6 border-b-2 border-r-2 border-orange-500 rounded-br-xl pointer-events-none z-20"></div>
                            
                            {!hasCamera && !camError && (
                                <div className="absolute inset-0 flex flex-col items-center justify-center text-orange-500/50 pointer-events-none">
                                    <Crosshair size={32} className="mb-2 opacity-50" />
                                    <span className="text-[10px] font-bold tracking-widest uppercase">Sistema Desactivado</span>
                                </div>
                            )}
                            
                            {camError && (
                                <div className="absolute inset-0 flex flex-col items-center justify-center text-red-500 bg-red-900/20 p-4 text-center z-10 backdrop-blur-sm">
                                    <AlertTriangle size={24} className="mb-2 animate-bounce" />
                                    <span className="text-[9px] font-bold tracking-widest uppercase">{camError}</span>
                                </div>
                            )}
                            
                            <video ref={videoRef} className="w-full h-full object-cover grayscale-[0.3] contrast-125" playsInline autoPlay muted />
                            
                            {/* Caja ROI */}
                            {hasCamera && (
                                <div 
                                    ref={roiElementRef}
                                    onPointerDown={(e) => startRoiDrag(e, 'move')}
                                    style={{ left: `${roi.x}%`, top: `${roi.y}%`, width: `${roi.w}%`, height: `${roi.h}%` }}
                                    className="absolute border border-orange-500/60 bg-orange-500/5 cursor-move shadow-[0_0_15px_rgba(255,69,0,0.3)] box-border transition-colors duration-100"
                                >
                                    <div className="absolute top-0 left-0 w-2 h-2 border-t-2 border-l-2 border-orange-500 pointer-events-none"></div>
                                    <div className="absolute top-0 right-0 w-2 h-2 border-t-2 border-r-2 border-orange-500 pointer-events-none"></div>
                                    <div className="absolute bottom-0 left-0 w-2 h-2 border-b-2 border-l-2 border-orange-500 pointer-events-none"></div>
                                    <div className="absolute bottom-0 right-0 w-2 h-2 border-b-2 border-r-2 border-orange-500 pointer-events-none"></div>
                                    
                                    <div ref={briDisplayRef} className="absolute bottom-1 right-1 bg-black/80 text-orange-400 text-[8px] font-mono px-1.5 py-0.5 rounded border border-orange-500/30 pointer-events-none">Bri: 0</div>
                                    
                                    <div onPointerDown={(e) => startRoiDrag(e, 'tl')} className="absolute -top-2 -left-2 w-4 h-4 bg-orange-500 border border-black cursor-nwse-resize rounded-full shadow-[0_0_5px_rgba(255,69,0,0.8)]" />
                                    <div onPointerDown={(e) => startRoiDrag(e, 'br')} className="absolute -bottom-2 -right-2 w-4 h-4 bg-orange-500 border border-black cursor-nwse-resize rounded-full shadow-[0_0_5px_rgba(255,69,0,0.8)]" />
                                </div>
                            )}
                            <canvas ref={canvasRef} className="hidden" />
                        </div>

                        {/* Controles Inferiores */}
                        <div className="grid grid-cols-5 gap-2">
                            <div className="col-span-3 bg-black/60 p-2.5 rounded-xl border border-orange-500/20 flex flex-col justify-center shadow-inner">
                                <label className="text-[8px] text-orange-500/80 font-bold uppercase tracking-wider mb-1.5 flex justify-between">Sensibilidad <span className="text-orange-400 font-mono bg-orange-900/30 px-1 rounded">{threshold}</span></label>
                                <input type="range" min="5" max="100" value={threshold} onChange={(e) => setThreshold(parseInt(e.target.value))} className="w-full h-1 bg-gray-800 rounded-lg appearance-none cursor-pointer accent-orange-500" />
                            </div>
                            
                            <button type="button" onClick={() => { setLaps({count: 0, last: 0, best: Infinity}); lapStartRef.current = 0; }} className="col-span-2 bg-red-900/20 hover:bg-red-600 text-red-500 hover:text-white border border-red-500/30 rounded-xl text-[9px] font-black uppercase tracking-widest transition-all flex items-center justify-center shadow-[0_0_10px_rgba(220,38,38,0.2)] hover:shadow-[0_0_20px_rgba(220,38,38,0.8)]">
                                RESET DATOS
                            </button>
                        </div>

                        {/* Marcadores */}
                        <div className="grid grid-cols-3 gap-2 mt-1">
                            <div className="bg-gradient-to-b from-orange-900/30 to-black/80 border border-orange-500/40 rounded-xl p-2 flex flex-col items-center justify-center shadow-[inset_0_0_20px_rgba(255,69,0,0.15)] relative overflow-hidden">
                                <div className="absolute top-0 left-0 w-full h-0.5 bg-orange-500/50"></div>
                                <span className="text-[7px] text-orange-400 font-bold uppercase tracking-widest mb-1 drop-shadow-[0_0_2px_rgba(255,69,0,0.8)]">Vueltas</span>
                                <div className="flex items-baseline gap-0.5 mt-0.5">
                                    <span className="font-digital text-3xl text-white drop-shadow-[0_0_10px_rgba(255,69,0,0.8)] leading-none">{laps.count}</span>
                                    <span className="font-digital text-[11px] text-orange-500/80 leading-none">/{targetLaps}</span>
                                </div>
                            </div>
                            <div className="bg-black/60 border border-orange-500/20 rounded-xl p-2 flex flex-col items-center justify-center shadow-inner relative">
                                <span className="text-[7px] text-gray-500 font-bold uppercase tracking-widest mb-1">Última</span>
                                <span className="font-digital text-xl text-orange-400 drop-shadow-[0_0_5px_rgba(255,69,0,0.3)] leading-none mt-1">{formatTime(laps.last)}</span>
                            </div>
                            <div className="bg-black/60 border border-orange-500/20 rounded-xl p-2 flex flex-col items-center justify-center shadow-inner relative">
                                <span className="text-[7px] text-gray-500 font-bold uppercase tracking-widest mb-1">Mejor</span>
                                <span className="font-digital text-xl text-[#39ff14] drop-shadow-[0_0_8px_rgba(57,255,20,0.4)] leading-none mt-1">{formatTime(laps.best)}</span>
                            </div>
                        </div>
                    </div>
                </div>
            );
        });
        
        // --- COMPONENTE TELEMETRÍA MOVIBLE Y COMPACTO ---
        const TelemetryPanel = memo(({ carId, data, config, style, onMouseDown, onTouchStart, onSave, onLoad, onCarSelect, isRally }) => { 
            const { t } = useTranslation();
            const [showMenu, setShowMenu] = useState(false);
            if (!data || !config) return null;
            const fileInputRef = useRef(null);
            const speedPercent = Math.min(100, (data.speed / 400) * 100); 
            const rpmPercent = Math.min(100, (data.speed / 300) * 90 + Math.random()*10); 
            
            const th = isRally ? {
                border: 'border-[#facc15]',
                border30: 'border-[#facc15]/30',
                border20: 'border-[#facc15]/20',
                bg: 'bg-[#facc15]',
                bg20: 'bg-[#facc15]/20',
                hoverBg: 'hover:bg-[#facc15]',
                text: 'text-[#facc15]',
                text60: 'text-[#facc15]/60',
                text80: 'text-[#facc15]/80',
                shadow: 'shadow-[0_0_40px_rgba(250,204,21,0.2)]',
                shadowMenu: 'shadow-[0_0_15px_rgba(250,204,21,0.4)]',
                dropShadow: 'drop-shadow-[0_0_10px_rgba(250,204,21,0.8)]',
                dropShadowSmall: 'drop-shadow-[0_0_5px_rgba(250,204,21,0.5)]',
                from: 'from-[#facc15]/40',
                via: 'via-[#facc15]',
                hex: '#facc15'
            } : {
                border: 'border-[#39ff14]',
                border30: 'border-[#39ff14]/30',
                border20: 'border-[#39ff14]/20',
                bg: 'bg-[#39ff14]',
                bg20: 'bg-[#39ff14]/20',
                hoverBg: 'hover:bg-[#39ff14]',
                text: 'text-[#39ff14]',
                text60: 'text-[#39ff14]/60',
                text80: 'text-[#39ff14]/80',
                shadow: 'shadow-[0_0_40px_rgba(57,255,20,0.2)]',
                shadowMenu: 'shadow-[0_0_15px_rgba(57,255,20,0.4)]',
                dropShadow: 'drop-shadow-[0_0_10px_rgba(57,255,20,0.8)]',
                dropShadowSmall: 'drop-shadow-[0_0_5px_rgba(57,255,20,0.5)]',
                from: 'from-[#39ff14]/40',
                via: 'via-[#39ff14]',
                hex: '#39ff14'
            };

            return (
                <div 
                    style={style}
                    onMouseDown={onMouseDown}
                    onTouchStart={onTouchStart}
                    className={`absolute w-60 bg-[#050a05]/95 border-2 ${th.border} rounded-xl ${th.shadow} backdrop-blur-xl animate-in z-[60] cursor-move select-none origin-bottom-left flex flex-col`}
                >
                    {(onSave || onLoad) && (
                        <div className={`bg-black/80 p-1 border-b ${th.border30} flex gap-1 rounded-t-lg`}>
                            {onSave && (
                                <button 
                                    onClick={(e) => { e.stopPropagation(); onSave(); }}
                                    onMouseDown={(e) => e.stopPropagation()}
                                    onTouchStart={(e) => e.stopPropagation()}
                                    className={`flex-1 ${th.bg20} ${th.hoverBg} ${th.text} hover:text-black border ${th.border} rounded px-2 py-1 text-[8px] font-black tracking-widest uppercase transition-all flex items-center justify-center gap-1 group`}
                                >
                                    <Save size={10} className="group-hover:scale-110 transition-transform"/> {t('save')}
                                </button>
                            )}
                            {onLoad && (
                                <>
                                    <button 
                                        onClick={(e) => { e.stopPropagation(); fileInputRef.current?.click(); }}
                                        onMouseDown={(e) => e.stopPropagation()}
                                        onTouchStart={(e) => e.stopPropagation()}
                                        className="flex-1 bg-blue-500/20 hover:bg-blue-500 text-blue-400 hover:text-white border border-blue-500/50 rounded px-2 py-1 text-[8px] font-black tracking-widest uppercase transition-all flex items-center justify-center gap-1 group"
                                    >
                                        <FolderOpen size={10} className="group-hover:scale-110 transition-transform"/> {t('open')}
                                    </button>
                                    <input 
                                        type="file" 
                                        ref={fileInputRef}
                                        accept=".json"
                                        className="hidden"
                                        onChange={(e) => { 
                                            e.stopPropagation(); 
                                            if (e.target.files && e.target.files[0]) {
                                                onLoad(e.target.files[0]);
                                            }
                                            e.target.value = '';
                                        }}
                                    />
                                </>
                            )}
                        </div>
                    )}

                    <div className={`${th.bg} text-black px-3 py-1.5 flex justify-between items-center pointer-events-auto relative ${!(onSave || onLoad) ? 'rounded-t-lg' : ''}`}>
                        <div className="flex items-center gap-1.5 pointer-events-none">
                            <Activity size={14} className="animate-pulse"/>
                            <h2 className="font-black text-[10px] tracking-[0.2em] uppercase">{t('telemetry')}</h2>
                        </div>
                        <div className="relative">
                            <button
                                onClick={(e) => { e.stopPropagation(); setShowMenu(!showMenu); }}
                                onMouseDown={(e) => e.stopPropagation()}
                                onTouchStart={(e) => e.stopPropagation()}
                                className="font-mono font-bold text-[9px] bg-black/20 hover:bg-black/40 px-2 py-0.5 rounded flex items-center gap-1 transition-colors cursor-pointer"
                                title="Cambiar coche seleccionado"
                            >
                                {t('car')} {carId} <ChevronDown size={10} className={`transition-transform ${showMenu ? 'rotate-180' : ''}`} />
                            </button>
                            {showMenu && (
                                <>
                                    <div className="fixed inset-0 z-[90]" onClick={(e) => { e.stopPropagation(); setShowMenu(false); }} onMouseDown={(e) => e.stopPropagation()} onTouchStart={(e) => e.stopPropagation()}></div>
                                    <div className={`absolute top-full right-0 mt-1 w-24 bg-[#0a0a0a] border ${th.border} rounded ${th.shadowMenu} z-[100] max-h-32 overflow-y-auto hide-scrollbar flex flex-col animate-in`}>
                                        {[1,2,3,4,5,6,7,8].map(id => (
                                            <button
                                                key={id}
                                                onMouseDown={(e) => e.stopPropagation()}
                                                onTouchStart={(e) => e.stopPropagation()}
                                                onClick={(e) => {
                                                    e.stopPropagation();
                                                    if(onCarSelect) onCarSelect(id);
                                                    setShowMenu(false);
                                                }}
                                                className={`text-[9px] font-mono text-left px-3 py-2 transition-colors border-b ${th.border20} last:border-0 ${carId === id ? `${th.bg} text-black font-black` : `${th.text} ${th.hoverBg}/20`}`}
                                            >
                                                {t('car')} {id}
                                            </button>
                                        ))}
                                    </div>
                                </>
                            )}
                        </div>
                    </div>
                    
                    <div className="p-3 grid grid-cols-2 gap-3 relative pointer-events-none overflow-hidden rounded-b-lg">
                        <div className="absolute inset-0 opacity-10" style={{backgroundImage: `linear-gradient(transparent 9px, ${th.hex} 1px), linear-gradient(90deg, transparent 9px, ${th.hex} 1px)`, backgroundSize: '20px 20px'}}></div>
                        
                        <div className={`col-span-2 flex items-end justify-between border-b ${th.border30} pb-2`}>
                            <div>
                                <span className={`text-[8px] ${th.text60} font-bold uppercase block tracking-wider`}>{t('speed')}</span>
                                <div className="flex items-baseline">
                                    <span className={`font-digital text-4xl text-white ${th.dropShadow} leading-none`}>{data.speed}</span>
                                    <span className={`text-[10px] ${th.text} font-bold ml-1`}>Km/h</span>
                                </div>
                            </div>
                            <div className="w-20 flex flex-col items-end">
                                <div className={`w-full h-1.5 bg-gray-900 rounded-full overflow-hidden border ${th.border30}`}>
                                    <div className={`h-full bg-gradient-to-r ${th.from} ${th.via} to-white transition-all duration-75`} style={{width: `${rpmPercent}%`}}></div>
                                </div>
                                <span className={`text-[8px] ${th.text} font-mono mt-1`}>RPM: {(rpmPercent * 250).toFixed(0)}0</span>
                            </div>
                        </div>
                        
                        <div className="space-y-1.5">
                            <div className="flex justify-between items-center"><span className="text-[8px] text-gray-400 font-bold">{t('motor')}</span><span className={`text-[8px] ${th.text} font-mono border ${th.border30} px-1 rounded truncate max-w-[70px]`}>{config.motorName || 'STD'}</span></div>
                            <div className="flex justify-between items-center"><span className="text-[8px] text-gray-400 font-bold">{t('tires')}</span><span className={`text-[8px] ${th.text} font-mono border ${th.border30} px-1 rounded truncate max-w-[70px]`}>{config.tireName || 'STD'}</span></div>
                            <div className="flex justify-between items-center"><span className="text-[8px] text-gray-400 font-bold">{t('gearRatio')}</span><span className={`text-[8px] ${th.text} font-mono border ${th.border30} px-1 rounded`}>{config.gearRatio ? config.gearRatio.toFixed(2) : '3.00'}</span></div>
                        </div>
                        
                        <div className="text-right space-y-1">
                            <div>
                                <span className="text-[7px] text-gray-500 block uppercase font-bold">{t('lastLap')}</span>
                                <span className="font-digital text-sm text-white">{data.lastLap > 0 ? (data.lastLap/1000).toFixed(3) : '--.---'}</span>
                            </div>
                            <div>
                                <span className={`text-[7px] ${th.text80} block uppercase font-bold`}>{t('bestLap')}</span>
                                <span className={`font-digital text-sm ${th.text} ${th.dropShadowSmall}`}>{data.bestLap > 0 && data.bestLap !== Infinity ? (data.bestLap/1000).toFixed(3) : '--.---'}</span>
                            </div>
                        </div>
                    </div>
                </div>
            ); 
        });

        /* --- 3. VISOR 3D (CORE LOGIC) --- */
        const Telemetry3DViewer = ({ circuitData, carSettings, customCarAssets, onCarAssetUpdate, onClose }) => {
            const { t, lang } = useTranslation();
            const containerRef = useRef(null);
            const [paused, setPaused] = useState(false); 
            const [selectedCarId, setSelectedCarId] = useState(1);
            const [sessionResults, setSessionResults] = useState(null);
            const [isGeneratingPDF, setIsGeneratingPDF] = useState(false);
            
            // Función para volver al 2D enviando el circuito actual
            const goTo2DFrom3D = () => {
                let dataStr = localStorage.getItem('slot_last_circuit');
                if (!dataStr && circuitData) {
                    dataStr = JSON.stringify(circuitData);
                }
                
                if (dataStr) {
                    // 1. ESTABLECEMOS la clave de transferencia para que el 2D la lea al arrancar (¡Antes la estaba borrando por error!)
                    localStorage.setItem('slot_circuit_transfer', dataStr);
                    sessionStorage.setItem('slot_circuit_transfer', dataStr);
                    
                    // 2. Inundamos TODAS las claves posibles que puede usar un diseñador 2D
                    const keys = ['slot_circuit', 'slot_save', 'circuit_data', 'circuitData', 'slot_track', 'slot_estado'];
                    keys.forEach(k => {
                        localStorage.setItem(k, dataStr);
                    });
                }
                
                // 3. RETARDO DE SEGURIDAD
                setTimeout(() => {
                    window.location.href = 'circuitos.html'; 
                }, 250);
            };

            // ESTADO PARA KRONO CAM
            const [showKrono, setShowKrono] = useState(false);
            const [kronoSyncActive, setKronoSyncActive] = useState(false);
            const kronoSyncRef = useRef({ active: false, waitingForFirstTrigger: true, latestLapTime: 0, forceCross: false });

            const handleKronoEvent = (type, data) => {
                if (type === 'start') {
                    kronoSyncRef.current = { active: true, waitingForFirstTrigger: true, latestLapTime: 0, forceCross: false };
                    setKronoSyncActive(true);
                    
                    // Resetear la telemetría del coche seleccionado para empezar limpio con el Krono
                    const car = physicsState.current.find(c => c.id === selectedCarIdRef.current);
                    if (car) {
                        car.lastLapTime = 0;
                        car.bestLapTime = Infinity;
                        car.totalLapTime = 0;
                        car.completedLaps = 0;
                        car.crossedStartLine = false;
                        if (raceStateRef.current === 'idle') car.laps = 0;
                        else if (raceStateRef.current === 'racing') car.laps = targetLapsRef.current;
                        sessionDataRef.current[car.id] = [];
                    }
                } else if (type === 'stop') {
                    kronoSyncRef.current.active = false;
                    setKronoSyncActive(false);
                } else if (type === 'trigger') {
                    const carId = selectedCarIdRef.current;
                    const car = physicsState.current.find(c => c.id === carId);

                    if (data.isFirst) {
                        kronoSyncRef.current.waitingForFirstTrigger = false;
                        kronoSyncRef.current.forceCross = true;
                        kronoSyncRef.current.latestLapTime = 0; 
                        if (car) car.crossedStartLine = true;
                    } else {
                        // FIX: Evita que el coche se teletransporte a la meta en cada vuelta.
                        // Solo actualiza su velocidad crucero para replicar el tiempo de la pista real.
                        kronoSyncRef.current.forceCross = false;
                        kronoSyncRef.current.latestLapTime = data.lapTime;
                        
                        // ACTUALIZAR LA TELEMETRÍA GLOBAL DIRECTAMENTE CON LOS DATOS DE LA CÁMARA
                        if (car) {
                            car.lastLapTime = data.lapTime;
                            if (data.lapTime < car.bestLapTime) car.bestLapTime = data.lapTime;
                            car.totalLapTime += data.lapTime;
                            car.completedLaps = data.count;

                            const currentSetup = carSetupsRef.current[carId];
                            if (currentSetup) {
                                const lapData = { lap: data.count, time: data.lapTime, motor: currentSetup.motorName, tire: currentSetup.tireName, gear: `${currentSetup.gearTeeth}/${currentSetup.pinionTeeth}`, voltage: trackVoltageRef.current, weight: currentSetup.weight };
                                if (!sessionDataRef.current[carId]) sessionDataRef.current[carId] = [];
                                sessionDataRef.current[carId].push(lapData);
                            }

                            // Sincronizar el conteo de vueltas con la carrera
                            if (raceStateRef.current === 'idle') {
                                car.laps = data.count;
                            } else if (raceStateRef.current === 'racing') {
                                car.laps = Math.max(0, targetLapsRef.current - data.count);
                                if (car.laps <= 0) {
                                    raceStateRef.current = 'finished'; setRaceState('finished'); 
                                    setSessionResults({...sessionDataRef.current});
                                    setWinnerId(car.id); playCommentary('winner', currentSetup?.name);
                                    if (timerIntervalRef.current) clearInterval(timerIntervalRef.current); 
                                    playRaceSound('green'); 
                                }
                            }
                        }

                        // Cantar la vuelta real del Krono instantáneamente
                        if (data.isBest && data.count > 1) {
                            playCommentary('fastest', { name: carSetupsRef.current[selectedCarIdRef.current]?.name || `Car ${selectedCarIdRef.current}`, time: data.lapTime });
                        } else {
                            playCommentary('lap', { count: data.count, time: data.lapTime });
                        }
                    }
                }
            };

            // ESTADO PARA ARRASTRAR TELEMETRÍA
            const [telemetryPos, setTelemetryPos] = useState({ x: 24, y: window.innerHeight - 280 });
            const [isDraggingTel, setIsDraggingTel] = useState(false);
            const dragOffset = useRef({ x: 0, y: 0 });

            // ESTADO PARA ARRASTRAR EL MANDO (CONTROLLER)
            const [ctrlPos, setCtrlPos] = useState({ x: window.innerWidth - 140, y: window.innerHeight / 2 - 120 });
            const [isDraggingCtrl, setIsDraggingCtrl] = useState(false);
            const dragCtrlOffset = useRef({ x: 0, y: 0 });

            const [laneChangeActive, setLaneChangeActive] = useState(true); 
            const [raceState, setRaceState] = useState('grid'); 
            const [winnerId, setWinnerId] = useState(null); 
            const [activeLights, setActiveLights] = useState(0); 
            const [elapsedTime, setElapsedTime] = useState(0);
            const [targetLaps, setTargetLaps] = useState(10);
            
            // --- NUEVO: ESTADO DE PUENTES ---
            const bridgeMode = 'Medio'; // Fijado a la mejor calidad
            
            // --- NUEVO: ESTADO SENTIDO INVERTIDO ---
            const [isReversed, setIsReversed] = useState(false);
            const isReversedRef = useRef(isReversed);
            useEffect(() => { isReversedRef.current = isReversed; }, [isReversed]);

            const [aiLevel, setAiLevel] = useState(3);
            const aiLevelRef = useRef(aiLevel);
            useEffect(() => { aiLevelRef.current = aiLevel; }, [aiLevel]);

            const [throttleProfile, setThrottleProfile] = useState(2);
            const throttleProfileRef = useRef(throttleProfile);
            useEffect(() => { throttleProfileRef.current = throttleProfile; }, [throttleProfile]);

            const [validationError, setValidationError] = useState(null);
            const validationTimeoutRef = useRef(null);
            const showValidationError = (msg) => {
                setValidationError(msg);
                if (validationTimeoutRef.current) clearTimeout(validationTimeoutRef.current);
                validationTimeoutRef.current = setTimeout(() => setValidationError(null), 4000);
            };

            const [cameraMode, setCameraMode] = useState('race');
            const cameraModeRef = useRef(cameraMode);
            useEffect(() => { cameraModeRef.current = cameraMode; }, [cameraMode]);

            const [trackVoltage, setTrackVoltage] = useState(12.0);
            const [activeButton, setActiveButton] = useState('GRID');
            const [isFullscreen, setIsFullscreen] = useState(false);
            const [manualThrottle, setManualThrottle] = useState(0);
            const [sceneReady, setSceneReady] = useState(false);
            const [showTrees, setShowTrees] = useState(false);
            const forestGroupRef = useRef(null);

            // NUEVO: ESTADO Y FUNCIONES PARA BACKUP/RESTORE DE COMPONENTES
            const [refreshPartsKey, setRefreshPartsKey] = useState(0);
            const restorePartsRef = useRef(null);

            const handleBackupParts = () => {
                const backup = {
                    motors: JSON.parse(localStorage.getItem('slot_custom_motors') || '[]'),
                    tires: JSON.parse(localStorage.getItem('slot_custom_tires') || '[]'),
                    gears: JSON.parse(localStorage.getItem('slot_custom_gears') || '[]'),
                    pinions: JSON.parse(localStorage.getItem('slot_custom_pinions') || '[]')
                };
                const dataStr = "data:text/json;charset=utf-8," + encodeURIComponent(JSON.stringify(backup, null, 2));
                const dlAnchorElem = document.createElement('a');
                dlAnchorElem.setAttribute("href", dataStr);
                dlAnchorElem.setAttribute("download", `slot_custom_parts_backup.json`);
                dlAnchorElem.click();
            };

            const handleRestoreParts = (e) => {
                const file = e.target.files[0];
                if (!file) return;
                const reader = new FileReader();
                reader.onload = (ev) => {
                    try {
                        const data = JSON.parse(ev.target.result);
                        if (data.motors) localStorage.setItem('slot_custom_motors', JSON.stringify(data.motors));
                        if (data.tires) localStorage.setItem('slot_custom_tires', JSON.stringify(data.tires));
                        if (data.gears) localStorage.setItem('slot_custom_gears', JSON.stringify(data.gears));
                        if (data.pinions) localStorage.setItem('slot_custom_pinions', JSON.stringify(data.pinions));
                        // Forzamos a recargar los componentes visuales
                        setRefreshPartsKey(prev => prev + 1);
                        showValidationError(t('restoreSuccess'));
                    } catch (err) {
                        showValidationError(t('restoreError'));
                    }
                };
                reader.readAsText(file);
                e.target.value = '';
            };

            useEffect(() => {
                if (forestGroupRef.current) {
                    forestGroupRef.current.visible = showTrees;
                }
            }, [showTrees]);
            
            // --- LOCUTORA DIVERTIDA STATE ---
            const [announcerEnabled, setAnnouncerEnabled] = useState(false);
            const announcerEnabledRef = useRef(announcerEnabled); // REF PARA EL BUCLE 3D
            const lastCommentTime = useRef(0);
            
            // NUEVO: Ref de idioma para evitar "stale closures" (que los temporizadores recuerden el idioma viejo)
            const langRef = useRef(lang);
            
            // Sincronizar estado con la referencia y silenciar al instante si se apaga
            useEffect(() => { 
                announcerEnabledRef.current = announcerEnabled; 
                if (!announcerEnabled) {
                    window.speechSynthesis.cancel(); 
                }
            }, [announcerEnabled]);

            // NUEVO: Actualizar la referencia de idioma y callar a la locutora de golpe si cambias la bandera
            useEffect(() => {
                langRef.current = lang;
                window.speechSynthesis.cancel();
            }, [lang]);

            const playCommentary = (type, extraData) => {
                if (!announcerEnabledRef.current) return; // CORRECCIÓN: Leer de la referencia
                const now = Date.now();
                if (now - lastCommentTime.current < 2000 && !['winner', 'start', 'green', 'fastest', 'lap'].includes(type)) return;
                
                const currentLang = langRef.current; // Usar siempre el idioma actual en tiempo real
                let text = "";
                const phrases = currentLang === 'en' ? {
                    start: ["Drivers, start your engines!", "Attention on the grid!", "This is going to be legendary!", "Warming up tires, here we go!"],
                    countdown: ["Watch the lights!", "Maximum concentration!", "Stay awake!"],
                    green: ["GREEN LIGHT! Go go go!", "And they are off!", "Full throttle!", "We are racing!"],
                    crash: ["Whoa! Off the track!", "Brutal crash!", "What a hit!", "Careful on that corner!", "Someone bought a plot of land!", "Oh my goodness, what a smash!"],
                    winner: ["We have a winner!", "Spectacular victory!", "Flawless race!", "Straight to the podium!"],
                    pit: ["Entering the pits...", "Mechanics ready!", "Strategic stop!", "Time to refuel!"],
                    fuel_low: ["You are running dry!", "Reserve! Box box box!", "The tank is shivering!"],
                    session_end: ["Session completed!", "Testing finished!", "Returning to pits!", "Data successfully saved!"],
                    refuel_krono: ["Refueling!", "Adding fuel!"]
                } : {
                    start: ["¡Pilotos, enciendan motores!", "¡Atención en la parrilla!", "¡Esto va a ser legendario!", "¡Calentando neumáticos, que esto empieza!"],
                    countdown: ["¡Ojo al semáforo!", "¡Concentración máxima!", "¡Que nadie se duerma!"],
                    green: ["¡Semaforo VERDE! ¡Gaaaas!", "¡Salida, salida, salida!", "¡A fondo!", "¡Arrancamos con todo!"],
                    crash: ["¡Uyyy! ¡Salida de pista!", "¡Accidente brutal!", "¡Menudo golpe!", "¡Cuidado en esa curva!", "¡Alguien ha comprado una parcela!", "¡Ay mi madre, qué tortazo!"],
                    winner: ["¡Tenemos ganador!", "¡Victoria espectacular!", "¡Carrera impecable!", "¡Directo al podio!"],
                    pit: ["Entrando en boxes...", "¡Mecánicos listos!", "¡Parada estratégica!", "¡A repostar!"],
                    fuel_low: ["¡Te quedas seco!", "¡Reserva! ¡Entra en boxes!", "¡El depósito está tiritando!"],
                    session_end: ["¡Sesión completada!", "¡Pruebas finalizadas!", "¡Volvemos a boxes!", "¡Datos guardados con éxito!"],
                    refuel_krono: ["¡Repostando!", "¡Cargando combustible!"]
                };

                const list = phrases[type] || [];
                if (list.length > 0) {
                    text = list[Math.floor(Math.random() * list.length)];
                    if (type === 'winner' && extraData) text = currentLang === 'en' ? `Incredible! ${extraData} wins the race! ` + text : `¡Increíble! ¡${extraData} gana la carrera! ` + text;
                }

                // NUEVO: SISTEMA DINÁMICO DE LECTURA DE TIEMPOS
                if (type === 'fastest' && extraData) {
                    const tStrEn = (extraData.time / 1000).toFixed(2);
                    const tStrEs = (extraData.time / 1000).toFixed(2).replace('.', ','); // La coma suena mejor en español ("coma" en lugar de "punto")
                    const punchlinesEn = ["Flying low!", "What a rhythm!", "Fastest lap!"];
                    const punchlinesEs = ["¡Vuela bajo!", "¡Qué ritmo!", "¡Vuelta rápida!"];
                    const punchline = currentLang === 'en' ? punchlinesEn[Math.floor(Math.random() * punchlinesEn.length)] : punchlinesEs[Math.floor(Math.random() * punchlinesEs.length)];
                    text = currentLang === 'en' ? `${punchline} ${extraData.name} stops the clock at ${tStrEn}!` : `${punchline} ¡${extraData.name} para el crono en ${tStrEs}!`;
                } else if (type === 'lap' && extraData) {
                    const tStrEn = (extraData.time / 1000).toFixed(1);
                    const tStrEs = (extraData.time / 1000).toFixed(1).replace('.', ',');
                    text = currentLang === 'en' ? `Lap ${extraData.count}, ${tStrEn}` : `Vuelta ${extraData.count}, ${tStrEs}`;
                }

                if (text) {
                    lastCommentTime.current = now;
                    const utterance = new SpeechSynthesisUtterance(text);
                    utterance.rate = 1.2; 
                    utterance.pitch = 1.3; 
                    utterance.volume = 1.0;
                    
                    // 1. FORZAMOS AL NAVEGADOR A CAMBIAR SU MOTOR FONÉTICO
                    utterance.lang = currentLang === 'en' ? 'en-US' : 'es-ES';
                    
                    const voices = window.speechSynthesis.getVoices();
                    const targetLang = currentLang === 'en' ? 'en' : 'es';
                    
                    // 2. Filtramos todas las voces que hablen el idioma seleccionado (ej: en-US, en-GB)
                    const matchingVoices = voices.filter(v => v.lang.toLowerCase().startsWith(targetLang));
                    
                    if (matchingVoices.length > 0) {
                        // 3. Intentamos buscar una voz femenina premium
                        let selectedVoice = matchingVoices.find(v => 
                            v.name.includes('Google') || 
                            v.name.includes('Samantha') || 
                            v.name.includes('Zira') || 
                            v.name.includes('Monica') || 
                            v.name.includes('Paulina') ||
                            v.name.includes('Victoria') ||
                            v.name.includes('Fiona')
                        );
                        
                        // 4. Si no encuentra las "famosas", coge la primera que sea del idioma correcto. 
                        if (!selectedVoice) {
                            selectedVoice = matchingVoices[0];
                        }
                        utterance.voice = selectedVoice;
                    }
                    
                    window.speechSynthesis.cancel(); 
                    window.speechSynthesis.speak(utterance);
                }
            };

            // HOMO VIEWER STATE
            const [showHomoViewer, setShowHomoViewer] = useState(false);
            const handleModelAssign = (file, targetId) => {
                if(onCarAssetUpdate) onCarAssetUpdate(file, targetId);
            };
            const handleCarTransform = (targetId, transformData) => {
                if(onCarAssetUpdate) onCarAssetUpdate(null, targetId, transformData);
            };

            const toggleFullscreen = () => { 
                try {
                    if (!document.fullscreenElement) { 
                        const p = document.documentElement.requestFullscreen();
                        if (p) p.then(() => setIsFullscreen(true)).catch(() => showValidationError(lang === 'en' ? "FULLSCREEN BLOCKED BY PREVIEW" : "PANTALLA COMPLETA DENEGADA EN VISTA PREVIA"));
                    } else { 
                        if (document.exitFullscreen) { 
                            const p = document.exitFullscreen();
                            if (p) p.then(() => setIsFullscreen(false)).catch(console.warn);
                        } 
                    }
                } catch (err) {
                    showValidationError(lang === 'en' ? "FULLSCREEN NOT SUPPORTED" : "FULLSCREEN NO SOPORTADO");
                }
            };

            const getAllPieces = () => {
                if (!circuitData) return [];
                if (Array.isArray(circuitData.lanes) && Array.isArray(circuitData.lanes[0])) return circuitData.lanes.flat();
                if (Array.isArray(circuitData.pieces) && Array.isArray(circuitData.pieces[0])) return circuitData.pieces.flat();
                return circuitData.pieces || [];
            };
            const hasRotonda = getAllPieces().some(p => p.subtype === 'rotonda' || p.type === 'rotonda');

            const [laneChangePressed, setLaneChangePressed] = useState(false);
            const [pitPressed, setPitPressed] = useState(false);
            const [autoLaneChange, setAutoLaneChange] = useState(false);
            const [numCars, setNumCars] = useState(hasRotonda ? 1 : 2);

            // VARIABLES DE ESTADO Y REF PARA RALLY
            const rallyPathRef = useRef([]);
            const rallyDistancesRef = useRef([]);

            const laneChangePressedRef = useRef(false);
            const pitPressedRef = useRef(false);
            const autoLaneChangeRef = useRef(false);
            const numCarsRef = useRef(hasRotonda ? 1 : 2);
            const manualThrottleRef = useRef(0);
            const selectedCarIdRef = useRef(selectedCarId);
            const trackVoltageRef = useRef(trackVoltage);
            const sessionDataRef = useRef({});
            const carMeshesRef = useRef([]);

            // ... (useEffects de refs sin cambios) ...
            useEffect(() => { laneChangePressedRef.current = laneChangePressed; }, [laneChangePressed]);
            useEffect(() => { pitPressedRef.current = pitPressed; }, [pitPressed]);
            useEffect(() => { autoLaneChangeRef.current = autoLaneChange; }, [autoLaneChange]);
            useEffect(() => { numCarsRef.current = numCars; }, [numCars]);
            useEffect(() => { manualThrottleRef.current = manualThrottle; }, [manualThrottle]);
            useEffect(() => { selectedCarIdRef.current = selectedCarId; }, [selectedCarId]);
            useEffect(() => { trackVoltageRef.current = trackVoltage; }, [trackVoltage]);
            
            // LOGICA DRAG AND DROP TELEMETRIA
            const handleTelDown = (e) => {
                e.stopPropagation(); // Evita mover la cámara 3D
                const clientX = e.clientX || (e.touches && e.touches[0].clientX);
                const clientY = e.clientY || (e.touches && e.touches[0].clientY);
                if (clientX !== undefined) {
                    setIsDraggingTel(true);
                    dragOffset.current = { x: clientX - telemetryPos.x, y: clientY - telemetryPos.y };
                }
            };

            useEffect(() => {
                const onMove = (e) => {
                    if(!isDraggingTel) return;
                    const clientX = e.clientX || (e.touches && e.touches[0].clientX);
                    const clientY = e.clientY || (e.touches && e.touches[0].clientY);
                    if(clientX !== undefined && clientY !== undefined) {
                        setTelemetryPos({ x: clientX - dragOffset.current.x, y: clientY - dragOffset.current.y });
                    }
                };
                const onUp = () => setIsDraggingTel(false);
                
                if(isDraggingTel) {
                    window.addEventListener('mousemove', onMove);
                    window.addEventListener('mouseup', onUp);
                    window.addEventListener('touchmove', onMove, {passive: false});
                    window.addEventListener('touchend', onUp);
                }
                return () => {
                    window.removeEventListener('mousemove', onMove);
                    window.removeEventListener('mouseup', onUp);
                    window.removeEventListener('touchmove', onMove);
                    window.removeEventListener('touchend', onUp);
                };
            }, [isDraggingTel]);

            // LOGICA DRAG AND DROP MANDO FLOTANTE
            const handleCtrlDown = (e) => {
                e.stopPropagation();
                const clientX = e.clientX || (e.touches && e.touches[0].clientX);
                const clientY = e.clientY || (e.touches && e.touches[0].clientY);
                if (clientX !== undefined) {
                    setIsDraggingCtrl(true);
                    dragCtrlOffset.current = { x: clientX - ctrlPos.x, y: clientY - ctrlPos.y };
                }
            };

            useEffect(() => {
                const onMove = (e) => {
                    if(!isDraggingCtrl) return;

                            // 2. Función de Suavizado (Box Blur Adaptativo)
                            const applyBlur = (input, windowRadius) => {
                                const output = new Float32Array(numSamples);
                                for(let i = 0; i < numSamples; i++) {
                                    let sum = 0;
                                    let count = 0;
                                    for(let j = -windowRadius; j <= windowRadius; j++) {
                                        let idx = i + j;
                                        if (isClosedTrack) {
                                            // Matemáticas circulares para unir meta y salida en circuitos normales
                                            idx = (idx + numSamples) % numSamples;
                                            sum += input[idx];
                                            count++;
                                        } else {
                                            // Modo Rally: Clampear a los extremos para mantener el suelo firme en rotondas
                                            if (idx < 0) idx = 0;
                                            if (idx >= numSamples) idx = numSamples - 1;
                                            sum += input[idx];
                                            count++;
                                        }
                                    }
                                    output[i] = sum / count;
                                }
                                return output;
                            };

                            // FIX: Aumentamos el radio a 40cm y damos 3 pasadas para subidas MUY suaves (Rampa total de 80cm)
                            const blurRadius = Math.max(1, Math.floor(40.0 / TRACK_RESOLUTION)); 
                            
                            let smoothHeights = rawHeights;
                            // 3 pasadas = Curva tipo S (Gaussiana) perfecta sin vértices abruptos
                            smoothHeights = applyBlur(smoothHeights, blurRadius);
                            smoothHeights = applyBlur(smoothHeights, blurRadius);
                            smoothHeights = applyBlur(smoothHeights, blurRadius);

                            // 4. Función de obtención de altura (Interpolación lineal fina)
                            getElevationAtDist = (queryDist) => {
                                // FIX: Forzar rotondas a ser 100% planas (al nivel de su entrada) para evitar escalones y roturas de malla
                                const rPiece = pieceMapRef.current.find(p => p.subtype === 'rotonda' && queryDist >= p.distStart && queryDist <= p.distEnd + 0.5);
                                if (rPiece) {
                                    queryDist = rPiece.distStart;
                                }

                                if (isClosedTrack) {
                                    if (queryDist < 0) queryDist += totalTrackLength;
                                    queryDist = queryDist % totalTrackLength;
                                } else {
                                    if (queryDist < 0) queryDist = 0;
                                    if (queryDist >= totalTrackLength) queryDist = totalTrackLength - 0.001;
                                }
                                
                                const exactIndex = queryDist / TRACK_RESOLUTION;
                                let index0 = Math.floor(exactIndex);
                                let index1 = index0 + 1;

                                if (isClosedTrack) {
                                    index0 = index0 % numSamples;
                                    index1 = index1 % numSamples;
                                } else {
                                    if (index0 >= numSamples - 1) {
                                        index0 = numSamples - 1;
                                        index1 = numSamples - 1;
                                    }
                                }

                                const ratio = exactIndex - Math.floor(exactIndex);
                                return smoothHeights[index0] * (1 - ratio) + smoothHeights[index1] * ratio;
                            };
                        } else {
                            // --- MODO AUTOMÁTICO ORIGINAL (Detección Inteligente) ---
                            const centerPoints = [];
                            for(let i=0; i<stepCount; i++) {
                                let p1 = rails.lanes[0][i];
                                let p2 = rails.lanes[numLanes - 1][i];
                                if(!p1 && !p2) { centerPoints.push(null); continue; }
                                if(!p1) p1 = p2;
                                if(!p2) p2 = p1;
                                centerPoints.push(new THREE.Vector3().lerpVectors(p1, p2, 0.5));
                            }
                            
                            const intersections = [];

                            const getPieceAtIdx = (idx) => {
                                const d = vertexDistances[idx];
                                return pieceMapRef.current.find(p => d >= p.distStart && d < p.distEnd);
                            };

                            const flatZones = [];
                            pieceMapRef.current.forEach(p => {
