                                            mappedTh = Math.pow(rawTh, 0.05); // ULTRA: Todo o nada absoluto (On/Off)
                                            topSpeedMult = 2.50; // ULTRA: +150% extra de velocidad punta (Locura absoluta)
                                        }
                                        
                                        ts = ms * mappedTh * topSpeedMult; 
                                        if (rawTh < 0.05) isB = true; 
                                        if (pitPressedRef.current && activeButtonRef.current === 'DIGITAL') car.wantsToPit = true; 
                                    }
                                } else { 
                                    let ait = 1.0;
                                    // IA MÁS AGRESIVA: Apura más la frenada reduciendo el lookAhead
                                    const lookAhead = (ms || 100) * 0.12; 
                                    const nextDist = (car.distance + lookAhead) % (totalDist || 1);
                                    
                                    let cpAhead = cp;
                                    if (nextDist < cp.distStart || nextDist >= cp.distEnd) {
                                        cpAhead = pieceMapRef.current.find(p => nextDist >= p.distStart && nextDist < p.distEnd) || cp;
                                    }
                                    
                                    // IA MÁS RÁPIDA: Paso por curva agresivo y rectas a mayor velocidad
                                    if (cpAhead && cpAhead.type === 'curve') { 
                                        ait = 0.70 + (Math.min(1, (cpAhead.radius || 90) / 90.0) * 0.50); 
                                    } else if (cpAhead && cpAhead.subtype && cpAhead.subtype.includes('chicane')) {
                                        ait = 0.95; 
                                    } else {
                                        ait = 1.15; // Rectas al 115% para ganar tiempo
                                    }
                                    
                                    // Multiplicadores base de nivel IA mucho más altos
                                    const aiLevelMults = [0.80, 1.00, 1.25, 1.50, 1.90];
                                    const baseMult = aiLevelMults[aiLevelRef.current - 1] || 1.25;
                                    const aiSkill = baseMult + ((car.id * 17) % 10) * 0.02; 
                                    
                                    ts = (ms || 100) * ait * aiSkill; 

                                    isB = false; 
                                    
                                    if (activeButtonRef.current === 'DIGITAL' && !kronoSyncRef.current.active) {
                                        const pitThreshold = 50 - ((car.id % 4) * 8); 
                                        if (car.fuel <= pitThreshold) car.wantsToPit = true; 
                                    } else {
                                        car.wantsToPit = false; 
                                    }
                                }

                                if (car.currentLane === LANE_PIT) ts = Math.min(ts, ms * 0.35); 

                                const isDigitalMode = activeButtonRef.current === 'DIGITAL' && !kronoSyncRef.current.active;

                                if (carShouldMove && car.speed > 10 && isDigitalMode) { 
                                    car.fuel = Math.max(0, car.fuel - (car.speed/ms)*dt*2.5); 
                                    if (car.fuel < 10 && car.fuel > 9 && car.id === selectedCarIdRef.current) playCommentary('fuel_low'); 
                                }
                                
                                if (isDigitalMode && car.fuel <= 0) ts = Math.min(ts, ms * 0.2); 
                                
                                if (car.currentLane === LANE_PIT && car.wantsToPit && !car.hasRefueledThisLap && cp) {
                                    const isValidPitZone = !(cp.type && (cp.type.includes('entry') || cp.type.includes('exit'))) && !(cp.subtype && (cp.subtype.includes('entry') || cp.subtype.includes('exit'))); 
                                    if (isValidPitZone) {
                                        let distToCarAhead = Infinity;
                                        for(let j=0; j<physicsState.current.length; j++){
                                            const other = physicsState.current[j];
                                            if (other.id !== car.id && other.currentLane === LANE_PIT && !other.isDerailled && other.id <= numCarsRef.current) {
                                                 let d = other.distance - car.distance;
                                                 if (d < -totalDist/2) d += totalDist;
                                                 if (d > 0 && d < distToCarAhead) distToCarAhead = d;
                                            }
                                        }

                                        let shouldStop = false;
                                        if (distToCarAhead < 13.0) shouldStop = true;
                                        else {
                                            const nextIdx = (cp.index + 1) % pieceMapRef.current.length;
                                            const nextPiece = pieceMapRef.current[nextIdx];
                                            const nextIsExit = nextPiece.type === 'pit_exit' || nextPiece.subtype === 'pit_exit';
                                            const isFuelPiece = cp.subtype && (cp.subtype.includes('pit_parallel') || cp.subtype.includes('digital_x'));
                                            if (isFuelPiece || nextIsExit) {
                                                const pl = cp.distEnd - cp.distStart;
                                                const distIn = car.distance - cp.distStart;
                                                if (distIn > pl * 0.4) shouldStop = true;
                                            }
                                        }

                                        if (shouldStop && !car.isRefueling) {
                                            ts = 0; 
                                            isB = true; 
                                            if (car.speed < 15) { 
                                                car.speed = 0;
                                                car.isRefueling = true;
                                                car.refuelStartTime = nowTime;
                                                playCommentary('refuel_krono');
                                                // playRaceSound('refuel');
                                            }
                                        }
                                    }
                                }

                                if (car.isRefueling) {
                                    car.speed = 0; ts = 0; car.fuel = Math.min(100, car.fuel + (dt * 35));
                                    if (nowTime - car.refuelStartTime >= 3000) { car.isRefueling = false; car.hasRefueledThisLap = true; car.wantsToPit = false; } 
                                    else { if(pg) pg.position.y = (car.worldPos.y || 0.2) + Math.sin(nowTime * 0.05) * 0.02; return; }
                                }

                                if (cp && (cp.type === 'pit_exit' || cp.subtype === 'pit_exit')) { car.hasRefueledThisLap = false; if (car.id === selectedCarIdRef.current) car.wantsToPit = false; }
                                if (car.isDerailled) { 
                                    if (!car.hasCommentedCrash && raceStateRef.current === 'racing') { playCommentary('crash'); car.hasCommentedCrash = true; } 
                                    car.velocity.y -= 9.8 * dt * 5; 
                                    _dir.copy(car.velocity).multiplyScalar(dt);
                                    car.worldPos.add(_dir); 
                                    if (car.worldPos.y < 0.5) { car.worldPos.y = 0.5; car.velocity.y *= -0.5; car.velocity.x *= 0.8; car.velocity.z *= 0.8; } 
                                    pg.position.copy(car.worldPos); 
                                    pg.rotation.x += car.velocity.z*dt*0.1; 
                                    pg.rotation.z -= car.velocity.x*dt*0.1; 
                                    
                                    if (nowTime > car.recoverTime) { 
                                        car.isDerailled = false; 
                                        car.hasCommentedCrash = false; 
                                        car.speed = 80; 
                                        car.invulnerableUntil = nowTime + 5000; 
                                        pg.rotation.set(0,0,0); 
                                        pg.position.y = 0.2; 
                                        if (car.id <= numCarsRef.current) vg.visible = true; 
                                    } 
                                    return; 
                                }
                                let shouldBeVisible = true;
                                if (nowTime < car.invulnerableUntil) {
                                    shouldBeVisible = Math.floor(nowTime / 100) % 2 === 0; 
                                }
                                if (car.id === selectedCarIdRef.current && cameraModeRef.current === 'pilot') {
                                    shouldBeVisible = false;
                                }
                                vg.visible = shouldBeVisible;

                                const cas = carAssetsRef.current[car.id]; if (vg && cas) { 
                                    if (cas.rotation) { 
                                        vg.rotation.x = (cas.rotation[0] || 0)*Math.PI/180; 
                                        vg.rotation.y = (cas.rotation[1] !== undefined ? cas.rotation[1] : 180)*Math.PI/180; 
                                        vg.rotation.z = (cas.rotation[2] || 0)*Math.PI/180; 
                                    } 
                                    if (vg.userData.currentGLB) {
                                        if (cas.yOffset !== undefined) vg.position.y = parseFloat(cas.yOffset);
                                        else vg.position.y = 0;
                                    } 
                                }
                                
                                const oldDist = car.distance;
                                const moveDir = isReversedRef.current ? -1 : 1;

                                if (carShouldMove) { 
                                    // APLICAR "PUNCH" EXTRA SEGÚN EL MANDO (Como en los mandos electrónicos reales)
                                    let currentAcc = acc;
                                    if (isHuman && throttleProfileRef.current === 4) currentAcc *= 10.0; // ULTRA: Misil balístico instantáneo
                                    else if (isHuman && throttleProfileRef.current === 3) currentAcc *= 4.0; // PRO: Patada muy fuerte
                                    else if (isHuman && throttleProfileRef.current === 2) currentAcc *= 1.8; // STD: Buena respuesta dinámica
                                    else if (isHuman && throttleProfileRef.current === 1) currentAcc *= 0.9; // ECO: Tracción suave y dócil

                                    if (car.speed < ts) {
                                        car.speed += currentAcc * dt;
                                        if (car.speed > ts) car.speed = ts;
                                    } else if (car.speed > ts) {
                                        car.speed -= currentAcc * dt * (isB ? 3.0 : 1.2);
                                        if (car.speed < ts) car.speed = ts;
                                    }
                                    if (car.speed < 0) car.speed = 0; 
                                }

                                const rawNewDist = oldDist + (carShouldMove ? car.speed * dt * moveDir : 0);
                                
                                // --- GESTIÓN DE POSICIÓN ---
                                if (hasRotonda && rallyPathRef.current.length > 0 && rallyDistancesRef.current.length > 0) {
                                    const rallyTotalLen = rallyDistancesRef.current[rallyDistancesRef.current.length - 1]; 
                                    let crossedFinish = false;
                                    
                                    if (carShouldMove) {
                                        if (moveDir === 1) {
                                            if (rawNewDist >= rallyTotalLen) {
                                                crossedFinish = true;
                                                car.distance = rawNewDist - rallyTotalLen;
                                            } else { car.distance = rawNewDist; }
                                        } else {
                                            if (rawNewDist < 0) {
                                                crossedFinish = true;
                                                car.distance = rawNewDist + rallyTotalLen;
                                            } else { car.distance = rawNewDist; }
                                        }
                                    }

                                    if (crossedFinish && carShouldMove) {
                                        if (!car.crossedStartLine) { 
                                            car.crossedStartLine = true; 
                                            car.lapStartTime = nowTime;
                                        } else {
                                            const registerLap = () => { 
                                                if (car.lapStartTime > 0) { 
                                                    const lapTime = nowTime - car.lapStartTime; 
                                                    car.lastLapTime = lapTime; 
                                                    let isBest = false;
                                                    if (lapTime < car.bestLapTime) {
                                                        car.bestLapTime = lapTime;
                                                        isBest = true;
                                                    } 
                                                    car.totalLapTime += lapTime; 
                                                    car.completedLaps++; 
                                                    
                                                    const currentSetup = carSetupsRef.current[car.id];
                                                    
                                                    // LOCUTORA CANTA VUELTAS Y TIEMPOS (Coche seleccionado o si es la vuelta más rápida de la sesión)
                                                    // SILENCIADA si Krono está activo porque ya canta instantáneamente desde la cámara
                                                    if (!kronoSyncRef.current.active) {
                                                        if (isBest && car.completedLaps > 1) {
                                                            playCommentary('fastest', { name: currentSetup?.name || `Car ${car.id}`, time: lapTime });
                                                        } else if (car.id === selectedCarIdRef.current) {
                                                            playCommentary('lap', { count: car.completedLaps, time: lapTime });
                                                        }
                                                    }

                                                    if (currentSetup) {
                                                        const lapData = { lap: car.completedLaps, time: lapTime, motor: currentSetup.motorName, tire: currentSetup.tireName, gear: `${currentSetup.gearTeeth}/${currentSetup.pinionTeeth}`, voltage: trackVoltageRef.current, weight: currentSetup.weight };
                                                        if (!sessionDataRef.current[car.id]) sessionDataRef.current[car.id] = [];
                                                        sessionDataRef.current[car.id].push(lapData);
                                                    }
                                                } 
                                                car.lapStartTime = nowTime; 
                                            };
                                            
                                            // AÑADIDO: Si Krono está activo para este coche, no registramos la vuelta internamente
                                            const skipInternalLap = kronoSyncRef.current.active && car.id === selectedCarIdRef.current;
                                            
                                            if (!skipInternalLap) {
                                                // AÑADIDO: 'grid' para contar tiempos en modo preparación (calentamiento)
                                                if (raceStateRef.current === 'idle' || raceStateRef.current === 'grid') { 
                                                    registerLap(); 
                                                    if (raceStateRef.current === 'idle') car.laps++; 
                                                } else if (raceStateRef.current === 'racing') { 
                                                    registerLap(); car.laps--; 
                                                    if (car.laps <= 0) { 
                                                        raceStateRef.current = 'finished'; setRaceState('finished');
