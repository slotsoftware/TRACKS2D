                                const isSpecial = [ 'crossing', 'digital_x', 'change_right', 'change_left', 'pit_parallel_double_x', 'digital_console', 'connection', 'analog_connect', 'starting_grid', 'chicane_entry', 'chicane_exit', 'rotonda' ].includes(p.subtype) || ['pit_entry', 'pit_exit'].includes(p.type);
                                if (isSpecial) {
                                    // Ampliamos el "escudo" de protección +15cm antes y después de la pieza especial
                                    flatZones.push({ start: p.distStart - 15.0, end: p.distEnd + 15.0 });
                                }
                            });

                            const getRoom = (dist) => {
                                let minRoom = Infinity;
                                flatZones.forEach(fz => {
                                    let distToStart = dist - fz.start;
                                    if (distToStart < -totalTrackLength/2) distToStart += totalTrackLength;
                                    if (distToStart > totalTrackLength/2) distToStart -= totalTrackLength;
                                    
                                    let distToEnd = dist - fz.end;
                                    if (distToEnd < -totalTrackLength/2) distToEnd += totalTrackLength;
                                    if (distToEnd > totalTrackLength/2) distToEnd -= totalTrackLength;

                                    let fzLength = fz.end - fz.start;
                                    if (distToStart >= 0 && distToStart <= fzLength) {
                                        minRoom = 0;
                                    } else {
                                        minRoom = Math.min(minRoom, Math.abs(distToStart), Math.abs(distToEnd));
                                    }
                                });
                                return minRoom;
                            };

                            // FIX: Añadir un vector direccional a los puntos para evitar chocar pistas paralelas
                            const testPoints = [];
                            for(let i=0; i<stepCount; i+=2) { 
                                if (centerPoints[i] && centerPoints[i+1]) {
                                    const piece = getPieceAtIdx(i);
                                    const dx = centerPoints[i+1].x - centerPoints[i].x;
                                    const dz = centerPoints[i+1].z - centerPoints[i].z;
                                    const len = Math.hypot(dx, dz);
                                    if (len > 0) {
                                        testPoints.push({ x: centerPoints[i].x, z: centerPoints[i].z, dist: vertexDistances[i], idx: i, type: 'normal', piece, dx: dx/len, dz: dz/len });
                                    }
                                }
                            }
                            
                            rails.changes.filter(c => c.isRotonda).forEach(rot => {
                                const piece = getPieceAtIdx(rot.refIdx);
                                const dStart = piece ? piece.distStart : vertexDistances[rot.refIdx];
                                const dEnd = piece ? piece.distEnd : (vertexDistances[rot.refIdx + 1] || dStart + 100);
                                
                                for(let pi=0; pi < rot.points.length - 1; pi+=2) {
                                    const pt = rot.points[pi];
                                    const ptNext = rot.points[pi+1];
                                    const dx = ptNext.x - pt.x;
                                    const dz = ptNext.z - pt.z;
                                    const len = Math.hypot(dx, dz);
                                    if (len > 0) {
                                        const approxDist = dStart + ((dEnd - dStart) * (pi / rot.points.length));
                                        testPoints.push({ x: pt.x, z: pt.z, dist: approxDist, idx: rot.refIdx, type: 'rotonda', piece, dx: dx/len, dz: dz/len });
                                    }
                                }
                            });

                            for(let i=0; i<testPoints.length; i++) {
                                const tp1 = testPoints[i];
                                const isSpecial1 = tp1.piece && (['crossing', 'digital_x', 'change_right', 'change_left', 'pit_parallel_double_x', 'chicane_entry', 'chicane_exit', 'analog_connect', 'connection', 'digital_console', 'starting_grid'].includes(tp1.piece.subtype) || ['pit_entry', 'pit_exit'].includes(tp1.piece.type));
                                
                                for(let j=i+1; j<testPoints.length; j++) {
                                    const tp2 = testPoints[j];
                                    const isSpecial2 = tp2.piece && (['crossing', 'digital_x', 'change_right', 'change_left', 'pit_parallel_double_x', 'chicane_entry', 'chicane_exit', 'analog_connect', 'connection', 'digital_console', 'starting_grid'].includes(tp2.piece.subtype) || ['pit_entry', 'pit_exit'].includes(tp2.piece.type));
                                    
                                    if (tp1.piece && tp2.piece) {
                                        const idxDiff = Math.abs(tp1.piece.index - tp2.piece.index);
                                        const maxIdx = pieceMapRef.current.length;
                                        if (idxDiff <= 1 || idxDiff >= maxIdx - 1) continue; 
                                        
                                        if (tp1.piece.subtype === 'rotonda' || tp2.piece.subtype === 'rotonda') {
                                            if (idxDiff <= 8 || idxDiff >= maxIdx - 8) continue;
                                        }
                                    }

                                    let travelDist = Math.abs(tp2.dist - tp1.dist);
                                    if (travelDist > totalTrackLength / 2) travelDist = totalTrackLength - travelDist; 

                                    if(travelDist > SEARCH_GAP) {
                                        const dist2D = Math.hypot(tp1.x - tp2.x, tp1.z - tp2.z);
                                        
                                        if(dist2D < 18.0) { // Aumentado para asegurar que atrapa paralelas ligeramente desplazadas
                                            const dot = (tp1.dx * tp2.dx) + (tp1.dz * tp2.dz);
                                            const isParallel = Math.abs(dot) > 0.85;
                                            
                                            // EXCEPCIÓN: Detectar de forma directa si van superpuestas/paralelas
                                            const isDoubleLongStraight = isParallel; 

                                            const midX = (tp1.x + tp2.x) / 2;
                                            const midZ = (tp1.z + tp2.z) / 2;
                                            
                                            const existingCross = intersections.find(c => {
                                                const d = (midX - c.midX)**2 + (midZ - c.midZ)**2;
                                                return d < (INTERSECTION_MERGE_RADIUS * INTERSECTION_MERGE_RADIUS); 
                                            });

                                            if(!existingCross) {
                                                let goesUpIdx = tp2.idx;
                                                if (tp1.type === 'rotonda' && tp2.type !== 'rotonda') goesUpIdx = tp2.idx;
                                                else if (tp2.type === 'rotonda' && tp1.type !== 'rotonda') goesUpIdx = tp1.idx;
                                                else if (isSpecial1 && !isSpecial2) goesUpIdx = tp2.idx;
                                                else if (isSpecial2 && !isSpecial1) goesUpIdx = tp1.idx;
                                                else {
                                                    // Topología Lógica
                                                    const type1 = tp1.piece?.type || 'straight';
                                                    const type2 = tp2.piece?.type || 'straight';
                                                    
                                                    if (type1 === 'straight' && type2 === 'curve') goesUpIdx = tp1.idx;
                                                    else if (type1 === 'curve' && type2 === 'straight') goesUpIdx = tp2.idx;
                                                    else {
                                                        if (type1 === 'curve' && type2 === 'curve') {
                                                            const r1 = tp1.piece?.radius || 0;
                                                            const r2 = tp2.piece?.radius || 0;
                                                            if (r1 > r2) goesUpIdx = tp1.idx;
                                                            else if (r2 > r1) goesUpIdx = tp2.idx;
                                                            else {
                                                                const room1 = getRoom(tp1.dist);
                                                                const room2 = getRoom(tp2.dist);
                                                                goesUpIdx = room1 >= room2 ? tp1.idx : tp2.idx;
                                                            }
                                                        } else {
                                                            const room1 = getRoom(tp1.dist);
                                                            const room2 = getRoom(tp2.dist);
                                                            goesUpIdx = room1 >= room2 ? tp1.idx : tp2.idx;
                                                        }
                                                    }
                                                }
                                                
                                                const centerDist = (goesUpIdx === tp1.idx) ? tp1.dist : tp2.dist;
                                                intersections.push({ centerDist, midX, midZ, isDoubleLongStraight, isParallel });
                                            } else {
                                                if (isDoubleLongStraight) {
                                                    existingCross.isDoubleLongStraight = true;
                                                    if (isParallel) existingCross.isParallel = true;
                                                }
                                            }
                                        }
                                    }
                                }
                            }

                            trackIntersections = intersections; // Guardamos para que el generador de muros sepa dónde están las excepciones

                            getElevationAtDist = (queryDist) => {
                                // FIX: Forzar rotondas a ser 100% planas (al nivel de su entrada) para evitar escalones y roturas de malla
                                const rPiece = pieceMapRef.current.find(p => p.subtype === 'rotonda' && queryDist >= p.distStart && queryDist <= p.distEnd + 0.5);
                                if (rPiece) {
                                    queryDist = rPiece.distStart;
                                }

                                let maxH = 0;
                                intersections.forEach(cross => {
                                    let distToCenter = Math.abs(queryDist - cross.centerDist);
                                    if (distToCenter > totalTrackLength / 2) distToCenter = totalTrackLength - distToCenter;
                                    
                                    // APLICAR LA EXCEPCIÓN: Puente más alto y cima plana extendida si están solapadas
                                    const targetHeight = cross.isDoubleLongStraight ? BRIDGE_TOP_H * 1.85 : BRIDGE_TOP_H;
                                    const targetRamp = cross.isDoubleLongStraight ? RAMP_LENGTH * 1.25 : RAMP_LENGTH;
                                    const targetFlat = (cross.isDoubleLongStraight && cross.isParallel) ? FLAT_TOP_LEN * 4.5 : FLAT_TOP_LEN;

                                    if (distToCenter < (targetFlat/2 + targetRamp)) {
                                        let h = 0;
                                        if (distToCenter <= targetFlat / 2) {
                                            h = targetHeight;
                                        } else {
                                            const rampPos = (distToCenter - targetFlat/2) / targetRamp;
                                            const smoothFactor = (rampPos * rampPos * (3 - 2 * rampPos)); 
                                            h = targetHeight * (1 - smoothFactor);
                                        }
                                        maxH = Math.max(maxH, h);
                                    }
                                });
                                
                                let flatMultiplier = 1.0;
                                flatZones.forEach(fz => {
                                    let distToStart = queryDist - fz.start;
                                    if (distToStart < -totalTrackLength/2) distToStart += totalTrackLength;
                                    if (distToStart > totalTrackLength/2) distToStart -= totalTrackLength;
                                    
                                    let distToEnd = queryDist - fz.end;
                                    if (distToEnd < -totalTrackLength/2) distToEnd += totalTrackLength;
                                    if (distToEnd > totalTrackLength/2) distToEnd -= totalTrackLength;

                                    let fzLength = fz.end - fz.start;
                                    let isInZone = distToStart >= 0 && distToStart <= fzLength;
                                    
                                    if (isInZone) {
                                        flatMultiplier = 0.0;
                                    } else {
                                        let distToZone = Math.min(Math.abs(distToStart), Math.abs(distToEnd));
                                        if (distToZone < BLEND_DIST) {
                                            let m = distToZone / BLEND_DIST;
                                            m = m * m * (3 - 2 * m); 
                                            flatMultiplier = Math.min(flatMultiplier, m);
                                        }
                                    }
                                });
                                
                                return maxH * flatMultiplier;
                            };
                        }

                        // APLICAR LAS ELEVACIONES OBTENIDAS
                        for(let i=0; i<stepCount; i++) {
                            const y = getElevationAtDist(vertexDistances[i]);
                            if(Math.abs(y) > 0.001) {
                                for(let j=0; j<numLanes; j++) {
                                    if(rails.lanes[j][i]) rails.lanes[j][i].y += y;
                                }
                                if(rails.pit[i]) rails.pit[i].y += y;
                            }
                        }
                        
                        for (let s = 0; s < aspVertCount; s++) {
                            const y = getElevationAtDist(asphaltDists[s]);
                            if (Math.abs(y) > 0.001) {
                                asphaltVerts[s * 6 + 1] += y;
                                asphaltVerts[s * 6 + 4] += y;
                            }
                        }
                        
                        rails.changes.forEach(changeItem => {
                            const dStart = vertexDistances[changeItem.refIdx] || 0;
                            
                            if (changeItem.isRotonda) {
                                // Reparación Crítica: Elevar también la geometría interior de la Rotonda
                                const rPiece = pieceMapRef.current.find(p => p.subtype === 'rotonda' && Math.abs(p.distStart - dStart) < 5.0);
                                const rLen = rPiece ? (rPiece.distEnd - rPiece.distStart) : 50.0;
                                
                                changeItem.points.forEach((pt, pi) => {
                                     const fraction = pi / (changeItem.points.length - 1 || 1);
                                     let ptDist = dStart + (rLen * fraction);
                                     const y = getElevationAtDist(ptDist);
                                     if (Math.abs(y) > 0.001) pt.y += y;
                                });
                            } else {
                                const dEnd = vertexDistances[changeItem.refIdx + changeItem.count] || (dStart + 50);
                                changeItem.points.forEach((pt, pi) => {
                                     const fraction = pi / (changeItem.points.length - 1 || 1);
                                     let ptDist = dStart + (dEnd - dStart) * fraction;
                                     const y = getElevationAtDist(ptDist);
                                     if (Math.abs(y) > 0.001) pt.y += y;
                                });
                            }
                        });
                    };
                    
                    applyBridgeElevations();

                    // --- IA REPARADORA: FILTRO LAPLACIANO DE SUAVIZADO MILIMÉTRICO ---
                    // Pre-calcula la suavidad absoluta durante la carga para liberar la CPU durante la carrera.
                    let passes = 0;
                    if (bridgeMode === 'Medio') passes = 8; // Suavidad matemática profunda
                    else if (bridgeMode === 'Básico') passes = 5; // Suave sin trompicones
                    
                    if (passes > 0) {
                        for (let p = 0; p < passes; p++) {
                            // 1. Suavizar Splines (Raíles)
                            const smoothSpline = (arr) => {
                                const temp = arr.map(v => v ? v.y : null);
                                for (let i = 1; i < arr.length - 1; i++) {
                                    if (arr[i] && arr[i-1] && arr[i+1]) {
                                        // Suavizado ponderado para aniquilar baches
                                        arr[i].y = (temp[i-1] + temp[i] * 2 + temp[i+1]) / 4.0;
                                    }
                                }
                            };
                            for(let j=0; j<numLanes; j++) smoothSpline(rails.lanes[j]);
                            smoothSpline(rails.pit);
                            
                            // 2. Suavizar Mesh (Asfalto)
                            const tempAsp = new Float32Array(asphaltVerts.length);
                            for(let i=0; i<asphaltVerts.length; i++) tempAsp[i] = asphaltVerts[i];
                            
                            for (let i = 6; i < aspVertCount * 6 - 6; i += 6) {
                                // i+1 = Altura (Y) del vértice izquierdo, i+4 = Altura (Y) del vértice derecho
                                asphaltVerts[i+1] = (tempAsp[i-5] + tempAsp[i+1]*2 + tempAsp[i+7]) / 4.0; 
                                asphaltVerts[i+4] = (tempAsp[i-2] + tempAsp[i+4]*2 + tempAsp[i+10]) / 4.0; 
                            }
                        }
                    }

                    // SINCRONIZAR LAS ALTURAS SUAVIZADAS A LAS GEOMETRÍAS FRAGMENTADAS POR MARCA
                    for (let s = 0; s < aspVertCount; s++) {
                        const ref = asphaltVertRefs[s];
                        ref.geoData.verts[ref.index + 1] = asphaltVerts[s * 6 + 1];
                        ref.geoData.verts[ref.index + 4] = asphaltVerts[s * 6 + 4];
                    }

                    // --- AUTO-GENERACIÓN DE MUROS REALISTAS Y TÚNELES (SUSTITUYE A LOS PILARES) ---
                    const wallVerts = []; const wallIndices = []; const wallUVs = [];
                    const bottomVerts = []; const bottomIndices = []; const bottomUVs = [];
                    
                    let depthOffset = 1.2; // Grosor de la pista superior (Reducido para que no parezca un tocho)
                    const floorY = 0.0; // Nivel base del suelo de la maqueta
                    
                    // IA: Túneles clásicos y rectos con arco normal
                    const getTunnelBottomY = (x, z, currentY, currentDist) => {
                        let bottomY = floorY; 
                        
                        if (currentY > 2.0) {
                            for (let s_bottom = 0; s_bottom < aspVertCount; s_bottom += 1) { 
                                if (Math.abs(asphaltDists[s_bottom] - currentDist) > 40.0) {
                                    const i = s_bottom * 6;
                                    const cx = (asphaltVerts[i] + asphaltVerts[i + 3]) / 2;
                                    const cz = (asphaltVerts[i + 2] + asphaltVerts[i + 5]) / 2;
                                    const cy = (asphaltVerts[i + 1] + asphaltVerts[i + 4]) / 2;
                                    
                                    if (cy < currentY - 3.0) {
                                        const d2 = (cx - x)**2 + (cz - z)**2;
                                        
                                        // Reducido de 14.0 a 10.5 para que el arco sea estrecho y ajustado a la pista
                                        const checkRadius = 10.5; 

                                        if (d2 < checkRadius**2) {
                                            const dist2d = Math.sqrt(d2);
                                            
                                            // Arco clásico semicircular (puente normal)
                                            let arch = Math.sqrt(1 - Math.pow(dist2d / checkRadius, 2));
                                            
                                            const maxClearance = (currentY - depthOffset) - cy;
                                            let localH = cy + (maxClearance * arch);
                                            
                                            // Hueco de seguridad ajustado al nuevo tamaño más pequeño
                                            if (dist2d < 7.5) {
                                                const minPassHeight = cy + 6.0; 
                                                if (localH < minPassHeight) localH = Math.min(minPassHeight, currentY - depthOffset);
                                            }
                                            
                                            if (localH > bottomY) bottomY = localH;
                                        }
                                    }
                                }
                            }
                        }
                        return Math.min(bottomY, currentY - depthOffset);
                    };
                    
                    // 1. Pre-calcular las alturas de corte de los muros
                    const rawBottomL = new Float32Array(aspVertCount);
                    const rawBottomR = new Float32Array(aspVertCount);

                    for (let s = 0; s < aspVertCount; s++) {
                        const xL = asphaltVerts[s * 6], yL = asphaltVerts[s * 6 + 1], zL = asphaltVerts[s * 6 + 2];
                        const xR = asphaltVerts[s * 6 + 3], yR = asphaltVerts[s * 6 + 4], zR = asphaltVerts[s * 6 + 5];
                        const dist = asphaltDists[s];
                        
                        rawBottomL[s] = Math.max(floorY, yL > 0.5 ? getTunnelBottomY(xL, zL, yL, dist) : floorY);
                        rawBottomR[s] = Math.max(floorY, yR > 0.5 ? getTunnelBottomY(xR, zR, yR, dist) : floorY);
                    }

                    // 2. Aplicar suavizado ligero para evitar escalones, sin derretir la forma del arco
                    const smoothBottomL = new Float32Array(aspVertCount);
                    const smoothBottomR = new Float32Array(aspVertCount);
                    const tunnelBlurRadius = 2; // Reducido drásticamente para mantener la forma clásica
                    
                    for (let i = 0; i < aspVertCount; i++) {
                        let sumL = 0, sumR = 0, count = 0;
                        let peakL = rawBottomL[i], peakR = rawBottomR[i]; 
                        
                        for (let j = -tunnelBlurRadius; j <= tunnelBlurRadius; j++) {
                            let idx = i + j;
                            if (idx >= 0 && idx < aspVertCount) {
                                if (Math.abs(asphaltDists[idx] - asphaltDists[i]) < 15.0) {
                                    sumL += rawBottomL[idx];
                                    sumR += rawBottomR[idx];
                                    if (rawBottomL[idx] > peakL) peakL = rawBottomL[idx];
                                    if (rawBottomR[idx] > peakR) peakR = rawBottomR[idx];
                                    count++;
                                }
                            }
                        }
                        
                        const avgL = count > 0 ? sumL / count : rawBottomL[i];
                        const avgR = count > 0 ? sumR / count : rawBottomR[i];
                        
                        // Priorizamos el pico para que el arco mantenga su altura y no se hunda
                        smoothBottomL[i] = (avgL * 0.2) + (peakL * 0.8);
                        smoothBottomR[i] = (avgR * 0.2) + (peakR * 0.8);
                        
                        // Tope de seguridad final
                        smoothBottomL[i] = Math.min(smoothBottomL[i], asphaltVerts[i * 6 + 1] - depthOffset);
                        smoothBottomR[i] = Math.min(smoothBottomR[i], asphaltVerts[i * 6 + 4] - depthOffset);
                    }

                    // 3. Generar la geometría final de los muros 100% suavizados
                    for (let s = 0; s < aspVertCount; s++) {
                        const xL = asphaltVerts[s * 6], yL = asphaltVerts[s * 6 + 1], zL = asphaltVerts[s * 6 + 2];
                        const xR = asphaltVerts[s * 6 + 3], yR = asphaltVerts[s * 6 + 4], zR = asphaltVerts[s * 6 + 5];
                        const dist = asphaltDists[s];
                        
                        let bottomL = smoothBottomL[s];
                        let bottomR = smoothBottomR[s];
                        
                        const uvScaleX = 0.025; // Reducido drásticamente (Cubre más distancia horizontal)
                        const uvScaleY = 0.08;  // Reducido (Estira las piedras verticalmente para darles tamaño real)

                        // Pared Izquierda (Anclada desde la cima con V=1.0)
                        wallVerts.push(xL, yL, zL); wallVerts.push(xL, bottomL, zL); 
                        wallUVs.push(dist * uvScaleX, 1.0); wallUVs.push(dist * uvScaleX, 1.0 - (yL - bottomL) * uvScaleY);
                        
                        // Pared Derecha (Anclada desde la cima con V=1.0)
                        wallVerts.push(xR, yR, zR); wallVerts.push(xR, bottomR, zR);
                        wallUVs.push(dist * uvScaleX, 1.0); wallUVs.push(dist * uvScaleX, 1.0 - (yR - bottomR) * uvScaleY);
                        
                        // Techo del túnel (Cara inferior)
                        bottomVerts.push(xL, bottomL, zL); bottomVerts.push(xR, bottomR, zR);
                        bottomUVs.push(0, dist * 0.1); bottomUVs.push(1, dist * 0.1);
                        
                        if (s > 0) {
                            const cur = s * 4, prev = (s - 1) * 4;
                            wallIndices.push(prev, prev + 1, cur); wallIndices.push(prev + 1, cur + 1, cur);
                            wallIndices.push(prev + 2, cur + 2, prev + 3); wallIndices.push(prev + 3, cur + 2, cur + 3);
                            
                            const curB = s * 2, prevB = (s - 1) * 2;
                            bottomIndices.push(prevB, curB, prevB + 1);
                            bottomIndices.push(prevB + 1, curB, curB + 1);
                        }
                    }
                    
                    const wallGeom = new THREE.BufferGeometry();
                    wallGeom.setAttribute('position', new THREE.Float32BufferAttribute(wallVerts, 3));
                    wallGeom.setAttribute('uv', new THREE.Float32BufferAttribute(wallUVs, 2));
                    wallGeom.setIndex(wallIndices);
                    wallGeom.computeVertexNormals();
                    
                    const bottomGeom = new THREE.BufferGeometry();
                    bottomGeom.setAttribute('position', new THREE.Float32BufferAttribute(bottomVerts, 3));
                    bottomGeom.setAttribute('uv', new THREE.Float32BufferAttribute(bottomUVs, 2));
                    bottomGeom.setIndex(bottomIndices);
                    bottomGeom.computeVertexNormals();
                    
                    const stoneTex = createStoneWallTexture();
                    const structMat = new THREE.MeshStandardMaterial({ 
                        map: stoneTex,
                        roughness: 0.95, 
                        metalness: 0.1, 
                        side: THREE.DoubleSide 
                    });
                    
                    const wallMesh = new THREE.Mesh(wallGeom, structMat);
                    wallMesh.receiveShadow = true; wallMesh.castShadow = true;
                    trackGroup.add(wallMesh);
                    
                    const bottomMesh = new THREE.Mesh(bottomGeom, structMat);
                    bottomMesh.receiveShadow = true; bottomMesh.castShadow = true;
                    trackGroup.add(bottomMesh);

                    // -----------------------------------------------------------------

                    let finalRallyPath = []; let rallyDists = [0]; let currentRallyDist = 0;
                    if (hasRotonda) {
                        const rotondas = rails.changes.filter(c => c.isRotonda).sort((a, b) => a.refIdx - b.refIdx);
                        let pathPoints = [];
                        let traversedRotondas = new Set();

                        // 1. Recorrido de IDA (Carril derecho)
                        for(let i=0; i<rails.lanes[0].length; i++) {
                            if(rails.lanes[0][i]) {
                                pathPoints.push(rails.lanes[0][i].clone());
                            } else {
                                const rot = rotondas.find(r => Math.abs(r.refIdx - i) <= 2);
                                if(rot && !traversedRotondas.has(rot.refIdx)) {
                                    if (pathPoints.length > 0) {
                                        const lastPt = pathPoints[pathPoints.length - 1];
                                        const rotEntry = rot.points[0];
                                        // Validar que conectamos con la entrada de forma natural
                                        if (lastPt.distanceTo(rotEntry) < 30.0) {
                                            pathPoints.push(...rot.points.map(p => p.clone()));
                                            traversedRotondas.add(rot.refIdx);
                                        }
                                    }
                                }
                            }
                        }
                        
                        // 2. Recorrido de VUELTA (Carril izquierdo, en reversa)
                        for(let i=rails.lanes[numLanes-1].length - 1; i>=0; i--) {
                            if(rails.lanes[numLanes-1][i]) {
                                pathPoints.push(rails.lanes[numLanes-1][i].clone());
                            } else {
                                const rot = rotondas.find(r => Math.abs(r.refIdx - i) <= 2);
                                if(rot && !traversedRotondas.has(rot.refIdx)) {
                                    if (pathPoints.length > 0) {
                                        const lastPt = pathPoints[pathPoints.length - 1];
                                        const rotExit = rot.points[rot.points.length - 1];
                                        // Validar que enganchamos con la salida de la rotonda
                                        if (lastPt.distanceTo(rotExit) < 30.0) {
                                            pathPoints.push(...[...rot.points].reverse().map(p => p.clone()));
                                            traversedRotondas.add(rot.refIdx);
                                        }
                                    }
                                }
                            }
                        }

                        const cleanPath = (points) => { 
                            if (points.length < 2) return points; 
                            const cleaned = [points[0]]; 
                            for (let i = 1; i < points.length; i++) { 
                                if (points[i].distanceTo(cleaned[cleaned.length - 1]) > 0.05) { 
                                    cleaned.push(points[i].clone()); 
                                } 
                            } 
                            return cleaned; 
                        }; 
                        finalRallyPath = cleanPath(pathPoints);

                        // Cierre de seguridad para formar el bucle infinito
                        if (finalRallyPath.length > 0) { 
                            const first = finalRallyPath[0]; 
                            const last = finalRallyPath[finalRallyPath.length - 1]; 
                            if (first.distanceTo(last) > 0.5 && first.distanceTo(last) < 100.0) { 
                                finalRallyPath.push(new THREE.Vector3().lerpVectors(last, first, 0.33)); 
                                finalRallyPath.push(new THREE.Vector3().lerpVectors(last, first, 0.66)); 
                                finalRallyPath.push(first.clone()); 
                            } 
                        }

                        // Pulido de uniones mediante promediado tensorial (5 pases para no deformar las rectas)
                        if (finalRallyPath.length > 10) { 
                            for (let iter = 0; iter < 5; iter++) { 
                                const smoothed = []; 
                                const len = finalRallyPath.length; 
                                for (let i = 0; i < len; i++) { 
                                    const prev = finalRallyPath[(i - 1 + len) % len]; 
                                    const curr = finalRallyPath[i]; 
                                    const next = finalRallyPath[(i + 1) % len]; 
                                    const x = (prev.x + curr.x + next.x) / 3; 
                                    const y = (prev.y + curr.y + next.y) / 3; 
                                    const z = (prev.z + curr.z + next.z) / 3; 
                                    smoothed.push(new THREE.Vector3(x, y, z)); 
                                } 
                                finalRallyPath = smoothed; 
                            } 
                        }

                        // CÁLCULO MILIMÉTRICO DE DISTANCIAS 3D (REPARA LOS TIRONES)
                        rallyDists = [0];
                        currentRallyDist = 0;
                        for(let i=1; i<finalRallyPath.length; i++) {
                            const d = finalRallyPath[i].distanceTo(finalRallyPath[i-1]);
                            currentRallyDist += d;
                            rallyDists.push(currentRallyDist);
                        }
                    }
                    rallyPathRef.current = finalRallyPath; rallyDistancesRef.current = rallyDists;

                    const totalDist = accumulatedDist; physicsState.current.forEach(car => { if (totalDist > 0) { while (car.distance < 0) car.distance += totalDist; car.distance = car.distance % totalDist; } });
                    const createRailMesh = (pts, c, w=0.6) => { 
                        const cp = pts.filter(p => p !== null); 
                        if(cp.length < 2) return; 
                        
                        const leftPts = []; const rightPts = []; const slotPts = [];
                        const railGap = 0.45; // Separación de los raíles metálicos desde el centro
                        
                        for (let i = 0; i < cp.length; i++) {
                            let p = cp[i];
                            let prev = i > 0 ? cp[i-1] : p;
                            let next = i < cp.length - 1 ? cp[i+1] : p;
                            if (i === 0 && cp.length > 1) next = cp[1];
                            if (i === cp.length - 1 && cp.length > 1) prev = cp[i-1];
                            
                            let dx = next.x - prev.x;
                            let dz = next.z - prev.z;
                            let len = Math.hypot(dx, dz);
                            if (len > 0.0001) { dx /= len; dz /= len; } else { dx = 1; dz = 0; }
                            
                            let nx = -dz; let nz = dx;
                            
                            leftPts.push(new THREE.Vector3(p.x + nx * railGap, p.y + 0.02, p.z + nz * railGap));
                            rightPts.push(new THREE.Vector3(p.x - nx * railGap, p.y + 0.02, p.z - nz * railGap));
                            slotPts.push(new THREE.Vector3(p.x, p.y - 0.04, p.z));
                        }

                        const pathL = new THREE.CatmullRomCurve3(leftPts);
                        const pathR = new THREE.CatmullRomCurve3(rightPts);
                        const pathS = new THREE.CatmullRomCurve3(slotPts);

                        const segments = Math.max(2, cp.length);
                        // OPTIMIZACIÓN GEOMÉTRICA: Reducido de 4/5 a 3 caras radiales (Prisma triangular). Altera miles de vértices y visualmente no se nota.
                        const gL = new THREE.TubeGeometry(pathL, segments, w/3.5, 3, false);
                        const gR = new THREE.TubeGeometry(pathR, segments, w/3.5, 3, false);
                        const gS = new THREE.TubeGeometry(pathS, segments, w/2.2, 3, false);

                        // OPTIMIZACIÓN MATERIALES: Usar Phong/Lambert evita que la GPU calcule metalness/roughness por pixel
                        const mMetal = new THREE.MeshPhongMaterial({ color: 0xd0d0d0, shininess: 50 });
                        const mSlot = new THREE.MeshLambertMaterial({ color: 0x020202 });

                        const meshL = new THREE.Mesh(gL, mMetal); meshL.castShadow = true; meshL.receiveShadow = true; trackGroup.add(meshL);
                        const meshR = new THREE.Mesh(gR, mMetal); meshR.castShadow = true; meshR.receiveShadow = true; trackGroup.add(meshR);
                        const meshS = new THREE.Mesh(gS, mSlot); meshS.receiveShadow = true; trackGroup.add(meshS);
                    };
                    const createMultiSegmentRailMesh = (points, color, width=0.6) => { let currentSegment = []; for (let p of points) { if (p === null) { if (currentSegment.length > 1) createRailMesh(currentSegment, color, width); currentSegment = []; } else { currentSegment.push(p); } } if (currentSegment.length > 1) createRailMesh(currentSegment, color, width); };

                    // CONSTRUIMOS Y AÑADIMOS UNA MALLA POR CADA SEGMENTO CREADO
                    asphaltGeometries.forEach(geoData => {
                        if (geoData.verts.length === 0) return;

                        const geo = new THREE.BufferGeometry();
                        geo.setAttribute('position', new THREE.Float32BufferAttribute(geoData.verts, 3));
                        geo.setAttribute('uv', new THREE.Float32BufferAttribute(geoData.uvs, 2));
                        geo.setIndex(geoData.indices);
                        geo.computeVertexNormals();

                        const mat = new THREE.MeshLambertMaterial({ 
                            map: geoData.texture, 
                            color: 0xcccccc,
                            side: THREE.DoubleSide
                        });
                        const mesh = new THREE.Mesh(geo, mat);
                        mesh.receiveShadow = true;
                        mesh.castShadow = true;
                        trackGroup.add(mesh);
                    });
                    
                    for(let j=0; j<numLanes; j++) {
                        createMultiSegmentRailMesh(rails.lanes[j], null, 0.7); 
                    }
                    
                    let curSeg = []; for (let p of rails.pit) { if (p === null) { if (curSeg.length > 1) createRailMesh(curSeg, null, 0.6); curSeg = []; } else { curSeg.push(p); } } if (curSeg.length > 1) createRailMesh(curSeg, null, 0.6); 
                    rails.changes.forEach(obj => { if (obj.points) createRailMesh(obj.points, null, 0.5); else createRailMesh(obj, null, 0.5); });
                    
                    const finishLinePiece = pieceMapRef.current.find(p => p.subtype === 'analog_connect' || p.subtype === 'connection' || p.subtype === 'digital_console') || pieceMapRef.current[0];
                    if (finishLinePiece) {
                        const getPosAt = (pa, d) => { 
                            let i=0; 
                            while(i < vertexDistances.length-1 && vertexDistances[i+1] < d) i++; 
                            const r = (d - vertexDistances[i]) / (vertexDistances[i+1] - vertexDistances[i]); 
                            if(!pa[i] || !pa[i+1]) return null; 
                            return new THREE.Vector3().lerpVectors(pa[i], pa[i+1], r); 
                        };
                        const midD = finishLinePiece.distStart + (finishLinePiece.distEnd - finishLinePiece.distStart) / 2;
                        const p1 = getPosAt(rails.lanes[0], midD);
                        const p2 = getPosAt(rails.lanes[numLanes - 1], midD);
                        
                        if (p1 && p2) {
                            const mid = new THREE.Vector3().lerpVectors(p1, p2, 0.5);
                            const tangent = new THREE.Vector3().subVectors(getPosAt(rails.lanes[0], midD + 1), p1).normalize();
                            const lineG = new THREE.BoxGeometry(trackWidth, 0.02, 1.8);
                            const lineCanvas = document.createElement('canvas'); 
                            lineCanvas.width = 128; 
                            lineCanvas.height = 32; 
                            const lineCtx = lineCanvas.getContext('2d');
                            lineCtx.fillStyle = 'white'; 
                            lineCtx.fillRect(0,0,128,32); 
                            lineCtx.fillStyle = 'black';
                            for(let x=0; x<128; x+=16) {
                                for(let y=0; y<32; y+=16) {
                                    if((x+y)/16 % 2 === 0) lineCtx.fillRect(x,y,16,16);
                                }
                            }
                            const lineTex = new THREE.CanvasTexture(lineCanvas);
                            const lineM = new THREE.MeshStandardMaterial({ map: lineTex, roughness: 0.9, polygonOffset: true, polygonOffsetFactor: -1 });
                            const lineMesh = new THREE.Mesh(lineG, lineM);
                            lineMesh.position.set(mid.x, mid.y + 0.02, mid.z);
                            const lookAtPos = mid.clone().add(tangent); 
                            lookAtPos.y = mid.y + 0.02; 
                            lineMesh.lookAt(lookAtPos);
                            lineMesh.castShadow = true;
                            lineMesh.receiveShadow = true;
                            trackGroup.add(lineMesh);
                        }
                    }

                    const b = new THREE.Box3().setFromObject(trackGroup); 
                    if (!b.isEmpty()) { 
                        const center = b.getCenter(new THREE.Vector3()); 
                        const size = b.getSize(new THREE.Vector3());
                        
                        // 1. IDÉNTICO A DECO.HTML: Elevamos la pista para que no se hunda
                        trackGroup.position.sub(center); 
                        trackGroup.position.y = 0.8; 
                        
                        // --- TABLERO DINÁMICO ---
                        // 2. TAMAÑO AJUSTADO: Margen muy reducido para que se ciña exactamente al circuito
                        const boardMargin = 30.0; 
                        const boardW = size.x + boardMargin;
                        const boardD = size.z + boardMargin;
                        
                        // Tablero con textura estilo asfalto Ninco pero en verde oscuro
                        const boardTopTex = createAsphaltTexture(renderer, '#081a0c'); 
                        boardTopTex.repeat.set(boardW / 50, boardD / 50); // Mayor densidad de grano para que se vea bien
                        const woodTex = createWoodTexture();
                        woodTex.repeat.set(Math.max(boardW, boardD) / 50, 1);
                        
                        const boardGeo = new THREE.BoxGeometry(1, 1, 1); 
                        // OPTIMIZACIÓN: Material Lambert en lugar de Standard
                        const topMat = new THREE.MeshLambertMaterial({ 
                            map: boardTopTex,
                            color: 0xcccccc
                        }); 
                        const sideMat = new THREE.MeshLambertMaterial({ map: woodTex }); 
                        const bottomMat = new THREE.MeshLambertMaterial({ color: 0x111111 });
                        const boardMaterials = [ sideMat, sideMat, topMat, bottomMat, sideMat, sideMat ];
                        
                        const boardMesh = new THREE.Mesh(boardGeo, boardMaterials);
                        boardMesh.scale.set(boardW, 2.0, boardD); 
                        // La tabla se ancla a la escena principal en Y=-0.5, dejando la pista arriba
                        boardMesh.position.set(0, -0.5, 0); 
                        boardMesh.receiveShadow = true;
                        
                        scene.add(boardMesh); // A la escena, envolviendo el trackGroup

                        // --- GENERADOR DE BOSQUE (ÁRBOLES DE DECORACIÓN) ---
                        const forestGroup = new THREE.Group();
                        forestGroup.name = "FOREST_GROUP";
                        forestGroup.visible = showTrees; // Initial state
                        trackGroup.add(forestGroup);
                        forestGroupRef.current = forestGroup;

                        // 1. Recopilar bordes exactos de la pista para una colisión perfecta
                        const trackEdges = [];
                        for(let i=0; i<rails.lanes[0].length; i+=2) { 
                            let pL = rails.lanes[0][i];
                            let pR = rails.lanes[numLanes - 1][i];
                            if (pL) trackEdges.push({ x: pL.x, z: pL.z });
                            if (pR) trackEdges.push({ x: pR.x, z: pR.z });
                        }
                        
                        // FIX: Incluir los puntos de rotondas y cambios de carril en la malla de colisión
                        // (Antes se ignoraban porque constan como 'null' en el array principal)
                        rails.changes.forEach(change => {
                            if (change.points) {
                                for(let i=0; i<change.points.length; i+=2) {
                                    trackEdges.push({ x: change.points[i].x, z: change.points[i].z });
                                }
                            }
                        });
                        
                        // Margen de seguridad aumentado: mitad de la pista + 10 uds 
                        // (Esto garantiza que el hueco interior de la rotonda se considere pista y no nazcan árboles dentro)
                        const safeMargin = (trackWidth / 2) + 10.0;
                        const safeDistanceSq = safeMargin * safeMargin;
                        
                        const isSafe = (tx, tz) => {
                            // Que el árbol no se salga volando por el borde del tablero de madera (Margen ajustado al nuevo tablero)
                            if (tx < center.x - boardW/2 + 5 || tx > center.x + boardW/2 - 5) return false;
                            if (tz < center.z - boardD/2 + 5 || tz > center.z + boardD/2 - 5) return false;
                            
                            // Que no colisione con NINGÚN borde de la pista
                            for(let i=0; i<trackEdges.length; i++) {
                                const dx = trackEdges[i].x - tx;
                                const dz = trackEdges[i].z - tz;
                                if ((dx*dx + dz*dz) < safeDistanceSq) return false;
                            }
                            return true;
                        };

                        // Densidad CONTROLADA: Garantizar los 100 árboles si físicamente caben
                        const maxTrees = 100; 
                        const validPositions = [];
                        const minTreeDistSq = 9.0 * 9.0; // Separación de 9uds para permitir bosques densos

                        // 1. Crear "centros" o semillas de bosque para que se agrupen de forma natural
                        const numClusters = 12; // Más semillas para encontrar huecos libres
                        const forestCenters = [];
                        for(let i=0; i<numClusters; i++) {
                            forestCenters.push({
                                x: center.x + (Math.random() - 0.5) * (boardW * 0.9),
                                z: center.z + (Math.random() - 0.5) * (boardD * 0.9)
                            });
                        }
                        
                        // 2. Algoritmo para buscar ubicaciones válidas agrupadas alrededor de los centros
                        for(let i=0; i<maxTrees * 300; i++) { 
                            const cluster = forestCenters[Math.floor(Math.random() * forestCenters.length)];
                            const angle = Math.random() * Math.PI * 2;
                            // Distribución en círculo: la raíz cuadrada agrupa de forma más natural sin concentrar todo en 1 punto
                            const radius = Math.sqrt(Math.random()) * 55; 
                            
                            const tx = cluster.x + Math.cos(angle) * radius;
                            const tz = cluster.z + Math.sin(angle) * radius;
                            
                            if (isSafe(tx, tz)) {
                                // Comprobar que no esté muy cerca de otros árboles ya colocados
                                let tooClose = false;
                                for(let j=0; j<validPositions.length; j++) {
                                    const dx = validPositions[j].x - tx;
                                    const dz = validPositions[j].z - tz;
                                    if ((dx*dx + dz*dz) < minTreeDistSq) {
                                        tooClose = true;
                                        break;
                                    }
                                }
                                
                                if (!tooClose) {
                                    validPositions.push({ x: tx, z: tz });
                                    if (validPositions.length >= maxTrees) break;
                                }
                            }
                        }

                        // Función principal para cargar TUS archivos Reales
                        const loadRealTrees = (fileList) => {
                            const loader = getSharedGLTFLoader();
                            const loadedTrees = [];
                            let loadedCount = 0;

                            const finalizeTrees = () => {
                                // Si no se cargó ninguno, no hacemos NADA (sin árboles falsos)
                                if (loadedTrees.length === 0) return; 

                                // --- OPTIMIZACIÓN EXTREMA: INSTANCED MESH ---
                                // Agrupa todas las transformaciones por tipo de árbol
                                const treeTransforms = loadedTrees.map(() => []); 
                                
                                validPositions.forEach(pos => {
                                    const typeIdx = Math.floor(Math.random() * loadedTrees.length);
                                    
                                    // Variación natural: tamaño aleatorio y rotación
                                    const scaleBase = 0.5 + Math.random() * 0.7; 
                                    const rotY = Math.random() * Math.PI * 2;
                                    // Ligera inclinación para que no parezcan estacas perfectas
                                    const rotX = (Math.random() - 0.5) * 0.1;
                                    const rotZ = (Math.random() - 0.5) * 0.1;
                                    
                                    const matrix = new THREE.Matrix4();
                                    // CORRECCIÓN DE ALTURA: Se bajan a -0.3 para tocar el suelo perfectamente
                                    const position = new THREE.Vector3(pos.x, -0.3, pos.z);
                                    const quaternion = new THREE.Quaternion().setFromEuler(new THREE.Euler(rotX, rotY, rotZ));
                                    const scaleVector = new THREE.Vector3(scaleBase, scaleBase, scaleBase);
                                    
                                    matrix.compose(position, quaternion, scaleVector);
                                    treeTransforms[typeIdx].push(matrix);
                                });

                                // Crear una única malla instanciada para miles de árboles (1 solo Draw Call por malla)
                                loadedTrees.forEach((treeModel, typeIdx) => {
                                    const instances = treeTransforms[typeIdx];
                                    if (instances.length === 0) return;

                                    // TRUCO DE SOMBRAS: Material negro, transparente y sin profundidad para evitar "z-fighting"
                                    const shadowMat = new THREE.MeshBasicMaterial({
                                        color: 0x000000,
                                        transparent: true,
                                        opacity: 0.45,
                                        depthWrite: false
                                    });

                                    // Matriz de proyección: Aplasta el eje Y a 0.001 y lo inclina (Shear) en X y Z
                                    const projMatrix = new THREE.Matrix4().set(
                                        1, 0.7, 0, 0,
                                        0, 0.001, 0, -0.09,
                                        0, 0.3, 1, 0,
                                        0, 0,   0, 1
                                    );

                                    treeModel.traverse(child => {
                                        if (child.isMesh) {
                                            // 1. InstancedMesh del Árbol Original
                                            const instancedMesh = new THREE.InstancedMesh(
                                                child.geometry,
                                                child.material,
                                                instances.length
                                            );
                                            
                                            // APAGAMOS SOMBRAS REALES PARA MÁXIMO RENDIMIENTO
                                            instancedMesh.castShadow = false;
                                            instancedMesh.receiveShadow = false;
                                            instancedMesh.frustumCulled = false; // Evita parpadeos en cámara

                                            // 2. InstancedMesh de la Sombra Falsa (Truco 2)
                                            const shadowMesh = new THREE.InstancedMesh(
                                                child.geometry,
                                                shadowMat,
                                                instances.length
                                            );
                                            shadowMesh.castShadow = false;
                                            shadowMesh.receiveShadow = false;
                                            shadowMesh.frustumCulled = false;

                                            const finalMatrix = new THREE.Matrix4();
                                            const shadowMatrix = new THREE.Matrix4();

                                            for (let i = 0; i < instances.length; i++) {
                                                // Matriz final del árbol original
                                                finalMatrix.multiplyMatrices(instances[i], child.matrixWorld);
                                                instancedMesh.setMatrixAt(i, finalMatrix);

                                                // Matriz de la sombra: Multiplicamos la proyección por la matriz del árbol
                                                shadowMatrix.multiplyMatrices(projMatrix, finalMatrix);
                                                shadowMesh.setMatrixAt(i, shadowMatrix);
                                            }
                                            
                                            instancedMesh.instanceMatrix.needsUpdate = true;
                                            shadowMesh.instanceMatrix.needsUpdate = true;

                                            forestGroup.add(instancedMesh);
                                            forestGroup.add(shadowMesh); // Añadimos la capa de sombras al grupo
                                        }
                                    });
                                });
                            };

                            fileList.forEach(fileName => {
                                const url = `https://raw.githubusercontent.com/slotsoftware/Telemetria/main/decora/${fileName}`;
                                
                                loader.load(url, (gltf) => {
                                    const treeModel = gltf.scene;
                                    
                                    // Reset y centrado perfecto para TUS modelos
                                    treeModel.position.set(0, 0, 0);
                                    treeModel.scale.set(1, 1, 1);
                                    treeModel.updateMatrixWorld(true);

                                    const boxOriginal = new THREE.Box3().setFromObject(treeModel);
                                    const centerOriginal = boxOriginal.getCenter(new THREE.Vector3());
                                    
                                    // Centrar el pivote geométricamente en X y Z
                                    treeModel.position.x -= centerOriginal.x;
                                    treeModel.position.z -= centerOriginal.z;

                                    // Escalar los árboles a un tamaño estándar visual para Scalextric (aprox 22 cm/unidades)
                                    const sizeOriginal = boxOriginal.getSize(new THREE.Vector3());
                                    const targetHeight = 22.0; 
                                    const scale = targetHeight / (sizeOriginal.y || 1);
                                    treeModel.scale.set(scale, scale, scale);
                                    treeModel.updateMatrixWorld(true);

                                    // Alinear en Y para que la base del tronco toque perfectamente el suelo independientemente de su geometría
                                    const boxScaled = new THREE.Box3().setFromObject(treeModel);
                                    treeModel.position.y -= boxScaled.min.y;

                                    treeModel.traverse(c => {
                                        if (c.isMesh) {
                                            // OPTIMIZACIÓN EXTREMA: Fuera sombras
                                            c.castShadow = false;
                                            c.receiveShadow = false;
                                            
                                            // OPTIMIZACIÓN EXTREMA: Cambiamos a MeshBasicMaterial (Sin cálculos de luz)
                                            if (c.material) {
                                                const oldMat = c.material;
                                                const basicMat = new THREE.MeshBasicMaterial({
                                                    map: oldMat.map || null,
                                                    color: oldMat.color || 0xffffff,
                                                    side: THREE.DoubleSide,
                                                    transparent: oldMat.transparent,
                                                    alphaTest: oldMat.alphaTest || 0.5
                                                });
                                                c.material = basicMat;
                                            }
                                        }
                                    });
                                    
                                    loadedTrees.push(treeModel);
                                    loadedCount++;
                                    if(loadedCount === fileList.length) finalizeTrees();
                                }, undefined, (e) => {
                                    console.warn("Fallo en descarga individual:", url, e);
                                    loadedCount++;
                                    if(loadedCount === fileList.length) finalizeTrees();
                                });
                            });
                        };

                        // LEER TU DIRECTORIO EN TIEMPO REAL DESDE GITHUB
                        fetch('https://api.github.com/repos/slotsoftware/Telemetria/contents/decora')
                            .then(res => {
                                if (!res.ok) throw new Error("Rate limit o carpeta no encontrada");
                                return res.json();
                            })
                            .then(data => {
                                // Filtrar SOLO los que se llamen pino o alamo
                                const glbFiles = data.filter(f => {
                                    const n = f.name.toLowerCase();
                                    return (n.includes('pino') || n.includes('alamo')) && (n.endsWith('.glb') || n.endsWith('.gltf'));
                                }).map(f => f.name);
                                
                                if (glbFiles.length > 0) {
                                    loadRealTrees(glbFiles);
                                } else {
                                    // Si no encuentra los nombres exactos, forzamos por si acaso
                                    loadRealTrees(['pino.glb', 'alamo.glb']);
                                }
                            })
                            .catch(err => {
                                console.warn("API bloqueada, intentando cargar lista predefinida...");
                                loadRealTrees(['pino.glb', 'alamo.glb']);
                            });

                        // --- FIN GENERADOR BOSQUE ---
                    } 
                    scene.add(trackGroup);

                    carMeshesRef.current = [];
                    if (rails.lanes[0].length > 2) { 
                        physicsState.current.forEach((car) => { 
                            const s = carSetupsRef.current[car.id]; 
                            if (!s) return; 
                            const cc = parseInt(s.color.replace('#','0x')); 
                            const c = createCar(car.id, cc); 
                            c.userData = { id: car.id };
                            trackGroup.add(c); 
                            carMeshes.push(c); 
                            carMeshesRef.current.push(c);
                        }); 
                    }

                    const getPositionAtDistance = (pa, d, outVec) => { 
                        let i = 0, min = 0, max = vertexDistances.length - 1; 
                        while (min <= max) { 
                            let mid = Math.floor((min + max) / 2); 
                            if (vertexDistances[mid] <= d) { 
                                i = mid; min = mid + 1; 
                            } else { 
                                max = mid - 1; 
                            } 
                        } 
                        if (i >= vertexDistances.length - 1) i = vertexDistances.length - 2; 
                        
                        const segmentLen = vertexDistances[i+1] - vertexDistances[i];
                        const r = segmentLen > 0.00001 ? (d - vertexDistances[i]) / segmentLen : 0; 
                        
                        const p1 = pa[i];
                        const p2 = pa[i+1];

                        if (!p1 || !p2) {
                            const fallback = p1 || p2;
                            if (fallback) return outVec.copy(fallback);
                            return null;
                        }

                        // FIX: Interpolación lineal estricta. Elimina matemáticamente los "trompicones" de los polinomios cúbicos.
                        return outVec.lerpVectors(p1, p2, r); 
                    };

                    const getRallyPositionByDist = (dist, outVec) => { 
                        const path = rallyPathRef.current;
                        const dists = rallyDistancesRef.current;
                        if (!path || path.length < 2 || dists.length < 2) return outVec.set(0,0,0);

                        const totalLen = dists[dists.length - 1];
                        if (totalLen <= 0.0001) return outVec.set(0,0,0);

                        let safeDist = dist; 
                        while (safeDist < 0) safeDist += totalLen; 
                        safeDist = safeDist % totalLen; 

                        let idx = 0, min = 0, max = dists.length - 1;
                        while (min <= max) {
                            let mid = Math.floor((min + max) / 2);
                            if (dists[mid] <= safeDist) {
                                idx = mid; min = mid + 1;
                            } else {
                                max = mid - 1;
                            }
                        }
                        if (idx >= dists.length - 1) idx = dists.length - 2;

                        const dStart = dists[idx];
                        const dEnd = dists[idx+1];
                        const segmentLen = dEnd - dStart;
                        const ratio = segmentLen > 0.00001 ? (safeDist - dStart) / segmentLen : 0;

                        const p1 = path[idx];
                        const p2 = path[idx+1];

                        // FIX: Interpolación lineal estricta para garantizar velocidad constante 100%
                        return outVec.lerpVectors(p1, p2, ratio); 
                    };

                    // LOOP DE RENDERIZADO (SOLO GRÁFICOS Y FÍSICA)
                    const animate = () => { 
                        animationId = requestAnimationFrame(animate); 
                        
                        // OPTIMIZACIÓN ANTITROMPICONES EXTREMA:
                        // Usar el Delta de tiempo crudo (sin promedios) sincroniza perfectamente con el V-Sync de la pantalla.
                        // Solo limitamos a 0.05s por si la pestaña pierde el foco.
                        let dt = Math.min(clock.current.getDelta(), 0.05); 

                        if (cameraModeRef.current !== prevCamMode) {
                            if (cameraModeRef.current === 'race') {
                                targetRadius = 250; // Vista panorámica
                                targetPhi = Math.PI / 4; // Ángulo cenital
                            }
                            prevCamMode = cameraModeRef.current;
                        }

                        spherical.radius += (targetRadius - spherical.radius) * (1.0 - Math.exp(-5.0 * dt));
                        spherical.phi += (targetPhi - spherical.phi) * (1.0 - Math.exp(-5.0 * dt));
                        spherical.makeSafe();

                        const isRaceActive = !pausedRef.current && (raceStateRef.current === 'idle' || raceStateRef.current === 'racing');
                        const nowTime = Date.now();
                        
                        if (carMeshes.length > 0 && vertexDistances.length > 1) { 
                            const vf = trackVoltage / 12.0;
                            const totalDist = accumulatedDist;
                            const finishPiece = pieceMapRef.current.find(p => p.subtype === 'analog_connect' || p.subtype === 'connection' || p.subtype === 'digital_console') || pieceMapRef.current[0];
                            const finishLineDist = finishPiece ? (finishPiece.distStart + (finishPiece.distEnd - finishPiece.distStart) * 0.5) : 0;

                            physicsState.current.forEach((car, idx) => {
                                if (idx >= carMeshes.length) return; const pg = carMeshes[idx], vg = pg.children[0], s = carSetupsRef.current[car.id]; if (!s) return;
                                if (car.id > numCarsRef.current) { if (vg.visible) vg.visible = false; return; } else { if (!vg.visible && nowTime >= car.invulnerableUntil) vg.visible = true; }
                                
                                // INICIALIZACIÓN DE FÍSICAS
                                const gr = s.gearTeeth / s.pinionTeeth;
                                const vfReal = trackVoltageRef.current / 12.0; 
                                const ms = (s.motorRPM / 150) * (3.0 / gr) * vfReal;
                                const acc = (s.motorTorque / s.weight) * gr * vfReal * 45; 
                                let ts = ms, isB = false;
                                
                                // CACHÉ DE PIEZA ACTUAL: Elimina la búsqueda O(N) exhaustiva de la pieza 60 veces por segundo por coche
                                let cp = pieceMapRef.current[car.lastPieceIndex >= 0 && car.lastPieceIndex < pieceMapRef.current.length ? car.lastPieceIndex : 0];
                                if (!cp || car.distance < cp.distStart || car.distance >= cp.distEnd) {
                                    cp = pieceMapRef.current.find(p => car.distance >= p.distStart && car.distance < p.distEnd) || pieceMapRef.current[0];
                                }

                                // 1. SISTEMA ANTICOLISIÓN PREDICTIVO OPTIMIZADO
                                if (activeButtonRef.current === 'DIGITAL') {
                                    if (numCarsRef.current > 1) {
                                        let dtc = Infinity;
                                        for (let j = 0; j < physicsState.current.length; j++) {
                                            const o = physicsState.current[j];
                                            if (o.id <= numCarsRef.current && o.id !== car.id && !o.isDerailled && nowTime > o.invulnerableUntil) {
                                                if (o.currentLane === car.currentLane || o.targetLane === car.currentLane) { 
                                                    let di = o.distance - car.distance; 
                                                    if (di < -totalDist / 2) di += totalDist; else if (di > totalDist / 2) di -= totalDist;
                                                    if (di > 0 && di < dtc) dtc = di; 
                                                }
                                            }
                                        }
                                        if (dtc < 45) { 
                                            ts *= Math.max(0.3, (dtc - 10) / 35); 
                                            if (dtc < 15) isB = true; 
                                        }
                                    }
                                }

                                // 2. CONTROL UNIFICADO: JUGADOR vs IA
                                const isHuman = (car.id === selectedCarIdRef.current);
                                // FIX: Impedir que el coche se mueva durante la cuenta atrás del semáforo (countdown)
                                const carShouldMove = isRaceActive || (isHuman && !pausedRef.current && raceStateRef.current === 'grid');
                                
                                if (!carShouldMove) car.speed = 0; // Frenado total automático si no se permite movimiento
                                
                                if (isHuman) { 
                                    if (kronoSyncRef.current.active) {
                                        const kData = kronoSyncRef.current;
                                        if (kData.waitingForFirstTrigger) {
                                            ts = 0;
                                            isB = true;
                                        } else {
                                            if (kData.latestLapTime > 0) {
                                                const maxD = (hasRotonda && rallyPathRef.current.length > 0) ? rallyDistancesRef.current[rallyDistancesRef.current.length - 1] : totalDist;
                                                const speedReq = maxD / (kData.latestLapTime / 1000);
                                                ts = speedReq;
                                            } else {
                                                ts = 60; // Velocidad base vuelta 1
                                            }
                                            
                                            if (kData.forceCross) {
                                                let targetCrossDist;
                                                if (hasRotonda && rallyPathRef.current.length > 0 && rallyDistancesRef.current.length > 0) {
                                                    targetCrossDist = rallyDistancesRef.current[rallyDistancesRef.current.length - 1];
                                                } else {
                                                    const finishPiece = pieceMapRef.current.find(p => p.subtype === 'analog_connect' || p.subtype === 'connection' || p.subtype === 'digital_console') || pieceMapRef.current[0];
                                                    targetCrossDist = finishPiece ? (finishPiece.distStart + (finishPiece.distEnd - finishPiece.distStart) * 0.5) : 0;
                                                }
                                                
                                                const moveDir = isReversedRef.current ? -1 : 1;
                                                const maxD = (hasRotonda && rallyPathRef.current.length > 0) ? rallyDistancesRef.current[rallyDistancesRef.current.length - 1] : totalDist;
                                                let preLineDist = targetCrossDist - (5.0 * moveDir);
                                                if (preLineDist < 0) preLineDist += maxD;
                                                preLineDist = preLineDist % maxD;
                                                
                                                car.distance = preLineDist;
                                                car.speed = ts > 0 ? ts : 60;
                                                kData.forceCross = false;
                                            }
                                        }
                                        if (pitPressedRef.current && activeButtonRef.current === 'DIGITAL') car.wantsToPit = true;
                                    } else {
                                        const rawTh = (manualThrottleRef.current || 0) / 100.0; 
                                        let mappedTh = rawTh;
                                        let topSpeedMult = 1.0;
                                        
                                        if (throttleProfileRef.current === 1) {
                                            mappedTh = Math.pow(rawTh, 1.5); // ECO: Curva más suave, pero ligeramente más rápido
                                            topSpeedMult = 1.10; 
                                        }
                                        else if (throttleProfileRef.current === 2) {
                                            mappedTh = Math.pow(rawTh, 0.8); // STD: Gatillo más vivo
                                            topSpeedMult = 1.30; 
                                        }
                                        else if (throttleProfileRef.current === 3) {
                                            mappedTh = Math.pow(rawTh, 0.30); // PRO: Potencia muy agresiva
                                            topSpeedMult = 1.70; // PRO: +70% extra de velocidad punta
                                        }
                                        else if (throttleProfileRef.current === 4) {
