                                model.scale.set(1, 1, 1);
                                model.updateMatrixWorld(true);

                                // 2. Medir original y centrar X/Z
                                const boxOriginal = new THREE.Box3().setFromObject(model);
                                const sizeOriginal = boxOriginal.getSize(new THREE.Vector3());
                                const centerOriginal = boxOriginal.getCenter(new THREE.Vector3());

                                model.position.x -= centerOriginal.x;
                                model.position.z -= centerOriginal.z;

                                const targetLength = 13.2; 
                                const maxAllowedWidth = 6.5; 
                                
                                const originalLength = Math.max(sizeOriginal.z, sizeOriginal.x); 
                                const originalWidth = Math.min(sizeOriginal.z, sizeOriginal.x);

                                let scale = targetLength / originalLength;
                                if ((originalWidth * scale) > maxAllowedWidth) {
                                    scale = maxAllowedWidth / originalWidth;
                                }
                                
                                model.scale.set(scale, scale, scale);
                                model.updateMatrixWorld(true);

                                // 3. Auto-Alineación perfecta al suelo (Auto-Floor)
                                // Garantiza que las ruedas/chasis toquen la pista independientemente del origen del modelo
                                const boxScaled = new THREE.Box3().setFromObject(model);
                                const bottomOffset = -boxScaled.min.y;
                                
                                model.position.y += bottomOffset;
                                model.rotation.y = Math.PI;

                                model.traverse(child => {
                                    if (child.isMesh) {
                                        child.castShadow = true; // Activar sombras proyectadas por el coche
                                        child.receiveShadow = true; // El coche también recibe sombras (ej. de los puentes)
                                        child.frustumCulled = false; // Elimina parones al recalcular volúmenes
                                        if (child.material) {
                                            // FIX PBR: Evita que los metales se vean negros sin un HDRI
                                            const fixMat = (m) => {
                                                if (m.metalness !== undefined) m.metalness = Math.min(m.metalness, 0.4);
                                                if (m.roughness !== undefined) m.roughness = Math.max(m.roughness, 0.3);
                                                m.needsUpdate = true;
                                            };
                                            if (Array.isArray(child.material)) child.material.forEach(fixMat);
                                            else fixMat(child.material);
                                        }
                                    }
                                });

                                vg.add(model);
                                console.log(`Coche ${targetId} actualizado con modelo 3D.`);
                            }, undefined, (error) => {
                                console.error(`Error cargando GLB para coche ${targetId}:`, error);
                            });
                        }
                    }
                });
            }, [customCarAssets, sceneReady]); 

            return ( 
                <div className="absolute inset-0 z-50 bg-[#60a5fa] text-white font-sans overflow-hidden animate-in"> 
                    {/* Contenedor 3D */}
                    <div ref={containerRef} className="absolute inset-0 w-full h-full" /> 
                    
                    {/* Botón Fullscreen */}
                    <button 
                        onClick={toggleFullscreen} 
                        title={isFullscreen ? t('exitFullscreen') : t('fullscreen')}
                        className="absolute top-6 right-6 z-[80] w-8 h-8 flex items-center justify-center bg-black/40 border border-gray-600 rounded text-gray-400 hover:text-white hover:border-white transition-all backdrop-blur-sm pointer-events-auto"
                    >
                        {isFullscreen ? <Minimize size={16} /> : <Maximize size={16} />}
                    </button>
                    
                    {/* MENSAJE DE ERROR FLOTANTE (NUEVO) */}
                    {validationError && (
                        <div className="absolute top-1/2 left-1/2 transform -translate-x-1/2 -translate-y-1/2 z-[9999] bg-red-600/95 text-white px-10 py-8 rounded-3xl border-4 border-red-400 shadow-[0_0_80px_rgba(220,38,38,1)] backdrop-blur-xl animate-in zoom-in duration-300 flex flex-col items-center gap-4 pointer-events-none text-center">
                            <AlertTriangle size={56} className="animate-bounce text-yellow-300 drop-shadow-xl"/>
                            <span className="font-black text-xl md:text-2xl tracking-widest uppercase drop-shadow-md">{validationError}</span>
                        </div>
                    )}

                    {/* DASHBOARD SUPERIOR */}
                    {(activeButton === 'ANALOG' || activeButton === 'PRACTICE') && (
                        <AnalogDashboard telemetry={telemetry.slice(0, numCars)} carSetups={carSetups} raceState={raceState} activeLights={activeLights} elapsedTime={elapsedTime} targetLaps={targetLaps} aiLevel={aiLevel} setAiLevel={setAiLevel} throttleProfile={throttleProfile} setThrottleProfile={setThrottleProfile} showTrees={showTrees} setShowTrees={setShowTrees} showGarage={showHomoViewer} setShowGarage={setShowHomoViewer} cameraMode={cameraMode} setCameraMode={setCameraMode} isRally={hasRotonda} />
                    )}
                    
                    {activeButton === 'DIGITAL' && (
                        <DigitalDashboard telemetry={telemetry} carSetups={carSetups} raceState={raceState} activeLights={activeLights} elapsedTime={elapsedTime} targetLaps={targetLaps} aiLevel={aiLevel} setAiLevel={setAiLevel} throttleProfile={throttleProfile} setThrottleProfile={setThrottleProfile} showTrees={showTrees} setShowTrees={setShowTrees} numCars={numCars} showGarage={showHomoViewer} setShowGarage={setShowHomoViewer} cameraMode={cameraMode} setCameraMode={setCameraMode} />
                    )}

                    {activeButton !== 'ANALOG' && activeButton !== 'DIGITAL' && activeButton !== 'PRACTICE' && (
                        <div className="absolute top-4 left-1/2 transform -translate-x-1/2 z-[70] flex items-start gap-8 pointer-events-none w-full justify-center px-4">
                            <div className="flex flex-col gap-2 mt-2 pointer-events-auto animate-in items-center transition-opacity duration-300">
                                <button onClick={enterGridMode} className={`px-4 py-2 rounded-lg text-[10px] font-black tracking-[0.2em] border-2 uppercase transition-all duration-300 w-36 ${activeButton === 'GRID' ? 'bg-[#22d3ee] border-[#22d3ee] text-black shadow-[0_0_30px_rgba(34,211,238,0.8)]' : 'bg-gray-900/80 border-gray-700 text-gray-400'}`}>{t('prep')}</button>
                                <button onClick={startPracticeMode} className={`px-4 py-2 rounded-lg text-[10px] font-black tracking-[0.2em] border-2 uppercase transition-all duration-300 w-36 ${activeButton === 'PRACTICE' ? 'bg-[#a3e635] border-[#a3e635] text-black shadow-[0_0_30px_rgba(163,230,53,0.8)]' : 'bg-gray-900/80 border-gray-700 text-gray-400'}`}>{hasRotonda ? t('rally') : t('practice')}</button>
                            </div>
                            
                            <div className="flex flex-col items-center mt-2 shrink-0 pointer-events-auto">
                                <div className="flex gap-4 items-end mb-1">
                                        <DrivingStyleSelector profile={throttleProfile} setProfile={setThrottleProfile} />
                                        <AiLevelSelector aiLevel={aiLevel} setAiLevel={setAiLevel} />
                                        <TreeToggle showTrees={showTrees} setShowTrees={setShowTrees} />
                                        <GarageToggle showGarage={showHomoViewer} setShowGarage={setShowHomoViewer} />
                                        <CameraSelector mode={cameraMode} setMode={setCameraMode} />
                                    </div>
                                    
                                    {/* SEMÁFORO Y CRONÓMETRO COMBINADOS (Minimalista) */}
                                    <div className="flex items-center gap-4 mt-1 bg-black/80 px-5 py-2.5 rounded-full border border-[#39ff14]/30 shadow-[0_0_30px_rgba(57,255,20,0.2)] backdrop-blur-md">
                                        <div className="flex gap-2.5">
                                            {[1, 2, 3, 4, 5].map(n => {
                                                const isRed = raceState === 'countdown' && activeLights >= n, isGreen = raceState === 'racing';
                                                let bg = 'bg-[#111]'; 
                                                let shadow = 'border-gray-800 opacity-50'; 
                                                if (isGreen) { 
                                                    bg = 'bg-[#39ff14]'; 
                                                    shadow = 'shadow-[0_0_15px_#39ff14] border-[#39ff14] scale-110 opacity-100'; 
                                                } else if (isRed) { 
                                                    bg = 'bg-[#ff0000]'; 
                                                    shadow = 'shadow-[0_0_15px_#ff0000] border-[#ff0000] scale-110 opacity-100'; 
                                                } 
                                                return <div key={n} className={`w-6 h-6 rounded-full border-2 ${bg} ${shadow} transition-all duration-100`}></div>
                                            })}
                                        </div>
                                        
                                        <div className="w-px h-8 bg-gray-700"></div>
                                        
                                        <div className="min-w-[150px]">
                                            <span className="text-white font-normal text-3xl tracking-widest drop-shadow-[0_0_8px_rgba(57,255,20,0.5)] font-timer tabular-nums text-center w-full block leading-none">{formatRaceTime(elapsedTime)}</span>
                                        </div>
                                    </div>
                                </div>
                            
                            <div className="flex flex-col gap-2 mt-2 pointer-events-auto animate-in items-center transition-opacity duration-300">
                                {!hasRotonda && (
                                    <>
                                        <button onClick={handleAnalogMode} className={`px-4 py-2 rounded-lg text-[10px] font-black tracking-[0.2em] border-2 uppercase transition-all duration-300 w-36 ${activeButton === 'ANALOG' ? 'bg-[#fbbf24] border-[#fbbf24] text-black shadow-[0_0_30px_rgba(251,191,36,0.8)]' : 'bg-gray-900/80 border-gray-700 text-gray-400'}`}>{t('analog')}</button>
                                        <button onClick={handleDigitalMode} className={`px-4 py-2 rounded-lg text-[10px] font-black tracking-[0.2em] border-2 uppercase transition-all duration-300 w-36 ${activeButton === 'DIGITAL' ? 'bg-[#d946ef] border-[#d946ef] text-black shadow-[0_0_30px_rgba(217,70,239,0.8)]' : 'bg-gray-900/80 border-gray-700 text-gray-400'}`}>{t('digital')}</button>
                                    </>
                                )}
                                {hasRotonda && (
                                    <div className="px-4 py-2 rounded-lg text-[10px] font-black tracking-[0.2em] border-2 border-[#facc15] bg-[#facc15]/10 text-[#facc15] shadow-[0_0_20px_rgba(250,204,21,0.3)] w-36 text-center animate-pulse">
                                        MODO RALLY
                                    </div>
                                )}
                            </div>
                        </div>
                    )}

                    {/* MANDO MANUAL FLOTANTE (Visible en todos los modos para calentamiento) */}
                    <div 
                        style={{ left: ctrlPos.x, top: ctrlPos.y, position: 'absolute', zIndex: 85, cursor: isDraggingCtrl ? 'grabbing' : 'grab' }}
                        onMouseDown={handleCtrlDown}
                        onTouchStart={handleCtrlDown}
                        className="bg-[#0f172a]/95 backdrop-blur-xl border-2 border-gray-700 rounded-[2rem] p-3 shadow-[0_0_60px_rgba(0,0,0,0.8)] flex flex-col gap-3 w-[100px] pointer-events-auto touch-none select-none animate-in fade-in"
                    >
                            {/* Controles Digitales (LC/BOX) si aplica */}
                            {activeButton === 'DIGITAL' && (
                                <>
                                    <div className="w-full bg-black/60 rounded-xl p-1.5 border border-gray-800 flex justify-between items-center shadow-inner overflow-hidden relative z-30">
                                        <button onMouseDown={e=>e.stopPropagation()} onTouchStart={e=>e.stopPropagation()} onClick={() => setSelectedCarId(prev => Math.max(1, prev - 1))} className="w-6 h-8 flex items-center justify-center bg-gray-800 rounded-lg text-gray-400 hover:text-white transition-colors"><ArrowLeft size={10}/></button>
                                        <div className="flex flex-col items-center leading-none z-10 pointer-events-none"><span className="text-[6px] text-gray-500 font-bold">ID</span><span className="text-xl font-black text-[#39ff14] font-digital">{selectedCarId}</span></div>
                                        <button onMouseDown={e=>e.stopPropagation()} onTouchStart={e=>e.stopPropagation()} onClick={() => setSelectedCarId(prev => Math.min(numCars, prev + 1))} className="w-6 h-8 flex items-center justify-center bg-gray-800 rounded-lg text-gray-400 hover:text-white transition-colors"><ArrowRight size={10}/></button>
                                    </div>
                                    <div className="grid grid-cols-1 gap-1.5 w-full relative z-30">
                                        <button 
                                            onPointerDown={(e) => { e.preventDefault(); e.stopPropagation(); setLaneChangePressed(true); }} 
                                            onPointerUp={(e) => { e.preventDefault(); e.stopPropagation(); setLaneChangePressed(false); }} 
                                            onPointerLeave={(e) => { e.stopPropagation(); setLaneChangePressed(false); }}
                                            className={`h-12 w-full rounded-xl flex items-center justify-center gap-1.5 border transition-all active:scale-95 touch-none select-none ${laneChangePressed?'bg-[#39ff14] text-black border-white shadow-[0_0_15px_#39ff14]':'bg-gray-800 text-gray-300 border-gray-600'}`}
                                        >
                                            <GitCommit size={16} className="rotate-90 shrink-0"/><span className="font-black text-[7px] leading-tight text-center">{t('laneChange1')}<br/>{t('laneChange2')}</span>
                                        </button>
                                        <button 
                                            onPointerDown={(e) => { e.preventDefault(); e.stopPropagation(); setPitPressed(true); }} 
                                            onPointerUp={(e) => { e.preventDefault(); e.stopPropagation(); setPitPressed(false); }}
                                            onPointerLeave={(e) => { e.stopPropagation(); setPitPressed(false); }}
                                            className={`h-10 w-full rounded-xl flex items-center justify-center gap-1.5 border transition-all active:scale-95 touch-none select-none ${pitPressed?'bg-blue-600 text-white shadow-[0_0_15px_blue]':'bg-gray-800 text-gray-400 border-gray-600'}`}
                                        >
                                            <Fuel size={14} className="shrink-0"/><span className="font-bold text-[7px] leading-tight text-center">{t('pitEntry1')}<br/>{t('pitEntry2')}</span>
                                        </button>
                                    </div>
                                </>
                            )}
                        
                        {/* Acelerador Manual */}
                        <div className="flex flex-col w-full items-center gap-0.5 mb-0.5 pointer-events-none">
                            <span className="text-[9px] font-black text-[#39ff14] tracking-widest uppercase bg-[#39ff14]/10 border border-[#39ff14]/30 px-2 py-0.5 rounded-full w-full text-center drop-shadow-[0_0_5px_rgba(57,255,20,0.5)]">{t('controller')}</span>
                            <span className="text-[6px] text-gray-400 font-bold uppercase tracking-wider">{t('manualControl')}</span>
                        </div>
                        <div className="relative w-full h-[240px] bg-black/80 rounded-2xl overflow-hidden border border-gray-600 shadow-[inset_0_0_20px_rgba(0,0,0,1)] z-10 group pointer-events-auto">
                            {kronoSyncActive ? (
                                <div className="absolute inset-0 bg-[#0a0a0a]/90 backdrop-blur-sm z-30 flex flex-col items-center justify-center border-2 border-[#39ff14] rounded-xl shadow-[0_0_20px_rgba(57,255,20,0.3)]">
                                    <div className="relative">
                                        <Timer size={40} className="text-[#39ff14] animate-pulse" />
                                        <Activity size={16} className="text-white absolute -bottom-2 -right-2" />
                                    </div>
                                    <span className="text-[#39ff14] font-black tracking-widest text-[12px] mt-4 text-center">KRONO SYNC<br/>ACTIVE</span>
                                    <span className="text-gray-400 font-bold text-[8px] mt-2 text-center px-2">El coche 3D replica los<br/>tiempos de la pista real</span>
                                </div>
                            ) : (
                                <>
                                    <div className="absolute bottom-0 left-0 w-full transition-all duration-75 pointer-events-none" style={{ height: `${manualThrottle}%`, background: `linear-gradient(to top, ${manualThrottle>90?'#ef4444':'#39ff14'} 0%, transparent 100%)`, boxShadow: `0 0 20px ${manualThrottle>90?'#ef4444':'#39ff14'}` }}></div>
                                    
                                    {/* Marcas de porcentaje visuales */}
                                    <div className="absolute inset-0 flex flex-col justify-between py-4 px-1 pointer-events-none opacity-40">
                                        {[100, 75, 50, 25, 0].map(val => (
                                            <div key={val} className="w-full flex items-center justify-between">
                                                <div className="w-2 border-t border-white/70"></div>
                                                <span className="text-[5px] text-white font-mono">{val}</span>
                                                <div className="w-2 border-t border-white/70"></div>
                                            </div>
                                        ))}
                                    </div>

                                    <input type="range" min="0" max="100" value={manualThrottle} 
                                        onMouseDown={e=>e.stopPropagation()} onTouchStart={e=>e.stopPropagation()} 
                                        onChange={(e)=>setManualThrottle(parseFloat(e.target.value))} 
                                        className="absolute -bottom-[85px] -left-[90px] w-[280px] h-[240px] opacity-0 cursor-pointer z-20" style={{ transform: 'rotate(-90deg)', transformOrigin: '50% 50%' }} title={t('slideTitle')}/>
                                    
                                    <div className="absolute top-2 left-0 w-full text-center pointer-events-none">
                                        <span className="font-digital text-2xl font-black drop-shadow-md text-white">{Math.round(manualThrottle)}</span>
                                        <span className="text-[8px] text-[#39ff14] font-bold block -mt-1">%</span>
                                    </div>

                                    {/* Indicador animado si el gas está a 0 */}
                                    {manualThrottle < 5 && (
                                        <div className="absolute bottom-6 left-0 w-full flex flex-col items-center pointer-events-none opacity-80 animate-pulse">
                                            <ArrowUp size={16} className="text-[#39ff14] mb-1" />
                                            <span className="text-[7px] text-white font-bold tracking-widest bg-black/80 px-2 py-0.5 rounded border border-white/20">{t('slide')}</span>
                                        </div>
                                    )}
                                </>
                            )}
                        </div>
                    </div>

                    {/* VISOR GARAJE 3D FLOTANTE */}
                    {showHomoViewer && ( 
                        <div className="absolute right-8 bottom-36 z-[90] pointer-events-auto animate-in slide-in-right duration-300 origin-bottom-right">
                            <GLBViewer 
                                onClose={() => setShowHomoViewer(false)} 
                                onLoad={handleModelAssign} 
                                onTransform={handleCarTransform} 
                                carAssets={customCarAssets}
                                carSetups={carSetups}
                                onNameChange={(id, newName) => handleUpdateConfig('name', newName, id)}
                            />
                        </div> 
                    )}

                    {/* KRONO CAM MODAL */}
                    {showKrono && <KronoModal onClose={() => setShowKrono(false)} onKronoEvent={handleKronoEvent} targetLaps={targetLaps} raceState={raceState} />}

                    {activeButton === 'GRID' && (
                        <>
                            {/* PANEL IZQUIERDO: POTENCIA Y AGARRE */}
                            <div className="absolute top-28 left-10 z-[60] flex flex-col gap-4 pointer-events-auto animate-in slide-in-left duration-500 scale-90 origin-top-left">
                                
                                <div className="bg-black/40 p-3 rounded-2xl border border-white/10 backdrop-blur-md shadow-2xl">
                                    {/* PANEL DE BACKUP / RESTORE DE PIEZAS CUSTOM ENGANCHADO AL DE MOTORES */}
                                    <div className="flex items-center justify-between border-b border-[#39ff14]/30 pb-2 mb-3">
                                        <span className="text-[9px] text-[#39ff14] font-bold tracking-widest uppercase ml-1 opacity-80">{t('customParts')}</span>
                                        <div className="flex gap-2">
                                            <button onClick={handleBackupParts} title={t('exportBackup')} className="bg-gray-800 hover:bg-[#39ff14] text-gray-400 hover:text-black px-2 py-1 rounded flex items-center gap-1 transition-colors text-[8px] font-bold"><CloudUpload size={10}/> {t('backup')}</button>
                                            <button onClick={() => restorePartsRef.current?.click()} title={t('importRestore')} className="bg-gray-800 hover:bg-blue-500 text-gray-400 hover:text-white px-2 py-1 rounded flex items-center gap-1 transition-colors text-[8px] font-bold"><CloudDownload size={10}/> {t('restore')}</button>
                                            <input type="file" ref={restorePartsRef} accept=".json" className="hidden" onChange={handleRestoreParts} />
                                        </div>
                                    </div>

                                    <div>
                                        <div className="text-[10px] text-[#39ff14] font-bold mb-2 tracking-widest uppercase ml-1 opacity-80">{t('powertrain')}</div>
                                        <MotorShowcase key={`motor-${refreshPartsKey}`} selectedCarId={selectedCarId} currentConfig={carSetups[selectedCarId]} onUpdate={handleUpdateConfig} />
                                    </div>
                                </div>
                                <div className="bg-black/40 p-3 rounded-2xl border border-white/10 backdrop-blur-md shadow-2xl">
                                    <div className="text-[10px] text-[#39ff14] font-bold mb-2 tracking-widest uppercase ml-1 opacity-80">{t('tireManagement')}</div>
                                    <TireShowcase key={`tire-${refreshPartsKey}`} selectedCarId={selectedCarId} currentConfig={carSetups[selectedCarId]} onUpdate={handleUpdateConfig} />
                                </div>
                            </div>

                            {/* PANEL DERECHO: MECÁNICA Y FÍSICA */}
                            <div className="absolute top-28 right-10 z-[60] flex flex-col gap-4 pointer-events-auto animate-in slide-in-right duration-500 scale-90 origin-top-right">
                                <div className="bg-black/40 p-4 rounded-2xl border border-white/10 backdrop-blur-md shadow-2xl">
                                    <div className="flex justify-end items-center border-b border-[#39ff14]/30 pb-2 mb-3">
                                        <div className="text-[10px] text-[#39ff14] font-bold tracking-widest uppercase text-right opacity-80">{t('workshopSettings')}</div>
                                    </div>
                                    <div className="flex flex-col gap-4">
                                        <GearShowcase key={`gear-${refreshPartsKey}`} selectedCarId={selectedCarId} currentConfig={carSetups[selectedCarId]} onUpdate={handleUpdateConfig} />
                                        <PinionShowcase key={`pinion-${refreshPartsKey}`} selectedCarId={selectedCarId} currentConfig={carSetups[selectedCarId]} onUpdate={handleUpdateConfig} />
                                        <WeightShowcase selectedCarId={selectedCarId} currentConfig={carSetups[selectedCarId]} onUpdate={handleUpdateConfig} />
                                        <VoltageShowcase voltage={trackVoltage} setVoltage={setTrackVoltage}/>
                                    </div>
                                </div>
                            </div>
                        </>
                    )}

                    {activeButton === 'GRID' && (
                        <TelemetryPanel 
                            carId={selectedCarId} 
                            data={telemetry.find(tel => tel.id === selectedCarId)} 
                            config={carSetups[selectedCarId]} 
                            onSave={saveCurrentSetup}
                            onLoad={loadSetupFromFile}
                            onCarSelect={setSelectedCarId}
                            style={{ 
                                left: telemetryPos.x, 
                                top: telemetryPos.y,
                                position: 'absolute',
                                zIndex: 60,
                                transform: 'scale(0.85)',
                                transformOrigin: 'bottom left'
                            }}
                            onMouseDown={handleTelDown}
                            onTouchStart={handleTelDown}
                            isRally={hasRotonda}
                        />
                    )}

                    {/* RESULTADOS SESIÓN (PDF) */}
                    {sessionResults && raceState === 'finished' && (
                        <div className="absolute inset-0 z-[100] bg-black/90 backdrop-blur-xl flex items-center justify-center p-8 animate-in zoom-in-95">
                            <div className="bg-[#0f172a] border border-gray-700 w-full max-w-5xl rounded-2xl shadow-2xl flex flex-col max-h-full">
                                <div className="p-4 border-b border-gray-800 flex justify-between items-center bg-gray-900/50 rounded-t-2xl">
                                    <h2 className="text-xl font-black text-white tracking-[0.2em] uppercase flex items-center gap-3">
                                        <Trophy className="text-yellow-400" size={28} /> REPORTE OFICIAL SESIÓN
                                    </h2>
                                    <div className="flex gap-3">
                                        <button onClick={exportToPDF} disabled={isGeneratingPDF} className="flex items-center gap-2 bg-blue-600 hover:bg-blue-500 text-white px-4 py-2 rounded font-bold text-xs uppercase tracking-wider transition-all disabled:opacity-50">
                                            <FileText size={16} /> {isGeneratingPDF ? 'GENERANDO...' : 'EXPORTAR PDF'}
                                        </button>
                                        <button onClick={() => { 
                                            setSessionResults(null); 
                                            // FIX: Volver a la vista 3D reseteando la sesión actual en lugar de ir al 2D
                                            if (activeButton === 'DIGITAL') handleDigitalMode();
                                            else if (activeButton === 'ANALOG') handleAnalogMode();
                                            else if (activeButton === 'PRACTICE') resetPractice();
                                            else enterGridMode();
                                        }} className="flex items-center gap-2 bg-gray-700 hover:bg-gray-600 text-white px-4 py-2 rounded font-bold text-xs uppercase tracking-wider transition-all">
                                            CERRAR
                                        </button>
                                    </div>
                                </div>
                                
                                <div id="engineering-report" className="flex-1 overflow-y-auto p-6 space-y-6 bg-[#0f172a] text-white">
                                    {/* 1. PARÁMETROS DE PISTA (BARRA SUPERIOR COMPACTA) */}
                                    <div className="bg-black/40 p-3 rounded-xl border border-gray-800 flex flex-wrap justify-between items-center gap-4">
                                        <div className="flex gap-8">
                                            <div><span className="text-[9px] text-gray-500 block uppercase">VOLTAJE</span><span className="text-sm font-mono font-bold text-[#39ff14]">{trackVoltage.toFixed(1)}V</span></div>
                                            <div><span className="text-[9px] text-gray-500 block uppercase">LONGITUD</span><span className="text-sm font-mono font-bold text-white">{hasRotonda && rallyDistancesRef.current.length > 0 ? rallyDistancesRef.current[rallyDistancesRef.current.length - 1].toFixed(1) : getTrackTotalLength().toFixed(1)}m</span></div>
                                            <div><span className="text-[9px] text-gray-500 block uppercase">MODO</span><span className="text-sm font-mono font-bold text-white">{activeButton}</span></div>
                                            <div><span className="text-[9px] text-gray-500 block uppercase">VUELTAS OBJETIVO</span><span className="text-sm font-mono font-bold text-white">{targetLaps}</span></div>
                                        </div>
                                    </div>

                                    {/* 2. SETUPS Y GRÁFICA */}
                                    <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                                        <div className="lg:col-span-1">
                                            <h3 className="text-sm font-bold text-[#39ff14] border-b border-[#39ff14]/30 pb-1 mb-3 uppercase">CLASIFICACIÓN Y SETUPS</h3>
                                            <div className="space-y-2">
                                                {telemetry.filter(tel => tel.id <= numCars).sort((a,b)=>a.position - b.position).map((tel, i) => (
                                                    <div key={tel.id} className="flex flex-col bg-black/40 p-2.5 rounded-lg border border-gray-800">
                                                        <div className="flex items-center justify-between border-b border-gray-800 pb-1.5 mb-1.5">
                                                            <div className="flex items-center gap-2">
                                                                <span className="text-base font-black text-[#39ff14]">{i+1}</span>
                                                                <span className="font-bold uppercase text-xs truncate max-w-[100px]">{carSetups[tel.id].name.startsWith('PILOTO ') ? carSetups[tel.id].name.replace('PILOTO', t('pilot')) : carSetups[tel.id].name}</span>
                                                            </div>
                                                            <div className="text-right leading-none">
                                                                <span className="block text-[10px] font-mono text-white">MEJOR: <span className="text-[#39ff14]">{formatRaceTime(tel.bestLap)}</span></span>
                                                            </div>
                                                        </div>
                                                        <div className="grid grid-cols-4 gap-1 text-[8px] font-mono">
                                                            <div><span className="block text-gray-500">MOT</span><span className="block text-gray-300 truncate" title={carSetups[tel.id].motorName}>{carSetups[tel.id].motorName.substring(0,6)}</span></div>
                                                            <div><span className="block text-gray-500">GOM</span><span className="block text-gray-300 truncate" title={carSetups[tel.id].tireName}>{carSetups[tel.id].tireName.substring(0,6)}</span></div>
                                                            <div><span className="block text-gray-500">REL</span><span className="block text-gray-300">{carSetups[tel.id].gearTeeth}/{carSetups[tel.id].pinionTeeth}</span></div>
                                                            <div><span className="block text-gray-500">PESO</span><span className="block text-gray-300">{carSetups[tel.id].weight.toFixed(0)}g</span></div>
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>
                                        <div className="lg:col-span-2 flex flex-col justify-start">
                                            <LapTimeChart results={sessionResults} carSetups={carSetups} />
                                        </div>
                                    </div>

                                    {/* 3. HISTORIAL DE VUELTAS (SCROLL PER PILOTO) */}
                                    <div>
                                        <h3 className="text-sm font-bold text-[#39ff14] border-b border-[#39ff14]/30 pb-1 mb-3 uppercase">TELEMETRÍA DETALLADA: HISTORIAL DE VUELTAS</h3>
                                        <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
                                            {telemetry.filter(tel => tel.id <= numCars).sort((a,b)=>a.position - b.position).map(tel => {
                                                const laps = sessionResults[tel.id] || [];
                                                const setup = carSetups[tel.id];
                                                const bestLap = tel.bestLap > 0 && tel.bestLap !== Infinity ? tel.bestLap : Math.min(...laps.map(l => l.time).filter(time => time > 0));
                                                
                                                return (
                                                    <div key={tel.id} className="bg-black/40 border border-gray-800 rounded-lg overflow-hidden flex flex-col h-64">
                                                        <div className="bg-gray-900/80 px-3 py-1.5 border-b border-gray-700 flex justify-between items-center" style={{ borderTop: `3px solid ${setup.color}` }}>
                                                            <span className="font-bold text-[10px] uppercase truncate">{setup.name.startsWith('PILOTO ') ? setup.name.replace('PILOTO', t('pilot')) : setup.name}</span>
                                                            <span className="font-mono text-[9px] bg-black/40 px-1 rounded text-gray-400">P{tel.position}</span>
                                                        </div>
                                                        <div className="flex-1 overflow-y-auto hide-scrollbar p-2 space-y-1">
                                                            {laps.length === 0 ? (
                                                                <div className="text-center text-gray-600 text-[9px] py-4">Sin vueltas registradas</div>
                                                            ) : (
                                                                laps.map((lap, idx) => {
                                                                    const isBest = lap.time === bestLap && lap.time > 0;
                                                                    const gap = lap.time > 0 && bestLap > 0 ? ((lap.time - bestLap)/1000).toFixed(3) : '---';
                                                                    return (
                                                                        <div key={idx} className={`flex justify-between items-center px-2 py-1 rounded text-[9px] font-mono border ${isBest ? 'bg-[#39ff14]/10 border-[#39ff14]/50' : 'bg-black/50 border-white/5 hover:bg-white/5'}`}>
                                                                            <span className="text-gray-500 w-6">V{lap.lap}</span>
                                                                            <span className={isBest ? 'text-[#39ff14] font-bold' : 'text-gray-300'}>{formatRaceTime(lap.time)}</span>
                                                                            <span className={`w-12 text-right ${isBest ? 'text-[#39ff14]' : 'text-gray-500'}`}>{isBest ? 'PR' : `+${gap}`}</span>
                                                                        </div>
                                                                    );
                                                                })
                                                            )}
                                                        </div>
                                                        <div className="bg-gray-900/50 p-1.5 text-center border-t border-gray-800">
                                                            <span className="text-[8px] text-gray-500 font-mono">TOTAL: {laps.length} VUELTAS</span>
                                                        </div>
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                    
                    {raceState === 'finished' && winnerId && !sessionResults && (
                        <div className="absolute inset-0 z-[200] flex flex-col items-center justify-center bg-black/90 backdrop-blur-xl animate-in p-6 overflow-auto">
                            <h1 className="text-6xl md:text-8xl font-black italic tracking-tighter text-transparent bg-clip-text bg-gradient-to-br from-white via-gray-200 to-gray-500 mb-4">{t('winner')}</h1>
                            <div className={`p-8 rounded-3xl border-4 shadow-[0_0_100px_currentColor] animate-bounce ${winnerId === 1 ? 'bg-red-900/50 border-red-500 text-red-500' : 'bg-blue-900/50 border-blue-500 text-blue-500'}`}>
                                <h2 className="text-4xl font-bold flex items-center gap-4"><span className="text-6xl">🏆</span> {carSetups[winnerId]?.name}</h2>
                            </div>
                            <button onClick={resetPractice} className="mt-10 px-8 py-4 bg-white text-black font-black text-xl rounded-full shadow-[0_0_30px_white]">{t('continue')}</button>
                        </div>
                    )}

                    {/* BARRA DE CONTROL INFERIOR - CENTRADA */}
                    <div className="absolute bottom-12 left-1/2 transform -translate-x-1/2 pointer-events-auto z-[70] flex items-end gap-4 max-w-[95vw]">
                        <div className="flex flex-col gap-2 shrink-0">
                            <button onClick={goTo2DFrom3D} className="flex items-center justify-center gap-2 bg-blue-600/90 hover:bg-blue-500 text-white border border-blue-400 px-6 py-3 rounded-full font-bold text-sm h-12 transition shadow-lg w-full">
                                <Layers size={20}/> 2D
                            </button>
                            <button onClick={onClose} className="flex items-center justify-center gap-2 bg-red-600/90 hover:bg-red-500 text-white border border-red-400 px-6 py-3 rounded-full font-bold text-sm h-12 transition shadow-lg w-full">
                                <X size={20}/> {t('back')}
                            </button>
                        </div>
                        <div className="flex gap-4 overflow-x-auto hide-scrollbar items-center bg-black/80 px-5 py-2 rounded-full border border-white/10 backdrop-blur-xl shadow-[0_0_30px_rgba(0,0,0,0.5)] h-12 shrink-0">
                            {/* BOTÓN LOCUTORA */}
                            <button onClick={() => setAnnouncerEnabled(!announcerEnabled)} className={`w-[95px] shrink-0 px-2 py-1.5 rounded-full font-black text-[10px] uppercase tracking-wider transition-all duration-300 flex items-center justify-center gap-1.5 border-2 ${announcerEnabled ? 'bg-[#39ff14]/20 text-[#39ff14] border-[#39ff14] shadow-[0_0_15px_rgba(57,255,20,0.4)] scale-105' : 'bg-gray-800 text-gray-500 border-gray-600 hover:text-white hover:border-gray-500'}`} title={announcerEnabled ? t('voiceOff') : t('voiceOn')}>
                                {announcerEnabled ? <Volume2 size={14} className="animate-pulse shrink-0"/> : <VolumeX size={14} className="shrink-0"/>}
                                <span className="truncate">{t('voice')} {announcerEnabled ? 'ON' : 'OFF'}</span>
                            </button>
                            <div className="w-px h-6 bg-white/20 shrink-0"></div>

                            {/* BOTÓN KRONO CAM */}
                            <button onClick={() => {
                                setShowKrono(!showKrono);
                                if (!showKrono) {
                                    setAnnouncerEnabled(true);
                                }
                            }} className={`w-[95px] shrink-0 px-2 py-1.5 rounded-full font-black text-[10px] uppercase tracking-wider transition-all duration-300 flex items-center justify-center gap-1.5 border-2 ${showKrono ? 'bg-orange-500/20 text-orange-500 border-orange-500 shadow-[0_0_15px_rgba(255,69,0,0.4)] scale-105' : 'bg-gray-800 text-gray-500 border-gray-600 hover:text-white hover:border-gray-500'}`} title="KRONO CAM">
                                <Crosshair size={14} className={showKrono ? "animate-[spin_4s_linear_infinite] shrink-0" : "shrink-0"}/>
                                <span className="truncate">KRONO</span>
                            </button>
                            <div className="w-px h-6 bg-white/20 shrink-0"></div>
                            
                            <div className="flex items-center gap-2 shrink-0">
                                <div className="flex flex-col items-end mr-1"><span className="text-[8px] text-gray-500 font-bold uppercase leading-none">{t('total')}</span><span className="text-[8px] text-[#39ff14] font-bold uppercase leading-none">{t('laps')}</span></div>
                                <button onClick={() => setTargetLaps(Math.max(1, targetLaps - 1))} className="w-6 h-6 flex items-center justify-center rounded-full bg-gray-900 border border-gray-600 transition-all"><Minus size={10} /></button>
                                <div className="bg-black border border-[#39ff14]/30 rounded px-2 w-10 text-center"><span className="font-digital text-lg text-[#39ff14]">{targetLaps}</span></div>
                                <button onClick={() => setTargetLaps(targetLaps + 1)} className="w-6 h-6 flex items-center justify-center rounded-full bg-gray-900 border border-gray-600 transition-all"><Plus size={10} /></button>
                            </div>
                            <div className="w-px h-6 bg-white/20"></div>
                            
                            <div className="flex gap-2">
                                <button onClick={() => { if (raceState === 'grid') startRaceSequence(); else if (paused) togglePause(); }} className="px-5 py-1.5 rounded-full font-black text-[10px] tracking-widest border border-[#39ff14] bg-[#39ff14]/10 text-[#39ff14] hover:bg-[#39ff14] hover:text-black transition-all flex items-center gap-2"><Play size={12} fill="currentColor"/> {t('start')}</button>
                                <button onClick={togglePause} className="px-5 py-1.5 rounded-full font-black text-[10px] tracking-widest border border-yellow-500 bg-yellow-500/10 text-yellow-500 hover:bg-yellow-500 hover:text-black transition-all flex items-center gap-2"><Pause size={12} fill="currentColor"/> {paused ? t('resume') : t('pause')}</button>
                            </div>
                            
                            <div className="w-px h-6 bg-white/20"></div>
                            <div className="flex items-center gap-2">
                                <div className="flex flex-col items-end mr-1"><span className="text-[8px] text-gray-500 font-bold uppercase leading-none">{t('total')}</span><span className="text-[8px] text-[#39ff14] font-bold uppercase leading-none">{t('pilots')}</span></div>
                                <button onClick={() => setNumCars(Math.max(1, numCars - 1))} className="w-6 h-6 flex items-center justify-center rounded-full bg-gray-900 border border-gray-600 transition-all"><Minus size={10} /></button>
                                <div className="bg-black border border-[#39ff14]/30 rounded px-2 w-10 text-center"><span className="font-digital text-lg text-[#39ff14]">{numCars}</span></div>
                                <button onClick={() => setNumCars(Math.min(8, numCars + 1))} className="w-6 h-6 flex items-center justify-center rounded-full bg-gray-900 border border-gray-600 transition-all"><Plus size={10} /></button>
                            </div>
                            <div className="w-px h-6 bg-white/20"></div>

                            {/* BOTÓN MENÚ CON ANCHO FIJO */}
                            <button onClick={enterGridMode} className="w-[115px] flex items-center justify-center px-4 py-1.5 rounded-full font-black text-[10px] tracking-widest uppercase bg-gray-800 text-gray-400 hover:text-white transition-all">{t('menu')}</button>
                            <div className="w-px h-6 bg-white/20"></div>
                            
                            {/* BOTÓN POLARIDAD CON ANCHO FIJO */}
                            <button onClick={() => {
                                if (raceState === 'grid' || raceState === 'idle') {
                                    setIsReversed(!isReversed);
                                } else {
                                    showValidationError(t('alertPolarity'));
                                }
                            }} className={`w-[115px] px-2 py-1.5 rounded-full font-black text-[10px] uppercase tracking-wider transition-all duration-300 flex items-center justify-center gap-1.5 border-2 ${isReversed ? 'bg-[#39ff14] text-black border-[#39ff14] shadow-[0_0_40px_#39ff14] scale-105' : 'bg-[#39ff14]/20 text-[#39ff14] border-[#39ff14] shadow-[0_0_20px_rgba(57,255,20,0.6),inset_0_0_10px_rgba(57,255,20,0.3)] [text-shadow:0_0_8px_#39ff14] hover:bg-[#39ff14]/40 hover:shadow-[0_0_35px_#39ff14]'}`} title={t('polarityChange')}>
                                <Repeat size={12} className={`shrink-0 ${isReversed ? "animate-[spin_4s_linear_infinite]" : ""}`} /> 
                                <span className="truncate">{t('polarity')} {isReversed ? 'I' : 'N'}</span>
                            </button>
                        </div>
                    </div>
                </div> 
            );
        };

        function Slot3DPlayer() {
          const [lang, setLang] = useState(() => localStorage.getItem('slot_lang') || 'es');
          
          const t = (key) => {
              if (TRANSLATIONS[lang] && TRANSLATIONS[lang][key]) return TRANSLATIONS[lang][key];
              return key;
          };

          const handleLangChange = (newLang) => {
              setLang(newLang);
              localStorage.setItem('slot_lang', newLang);
          };

          // NUEVO: Sincronizar el idioma en tiempo real si se cambia desde otra pestaña (ej: circuitos.html o deco.html)
          useEffect(() => {
              const syncLang = (e) => {
                  if (e.key === 'slot_lang' && e.newValue) {
                      setLang(e.newValue);
                  }
              };
              window.addEventListener('storage', syncLang);
              return () => window.removeEventListener('storage', syncLang);
          }, []);

          const [circuitData, setCircuitData] = useState(null);
          const [carSettings, setCarSettings] = useState(Array(8).fill(null).map((_, i) => ({ id: i + 1, name: `PILOTO ${i + 1}`, color: ['#ef4444', '#3b82f6', '#22c55e', '#eab308', '#a855f7', '#ec4899', '#f97316', '#64748b'][i % 8] })));
          const [customCarAssets, setCustomCarAssets] = useState(Object.fromEntries(Array.from({length: 8}, (_, i) => [i + 1, { obj: null, rotation: [0, 180, 0], yOffset: 0 }])));

          const handleCarAssetUpdate = (file, targetId, transformData) => {
              if (file && targetId) {
                  const url = URL.createObjectURL(file);
                  setCustomCarAssets(prev => ({
                      ...prev,
                      [targetId]: { ...prev[targetId], glb: url, glbName: file.name }
                  }));
                  console.log(`Modelo asignado a coche ${targetId}`);
              }
              else if (targetId && transformData) {
                  setCustomCarAssets(prev => ({
                      ...prev,
                      [targetId]: { ...prev[targetId], ...transformData }
                  }));
              }
          };

          // NUEVO: Auto-cargar modelos GLB para los coches al iniciar
          const autoLoadDone = useRef(false);
          useEffect(() => {
              if (circuitData && !autoLoadDone.current) {
                  autoLoadDone.current = true;
                  
                  const savedConfig = localStorage.getItem('slot_gh_config');
                  let config = { owner: 'slotsoftware', repo: 'Telemetria', path: 'coches', branch: 'main' };
                  if (savedConfig) {
                      try { 
                          const parsed = JSON.parse(savedConfig); 
                          if ((parsed.owner === 'slotcarhome-star' || parsed.owner === 'slotsoftware') && 
                              (parsed.repo === 'Circuitos3d' || parsed.repo === 'Telemetria')) {
                              parsed.owner = 'slotsoftware';
                              parsed.repo = 'Telemetria';
                              parsed.path = 'coches';
                          }
                          config = parsed;
                      } catch (e) {}
                  }

                  const apiUrl = `https://api.github.com/repos/${config.owner}/${config.repo}/contents${config.path ? '/' + config.path : ''}`;
                  
                  const getRawUrl = (fileName) => {
                      return `https://raw.githubusercontent.com/${config.owner}/${config.repo}/${config.branch}/${config.path ? config.path + '/' : ''}${fileName}`;
                  };

                  const loadFromUrl = (rawUrl, fileName, targetId) => {
                      fetch(rawUrl)
                          .then(r => r.blob())
                          .then(blob => {
                              const file = new File([blob], fileName, { type: 'model/gltf-binary' });
                              setCustomCarAssets(prev => {
                                  if (prev[targetId] && prev[targetId].glb) return prev; // Evita sobreescribir si el usuario cargó uno manual rápido
                                  const url = URL.createObjectURL(file);
                                  return { ...prev, [targetId]: { ...prev[targetId], glb: url, glbName: fileName } };
                              });
                              console.log(`🚗 Auto-cargado coche ${targetId} por defecto:`, fileName);
                          })
                          .catch(e => console.error(`Error auto-loading car ${targetId}:`, e));
                  };

                  fetch(apiUrl)
                      .then(res => res.ok ? res.json() : Promise.reject(res.status))
                      .then(data => {
                          if (Array.isArray(data)) {
                              const glbFiles = data.filter(f => f.name.toLowerCase().endsWith('.glb') || f.name.toLowerCase().endsWith('.gltf'));
                              
                              if (glbFiles.length > 0) {
                                  // Coche 1: 9no archivo (posición 9 de la nube, índice 8)
                                  if (glbFiles.length > 8) loadFromUrl(getRawUrl(glbFiles[8].name), glbFiles[8].name, 1);
                                  else loadFromUrl(getRawUrl(glbFiles[0].name), glbFiles[0].name, 1);
                                  
                                  // Coche 2: 10mo archivo (posición 10 de la nube, índice 9)
                                  if (glbFiles.length > 9) loadFromUrl(getRawUrl(glbFiles[9].name), glbFiles[9].name, 2);
                                  else loadFromUrl(getRawUrl(glbFiles[0].name), glbFiles[0].name, 2);

                                  // Resto de coches asignados secuencialmente a los primeros archivos
                                  if (glbFiles.length > 0) loadFromUrl(getRawUrl(glbFiles[0].name), glbFiles[0].name, 3);
                                  
                                  if (glbFiles.length > 1) loadFromUrl(getRawUrl(glbFiles[1].name), glbFiles[1].name, 4);
                                  else if (glbFiles.length > 0) loadFromUrl(getRawUrl(glbFiles[0].name), glbFiles[0].name, 4);
                                  
                                  if (glbFiles.length > 2) loadFromUrl(getRawUrl(glbFiles[2].name), glbFiles[2].name, 5);
                                  else if (glbFiles.length > 0) loadFromUrl(getRawUrl(glbFiles[0].name), glbFiles[0].name, 5);
                                  
                                  if (glbFiles.length > 3) loadFromUrl(getRawUrl(glbFiles[3].name), glbFiles[3].name, 6);
                                  else if (glbFiles.length > 0) loadFromUrl(getRawUrl(glbFiles[0].name), glbFiles[0].name, 6);
                                  
                                  if (glbFiles.length > 4) loadFromUrl(getRawUrl(glbFiles[4].name), glbFiles[4].name, 7);
                                  else if (glbFiles.length > 0) loadFromUrl(getRawUrl(glbFiles[0].name), glbFiles[0].name, 7);
                                  
                                  if (glbFiles.length > 5) loadFromUrl(getRawUrl(glbFiles[5].name), glbFiles[5].name, 8);
                                  else if (glbFiles.length > 0) loadFromUrl(getRawUrl(glbFiles[0].name), glbFiles[0].name, 8);
                              }
                          }
                      })
                      .catch(err => {
                          console.log("GitHub API failed for auto-load:", err);
                          // Fallback por límite de API de GitHub (60 peticiones/hora)
                          if (config.owner === 'slotsoftware' && config.repo === 'Telemetria') {
                              loadFromUrl(getRawUrl('amartin.glb'), 'amartin.glb', 1);
                              loadFromUrl(getRawUrl('seat_leon.glb'), 'seat_leon.glb', 2);
                              loadFromUrl(getRawUrl('seat_leon.glb'), 'seat_leon.glb', 3);
                              loadFromUrl(getRawUrl('amartin.glb'), 'amartin.glb', 4);
                              loadFromUrl(getRawUrl('seat_leon.glb'), 'seat_leon.glb', 5);
                              loadFromUrl(getRawUrl('amartin.glb'), 'amartin.glb', 6);
                              loadFromUrl(getRawUrl('seat_leon.glb'), 'seat_leon.glb', 7);
                              loadFromUrl(getRawUrl('amartin.glb'), 'amartin.glb', 8);
                          }
                      });
              }
          }, [circuitData]);

          useEffect(() => { 
              const ls = document.getElementById('loading-screen'); 
              
              // LÓGICA DE CARGA INTELIGENTE (HANDOFF 2D -> 3D)
              
              // 1. Primero miramos si el Diseñador 2D nos ha pasado un circuito ("slot_circuit_transfer")
              const transferData = localStorage.getItem('slot_circuit_transfer');
              
              if (transferData) {
                  try {
                      const d = JSON.parse(transferData);
                      if (d.brand && d.pieces) {
                          setCircuitData(d);
                          console.log("⚡ Circuito importado desde el Diseñador 2D.");
                          
                          // Lo guardamos como nuestro "último circuito" persistente (STRING EXACTO)
                          localStorage.setItem('slot_last_circuit', transferData);
                          
                          // IMPORTANTE: Borramos la transferencia para consumir el evento
                          localStorage.removeItem('slot_circuit_transfer');
                      }
                  } catch (e) {
                      console.error("Error al leer datos del diseñador 2D:", e);
                  }
              } 
              else {
                  // 2. Si no hay transferencia, cargamos el último circuito que se usó en el visor
                  const savedCircuit = localStorage.getItem('slot_last_circuit');
                  if (savedCircuit) {
                      try {
                          const d = JSON.parse(savedCircuit);
                          if (d.brand && d.pieces) {
                              setCircuitData(d);
                              console.log("⚡ Circuito recuperado del historial.");
                          }
                      } catch (e) {
                          console.warn("No se pudo recuperar el circuito guardado.");
                      }
                  }
              }

              if (ls) { ls.style.opacity = '0'; setTimeout(() => ls.style.display = 'none', 1000); } 
          }, []);

          const loadCircuit = (e) => { 
            const f = e.target.files[0]; if (!f) return; 
            const r = new FileReader(); 
            r.onload = (ev) => { 
                try { 
                    const d = JSON.parse(ev.target.result); 
                    if (d.brand && (d.pieces || d.lanes)) { 
                        setCircuitData(d); // Guardamos el objeto completo para no perder datos que necesita el 2D
                        // 2. GUARDAR EN MEMORIA AL CARGAR MANUALMENTE (STRING EXACTO)
                        localStorage.setItem('slot_last_circuit', ev.target.result);
                    } else {
                        console.error("Formato de circuito inválido");
                    }
                } catch (err) { console.error("Error al leer JSON"); } 
            }; 
            r.readAsText(f); 
          };

          if (circuitData) {
            return (
                <LanguageContext.Provider value={{ lang, t }}>
                    <React.Fragment>
                        {/* BANDERAS DE IDIOMA EN EL VISOR 3D */}
                        <div className="absolute top-6 right-24 z-[90] flex gap-3 bg-black/50 p-2 rounded-full border border-white/10 backdrop-blur-md pointer-events-auto">
                            <button onClick={() => handleLangChange('es')} className={`text-2xl transition-all ${lang === 'es' ? 'scale-125 drop-shadow-[0_0_10px_rgba(255,255,255,0.8)] grayscale-0' : 'opacity-50 grayscale hover:grayscale-0 hover:opacity-100'}`} title="Español">🇪🇸</button>
                            <button onClick={() => handleLangChange('en')} className={`text-2xl transition-all ${lang === 'en' ? 'scale-125 drop-shadow-[0_0_10px_rgba(255,255,255,0.8)] grayscale-0' : 'opacity-50 grayscale hover:grayscale-0 hover:opacity-100'}`} title="English">🇬🇧</button>
                        </div>
                        <Telemetry3DViewer 
                            circuitData={circuitData} 
                            carSettings={carSettings} 
                            customCarAssets={customCarAssets} 
                            onCarAssetUpdate={handleCarAssetUpdate}
                            onClose={() => setCircuitData(null)} 
                        />
                    </React.Fragment>
                </LanguageContext.Provider>
            );
          }

          return (
            <LanguageContext.Provider value={{ lang, t }}>
                <div className="flex flex-col h-[100dvh] w-full bg-[#0a0a0a] overflow-hidden font-sans select-none text-gray-200 justify-center items-center relative">
                    
                    {/* BANDERAS DE IDIOMA */}
                    <div className="absolute top-6 right-6 z-50 flex gap-3 bg-black/50 p-2 rounded-full border border-white/10 backdrop-blur-md">
                        <button onClick={() => handleLangChange('es')} className={`text-2xl transition-all ${lang === 'es' ? 'scale-125 drop-shadow-[0_0_10px_rgba(255,255,255,0.8)] grayscale-0' : 'opacity-50 grayscale hover:grayscale-0 hover:opacity-100'}`} title="Español">🇪🇸</button>
                        <button onClick={() => handleLangChange('en')} className={`text-2xl transition-all ${lang === 'en' ? 'scale-125 drop-shadow-[0_0_10px_rgba(255,255,255,0.8)] grayscale-0' : 'opacity-50 grayscale hover:grayscale-0 hover:opacity-100'}`} title="English">🇬🇧</button>
                    </div>

                    {/* LOBBY SCREEN */}
                    <div className="absolute inset-0 opacity-20 pointer-events-none" style={{backgroundImage: 'radial-gradient(#39ff14 1px, transparent 1px)', backgroundSize: '40px 40px'}}></div>
                    <div className="z-10 flex flex-col items-center gap-8 animate-in w-full max-w-4xl px-4">
                        <div className="text-center">
                            <Activity size={80} className="text-[#39ff14] mx-auto mb-4 animate-pulse drop-shadow-[0_0_30px_rgba(57,255,20,0.6)]"/>
                            <h1 className="text-5xl md:text-7xl font-black italic tracking-tighter text-white uppercase drop-shadow-xl">TRACKS & TELEMETRY</h1>
                            <p className="text-[#39ff14] font-mono text-xl tracking-[0.5em] mt-2 font-bold">3D PLAYER</p>
                        </div>

                        <div className="bg-black/50 p-10 rounded-3xl border border-white/10 backdrop-blur-xl shadow-2xl flex flex-col items-center gap-6 w-full">
                            <div className="text-center space-y-2 mb-4">
                                <h2 className="text-2xl font-bold text-white">{t('lobbyTitle')}</h2>
                                <p className="text-gray-400 text-sm">{t('lobbySub')}</p>
                            </div>
                            
                            <div className="flex flex-col md:flex-row gap-6 w-full justify-center">
                                {/* BOTÓN CARGAR ARCHIVO JSON */}
                                <label className="group relative cursor-pointer flex-1 max-w-xs">
                                    <div className="absolute -inset-1 bg-gradient-to-r from-[#39ff14] to-emerald-600 rounded-xl blur opacity-25 group-hover:opacity-75 transition duration-1000 group-hover:duration-200"></div>
                                    <div className="relative px-6 py-8 bg-gray-900 ring-1 ring-gray-900/5 rounded-xl leading-none flex flex-col items-center justify-center gap-4 h-full hover:bg-gray-800 transition-colors">
                                        <CloudUpload className="w-12 h-12 text-[#39ff14] group-hover:scale-110 transition-transform duration-300" />
                                        <span className="text-gray-300 group-hover:text-white transition-colors font-bold uppercase tracking-wider text-center text-sm">{t('btnLoad')}</span>
                                    </div>
                                    <input type="file" accept=".json" onChange={loadCircuit} className="hidden" />
                                </label>

                                {/* BOTÓN IR AL DISEÑADOR 2D */}
                                <button onClick={() => {
                                    let dataStr = localStorage.getItem('slot_last_circuit');
                                    if (!dataStr && circuitData) {
                                        dataStr = JSON.stringify(circuitData);
                                    }
                                    
                                    if (dataStr) {
                                        // Guardar el circuito en la clave de transferencia (¡No borrarla!)
                                        localStorage.setItem('slot_circuit_transfer', dataStr);
                                        sessionStorage.setItem('slot_circuit_transfer', dataStr);
                                        
                                        const keys = ['slot_circuit', 'slot_save', 'circuit_data', 'circuitData', 'slot_track', 'slot_estado'];
                                        keys.forEach(k => localStorage.setItem(k, dataStr));
                                    }
                                    
                                    // Retardo de seguridad para evitar condición de carrera en navegadores
                                    setTimeout(() => {
                                        window.location.href = 'circuitos.html';
                                    }, 250);
                                }} className="group relative flex-1 max-w-xs">
                                    <div className="absolute -inset-1 bg-gradient-to-r from-blue-600 to-cyan-500 rounded-xl blur opacity-25 group-hover:opacity-75 transition duration-1000 group-hover:duration-200"></div>
                                    <div className="relative px-6 py-8 bg-gray-900 ring-1 ring-gray-900/5 rounded-xl leading-none flex flex-col items-center justify-center gap-4 h-full hover:bg-gray-800 transition-colors">
                                        <PenTool className="w-12 h-12 text-cyan-400 group-hover:scale-110 transition-transform duration-300" />
                                        <span className="text-gray-300 group-hover:text-white transition-colors font-bold uppercase tracking-wider text-center text-sm">{t('btn2D')}</span>
                                    </div>
                                </button>
                            </div>
                            
                            {/* Botón opcional para borrar memoria */}
                            <button onClick={() => { localStorage.removeItem('slot_last_circuit'); sessionStorage.removeItem('slot_last_circuit'); console.log("Memoria de circuito borrada."); }} className="text-[10px] text-gray-600 hover:text-red-400 mt-6 uppercase tracking-widest transition-colors border-b border-transparent hover:border-red-400/50 pb-0.5">
                                {t('clearCache')}
                            </button>
                        </div>

                        <div className="text-[10px] text-gray-600 font-mono absolute bottom-4">V.2.0 PLAYER - POWERED BY REACT & THREE.JS</div>
                    </div>
                </div>
            </LanguageContext.Provider>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<Slot3DPlayer />);
    </script>
</body>
</html>
