        console.error = function(...args) {
            if (typeof args[0] === 'string' && args[0].includes('deoptimised the styling of')) return;
            originalConsoleError.apply(console, args);

            sharedGLTFLoader = new THREE.GLTFLoader();

            );
        });
        const TireSVG = memo(({ type, rimColor, label, compoundColor }) => (<svg viewBox="0 0 60 60" className="w-full h-full drop-shadow-md transform transition-transform hover:scale-110"><defs><radialGradient id={`rim-${label}`} cx="50%" cy="50%" r="50%"><stop offset="0%" stopColor="#fff"/><stop offset="100%" stopColor={rimColor}/></radialGradient></defs><circle cx="30" cy="30" r="28" fill="#1a1a1a" stroke="#000" strokeWidth="1" />{type === 'Lluvia' && <path d="M10,10 L50,50 M50,10 L10,50 M30,5 L30,55 M5,30 L55,30" stroke="#333" strokeWidth="1" opacity="0.3" />}<circle cx="30" cy="30" r="18" fill={`url(#rim-${label})`} stroke="#444" strokeWidth="1" /><circle cx="30" cy="30" r="3" fill="#111" /><text x="30" y="54" fontSize="7" fontWeight="900" fill={compoundColor} textAnchor="middle" style={{textShadow:'0 1px 1px black'}}>{label}</text></svg>));
        const GearSVG = memo(({ teeth, color, material }) => (<svg viewBox="0 0 60 60" className="w-full h-full transform transition-transform hover:rotate-90 duration-500"><path d="M30,2 L32,6 L36,6 L38,2 L42,4 L42,8 L46,10 L48,6 L52,9 L50,14 L54,16 L58,14 L58,19 L54,22 L56,26 L60,28 L58,32 L54,34 L56,38 L58,41 L54,44 L50,42 L48,46 L52,50 L48,54 L44,52 L42,56 L38,58 L36,54 L32,54 L30,58 L26,56 L24,52 L20,54 L16,50 L20,46 L18,42 L14,44 L10,41 L12,37 L8,34 L4,32 L2,28 L6,26 L8,22 L4,19 L4,14 L8,16 L12,14 L10,9 L14,6 L16,10 L20,8 L20,4 L24,2 L26,6 L30,6 Z" fill={color} stroke="#000" strokeWidth="0.5"/><circle cx="30" cy="30" r="10" fill={material==='Bronce'?'#92400e':(material==='Dural'?'#94a3b8':'#e2e8f0')} stroke="#000" strokeWidth="1"/><circle cx="30" cy="30" r="3" fill="#000"/></svg>));
        const PinionSVG = memo(({ teeth, material, diameter }) => (<svg viewBox="0 0 40 40" className="w-full h-full transform transition-transform hover:rotate-180 duration-500"><circle cx="20" cy="20" r="18" fill="none" stroke="#666" strokeWidth="2" strokeDasharray="3,1"/><path d="M20,2 L23,5 L28,5 L30,8 L35,10 L35,15 L32,18 L35,22 L35,28 L30,32 L25,32 L22,35 L18,35 L15,32 L10,32 L5,28 L5,22 L8,18 L5,15 L5,10 L10,8 L12,5 L17,5 Z" fill={material==='Latón'?'#fbbf24':(material==='Nylon'?'#fff':'#94a3b8')} stroke="#000" strokeWidth="0.5"/><circle cx="20" cy="20" r="4" fill="#000"/></svg>));
        
        /* --- COMPONENTE GLB VIEWER (HOMO -> GARAJE) --- */
        const GLBViewer = ({ onClose, onLoad, onTransform, carAssets, carSetups, onNameChange }) => { 
            const { t } = useTranslation();
            const mountRef = useRef(null); 
            const inputRef = useRef(null); 
            const [status, setStatus] = useState("ESPERANDO..."); 
            const [targetCarId, setTargetCarId] = useState(1); 
            const [showCarMenu, setShowCarMenu] = useState(false); 
            
            const [rotY, setRotY] = useState(180);
            const [yOff, setYOff] = useState(0);
            
            // ESTADO PARA ENTRADA MANUAL DE ARCHIVO
            const [manualFileName, setManualFileName] = useState("");

            const rendererRef = useRef(null); 
            const sceneRef = useRef(null); 
            const cameraRef = useRef(null); 
            const controlsRef = useRef(null); 
            const modelRef = useRef(null);
        
        // GITHUB STATE CON PERSISTENCIA
        const [ghConfig, setGhConfig] = useState(() => {
            const saved = localStorage.getItem('slot_gh_config');
            if (saved) {
                let parsed = JSON.parse(saved);
                // Auto-migración al nuevo directorio si se usaba el anterior por defecto
                if ((parsed.owner === 'slotcarhome-star' || parsed.owner === 'slotsoftware') && 
                    (parsed.repo === 'Circuitos3d' || parsed.repo === 'Telemetria')) {
                    parsed.owner = 'slotsoftware';
                    parsed.repo = 'Telemetria';
                    parsed.path = 'coches';
                    localStorage.setItem('slot_gh_config', JSON.stringify(parsed));
                }
                return parsed;
            }
            return { owner: 'slotsoftware', repo: 'Telemetria', path: 'coches', branch: 'main' };
        });
        const [isEditingConfig, setIsEditingConfig] = useState(false);
        const [onlineFiles, setOnlineFiles] = useState([]);
        const [showFileMenu, setShowFileMenu] = useState(false);

        // Actualizar controles si cambias de coche
        useEffect(() => {
            if (carAssets && carAssets[targetCarId]) {
                const asset = carAssets[targetCarId];
                if (asset.rotation && asset.rotation[1] !== undefined) {
                    setRotY(asset.rotation[1]);
                }
                if (asset.yOffset !== undefined) {
                    setYOff(parseFloat(asset.yOffset));
                }
                // Si ya hay modelo cargado, actualizar visualmente
                if (modelRef.current) {
                    modelRef.current.rotation.y = (asset.rotation ? asset.rotation[1] : 180) * Math.PI / 180;
                    modelRef.current.position.y = (asset.yOffset !== undefined ? parseFloat(asset.yOffset) : 0) + (modelRef.current.userData.initialY || 0);
                }
            }
        }, [targetCarId, carAssets]);

        // Fetch archivos de GitHub
        useEffect(() => {
            if (!showFileMenu) return;
            if (!ghConfig.owner || !ghConfig.repo) {
                setIsEditingConfig(true); // Forzar edición si no hay config
                return;
            }
            // Si hay config y no estamos editando, cargar
            if (!isEditingConfig) {
                setStatus("BUSCANDO EN GITHUB...");
                const path = ghConfig.path ? `/${ghConfig.path}` : '';
                const apiUrl = `https://api.github.com/repos/${ghConfig.owner}/${ghConfig.repo}/contents${path}`;
                
                fetch(apiUrl)
                    .then(res => {
                        if (res.status === 404) throw new Error("Repo no encontrado");
                        // Si nos da error de tasa (rate limit), lanzamos error para mostrar botón manual
                        if (res.status === 403) throw new Error("Límite API excedido");
                        return res.json();
                    })
                    .then(data => {
                        if (Array.isArray(data)) {
                            const glbFiles = data.filter(f => f.name.toLowerCase().endsWith('.glb') || f.name.toLowerCase().endsWith('.gltf'));
                            setOnlineFiles(glbFiles);
                            setStatus(glbFiles.length > 0 ? "ARCHIVOS ENCONTRADOS" : "SIN ARCHIVOS 3D");
                        } else {
                            setOnlineFiles([]);
                            setStatus("CARPETA VACÍA");
                        }
                    })
                    .catch(err => {
                        console.error("Error GitHub:", err);
                        setStatus("ERROR CONEXIÓN (VER LOG)");
                        setOnlineFiles([]); // Asegura lista vacía para mostrar fallback
                    });
            }
        }, [showFileMenu, ghConfig, isEditingConfig]);

        const saveGithubConfig = (e) => {
            e.preventDefault();
            const formData = new FormData(e.target);
            const newConfig = {
                owner: formData.get('owner').trim(),
                repo: formData.get('repo').trim(),
                path: formData.get('path').trim(),
                branch: formData.get('branch').trim() || 'main'
            };
            
            if (newConfig.owner && newConfig.repo) {
                localStorage.setItem('slot_gh_config', JSON.stringify(newConfig));
                setGhConfig(newConfig);
                setIsEditingConfig(false);
                setStatus("CONFIGURACIÓN GUARDADA");
            }
        };

        useEffect(() => { 
            if (!mountRef.current) return; 
            if (rendererRef.current) return; // GUARDA DEFENSIVA: Evitar doble inicialización

            if (typeof THREE === 'undefined') { setStatus("ERROR: THREE.JS NO CARGADO"); return; } 
            if (typeof THREE.GLTFLoader === 'undefined') { setStatus("ERROR: GLTFLOADER NO CARGADO"); return; } 
            
            const width = mountRef.current.clientWidth || 300; 
            const height = mountRef.current.clientHeight || 300; 
            const scene = new THREE.Scene(); 
            sceneRef.current = scene; 
            
            // --- GRUPO SEGURO PARA MODELOS ---
            // Creamos un contenedor específico para los coches.
            // Al recargar, limpiaremos SOLO este grupo, sin tocar luces ni helpers.
            const modelGroup = new THREE.Group();
            modelGroup.name = "MODEL_CONTAINER";
            scene.add(modelGroup);
            modelRef.current = modelGroup;

            const camera = new THREE.PerspectiveCamera(50, width / height, 0.01, 1000); 
            camera.position.set(0, 1.5, 3.5); 
            cameraRef.current = camera; 
            
            const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true, preserveDrawingBuffer: true, powerPreference: "high-performance" }); 
            renderer.setSize(width, height); 
            // OPTIMIZACIÓN: Capado a 1.0 para no saturar GPUs en pantallas Retina/Alta densidad
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.0)); 
            renderer.outputEncoding = THREE.sRGBEncoding; 
            renderer.toneMapping = THREE.ACESFilmicToneMapping;
            renderer.toneMappingExposure = 1.2;
            renderer.shadowMap.enabled = true;
            // OPTIMIZACIÓN: Sombras estándar (Mucho más rápidas que las Soft)
            renderer.shadowMap.type = THREE.PCFShadowMap;
            mountRef.current.appendChild(renderer.domElement); 
            rendererRef.current = renderer; 
            
            // ELEMENTOS ESTÁTICOS (Nunca se eliminan)
            const hemiLight = new THREE.HemisphereLight(0xffffff, 0x444444, 1.0); 
            hemiLight.userData = { keep: true };
            scene.add(hemiLight); 
            
            const dirLight = new THREE.DirectionalLight(0xffffff, 2.0); 
            dirLight.position.set(5, 5, 5); 
            dirLight.castShadow = true; 
            dirLight.shadow.mapSize.width = 1024;
            dirLight.shadow.mapSize.height = 1024;
            dirLight.userData = { keep: true };
            scene.add(dirLight); 
            
            const grid = new THREE.GridHelper(10, 10, 0x39ff14, 0x333333); 
            grid.userData = { keep: true };
            scene.add(grid); 
            
            const axes = new THREE.AxesHelper(1); 
            axes.userData = { keep: true };
            scene.add(axes); 
            
            if (typeof THREE.OrbitControls !== 'undefined' && !controlsRef.current) { 
                const controls = new THREE.OrbitControls(camera, renderer.domElement); 
                controls.enableDamping = true; 
                controls.autoRotate = true; 
                controls.target.set(0, 0.5, 0); 
                controlsRef.current = controls; 
            } 
            
            const resizeObserver = new ResizeObserver(entries => { 
                window.requestAnimationFrame(() => { 
                    for (let entry of entries) { 
                        const { width, height } = entry.contentRect; 
                        if (width && height && renderer && camera) { 
                            camera.aspect = width / height; 
                            camera.updateProjectionMatrix(); 
                            renderer.setSize(width, height); 
                        } 
                    } 
                }); 
            }); 
            resizeObserver.observe(mountRef.current); 
            
            let frameId; 
            const animate = () => { 
                frameId = requestAnimationFrame(animate); 
                if (controlsRef.current) controlsRef.current.update(); 
                renderer.render(scene, camera); 
            }; 
            animate(); 
            
            return () => { 
                cancelAnimationFrame(frameId); 
                resizeObserver.disconnect(); 
                if (controlsRef.current) {
                    controlsRef.current.dispose();
                    controlsRef.current = null;
                }
                if (rendererRef.current) { 
                    rendererRef.current.dispose(); 
                    if (mountRef.current && rendererRef.current.domElement) {
                        mountRef.current.removeChild(rendererRef.current.domElement);
                    }
                    rendererRef.current = null;
                } 
            }; 
        }, []); 
        
        const applyTransform = (newRot, newY) => {
            setRotY(newRot);
            setYOff(newY);
            if (modelRef.current) {
                modelRef.current.rotation.y = newRot * Math.PI / 180;
                modelRef.current.position.y = newY + (modelRef.current.userData.initialY || 0);
            }
            if (onTransform) {
                onTransform(targetCarId, { rotation: [0, newRot, 0], yOffset: newY });
            }
        };

        const rotate90 = (dir) => {
            // Rotar 90 grados exactos
            let next = rotY + (90 * dir);
            applyTransform(next, yOff);
        }

        const adjustHeight = (direction) => { 
            const next = yOff + (direction * 0.05);
            applyTransform(rotY, next);
        }; 

        const processLoadedModel = (model, fileName, url) => {
            if (!sceneRef.current || !modelRef.current) return;

            const modelGroup = modelRef.current;

            // LIMPIEZA SEGURA SOLO DEL GRUPO (Deep cleanup)
            while (modelGroup.children.length > 0) {
                const oldObj = modelGroup.children[0];
                oldObj.traverse(c => {
                    if (c.isMesh) {
                        if (c.geometry) c.geometry.dispose();
                        if (c.material) {
                            const disposeMat = (m) => {
                                for (const key in m) {
                                    if (m[key] && m[key].isTexture) m[key].dispose();
                                }
                                m.dispose();
                            };
                            if (Array.isArray(c.material)) c.material.forEach(disposeMat);
                            else disposeMat(c.material);
                        }
                    }
                });
                modelGroup.remove(oldObj);
            }

            model.traverse(child => {
                if (child.isMesh) {
                    child.castShadow = true;
                    child.receiveShadow = true; 
                    child.frustumCulled = false; // EVITA TIRONES DE CÁMARA
                    if (child.material) {
                        // FIX PBR: Evita que los metales se vean negros sin un HDRI
                        const fixMat = (m) => {
                            if (m.metalness !== undefined) m.metalness = Math.min(m.metalness, 0.4);
                            if (m.roughness !== undefined) m.roughness = Math.max(m.roughness, 0.3);
                            m.needsUpdate = true;
                        };
                        if (Array.isArray(child.material)) child.material.forEach(fixMat);
                        else fixMat(child.material);
                    }
                }
            });

            // 1. Resetear transformaciones para un cálculo limpio
            model.position.set(0, 0, 0);
            model.scale.set(1, 1, 1);
            model.updateMatrixWorld(true);

            // 2. Medir modelo original y centrar en X/Z
            const boxOriginal = new THREE.Box3().setFromObject(model);
            const sizeOriginal = boxOriginal.getSize(new THREE.Vector3());
            const centerOriginal = boxOriginal.getCenter(new THREE.Vector3());

            model.position.x -= centerOriginal.x;
            model.position.z -= centerOriginal.z;

            // 3. Aplicar escala
            const maxDim = Math.max(sizeOriginal.x, sizeOriginal.y, sizeOriginal.z);
            const scale = maxDim > 0 ? 3.5 / maxDim : 1;
            model.scale.setScalar(scale);
            model.updateMatrixWorld(true);

            // 4. Auto-Alineación con el Suelo (Auto-Floor)
            // Calcula el punto más bajo real después de escalar y lo eleva para que toque exactamente Y=0
            const boxScaled = new THREE.Box3().setFromObject(model);
            const bottomOffset = -boxScaled.min.y;

            model.userData.initialY = bottomOffset;
            model.position.y += bottomOffset + yOff;
            model.rotation.y = rotY * Math.PI / 180;

            modelGroup.add(model);

            setStatus(`CARGADO: ${fileName.toUpperCase()}`);

            if (url) {
                fetch(url)
                    .then(r => r.blob())
                    .then(blob => {
                        const file = new File([blob], fileName, { type: 'model/gltf-binary' });
                        if (onLoad) onLoad(file, targetCarId);
                    });
            }

            if (onTransform) {
                onTransform(targetCarId, { rotation: [0, rotY, 0], yOffset: yOff });
            }
        };

        const loadFromGitHub = (fileData) => {
            setShowFileMenu(false);
            setStatus(`DESCARGANDO: ${fileData.name}...`);
            
            let rawUrl = `https://raw.githubusercontent.com/${ghConfig.owner}/${ghConfig.repo}/${ghConfig.branch}/${ghConfig.path ? ghConfig.path + '/' : ''}${fileData.name}`;

            console.log("Intentando cargar:", rawUrl); // Debug para ver URL real

            // USAR EL CARGADOR OPTIMIZADO COMPARTIDO
            const loader = getSharedGLTFLoader();
            loader.load(rawUrl, (gltf) => processLoadedModel(gltf.scene, fileData.name, rawUrl), (xhr) => setStatus(`BAJANDO ${(xhr.loaded / xhr.total * 100).toFixed(0)}%`), (err) => { console.error(err); setStatus("ERROR: NO ENCONTRADO (404)"); });
        };

        const loadDirectFile = (fileName) => {
            // Helper para cargar archivo directo sin pasar por el listado de API
            if(!fileName) return;
            const cleanName = fileName.trim();
            loadFromGitHub({ name: cleanName });
        };

        const handleFileChange = (e) => { 
            const file = e.target.files[0]; if (!file) return; 
            
            // VALIDACIÓN EXTENSIÓN
            const lowerName = file.name.toLowerCase();
            if (!lowerName.endsWith('.glb') && !lowerName.endsWith('.gltf')) {
                setStatus("FICHERO INCORRECTO");
                e.target.value = '';
                return;
            }

            setStatus("PROCESANDO LOCAL..."); 
            const reader = new FileReader(); 
            reader.onload = (event) => { 
                // USAR EL CARGADOR OPTIMIZADO COMPARTIDO
                const loader = getSharedGLTFLoader(); 
                loader.parse(event.target.result, '', (gltf) => { processLoadedModel(gltf.scene, file.name, null); if (onLoad) onLoad(file, targetCarId); }, (err) => { console.error(err); setStatus("ERROR PARSE GLB"); }); 
            }; 
            reader.readAsArrayBuffer(file); e.target.value = ''; 
        }; 
        
        const triggerFileSelect = () => { if (inputRef.current) inputRef.current.click(); }; 
        
        return ( 
            <div className="w-[380px] h-[400px] bg-[#0f172a] border-2 border-[#39ff14] rounded-xl shadow-[0_0_40px_rgba(57,255,20,0.2)] flex flex-col overflow-hidden animate-in z-50 pointer-events-auto relative">
                <div className="bg-[#39ff14]/10 p-2 flex flex-col border-b border-[#39ff14]/30 gap-1.5 shrink-0">
                    <div className="flex justify-between items-center w-full">
                        <div className="flex items-center gap-1.5 shrink-0"><span className="w-2 h-2 bg-[#39ff14] rounded-full animate-pulse"></span><h3 className="text-[10px] font-black text-white tracking-[0.1em]">{t('garage3d')}</h3></div> 
                        <div className="relative"><button onClick={() => setShowCarMenu(!showCarMenu)} className="flex items-center gap-1 bg-black/60 border border-[#39ff14]/30 hover:border-[#39ff14] rounded px-2 py-1 transition-all group" ><span className="text-[8px] font-bold text-gray-400 group-hover:text-gray-300">ASIGNAR:</span><span className="text-[10px] font-mono font-bold text-[#39ff14] group-hover:text-white">C{targetCarId}</span><ChevronDown size={12} className="text-[#39ff14] opacity-50 group-hover:opacity-100 transition-transform duration-300" style={{ transform: showCarMenu ? 'rotate(180deg)' : 'rotate(0deg)' }}/></button> 
                            {showCarMenu && ( <div className="absolute top-full left-0 mt-1 w-28 bg-[#0a0a0a] border border-[#39ff14] shadow-[0_0_15px_rgba(57,255,20,0.2)] z-[100] flex flex-col max-h-40 overflow-y-auto hide-scrollbar rounded-md animate-in origin-top"> {[1,2,3,4,5,6,7,8].map(id => ( <button key={id} onClick={() => { setTargetCarId(id); setShowCarMenu(false); }} className={`px-2 py-1.5 text-[10px] font-mono text-left transition-all border-b border-[#39ff14]/10 flex justify-between items-center ${targetCarId === id ? 'bg-[#39ff14] text-black font-black' : 'text-[#39ff14] hover:bg-[#39ff14]/20 hover:pl-3'}`} ><span>COCHE {id}</span> {targetCarId === id && <span className="w-1.5 h-1.5 bg-black rounded-full"></span>} </button> ))} </div> )} 
                        </div>
                        <button onClick={onClose} className="text-[#39ff14] hover:text-white transition hover:scale-125 bg-black/20 p-1 rounded-full ml-auto"><X size={14} /></button>
                    </div>

                    {/* CAMBIO DE NOMBRE DE PILOTO EN TIEMPO REAL */}
                    {carSetups && onNameChange && (
                        <div className="flex items-center gap-1.5 bg-black/40 px-2 py-1 rounded border border-[#39ff14]/20 mt-0.5">
                            <User size={10} className="text-[#39ff14]" />
                            <span className="text-[8px] text-gray-400 font-bold tracking-wider">PILOTO:</span>
                            <input 
                                type="text" 
                                value={carSetups[targetCarId]?.name || ''} 
                                onChange={(e) => onNameChange(targetCarId, e.target.value.toUpperCase())}
                                maxLength={15}
                                placeholder={`PILOTO ${targetCarId}`}
                                className="flex-1 bg-transparent border-b border-gray-600 focus:border-[#39ff14] px-1 text-[10px] text-[#39ff14] outline-none font-bold transition-colors uppercase"
                            />
                        </div>
                    )}
                    
                    {/* BARRA DE HERRAMIENTAS MEJORADA CON TEXTOS */}
                    <div className="flex items-center gap-1 w-full justify-between mt-0.5"> 
                        <div className="flex gap-0.5 items-center bg-black/40 p-1 rounded border border-[#39ff14]/20">
                            <button onClick={() => rotate90(-1)} className="hover:bg-[#39ff14] text-[#39ff14] hover:text-black px-1 py-0.5 rounded transition flex items-center gap-0.5" title="-90 Grados"><RotateCcw size={10}/><span className="text-[7px] font-mono font-bold">-90º</span></button>
                            <button onClick={() => rotate90(1)} className="hover:bg-[#39ff14] text-[#39ff14] hover:text-black px-1 py-0.5 rounded transition flex items-center gap-0.5" title="+90 Grados"><span className="text-[7px] font-mono font-bold">+90º</span><RotateCw size={10}/></button>
                        </div>

                        <div className="flex gap-0.5 items-center bg-black/40 p-1 rounded border border-[#39ff14]/20">
                            <button onClick={() => adjustHeight(1)} className="hover:bg-[#39ff14] text-[#39ff14] hover:text-black px-1 py-0.5 rounded transition flex items-center gap-0.5" title="Subir altura"><ArrowUp size={10}/><span className="text-[7px] font-bold">SUBIR</span></button>
                            <button onClick={() => adjustHeight(-1)} className="hover:bg-[#39ff14] text-[#39ff14] hover:text-black px-1 py-0.5 rounded transition flex items-center gap-0.5" title="Bajar altura"><ArrowDown size={10}/><span className="text-[7px] font-bold">BAJAR</span></button>
                        </div>
                        
                        <div className="flex gap-1 ml-auto">
                            <button onClick={() => setShowFileMenu(!showFileMenu)} className="bg-[#3b82f6]/20 hover:bg-[#3b82f6] text-[#3b82f6] hover:text-white px-1.5 py-0.5 rounded text-[7px] font-bold transition border border-[#3b82f6]/50 flex items-center gap-0.5" title="Cargar desde GitHub"><CloudDownload size={9} /><span>NUBE</span></button>
                            <button onClick={triggerFileSelect} className="bg-[#39ff14]/20 hover:bg-[#39ff14] text-[#39ff14] hover:text-black px-1.5 py-0.5 rounded text-[7px] font-bold transition border border-[#39ff14]/50 flex items-center gap-0.5" title="Local"><FolderOpen size={9} /><span>PC</span></button>
                        </div>

                        {/* MENU GITHUB FLOTANTE */}
                        {showFileMenu && (
                            <div className="absolute top-20 right-2 w-64 bg-[#0a0a0a] border border-[#39ff14] shadow-[0_0_30px_rgba(57,255,20,0.4)] z-[100] flex flex-col max-h-64 overflow-hidden rounded-md animate-in origin-top-right">
                                <div className="px-2 py-1.5 text-[8px] font-bold text-gray-500 border-b border-gray-800 bg-gray-900 uppercase tracking-widest flex justify-between items-center">
                                    <span>ARCHIVOS EN LA NUBE</span>
                                    <button onClick={() => setIsEditingConfig(!isEditingConfig)} className="text-[#39ff14] hover:text-white bg-black/50 p-1 rounded hover:bg-[#39ff14]/20 transition-colors"><Settings size={10}/></button>
                                </div>
                                
                                {isEditingConfig ? (
                                    <div className="p-2 bg-gray-900">
                                        <form onSubmit={saveGithubConfig} className="flex flex-col gap-2">
                                            <input name="owner" placeholder="Usuario GitHub" defaultValue={ghConfig.owner} className="bg-black border border-gray-700 text-[10px] text-white px-2 py-1.5 rounded focus:border-[#39ff14] outline-none" required />

            </div> 
        ); };

        const LapTimeChart = memo(({ results, carSetups }) => {
            const width = 800, height = 300, padding = 40;
            const carIds = Object.keys(results).map(Number);
            
            const allPoints = [];
            carIds.forEach(id => {
                results[id].forEach(lap => {
                    if(lap.time > 0) allPoints.push(lap.time);
                });
            });
            
            if (allPoints.length === 0) return null;

            const minTime = Math.min(...allPoints) * 0.95; // Un poco de margen abajo
            const maxTime = Math.max(...allPoints) * 1.05; // Un poco de margen arriba
            const timeRange = maxTime - minTime || 1;
            
            const maxLap = Math.max(...carIds.map(id => results[id].length));
            const lapRange = Math.max(1, maxLap - 1);

            const getX = (lapIdx) => padding + (lapIdx / lapRange) * (width - padding * 2);
            const getY = (time) => height - padding - ((time - minTime) / timeRange) * (height - padding * 2);

            const formatTime = (ms) => (ms/1000).toFixed(2);

            return (
                <div className="w-full bg-[#050a05] border border-gray-700 rounded-xl p-4 relative">
                    <h4 className="text-xs font-bold text-gray-400 uppercase tracking-widest mb-2 text-center">ANÁLISIS DE RITMO VUELTA A VUELTA</h4>
                    <svg viewBox={`0 0 ${width} ${height}`} className="w-full h-auto overflow-visible">
                        {[0, 0.25, 0.5, 0.75, 1].map((pct, i) => {
                            const y = height - padding - pct * (height - padding * 2);
                            const val = minTime + pct * timeRange;
                            return (
                                <g key={i}>
                                    <line x1={padding} y1={y} x2={width - padding} y2={y} stroke="#333" strokeWidth="1" strokeDasharray="4,4" />
                                    <text x={padding - 5} y={y + 3} textAnchor="end" className="text-[10px] fill-gray-500 font-mono">{formatTime(val)}s</text>
                                </g>
                            );
                        })}
                        <line x1={padding} y1={height - padding} x2={width - padding} y2={height - padding} stroke="#666" strokeWidth="1" />
                        <line x1={padding} y1={padding} x2={padding} y2={height - padding} stroke="#666" strokeWidth="1" />
                        {carIds.map(id => {
                            const data = results[id];
                            if (data.length < 1) return null;
                            let d = "";
                            data.forEach((lap, i) => {
                                const x = getX(i);
                                const y = getY(lap.time);
                                if (i === 0) d += `M ${x} ${y}`;
                                else d += ` L ${x} ${y}`;
                            });

                            return (
                                <g key={id}>
                                    <path d={d} fill="none" stroke={carSetups[id]?.color || '#fff'} strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" />
                                    {data.map((lap, i) => (
                                        <circle key={i} cx={getX(i)} cy={getY(lap.time)} r="4" fill="#000" stroke={carSetups[id]?.color} strokeWidth="2" />
                                    ))}
                                </g>
                            );
                        })}
                        {Array.from({length: maxLap}).map((_, i) => (
                            <text key={i} x={getX(i)} y={height - padding + 15} textAnchor="middle" className="text-[10px] fill-gray-400 font-mono">V{i+1}</text>
                        ))}
                    </svg>
                </div>
            );
        });

        const CameraSelector = memo(({ mode, setMode }) => {

                        <button onClick={(e) => { e.stopPropagation(); setMode('front'); }} className={`px-2 h-4 rounded flex items-center justify-center text-[7px] font-black border transition-all duration-300 ${mode === 'front' ? 'bg-[#39ff14] border-[#39ff14] text-black shadow-[0_0_10px_rgba(57,255,20,0.4)]' : 'bg-gray-900 border-gray-800 text-gray-500 hover:bg-gray-800'}`}>
                            {t('camFront')}

            const { t } = useTranslation();

            const formatTime = (ms) => { if (!ms || ms === Infinity) return "00:00.000"; const m = Math.floor(ms / 60000); const s = Math.floor((ms % 60000) / 1000); const sms = Math.floor(ms % 1000); return `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}.${sms.toString().padStart(3,'0')}`; };
            const sortedTelemetry = [...telemetry].sort((a, b) => a.position - b.position); const leader = sortedTelemetry[0];

            const renderPanel = (data, setup) => {

                        <div className="p-3 grid grid-cols-2 gap-3 relative">
                            <div className="absolute inset-0 opacity-10" style={{backgroundImage: `linear-gradient(transparent 9px, ${borderColor} 1px), linear-gradient(90deg, transparent 9px, ${borderColor} 1px)`, backgroundSize: '20px 20px'}}></div>
                            
                            <div className="col-span-2 flex items-end justify-between border-b pb-2" style={{borderColor: `${borderColor}40`}}>

                                    return (
                                        <div key={pilot.id} className={`flex flex-col px-3 py-2 transition-colors border-l-4 ${pilot.id === 1 ? 'border-red-500 bg-red-900/10 hover:bg-red-900/20' : (pilot.id === 2 ? 'border-blue-500 bg-blue-900/10 hover:bg-blue-900/20' : 'border-gray-600 hover:bg-white/5')}`}>
                                            {/* FILA SUPERIOR: POSICIÓN Y NOMBRE */}
                                            <div className="flex items-center justify-between mb-1.5">
                                                <div className="flex items-center gap-2.5">
                                                    <span className={`text-[12px] font-black w-6 h-6 flex items-center justify-center rounded-md shadow-md ${idx === 0 ? 'text-black' : (idx === 1 ? 'bg-white text-black' : (idx === 2 ? 'bg-orange-400 text-black' : 'text-gray-400 bg-gray-800'))}`} style={idx === 0 ? { backgroundColor: neonColor } : {}}>
                                                        {pilot.position}
                                                    </span>
                                                    <div className="flex flex-col">
                                                        <span className="font-bold text-[11px] text-white uppercase tracking-tight leading-none">{config.name.startsWith('PILOTO ') ? config.name.replace('PILOTO', t('pilot')) : config.name}</span>
                                                        <span className="text-[7px] text-gray-500 font-mono mt-0.5">ID: {pilot.id}</span>
                                                    </div>
                                                </div>
                                                <div className="text-right">
                                                    <span className="block font-digital text-lg leading-none" style={{ color: neonColor }}>{lapsDone}</span>
                                                    <span className="text-[7px] font-bold text-gray-500 uppercase tracking-wider">{t('laps')}</span>
                                                </div>
                                            </div>
                                            
                                            {/* FILA INFERIOR: DATOS DETALLADOS EN GRID */}
                                            <div className="grid grid-cols-3 gap-1 bg-black/30 rounded p-1.5 border border-white/5">
                                                <div className="flex flex-col items-center border-r border-white/5">
                                                    <span className="text-[6px] text-gray-500 uppercase font-bold tracking-wider mb-0.5">ÚLTIMA</span>
                                                    <span className="text-[9px] font-mono text-gray-300 font-bold">{formatTime(pilot.lastLap)}</span>
                                                </div>
                                                <div className="flex flex-col items-center border-r border-white/5">
                                                    <span className="text-[6px] uppercase font-bold tracking-wider mb-0.5" style={{ color: `${neonColor}b3` }}>MEJOR</span>
                                                    <span className={`text-[9px] font-mono font-bold ${pilot.bestLap === leader.bestLap ? 'text-purple-400' : 'text-white'}`}>{formatTime(pilot.bestLap)}</span>
                                                </div>
                                                <div className="flex flex-col items-center">
                                                    <span className="text-[6px] text-yellow-500/70 uppercase font-bold tracking-wider mb-0.5">GAP</span>
                                                    <span className={`text-[9px] font-mono font-bold ${isLeader ? '' : 'text-yellow-500'}`} style={isLeader ? { color: neonColor } : {}}>{gap}</span>
                                                </div>
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                            <div className="bg-black/40 px-2 py-1 text-[6px] text-gray-600 text-center font-mono uppercase tracking-widest">
                                REAL TIME TELEMETRY SYSTEM v2.1
                            </div>
                        </div>
                    </div>
                    
                    <div className="flex-1 flex flex-col items-center mx-2 -mt-4 pointer-events-auto">
                        <div className="flex gap-4 items-end mb-1">
                            <DrivingStyleSelector profile={throttleProfile} setProfile={setThrottleProfile} />
                            <AiLevelSelector aiLevel={aiLevel} setAiLevel={setAiLevel} />
                            <TreeToggle showTrees={showTrees} setShowTrees={setShowTrees} />
                            <GarageToggle showGarage={showGarage} setShowGarage={setShowGarage} />
                            <CameraSelector mode={cameraMode} setMode={setCameraMode} />
                        </div>
                        
                        {/* SEMÁFORO Y CRONÓMETRO COMBINADOS (Minimalista) */}
                        <div className="flex items-center gap-4 mt-1 bg-black/80 px-5 py-2.5 rounded-full border border-[#39ff14]/30 shadow-[0_0_30px_rgba(57,255,20,0.2)] backdrop-blur-md">
                            <div className="flex gap-2.5">
                                {[1, 2, 3, 4, 5].map(n => { 
                                    const isRed = raceState === 'countdown' && activeLights >= n; 
                                    const isGreen = raceState === 'racing'; 
                                    let bg = 'bg-[#111]'; 
                                    let shadow = 'border-gray-800 opacity-50'; 
                                    if (isGreen) { 
                                        bg = 'bg-[#39ff14]'; 
                                        shadow = 'shadow-[0_0_15px_#39ff14] border-[#39ff14] scale-110 opacity-100'; 
                                    } else if (isRed) { 
                                        bg = 'bg-[#ff0000]'; 
                                        shadow = 'shadow-[0_0_15px_#ff0000] border-[#ff0000] scale-110 opacity-100'; 
                                    } 
                                    return <div key={n} className={`w-6 h-6 rounded-full border-2 ${bg} ${shadow} transition-all duration-100`}></div> 
                                })}
                            </div>
                            
                            <div className="w-px h-8 bg-gray-700"></div>
                            
                            <div className="min-w-[150px]">
                                <span className="text-white font-normal text-3xl tracking-widest drop-shadow-[0_0_8px_rgba(57,255,20,0.5)] font-timer tabular-nums text-center w-full block leading-none">{formatTime(elapsedTime)}</span>
                            </div>
                        </div>
                    </div>
                    
                    <div className="flex flex-col gap-2 animate-in slide-in-right duration-700 pointer-events-auto">
                        {renderPanel(telemetry.find(t => t.id === 2), carSetups[2])}
                    </div>
                </div>
            );
        });

        const DigitalDashboard = memo(({ telemetry, carSetups, raceState, activeLights, elapsedTime, targetLaps, aiLevel, setAiLevel, throttleProfile, setThrottleProfile, showTrees, setShowTrees, numCars, showGarage, setShowGarage, cameraMode, setCameraMode }) => {
            const { t } = useTranslation();
            const isPractice = raceState === 'idle';
            const formatTime = (ms) => { if (!ms || ms === Infinity) return "00:00.000"; const m = Math.floor(ms / 60000); const s = Math.floor((ms % 60000) / 1000); const sms = Math.floor(ms % 1000); return `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}.${sms.toString().padStart(3,'0')}`; };

            const activeTelemetry = telemetry.filter(t => t.id <= numCars);
            const sortedTelemetry = [...activeTelemetry].sort((a, b) => a.position - b.position);
            const leader = sortedTelemetry[0];

            const renderDigitalPanel = (data, setup) => {
                if (!data || !setup) return null;
                const rpmPercent = Math.min(100, (data.speed / 300) * 90 + Math.random()*10);
                const borderColor = setup.color || '#39ff14';
                
                return (
                    <div key={data.id} className="w-[175px] bg-[#050a05]/95 border rounded-lg overflow-hidden shadow-[0_0_15px_rgba(0,0,0,0.5)] backdrop-blur-xl animate-in" style={{borderColor: borderColor}}>
                        <div className="text-black px-2 py-1 flex justify-between items-center" style={{backgroundColor: borderColor}}>
                            <div className="flex items-center gap-1">
                                <Activity size={10} className="animate-pulse"/>
                                <h2 className="font-black text-[7px] tracking-[0.2em] uppercase leading-none">{t('telemetry')}</h2>
                            </div>
                            <span className="font-mono font-bold text-[7px] bg-black/20 px-1.5 py-0.5 rounded leading-none">P{data.position}</span>
                        </div>
                        
                        <div className="p-2 grid grid-cols-2 gap-2 relative">
                            <div className="absolute inset-0 opacity-10" style={{backgroundImage: `linear-gradient(transparent 8px, ${borderColor} 1px), linear-gradient(90deg, transparent 8px, ${borderColor} 1px)`, backgroundSize: '16px 16px'}}></div>
                            
                            <div className="col-span-2 flex items-end justify-between border-b pb-1.5 relative z-10" style={{borderColor: `${borderColor}40`}}>
                                <div>
                                    <span className="text-[6px] font-bold uppercase block tracking-wider leading-none mb-1" style={{color: borderColor, opacity: 0.8}}>{t('speed')}</span>
                                    <div className="flex items-baseline leading-none">
                                        <span className="font-digital text-xl text-white drop-shadow-[0_0_3px_rgba(255,255,255,0.5)] leading-none">{data.speed}</span>
                                        <span className="text-[6px] font-bold ml-1 leading-none" style={{color: borderColor}}>Km/h</span>
                                    </div>
                                </div>
                                <div className="w-14 flex flex-col items-end justify-end">
                                    <div className="w-full h-[3px] bg-gray-900 rounded-full overflow-hidden border border-gray-700 mb-0.5">
                                        <div className="h-full transition-all duration-75" style={{width: `${rpmPercent}%`, backgroundColor: borderColor}}></div>
                                    </div>
                                    <span className="text-[6px] font-mono leading-none mt-0.5" style={{color: borderColor}}>RPM: {(rpmPercent * 250).toFixed(0)}0</span>
                                </div>
                            </div>
                            
                            <div className="space-y-1 relative z-10 flex flex-col justify-center">
                                <div className="flex justify-between items-center"><span className="text-[6px] text-gray-400 font-bold">MOT</span><span className="text-[6px] font-mono border px-1 rounded truncate max-w-[45px] leading-none py-[2px]" style={{color: borderColor, borderColor: `${borderColor}40`}}>{setup.motorName || 'STD'}</span></div>
                                <div className="flex justify-between items-center"><span className="text-[6px] text-gray-400 font-bold">GOM</span><span className="text-[6px] font-mono border px-1 rounded truncate max-w-[45px] leading-none py-[2px]" style={{color: borderColor, borderColor: `${borderColor}40`}}>{setup.tireName || 'STD'}</span></div>
                                <div className="flex justify-between items-center mt-1">
                                    <span className="text-[6px] text-gray-400 font-bold">FUEL</span>
                                    <div className="flex gap-[1px]">
                                        {[...Array(10)].map((_, i) => {
                                            const isActive = data.fuel > (i * 10);
                                            let color = '#39ff14'; // Verde neón (lleno)
                                            if (i < 2) color = '#ef4444'; // Rojo (0-20%)
                                            else if (i < 4) color = '#facc15'; // Amarillo (20-40%)
                                            
                                            return (
                                                <div key={i} className="w-[3px] h-[6px] rounded-[1px] transition-all duration-300" style={{
                                                    backgroundColor: isActive ? color : '#111827',
                                                    boxShadow: isActive ? `0 0 2px ${color}90` : 'inset 0 0 1px rgba(0,0,0,0.8)',
                                                    border: '1px solid rgba(255,255,255,0.05)',
                                                    opacity: isActive ? 1 : 0.6
                                                }}></div>
                                            );
                                        })}
                                    </div>
                                </div>
                            </div>
                            
                            <div className="text-right space-y-1 relative z-10 flex flex-col justify-center">
                                <div>
                                    <span className="text-[5px] text-gray-500 block uppercase font-bold leading-none mb-1">{t('lastLap')}</span>
                                    <span className="font-digital text-[11px] text-white leading-none block">{data.lastLap > 0 ? formatTime(data.lastLap) : '--:--.---'}</span>
                                </div>
                                <div>
                                    <span className="text-[5px] block uppercase font-bold leading-none mb-1 mt-1.5" style={{color: borderColor, opacity: 0.8}}>{t('bestLap')}</span>
                                    <span className="font-digital text-[11px] drop-shadow-[0_0_3px_rgba(255,255,255,0.2)] leading-none block" style={{color: borderColor}}>{data.bestLap > 0 && data.bestLap !== Infinity ? formatTime(data.bestLap) : '--:--.---'}</span>
                                </div>
                            </div>
                        </div>
                        <div className="bg-black/40 px-2 py-1 border-t border-gray-800 flex justify-between items-center">
                             <span className="text-[7px] font-black uppercase text-white tracking-widest truncate leading-none">{setup.name.startsWith('PILOTO ') ? setup.name.replace('PILOTO', t('pilot')) : setup.name}</span>
                             <span className="text-[6px] text-gray-500 font-mono shrink-0 ml-1 leading-none">ID: {data.id}</span>
                        </div>
                    </div>
                );
            };

            return (
                <div className="absolute top-0 left-0 w-full h-full pointer-events-none flex justify-between p-6 z-50 items-start pt-10">
                    {/* IZQUIERDA: PANELES COMPACTOS Y DETALLADOS (AL REVÉS) */}
                    <div className="flex flex-col gap-2 animate-in slide-in-left duration-700 pointer-events-auto max-h-[85vh] overflow-y-auto hide-scrollbar pb-20">
                        <div className={`grid gap-2 ${numCars > 4 ? 'grid-cols-2 w-[360px]' : 'grid-cols-1 w-[175px]'}`}>
                            {activeTelemetry.sort((a,b) => a.id - b.id).map(tData => renderDigitalPanel(tData, carSetups[tData.id]))}
                        </div>
                    </div>

                    {/* CENTRO: SEMÁFORO Y CONTROLES */}
                    <div className="flex-1 flex flex-col items-center mx-2 -mt-4 pointer-events-auto">
                        <div className="flex gap-4 items-end mb-1">
                            <DrivingStyleSelector profile={throttleProfile} setProfile={setThrottleProfile} />
                            <AiLevelSelector aiLevel={aiLevel} setAiLevel={setAiLevel} />
                            <TreeToggle showTrees={showTrees} setShowTrees={setShowTrees} />
                            <GarageToggle showGarage={showGarage} setShowGarage={setShowGarage} />
                            <CameraSelector mode={cameraMode} setMode={setCameraMode} />
                        </div>
                        
                        <div className="flex items-center gap-4 mt-1 bg-black/80 px-5 py-2.5 rounded-full border border-[#39ff14]/30 shadow-[0_0_30px_rgba(57,255,20,0.2)] backdrop-blur-md">
                            <div className="flex gap-2.5">
                                {[1, 2, 3, 4, 5].map(n => { 
                                    const isRed = raceState === 'countdown' && activeLights >= n; 
                                    const isGreen = raceState === 'racing'; 
                                    let bg = 'bg-[#111]'; 
                                    let shadow = 'border-gray-800 opacity-50'; 
                                    if (isGreen) { bg = 'bg-[#39ff14]'; shadow = 'shadow-[0_0_15px_#39ff14] border-[#39ff14] scale-110 opacity-100'; } 
                                    else if (isRed) { bg = 'bg-[#ff0000]'; shadow = 'shadow-[0_0_15px_#ff0000] border-[#ff0000] scale-110 opacity-100'; } 
                                    return <div key={n} className={`w-6 h-6 rounded-full border-2 ${bg} ${shadow} transition-all duration-100`}></div> 
                                })}
                            </div>
                            <div className="w-px h-8 bg-gray-700"></div>
                            <div className="min-w-[150px]">
                                <span className="text-white font-normal text-3xl tracking-widest drop-shadow-[0_0_8px_rgba(57,255,20,0.5)] font-timer tabular-nums text-center w-full block leading-none">{formatTime(elapsedTime)}</span>
                            </div>
                        </div>
                    </div>
                    
                    {/* DERECHA: TIMING TOWER */}
                    <div className="flex flex-col gap-2 animate-in slide-in-right duration-700 pointer-events-auto">
                        <div className="w-72 bg-[#0f172a]/95 border border-gray-700 rounded-xl overflow-hidden shadow-2xl backdrop-blur-md">
                            <div className="bg-gray-900/90 px-3 py-2 flex justify-between items-center border-b border-gray-700">
                                <div className="flex items-center gap-2">
                                    <Activity size={12} className="text-[#39ff14]"/>
                                    <span className="text-[10px] font-bold text-white tracking-widest uppercase">TIMING TOWER (DIGITAL)</span>
                                </div>
                                <span className="text-[10px] font-mono font-bold text-black bg-[#39ff14] px-2 py-0.5 rounded">{isPractice ? t('freePractice') : `LAP ${leader ? Math.min(targetLaps, (targetLaps - leader.laps) + 1) : 0}/${targetLaps}`}</span>
                            </div>
                            
                            <div className="divide-y divide-gray-800/50">
                                {sortedTelemetry.map((pilot, idx) => {
                                    const config = carSetups[pilot.id];
                                    const isLeader = idx === 0;
                                    const gap = isLeader ? "-" : `+${((pilot.laps - leader.laps) * 10 + Math.random()*2).toFixed(1)}`;
                                    const lapsDone = isPractice ? pilot.laps : (targetLaps - pilot.laps);
                                    
                                    return (
                                        <div key={pilot.id} className="flex flex-col px-3 py-2 transition-colors border-l-4 hover:bg-white/5 bg-black/20" style={{ borderLeftColor: config.color || '#666' }}>
                                            <div className="flex items-center justify-between mb-1.5">
                                                <div className="flex items-center gap-2.5">
                                                    <span className={`text-[12px] font-black w-6 h-6 flex items-center justify-center rounded-md shadow-md ${idx === 0 ? 'bg-[#39ff14] text-black shadow-[0_0_8px_#39ff14]' : (idx === 1 ? 'bg-gray-300 text-black shadow-[0_0_8px_rgba(209,213,219,0.5)]' : (idx === 2 ? 'bg-amber-600 text-black shadow-[0_0_8px_rgba(217,119,6,0.5)]' : 'text-gray-400 bg-gray-800'))}`}>
                                                        {pilot.position}
                                                    </span>
                                                    <div className="flex flex-col">
                                                        <span className="font-bold text-[11px] text-white uppercase tracking-tight leading-none">{config.name.startsWith('PILOTO ') ? config.name.replace('PILOTO', t('pilot')) : config.name}</span>
                                                        <span className="text-[7px] text-gray-500 font-mono mt-0.5">ID: {pilot.id} | FUEL: {pilot.fuel.toFixed(0)}%</span>
                                                    </div>
                                                </div>
                                                <div className="text-right">
                                                    <span className="block font-digital text-lg leading-none text-[#39ff14]">{lapsDone}</span>
                                                    <span className="text-[7px] font-bold text-gray-500 uppercase tracking-wider">{t('laps')}</span>
                                                </div>
                                            </div>
                                            <div className="grid grid-cols-3 gap-1 bg-black/40 rounded p-1.5 border border-white/5">
                                                <div className="flex flex-col items-center border-r border-white/5">
                                                    <span className="text-[6px] text-gray-500 uppercase font-bold tracking-wider mb-0.5">ÚLTIMA</span>
                                                    <span className="text-[9px] font-mono text-gray-300 font-bold">{formatTime(pilot.lastLap)}</span>
                                                </div>
                                                <div className="flex flex-col items-center border-r border-white/5">
                                                    <span className="text-[6px] text-[#39ff14]/70 uppercase font-bold tracking-wider mb-0.5">MEJOR</span>
                                                    <span className={`text-[9px] font-mono font-bold ${pilot.bestLap === leader.bestLap ? 'text-purple-400' : 'text-white'}`}>{formatTime(pilot.bestLap)}</span>
                                                </div>
                                                <div className="flex flex-col items-center">
                                                    <span className="text-[6px] text-yellow-500/70 uppercase font-bold tracking-wider mb-0.5">GAP</span>
                                                    <span className={`text-[9px] font-mono font-bold ${isLeader ? 'text-[#39ff14]' : 'text-yellow-500'}`}>{gap}</span>
                                                </div>
                                            </div>
                                        </div>
                                    );
                                })}
                            </div>
                        </div>
                    </div>
                </div>
            );
        });

        const MotorShowcase = memo(({ selectedCarId, currentConfig, onUpdate }) => {
            if (!currentConfig) return null;
            const { t } = useTranslation();
            const defaultMotors = {
                "SLOT.IT (V12/BOXER)": [{ label: "V12/4", rpm: "23.000", torque: "170", type: "Short Can", color: "#fca5a5", name: "V12/4 23k" },{ label: "BOXER 2", rpm: "21.500", torque: "340", type: "Long Can", color: "#fdba74", name: "Boxer 21.5k" },{ label: "FLAT-6", rpm: "20.500", torque: "200", type: "Flat", color: "#fde047", name: "Flat-6 20.5k" }],
                "NSR (KING/SHARK)": [{ label: "KING 21", rpm: "21.400", torque: "350", type: "Long Can", color: "#bef264", name: "King 21 Evo" },{ label: "SHARK 25", rpm: "25.000", torque: "176", type: "Short Can", color: "#67e8f9", name: "Shark 25k" },{ label: "BABY K", rpm: "17.000", torque: "245", type: "Long Can", color: "#d8b4fe", name: "Baby King" }],
                "SCALEAUTO (TECH)": [{ label: "SC-11", rpm: "20.000", torque: "260", type: "Long Can", color: "#fca5a5", name: "SC-11b" },{ label: "SC-25", rpm: "21.000", torque: "320", type: "Long Can", color: "#cbd5e1", name: "Sprinter" }],
                "NINCO (NC)": [{ label: "NC-5", rpm: "20.000", torque: "290", type: "Long Can", color: "#f87171", name: "Speeder" },{ label: "NC-6", rpm: "23.500", torque: "350", type: "Long Can", color: "#fbbf24", name: "Crusher" }],
                "SCALEXTRIC (RX/RK)": [{ label: "RX-41", rpm: "18.000", torque: "210", type: "Short Can", color: "#94a3b8", name: "RX-41" },{ label: "PRO SPEED", rpm: "22.000", torque: "310", type: "Long Can", color: "#fb923c", name: "Pro Speed" }]
            }; 
            
            const [motors, setMotors] = useState(() => {
                const saved = localStorage.getItem('slot_custom_motors');
                return saved ? { ...defaultMotors, "CUSTOM (USER)": JSON.parse(saved) } : defaultMotors;
            });
            const [isAdding, setIsAdding] = useState(false);
            const [newForm, setNewForm] = useState({ name: 'Custom M', rpm: 25000, torque: 250, type: 'Long Can' });

            const handleAdd = () => {
                const updated = { ...motors };
                if (!updated["CUSTOM (USER)"]) updated["CUSTOM (USER)"] = [];
                
                const newItem = {
                    label: newForm.name.substring(0, 7).toUpperCase(),
                    name: newForm.name,
                    rpm: newForm.rpm.toString().replace(/\B(?=(\d{3})+(?!\d))/g, "."),
                    torque: newForm.torque.toString(),
                    type: newForm.type,
                    color: "#39ff14"
                };
                
                updated["CUSTOM (USER)"].push(newItem);
                setMotors(updated);
                localStorage.setItem('slot_custom_motors', JSON.stringify(updated["CUSTOM (USER)"]));
                setIsAdding(false);
            };

            const handleDelete = (idx) => {
                const updated = { ...motors };
                updated["CUSTOM (USER)"].splice(idx, 1);
                if (updated["CUSTOM (USER)"].length === 0) delete updated["CUSTOM (USER)"];
                setMotors(updated);
                localStorage.setItem('slot_custom_motors', JSON.stringify(updated["CUSTOM (USER)"] || []));
            };

            return (
                <div className="w-64 h-[21rem] flex flex-col rounded-sm overflow-hidden border border-[#39ff14]/30 shadow-[0_0_20px_rgba(57,255,20,0.1)] bg-[#050a05]/90 backdrop-blur-md animate-in z-50 transition-all hover:border-[#39ff14]/80 hover:shadow-[0_0_30px_rgba(57,255,20,0.2)] group relative">
                    <div className="absolute top-0 right-0 w-3 h-3 border-t-2 border-r-2 border-[#39ff14]"></div><div className="absolute bottom-0 left-0 w-3 h-3 border-b-2 border-l-2 border-[#39ff14]"></div>
                    
                    <div className="p-2 border-b border-[#39ff14]/20 bg-[#39ff14]/5 flex justify-between items-center shrink-0 relative z-10">
                        <div className="flex items-center gap-2"> <Zap className="text-[#39ff14]" size={14} /> <h2 className="text-[10px] font-black text-white tracking-[0.2em] uppercase">{t('motorPower')}</h2> </div>
                        <div className="flex items-center gap-2">
                            <button onClick={()=>setIsAdding(true)} className="px-2 py-1 bg-[#39ff14]/20 hover:bg-[#39ff14] text-[#39ff14] hover:text-black rounded flex items-center justify-center gap-1 transition-colors text-[8px] font-black tracking-widest" title="Añadir Motor Personalizado"><Plus size={10}/> NUEVO</button>
                            <div className="flex items-center gap-1"><div className="w-1 h-1 rounded-full bg-[#39ff14] animate-pulse"></div><span className="text-[8px] text-[#39ff14]/70 font-mono">C{selectedCarId}</span></div>
                        </div>
                    </div>

                localStorage.setItem('slot_custom_pinions', JSON.stringify(updated["CUSTOM (USER)"]));

        const VoltageShowcase = memo(({ voltage, setVoltage }) => { 
            const { t } = useTranslation(); 
            const [amps, setAmps] = useState(1.2); 
            const [history, setHistory] = useState(new Array(24).fill(0.2)); 
            
            useEffect(() => { 
                const interval = setInterval(() => { 
                    const baseAmps = (voltage / 12) * 1.5; 
                    const noise = (Math.random() - 0.5) * 0.15; 
                    const newAmps = Math.max(0, baseAmps + noise); 
                    setAmps(newAmps);

            }, [voltage]); 
            
            return (
                <div className="w-64 h-40 flex flex-col rounded-sm overflow-hidden border border-[#39ff14]/30 shadow-[0_0_20px_rgba(57,255,20,0.1)] bg-[#050a05]/90 backdrop-blur-md animate-in z-50 transition-all hover:border-[#39ff14]/80 hover:shadow-[0_0_30px_rgba(57,255,20,0.2)] relative group">
                    <svg className="absolute top-0 left-0 w-6 h-6 pointer-events-none opacity-50" viewBox="0 0 32 32"><path d="M1 1 L10 1 L10 2 L2 2 L2 10 L1 10 Z" fill="#39ff14"/></svg>
                    <svg className="absolute top-0 right-0 w-6 h-6 pointer-events-none opacity-50" viewBox="0 0 32 32"><path d="M31 1 L22 1 L22 2 L30 2 L30 10 L31 10 Z" fill="#39ff14"/></svg>

                    <svg className="absolute bottom-0 right-0 w-6 h-6 pointer-events-none opacity-50" viewBox="0 0 32 32"><path d="M31 31 L22 31 L22 30 L30 30 L30 22 L31 22 Z" fill="#39ff14"/></svg>

                    <div className="flex flex-col p-2 gap-2 h-full relative z-10">

                                <span className="absolute top-0.5 left-1 text-[6px] text-[#39ff14]/60 font-bold tracking-wider">CORRIENTE</span>
                                <div className="flex items-baseline gap-0.5 mt-1">

                        <div className="flex-1 bg-black/50 border border-[#39ff14]/20 rounded flex items-end px-0.5 gap-[1px] relative overflow-hidden">
                            <div className="absolute inset-0 opacity-20" style={{backgroundImage: 'linear-gradient(transparent 3px, #39ff14 3px)', backgroundSize: '100% 4px'}}></div>
                            {history.map((h, i) => (
                                <div key={i} className="flex-1 bg-[#39ff14]/60 shadow-[0_0_5px_#39ff14]" style={{height: `${h * 100}%`, transition: 'height 0.1s ease'}}></div>
                            ))}
                            <span className="absolute top-0.5 right-1 text-[6px] text-[#39ff14]/50 font-mono">LOAD MONITOR</span>
                        </div>
                        <div className="flex items-center gap-2">
                            <button onClick={() => setVoltage(Math.max(10, voltage - 0.5))} className="w-8 h-6 rounded bg-gray-900 border border-gray-700 hover:border-[#39ff14] hover:bg-[#39ff14]/20 text-gray-400 hover:text-[#39ff14] flex items-center justify-center transition-all active:scale-95"><Minus size={12}/></button>
                            <div className="flex-1 h-1.5 bg-gray-900 rounded-full overflow-hidden border border-gray-700 relative group-hover:border-[#39ff14]/30 transition-colors">
                                <div className="h-full bg-gradient-to-r from-[#39ff14]/40 to-[#39ff14] shadow-[0_0_10px_#39ff14] relative transition-all duration-300" style={{width: `${((voltage - 10) / 10) * 100}%`}}></div>
                            </div>
                            <button onClick={() => setVoltage(Math.min(20, voltage + 0.5))} className="w-8 h-6 rounded bg-gray-900 border border-gray-700 hover:border-[#39ff14] hover:bg-[#39ff14]/20 text-gray-400 hover:text-[#39ff14] flex items-center justify-center transition-all active:scale-95"><Plus size={12}/></button>
                        </div>
