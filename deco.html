            const mountRef = useRef(null);

            const [status, setStatus] = useState(lang === 'en' ? "READY" : "LISTO");

                    fetch(apiUrl).then(res => { if (res.status === 404) throw new Error("Repo no encontrado"); if (res.status === 403) throw new Error("Límite API excedido"); return res.json(); }).then(data => { if (Array.isArray(data)) { const glbFiles = data.filter(f => f.name.toLowerCase().endsWith('.glb') || f.name.toLowerCase().endsWith('.gltf')); setOnlineFiles(glbFiles); setStatus(glbFiles.length > 0 ? (lang === 'en' ? "FILES FOUND" : "ARCHIVOS ENCONTRADOS") : (lang === 'en' ? "NO 3D FILES" : "SIN ARCHIVOS 3D")); } else { setOnlineFiles([]); setStatus(lang === 'en' ? "EMPTY FOLDER" : "CARPETA VACÍA"); } }).catch(err => { console.error("GitHub:", err); setStatus(lang === 'en' ? "CONNECTION ERROR" : "ERROR CONEXIÓN"); setOnlineFiles([]); });
                }
            }, [showFileMenu, ghConfig, isEditingConfig, lang]);

            const saveGithubConfig = (e) => { e.preventDefault(); const formData = new FormData(e.target); const newConfig = { owner: formData.get('owner').trim(), repo: formData.get('repo').trim(), path: formData.get('path').trim(), branch: formData.get('branch').trim() || 'main' }; if (newConfig.owner && newConfig.repo) { localStorage.setItem('slot_gh_config', JSON.stringify(newConfig)); setGhConfig(newConfig); setIsEditingConfig(false); setStatus(lang === 'en' ? "CONFIG SAVED" : "CONFIGURACIÓN GUARDADA"); } };

            useEffect(() => { 
                if (!mountRef.current || rendererRef.current) return;
                if (typeof THREE === 'undefined') { setStatus(lang === 'en' ? "NO THREE.JS" : "NO THREE.JS"); return; } 
                const width = mountRef.current.clientWidth || 300, height = mountRef.current.clientHeight || 300; 
                const scene = new THREE.Scene(); sceneRef.current = scene; 
                const modelGroup = new THREE.Group(); modelGroup.name = "MODEL_CONTAINER"; scene.add(modelGroup); modelRef.current = modelGroup;
                const camera = new THREE.PerspectiveCamera(50, width / height, 0.01, 1000); camera.position.set(0, 2, 4); cameraRef.current = camera; 
                const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true, preserveDrawingBuffer: true }); renderer.setSize(width, height); renderer.setPixelRatio(Math.min(window.devicePixelRatio, 1.25)); renderer.outputEncoding = THREE.sRGBEncoding; mountRef.current.appendChild(renderer.domElement); rendererRef.current = renderer; 
                scene.add(new THREE.HemisphereLight(0xffffff, 0x444444, 1.5)); 
                const dirLight = new THREE.DirectionalLight(0xffffff, 2); dirLight.position.set(2, 5, 3); dirLight.castShadow = true; scene.add(dirLight); 
                scene.add(new THREE.GridHelper(10, 10, 0x39ff14, 0x333333)); scene.add(new THREE.AxesHelper(1)); 
                if (typeof THREE.OrbitControls !== 'undefined' && !controlsRef.current) { const controls = new THREE.OrbitControls(camera, renderer.domElement); controls.enableDamping = true; controls.autoRotate = true; controls.target.set(0, 0.5, 0); controlsRef.current = controls; } 
                const resizeObserver = new ResizeObserver(entries => { window.requestAnimationFrame(() => { for (let entry of entries) { const { width, height } = entry.contentRect; if (width && height && renderer && camera) { camera.aspect = width / height; camera.updateProjectionMatrix(); renderer.setSize(width, height); } } }); }); resizeObserver.observe(mountRef.current); 
                let frameId; const animate = () => { frameId = requestAnimationFrame(animate); if (controlsRef.current) controlsRef.current.update(); renderer.render(scene, camera); }; animate(); 
                setViewerReady(true);
                return () => { cancelAnimationFrame(frameId); resizeObserver.disconnect(); if (controlsRef.current) { controlsRef.current.dispose(); controlsRef.current = null; } if (rendererRef.current) { rendererRef.current.dispose(); if (mountRef.current && rendererRef.current.domElement) { mountRef.current.removeChild(rendererRef.current.domElement); } rendererRef.current = null; } };

            useEffect(() => {
                if (!viewerReady || !modelRef.current) return;
                const asset = carAssets[currentTargetId];
                if (asset && asset.glb) {

                                child.frustumCulled = false; // Evita parpadeos en 3D
                                if (child.material) {

                                        const newMat = new THREE.MeshLambertMaterial({ map: child.material.map, color: child.material.color, transparent: child.material.transparent, opacity: child.material.opacity, alphaTest: child.material.alphaTest, side: THREE.FrontSide }); 
                                        child.material.dispose(); 
                                        child.material = newMat; 
                                    } else { 
                                        child.material.side = THREE.FrontSide; 
                                    } 
                                } 
                            } 
                        });
                        const box = new THREE.Box3().setFromObject(model); const size = box.getSize(new THREE.Vector3()); const center = box.getCenter(new THREE.Vector3()); model.position.sub(center); 
                        const maxDim = Math.max(size.x, size.y, size.z); const scale = maxDim > 0 ? 2.5 / maxDim : 1; model.scale.setScalar(scale);
                        modelGroup.userData.baseScale = new THREE.Vector3(scale, scale, scale); modelGroup.userData.loadedGlb = asset.glb; modelGroup.add(model);
                        modelGroup.rotation.set((asset.rotation ? asset.rotation[0] : 0) * Math.PI / 180, (asset.rotation ? asset.rotation[1] : 180) * Math.PI / 180, (asset.rotation ? asset.rotation[2] : 0) * Math.PI / 180);
                        if(asset.scale !== undefined) { modelGroup.scale.copy(modelGroup.userData.baseScale).multiplyScalar(asset.scale); }
                        setStatus(`${lang === 'en' ? "READY" : "LISTO"}: ${asset.glbName ? asset.glbName.replace(/\.glb|\.gltf/gi, '').toUpperCase() : 'MODELO'}`);
                    }, undefined, (err) => { setStatus(lang === 'en' ? "ERROR LOADING" : "ERROR CARGANDO"); console.warn("Viewer Load Error:", err); });
                } else {
                    const modelGroup = modelRef.current;
                    while (modelGroup.children.length > 0) modelGroup.remove(modelGroup.children[0]);
                    modelGroup.userData.loadedGlb = null;
                    setStatus(lang === 'en' ? "NO MODEL - LOAD ONE" : "SIN MODELO - CARGA UNO");
                }
            }, [viewerReady, currentTargetId, carAssets, lang]);

            const updateTransform = (key, delta) => {
                const next = { ...transform, [key]: transform[key] + delta };
                setTransform(next);
                if (modelRef.current) {
                    if (key === 'x' || key === 'y' || key === 'z') { } else if (key === 'rotX' || key === 'rotY' || key === 'rotZ') { modelRef.current.rotation.set(next.rotX * Math.PI / 180, next.rotY * Math.PI / 180, next.rotZ * Math.PI / 180); } else if (key === 'scale') { if(modelRef.current.userData.baseScale) { modelRef.current.scale.copy(modelRef.current.userData.baseScale).multiplyScalar(next.scale); } }
                }
                if (onTransform) onTransform(currentTargetId, { offset: [next.x, next.y, next.z], rotation: [next.rotX, next.rotY, next.rotZ], scale: next.scale, yOffset: next.y, scatterCount: scatterCount });
            };

            const updateScatterCount = (newCount) => { const count = Math.max(1, Math.min(60, parseInt(newCount))); setScatterCount(count); if (onTransform) onTransform(currentTargetId, { offset: [transform.x, transform.y, transform.z], rotation: [transform.rotX, transform.rotY, transform.rotZ], scale: transform.scale, yOffset: transform.y, scatterCount: count }); };
            const processLoadedModel = (model, fileName, url) => { setStatus(`${lang === 'en' ? "READY" : "LISTO"}: ${fileName.split('.')[0].toUpperCase()}`); if (url) { fetch(url).then(r => { if (!r.ok) throw new Error("HTTP " + r.status); return r.blob(); }).then(blob => { const file = new File([blob], fileName, { type: 'model/gltf-binary' }); if (onLoad) onLoad(file, currentTargetId, loadingTypeRef.current); }).catch(err => { console.warn("Error descargando blob:", err); setStatus("ERROR BLOB"); }); } };
            const loadFromGitHub = (fileData) => { setShowFileMenu(false); setStatus(`${lang === 'en' ? "DOWNLOADING" : "BAJANDO"}: ${fileData.name || fileData.file}...`); let activePath = ghConfig.path ? ghConfig.path : ''; if (loadingTypeRef.current === 'car') { activePath = activePath ? `${activePath}/coches` : 'coches'; } else if (loadingTypeRef.current === 'decor') { activePath = activePath ? `${activePath}/decora` : 'decora'; } const fileName = fileData.file || fileData.name; let rawUrl = `https://raw.githubusercontent.com/${ghConfig.owner}/${ghConfig.repo}/${ghConfig.branch}/${activePath ? activePath + '/' : ''}${fileName}`; if(ghConfig.owner === 'slotsoftware' && ghConfig.repo === 'Telemetria') { rawUrl = `https://raw.githubusercontent.com/slotsoftware/Telemetria/main/${activePath ? activePath + '/' : ''}${fileName}`; } const loader = getSharedGLTFLoader() || new THREE.GLTFLoader(); loader.load( rawUrl, (gltf) => processLoadedModel(gltf.scene, fileData.name, rawUrl), (xhr) => setStatus(`${lang === 'en' ? "LOADING" : "CARGANDO"} ${(xhr.loaded / xhr.total * 100).toFixed(0)}%`), (err) => { console.warn("Error GLTFLoader (Viewer):", err); setStatus("ERROR 404/RED"); } ); };
            const loadDirectFile = (fileName) => { if(!fileName) return; const cleanName = fileName.trim(); loadFromGitHub({ name: cleanName }); };
            const handleFileChange = (e) => { const file = e.target.files[0]; if (!file) return; setStatus(lang === 'en' ? "PROCESSING..." : "PROCESANDO..."); if (onLoad) onLoad(file, currentTargetId, loadingTypeRef.current); e.target.value = ''; };

                                {(currentTargetId > 1) && (

        /* --- VISOR 3D --- */
        const Telemetry3DViewer = ({ circuitData, carSettings, customCarAssets, onCarAssetUpdate, onClose, lang, setLang, t }) => {
            const containerRef = useRef(null);
            const [manualThrottle, setManualThrottle] = useState(40); // AUTOMÁTICO: Coche rueda por defecto

            const [boardSettings, setBoardSettings] = useState({ visible: true, width: 400, depth: 300, x: 0, z: 0, material: 'grass' });

            const [targetId, setTargetId] = useState(1); 
            const [cameraMode, setCameraMode] = useState('CHASE'); 
            const cameraModeRef = useRef('CHASE');
            
            const [showTrees, setShowTrees] = useState(true); // BOSQUE AUTO ON
            const forestGroupRef = useRef(null);
            
            // ESTADO PARA ARRASTRAR EL MANDO (CONTROLLER)
            const [ctrlPos, setCtrlPos] = useState({ x: window.innerWidth - 140, y: window.innerHeight / 2 - 120 });
            const [isDraggingCtrl, setIsDraggingCtrl] = useState(false);
            const dragCtrlOffset = useRef({ x: 0, y: 0 });
            const [selectedCarId, setSelectedCarId] = useState(1);
            const [laneChangePressed, setLaneChangePressed] = useState(false);
            const [pitPressed, setPitPressed] = useState(false);
            
            const laneChangePressedRef = useRef(false);
            useEffect(() => { laneChangePressedRef.current = laneChangePressed; }, [laneChangePressed]);
            
            const pitPressedRef = useRef(false);
            useEffect(() => { pitPressedRef.current = pitPressed; }, [pitPressed]);

            const numCars = 8;

            useEffect(() => {
                if (forestGroupRef.current) {
                    forestGroupRef.current.visible = showTrees;
                }
            }, [showTrees]);

            const handleCtrlDown = (e) => {
                e.stopPropagation();
                const clientX = e.clientX || (e.touches && e.touches[0].clientX);
                const clientY = e.clientY || (e.touches && e.touches[0].clientY);
                if (clientX !== undefined) {
                    setIsDraggingCtrl(true);
                    dragCtrlOffset.current = { x: clientX - ctrlPos.x, y: clientY - ctrlPos.y };
                }
            };

            useEffect(() => {
                const onMove = (e) => {
                    if(!isDraggingCtrl) return;
                    const clientX = e.clientX || (e.touches && e.touches[0].clientX);
                    const clientY = e.clientY || (e.touches && e.touches[0].clientY);
                    if(clientX !== undefined && clientY !== undefined) {
                        setCtrlPos({ x: clientX - dragCtrlOffset.current.x, y: clientY - dragCtrlOffset.current.y });
                    }
                };
                const onUp = () => setIsDraggingCtrl(false);
                
                if(isDraggingCtrl) {
                    window.addEventListener('mousemove', onMove);
                    window.addEventListener('mouseup', onUp);
                    window.addEventListener('touchmove', onMove, {passive: false});
                    window.addEventListener('touchend', onUp);
                }
                return () => {
                    window.removeEventListener('mousemove', onMove);
                    window.removeEventListener('mouseup', onUp);
                    window.removeEventListener('touchmove', onMove);
                    window.removeEventListener('touchend', onUp);
                };
            }, [isDraggingCtrl]);

            const [isPaused, setIsPaused] = useState(false);
            const isPausedRef = useRef(false);
            useEffect(() => { isPausedRef.current = isPaused; }, [isPaused]);
            
            const tRef = useRef(t);
            useEffect(() => { tRef.current = t; }, [t]);
            
            const telemetryRefs = {
                speed: useRef(null), rpmBar: useRef(null), lap: useRef(null),
                currentTime: useRef(null), bestTime: useRef(null), progress: useRef(null), throttleBar: useRef(null)
            };
            
            const trackBaseSizeRef = useRef({ width: 0, depth: 0 }); 
            const raceStateRef = useRef({ laps: 0, lapStartTime: 0, bestTime: 999999, lastTime: 0 });
            const boardSettingsRef = useRef(boardSettings);
            useEffect(() => { boardSettingsRef.current = boardSettings; }, [boardSettings]);
            const pathPointsRef = useRef([]);

            const hasRotonda = circuitData.pieces.some(p => p.subtype === 'rotonda' || p.name === 'Rotonda');
            const rallyPathRef = useRef([]);

                        if (d12.length > 0) rails.changes.push({ points: d12, refIdx: startVertexIdx, count: steps, type: '1to2' });
                        if (d21.length > 0) rails.changes.push({ points: d21, refIdx: startVertexIdx, count: steps, type: '2to1' });
                        pieceMapRef.current.push({ index, distStart: accumulatedDist-p.length, distEnd: accumulatedDist, type: p.type, subtype: p.subtype, invert: p.invert, elevation: p.elevation || 0 });
                    });
                    
                    const applyBridgeElevations = () => {
                        const stepCount = rails.lane1.length;
                        const totalTrackLength = vertexDistances[vertexDistances.length - 1] || 1;
                        
                        let BRIDGE_TOP_H = 10.5, RAMP_LENGTH = 130.0, FLAT_TOP_LEN = 40.0, SEARCH_GAP = 50.0, INTERSECTION_MERGE_RADIUS = 100.0, BLEND_DIST = 70.0;

                        const hasManualElevation = pieceMapRef.current.some(p => (p.elevation || 0) !== 0);
                        let getElevationAtDist;

                        if (hasManualElevation) {
                            const MANUAL_LEVEL_HEIGHT = 10.0; 
                            const TRACK_RESOLUTION = 1.0; 
                            const numSamples = Math.max(10, Math.ceil(totalTrackLength / TRACK_RESOLUTION)); 
                            const rawHeights = new Float32Array(numSamples);
                            for (let i = 0; i < numSamples; i++) { 
                                const dist = i * TRACK_RESOLUTION; 
                                const piece = pieceMapRef.current.find(p => dist >= p.distStart && dist <= p.distEnd) || pieceMapRef.current[0]; 
                                rawHeights[i] = (piece.elevation || 0) * MANUAL_LEVEL_HEIGHT; 
                            }
                            
                            const applyBlur = (input, windowRadius) => { 
                                const output = new Float32Array(numSamples); 
                                for(let i = 0; i < numSamples; i++) { 
                                    let sum = 0; 
                                    let count = 0;
                                    for(let j = -windowRadius; j <= windowRadius; j++) { 
                                        const idx = i + j;
                                        if (idx >= 0 && idx < numSamples) {

                                            count++;
                                        }
                                    } 
                                    output[i] = sum / count; 
                                } 
                                return output; 
                            };
                            
                            const blurRadius = Math.max(1, Math.floor(25.0 / TRACK_RESOLUTION)); 
                            let smoothHeights = rawHeights; 
                            smoothHeights = applyBlur(smoothHeights, blurRadius); 
                            smoothHeights = applyBlur(smoothHeights, blurRadius); 
                            smoothHeights = applyBlur(smoothHeights, blurRadius); 
                            smoothHeights = applyBlur(smoothHeights, blurRadius); 
                            
                            getElevationAtDist = (queryDist) => { 
                                if (queryDist < 0) queryDist = 0; 
                                if (queryDist >= totalTrackLength) queryDist = totalTrackLength - 0.01; 
                                const exactIndex = queryDist / TRACK_RESOLUTION; 
                                const index0 = Math.floor(exactIndex); 
                                const index1 = Math.min(numSamples - 1, index0 + 1); 
                                const ratio = exactIndex - index0; 
                                return smoothHeights[index0] * (1 - ratio) + smoothHeights[index1] * ratio; 
                            };
                        } else {
                            const centerPoints = [];
                            for(let i=0; i<stepCount; i++) {
                                let p1 = rails.lane1[i]; let p2 = rails.lane2[i];
                                if(!p1 && !p2) { centerPoints.push(null); continue; }
                                if(!p1) p1 = p2; if(!p2) p2 = p1;
                                centerPoints.push(new THREE.Vector3().lerpVectors(p1, p2, 0.5));
                            }
                            const intersections = [];
                            const getPieceAtIdx = (idx) => { const d = vertexDistances[idx]; return pieceMapRef.current.find(p => d >= p.distStart && d < p.distEnd); };

                            const flatZones = [];
                            pieceMapRef.current.forEach(p => {
                                const isSpecial = [ 'crossing', 'digital_x', 'change_right', 'change_left', 'pit_parallel_double_x', 'digital_console', 'connection', 'analog_connect', 'starting_grid', 'chicane_entry', 'chicane_exit', 'rotonda' ].includes(p.subtype) || ['pit_entry', 'pit_exit'].includes(p.type);
                                if (isSpecial) flatZones.push({ start: p.distStart - 15.0, end: p.distEnd + 15.0 });
                            });

                            const getRoom = (dist) => {
                                let minRoom = Infinity;
                                flatZones.forEach(fz => {
                                    let distToStart = dist - fz.start; if (distToStart < -totalTrackLength/2) distToStart += totalTrackLength; if (distToStart > totalTrackLength/2) distToStart -= totalTrackLength;
                                    let distToEnd = dist - fz.end; if (distToEnd < -totalTrackLength/2) distToEnd += totalTrackLength; if (distToEnd > totalTrackLength/2) distToEnd -= totalTrackLength;
                                    let fzLength = fz.end - fz.start;

                            };

                            const testPoints = [];
                            for(let i=0; i<stepCount; i+=2) { 
                                if (centerPoints[i]) {
                                    const piece = getPieceAtIdx(i);
                                    testPoints.push({ x: centerPoints[i].x, z: centerPoints[i].z, dist: vertexDistances[i], idx: i, type: 'normal', piece });
                                }
                            }
                            
                            rails.changes.filter(c => c.isRotonda).forEach(rot => {
                                const piece = getPieceAtIdx(rot.refIdx);
                                const dStart = piece ? piece.distStart : vertexDistances[rot.refIdx];
                                const dEnd = piece ? piece.distEnd : (vertexDistances[rot.refIdx + 1] || dStart + 100);
                                rot.points.forEach((pt, pi) => {
                                    if (pi % 2 === 0) {

                                        testPoints.push({ x: pt.x, z: pt.z, dist: approxDist, idx: rot.refIdx, type: 'rotonda', piece });
                                    }

                            });

                            for(let i=0; i<testPoints.length; i++) {
                                const tp1 = testPoints[i];
                                const isSpecial1 = tp1.piece && (['crossing', 'digital_x', 'change_right', 'change_left', 'pit_parallel_double_x', 'chicane_entry', 'chicane_exit', 'analog_connect', 'connection', 'digital_console', 'starting_grid'].includes(tp1.piece.subtype) || ['pit_entry', 'pit_exit'].includes(tp1.piece.type));
                                
                                for(let j=i+1; j<testPoints.length; j++) {

                                    const isSpecial2 = tp2.piece && (['crossing', 'digital_x', 'change_right', 'change_left', 'pit_parallel_double_x', 'chicane_entry', 'chicane_exit', 'analog_connect', 'connection', 'digital_console', 'starting_grid'].includes(tp2.piece.subtype) || ['pit_entry', 'pit_exit'].includes(tp2.piece.type));
                                    
                                    if (tp1.piece && tp2.piece) {

                                        const maxIdx = pieceMapRef.current.length;
                                        if (idxDiff <= 1 || idxDiff >= maxIdx - 1) continue; 
                                        if (tp1.piece.subtype === 'rotonda' || tp2.piece.subtype === 'rotonda') {

                                        }
                                    }

                                    let travelDist = Math.abs(tp2.dist - tp1.dist);
                                    if (travelDist > totalTrackLength / 2) travelDist = totalTrackLength - travelDist; 

                                    if(travelDist > SEARCH_GAP) {
                                        const dist2D = Math.sqrt((tp1.x - tp2.x)**2 + (tp1.z - tp2.z)**2);
                                        if(dist2D < 18.0) { 
                                            if (tp1.type === 'normal' && tp2.type === 'normal') {
                                                const p1Next = centerPoints[tp1.idx+1]; const p2Next = centerPoints[tp2.idx+1];
                                                if(p1Next && p2Next) {
                                                    const dx1 = p1Next.x - centerPoints[tp1.idx].x; const dz1 = p1Next.z - centerPoints[tp1.idx].z;
                                                    const dx2 = p2Next.x - centerPoints[tp2.idx].x; const dz2 = p2Next.z - centerPoints[tp2.idx].z;
                                                    const len1 = Math.sqrt(dx1*dx1 + dz1*dz1); const len2 = Math.sqrt(dx2*dx2 + dz2*dz2);
                                                    if(len1 > 0 && len2 > 0) {
                                                        const dot = (dx1*dx2 + dz1*dz2) / (len1 * len2);
                                                        if(Math.abs(dot) > 0.95) continue; 
                                                    }
                                                }
                                            }

                                            const midX = (tp1.x + tp2.x) / 2; const midZ = (tp1.z + tp2.z) / 2;
                                            const exists = intersections.some(c => (midX - c.midX)**2 + (midZ - c.midZ)**2 < (INTERSECTION_MERGE_RADIUS * INTERSECTION_MERGE_RADIUS));

                                            if(!exists) {
                                                let goesUpIdx = tp2.idx;
                                                if (tp1.type === 'rotonda' && tp2.type !== 'rotonda') goesUpIdx = tp2.idx;
                                                else if (tp2.type === 'rotonda' && tp1.type !== 'rotonda') goesUpIdx = tp1.idx;
                                                else if (isSpecial1 && !isSpecial2) goesUpIdx = tp2.idx;
                                                else if (isSpecial2 && !isSpecial1) goesUpIdx = tp1.idx;
                                                else {
                                                    const elev1 = tp1.piece?.elevation || 0; const elev2 = tp2.piece?.elevation || 0;
                                                    if (elev1 > 0 || elev2 < 0) goesUpIdx = tp1.idx;
                                                    else if (elev2 > 0 || elev1 < 0) goesUpIdx = tp2.idx;
                                                    else {
                                                        const type1 = tp1.piece?.type || 'straight'; const type2 = tp2.piece?.type || 'straight';
                                                        if (type1 === 'straight' && type2 === 'curve') goesUpIdx = tp1.idx;
                                                        else if (type1 === 'curve' && type2 === 'straight') goesUpIdx = tp2.idx;
                                                        else {
                                                            if (type1 === 'curve' && type2 === 'curve') {
                                                                const r1 = tp1.piece?.radius || 0; const r2 = tp2.piece?.radius || 0;
                                                                if (r1 > r2) goesUpIdx = tp1.idx;
                                                                else if (r2 > r1) goesUpIdx = tp2.idx;
                                                                else {
                                                                    const room1 = getRoom(tp1.dist); const room2 = getRoom(tp2.dist);
                                                                    goesUpIdx = room1 >= room2 ? tp1.idx : tp2.idx;
                                                                }
                                                            } else {
                                                                const room1 = getRoom(tp1.dist); const room2 = getRoom(tp2.dist);
                                                                goesUpIdx = room1 >= room2 ? tp1.idx : tp2.idx;
                                                            }
                                                        }
                                                    }
                                                }

                                }
                            }

                            getElevationAtDist = (queryDist) => {
                                let maxH = 0;
                                intersections.forEach(cross => {
                                    let distToCenter = Math.abs(queryDist - cross.centerDist);
                                    if (distToCenter > totalTrackLength / 2) distToCenter = totalTrackLength - distToCenter;
                                    
                                    if (distToCenter < (FLAT_TOP_LEN/2 + RAMP_LENGTH)) {
                                        let h = 0;
                                        if (distToCenter <= FLAT_TOP_LEN / 2) {

                                        } else {
                                            const rampPos = (distToCenter - FLAT_TOP_LEN/2) / RAMP_LENGTH;
                                            const smoothFactor = (rampPos * rampPos * (3 - 2 * rampPos)); 
                                            h = BRIDGE_TOP_H * (1 - smoothFactor);
                                        }
                                        maxH = Math.max(maxH, h);
                                    }
                                });
                                
                                let flatMultiplier = 1.0;
                                flatZones.forEach(fz => {
                                    let distToStart = queryDist - fz.start; if (distToStart < -totalTrackLength/2) distToStart += totalTrackLength; if (distToStart > totalTrackLength/2) distToStart -= totalTrackLength;
                                    let distToEnd = queryDist - fz.end; if (distToEnd < -totalTrackLength/2) distToEnd += totalTrackLength; if (distToEnd > totalTrackLength/2) distToEnd -= totalTrackLength;
                                    let fzLength = fz.end - fz.start;

                                    if (isInZone) {

                                            m = m * m * (3 - 2 * m);

                                        }
                                    }
                                });

                            };
                        }

                        for(let i=0; i<stepCount; i++) {
                            const y = getElevationAtDist(vertexDistances[i]);
                            if(Math.abs(y) > 0.001) {
                                if(rails.lane1[i]) rails.lane1[i].y += y;
                                if(rails.lane2[i]) rails.lane2[i].y += y;
                                if(rails.pit[i]) rails.pit[i].y += y;
                            }
                        }
                        
                        for (let s = 0; s < aspVertCount; s++) {
                            const y = getElevationAtDist(asphaltDistances[s]);
                            if (Math.abs(y) > 0.001) {
                                asphaltVerts[s * 6 + 1] += y;
                                asphaltVerts[s * 6 + 4] += y;
                                if (borders.inner[s]) borders.inner[s].y += y;
                                if (borders.outer[s]) borders.outer[s].y += y;
                                if (guardrails.inner[s]) guardrails.inner[s].y += y;
                                if (guardrails.outer[s]) guardrails.outer[s].y += y;
                            }
                        }

                        rails.changes.forEach(changeItem => {
                            if (!changeItem.points) return;
                            if (changeItem.isRotonda) {
                                changeItem.points.forEach((pt, pi) => {
                                    const fraction = pi / (changeItem.points.length - 1 || 1);
                                    const ptDist = changeItem.baseDist + (fraction * changeItem.totalLen);
                                    const y = getElevationAtDist(ptDist);
                                    if (Math.abs(y) > 0.001) pt.y += y;
                                });
                            } else {
                                const dStart = vertexDistances[changeItem.refIdx] || 0;
                                const dEnd = vertexDistances[changeItem.refIdx + changeItem.count] || (dStart + 50);
                                changeItem.points.forEach((pt, pi) => {
                                     const fraction = pi / (changeItem.points.length - 1 || 1);
                                     let ptDist = dStart + (dEnd - dStart) * fraction;
                                     const y = getElevationAtDist(ptDist);
                                     if (Math.abs(y) > 0.001) pt.y += y;
                                });
                            }
                        });

                        let passes = 8; 
                        for (let p = 0; p < passes; p++) {
                            const smoothSpline = (arr) => {
                                const temp = arr.map(v => v ? v.y : null);
                                for (let i = 1; i < arr.length - 1; i++) {
                                    if (arr[i] && arr[i-1] && arr[i+1]) {
                                        arr[i].y = (temp[i-1] + temp[i] * 2 + temp[i+1]) / 4.0;
                                    }
                                }
                            };
                            smoothSpline(rails.lane1); smoothSpline(rails.lane2); smoothSpline(rails.pit);
                            smoothSpline(borders.inner); smoothSpline(borders.outer);
                            smoothSpline(guardrails.inner); smoothSpline(guardrails.outer);
                            
                            const tempAsp = new Float32Array(asphaltVerts.length);
                            for(let i=0; i<asphaltVerts.length; i++) tempAsp[i] = asphaltVerts[i];
                            for (let i = 6; i < aspVertCount * 6 - 6; i += 6) {
                                asphaltVerts[i+1] = (tempAsp[i-5] + tempAsp[i+1]*2 + tempAsp[i+7]) / 4.0; 
                                asphaltVerts[i+4] = (tempAsp[i-2] + tempAsp[i+4]*2 + tempAsp[i+10]) / 4.0; 
                            }
                        }
                    };
                    applyBridgeElevations();

                    const buildWallsAndTunnels = () => {
                        const wallVerts = []; const wallIndices = []; const wallUVs = [];
                        const bottomVerts = []; const bottomIndices = []; const bottomUVs = [];

                        let tunnelRadius = 16.0; 
                        let tunnelClearance = 6.5; 
                        let depthOffset = 1.5; 
                        const floorY = 0.0; 

                        const getTunnelBottomY = (x, z, currentY, currentDist) => {
                            let bottomY = floorY; 
                            if (currentY > 2.0) {
                                for (let i = 0; i < aspVertCount; i += 3) { 
                                    if (Math.abs(asphaltDistances[i] - currentDist) > 40.0) {
                                        const cx = (asphaltVerts[i * 6] + asphaltVerts[i * 6 + 3]) / 2;
                                        const cz = (asphaltVerts[i * 6 + 2] + asphaltVerts[i * 6 + 5]) / 2;
                                        const cy = (asphaltVerts[i * 6 + 1] + asphaltVerts[i * 6 + 4]) / 2;
                                        
                                        if (cy < currentY - 3.0) {
                                            const d2 = (cx - x)**2 + (cz - z)**2;

                        trackGroup.add(bottomMesh);
                    };
                    buildWallsAndTunnels();

                    const buildContinuousLane = (laneArray, distArray) => {

                    };
                    const physLane1 = buildContinuousLane(rails.lane1, vertexDistances);
                    const physLane2 = buildContinuousLane(rails.lane2, vertexDistances);
                    const physPit = buildContinuousLane(rails.pit, vertexDistances);

                    trackGroup.userData.physLane2 = physLane2;
                    trackGroup.userData.physPit = physPit;
                    trackGroup.userData.railsData = rails;
                    trackGroup.userData.vertexDistances = vertexDistances;

                    let finalRallyPath = []; let rallyDists = [0]; let currentRallyDist = 0;
                    if (hasRotonda) {
                        const rotondas = rails.changes.filter(c => c.isRotonda).sort((a, b) => a.refIdx - b.refIdx);
                        const startRotonda = rotondas.find(r => r.refIdx < rails.lane1.length / 3);
                        const endRotonda = rotondas.find(r => r.refIdx > (rails.lane1.length * 2) / 3) || (rotondas.length === 1 && !startRotonda ? rotondas[0] : null);

                        let l1Start = startRotonda ? startRotonda.refIdx + 1 : 0;
                        let l1End = endRotonda ? endRotonda.refIdx : rails.lane1.length;
                        
                        let l2Start = startRotonda ? startRotonda.refIdx + 1 : 0;
                        let l2End = endRotonda ? endRotonda.refIdx : rails.lane2.length;

                        const l1Clean = [];
                        for (let i = l1Start; i < l1End; i++) {
                            if (rails.lane1[i]) l1Clean.push(rails.lane1[i].clone());
                        }
                        
                        const l2Clean = [];
                        for (let i = l2Start; i < l2End; i++) {
                            if (rails.lane2[i]) l2Clean.push(rails.lane2[i].clone());

                        if (startRotonda && startRotonda.points) {
                            for (let i = 0; i < startRotonda.points.length; i++) finalRallyPath.push(startRotonda.points[i].clone());

                        for (let i = 0; i < l1Clean.length; i++) {
                            finalRallyPath.push(l1Clean[i].clone());
                        }
                        
                        if (endRotonda && endRotonda.points) {
                            for (let i = 0; i < endRotonda.points.length; i++) finalRallyPath.push(endRotonda.points[i].clone());
                        }
                        
                        for (let i = l2Clean.length - 1; i >= 0; i--) {
                            finalRallyPath.push(l2Clean[i].clone());

                        const cleanPath = (points) => {
                            if (points.length < 2) return points;
                            const cleaned = [points[0]];
                            for (let i = 1; i < points.length; i++) { if (points[i].distanceTo(cleaned[cleaned.length - 1]) > 0.05) cleaned.push(points[i]); }
                            return cleaned;
                        }; 
                        finalRallyPath = cleanPath(finalRallyPath);

                        if (finalRallyPath.length > 0) { 
                            const first = finalRallyPath[0]; const last = finalRallyPath[finalRallyPath.length - 1]; 
                            if (first.distanceTo(last) > 0.5 && first.distanceTo(last) < 20.0) { 
                                finalRallyPath.push(new THREE.Vector3().lerpVectors(last, first, 0.33));

                        if (finalRallyPath.length > 10) { 
                            for (let iter = 0; iter < 10; iter++) { 
                                const smoothed = []; const len = finalRallyPath.length; 
                                for (let i = 0; i < len; i++) {

                if (!isDecor) { const originalWidth = Math.min(size.z, size.x); if ((originalWidth * scale) > 6.5) scale = 6.5 / originalWidth; model.rotation.y = Math.PI; } else { if (size.z > size.y * 1.5) model.rotation.x = -Math.PI / 2; else model.rotation.y = Math.PI; }
                model.scale.set(scale, scale, scale); model.userData.baseScale = new THREE.Vector3(scale, scale, scale);
                if (count <= 1) { container.add(model); } else {
                    const bRef = boardSettingsRef.current; 
                    const trackEdges = trackGroupRef.current && trackGroupRef.current.userData.trackEdges ? trackGroupRef.current.userData.trackEdges : [];
                    const safeMarginDecor = 14.0;
                    const minSafeDistSq = safeMarginDecor * safeMarginDecor;
                    
                    for(let i=0; i<count; i++) {
                        const clone = model.clone(); let validPos = false; let attempts = 0; let rX = 0, rZ = 0;
                        while(!validPos && attempts < 150) { 
                            rX = bRef.x + (Math.random() - 0.5) * bRef.width; rZ = bRef.z + (Math.random() - 0.5) * bRef.depth; validPos = true;
                            
                            if (trackEdges.length > 0) {
                                for (let j = 0; j < trackEdges.length; j += 3) { 
                                    const dx = rX - trackEdges[j].x; const dz = rZ - trackEdges[j].z; 
                                    if (dx * dx + dz * dz < minSafeDistSq) { validPos = false; break; } 
                                }
                            } else {
                                const centers = pathPointsRef.current || [];
                                for (let j = 0; j < centers.length; j += 3) { 
                                    const c = centers[j]; 
                                    if (!c) continue; 
                                    const dx = rX - c.x; 
                                    const dz = rZ - c.z; 
                                    if (dx * dx + dz * dz < minSafeDistSq) { validPos = false; break; } 
                                }
                            }
                            attempts++;
                        }
                    if(validPos) { 
                        clone.position.x = rX; 
                        clone.position.z = rZ; 
                        clone.rotation.y = Math.random() * Math.PI * 2; 
                        clone.userData.baseScale = new THREE.Vector3(scale, scale, scale); 
                        clone.updateMatrix();
                        clone.matrixAutoUpdate = false;
                        container.add(clone); 
                    }
                }
            }
        };

                                onPointerDown={(e) => { e.preventDefault(); e.stopPropagation(); setLaneChangePressed(true); }} 
                                onPointerUp={(e) => { e.preventDefault(); e.stopPropagation(); setLaneChangePressed(false); }} 
                                onPointerLeave={(e) => { e.stopPropagation(); setLaneChangePressed(false); }}
                                className={`h-12 w-full rounded-xl flex items-center justify-center gap-1.5 border transition-all active:scale-95 touch-none select-none ${laneChangePressed?'bg-[#39ff14] text-black border-white shadow-[0_0_15px_#39ff14]':'bg-gray-800 text-gray-300 border-gray-600'}`}
                            >
                                <GitCommit size={16} className="rotate-90 shrink-0"/><span className="font-black text-[7px] leading-tight text-center">{t.laneChange1}<br/>{t.laneChange2}</span>
                            </button>
                            <button 
                                onPointerDown={(e) => { e.preventDefault(); e.stopPropagation(); setPitPressed(true); }} 
                                onPointerUp={(e) => { e.preventDefault(); e.stopPropagation(); setPitPressed(false); }}
                                onPointerLeave={(e) => { e.stopPropagation(); setPitPressed(false); }}
                                className={`h-10 w-full rounded-xl flex items-center justify-center gap-1.5 border transition-all active:scale-95 touch-none select-none ${pitPressed?'bg-blue-600 text-white shadow-[0_0_15px_blue]':'bg-gray-800 text-gray-400 border-gray-600'}`}
                            >
                                <Fuel size={14} className="shrink-0"/><span className="font-bold text-[7px] leading-tight text-center">{t.pitEntry1}<br/>{t.pitEntry2}</span>
                            </button>
                        </div>
                        
                        <div className="flex flex-col w-full items-center gap-0.5 mb-0.5 pointer-events-none">
                            <span className="text-[9px] font-black text-[#39ff14] tracking-widest uppercase bg-[#39ff14]/10 border border-[#39ff14]/30 px-2 py-0.5 rounded-full w-full text-center drop-shadow-[0_0_5px_rgba(57,255,20,0.5)]">{t.controller}</span>
                            <span className="text-[6px] text-gray-400 font-bold uppercase tracking-wider">{t.manualControl}</span>
                        </div>
                        <div className="relative w-full h-[240px] bg-black/80 rounded-2xl overflow-hidden border border-gray-600 shadow-[inset_0_0_20px_rgba(0,0,0,1)] z-10 group pointer-events-auto">
                            <div className="absolute bottom-0 left-0 w-full transition-all duration-75 pointer-events-none" style={{ height: `${manualThrottle}%`, background: `linear-gradient(to top, ${manualThrottle>90?'#ef4444':'#39ff14'} 0%, transparent 100%)`, boxShadow: `0 0 20px ${manualThrottle>90?'#ef4444':'#39ff14'}` }}></div>
                            
                            <div className="absolute inset-0 flex flex-col justify-between py-4 px-1 pointer-events-none opacity-40">
                                {[100, 75, 50, 25, 0].map(val => (
                                    <div key={val} className="w-full flex items-center justify-between">
                                        <div className="w-2 border-t border-white/70"></div>
                                        <span className="text-[5px] text-white font-mono">{val}</span>
                                        <div className="w-2 border-t border-white/70"></div>
                                    </div>
                                ))}
                            </div>

                            <input type="range" min="0" max="100" value={manualThrottle} 
                                onMouseDown={e=>e.stopPropagation()} onTouchStart={e=>e.stopPropagation()} 
                                onChange={(e)=>setManualThrottle(parseFloat(e.target.value))} 
                                className="absolute -bottom-[85px] -left-[90px] w-[280px] h-[240px] opacity-0 cursor-pointer z-20" style={{ transform: 'rotate(-90deg)', transformOrigin: '50% 50%' }} title={t.slideTitle}/>
                            
                            <div className="absolute top-2 left-0 w-full text-center pointer-events-none">
                                <span className="font-digital text-2xl font-black drop-shadow-md text-white">{Math.round(manualThrottle)}</span>
                                <span className="text-[8px] text-[#39ff14] font-bold block -mt-1">%</span>
                            </div>

                            {manualThrottle < 5 && (
                                <div className="absolute bottom-6 left-0 w-full flex flex-col items-center pointer-events-none opacity-80 animate-pulse">
                                    <ArrowUp size={16} className="text-[#39ff14] mb-1" />
                                    <span className="text-[7px] text-white font-bold tracking-widest bg-black/80 px-2 py-0.5 rounded border border-white/20">{t.slide}</span>
                                </div>
                            )}
                        </div>
                    </div>
                </div> 
            );
        };
        
        function Slot3DPlayer() {
          const [circuitData, setCircuitData] = useState(null);
          const [carSettings, setCarSettings] = useState(Array(8).fill(null).map((_, i) => ({ id: i + 1, name: `PILOTO ${i + 1}`, color: ['#ef4444', '#3b82f6', '#22c55e', '#eab308', '#a855f7', '#ec4899', '#f97316', '#64748b'][i % 8] })));
          const [customCarAssets, setCustomCarAssets] = useState(Object.fromEntries(Array.from({length: 2}, (_, i) => [i + 1, { obj: null, rotation: [0, 180, 0], yOffset: 0 }])));
          
          const [lang, setLangState] = useState(() => localStorage.getItem('slot_lang') || 'es');
          const setLang = (newLang) => { setLangState(newLang); localStorage.setItem('slot_lang', newLang); };
          const t = TRANSLATIONS[lang] || TRANSLATIONS.es;

          const [user, setUser] = useState(null);
          const [showAuthModal, setShowAuthModal] = useState(false);
          const [authMode, setAuthMode] = useState('login'); 
          const [authEmail, setAuthEmail] = useState('');
          const [authPassword, setAuthPassword] = useState('');
          const [authUsername, setAuthUsername] = useState('');
          const [authError, setAuthError] = useState('');
          const [authMessage, setAuthMessage] = useState('');
          const dbRef = useRef(null);

          // AUTO LOAD DEL COCHE GLB AL CARGAR CIRCUITO
          const autoLoadDone = useRef(false);
          useEffect(() => {
              if (circuitData && !autoLoadDone.current) {
                  autoLoadDone.current = true;
                  const apiUrl = `https://api.github.com/repos/slotsoftware/Telemetria/contents/coches`;
                  fetch(apiUrl)
                      .then(res => res.json())
                      .then(data => {
                          const glbFiles = data.filter(f => f.name.toLowerCase().endsWith('.glb') || f.name.toLowerCase().endsWith('.gltf'));
                          if (glbFiles.length > 0) {
                              const rawUrl = `https://raw.githubusercontent.com/slotsoftware/Telemetria/main/coches/${glbFiles[0].name}`;
                              fetch(rawUrl).then(r => r.blob()).then(blob => {
                                  const file = new File([blob], glbFiles[0].name, {type: 'model/gltf-binary'});
                                  setCustomCarAssets(prev => {
                                      if (prev[1] && prev[1].glb) return prev;
                                      return { ...prev, 1: { ...prev[1], glb: URL.createObjectURL(file), glbName: glbFiles[0].name } };
                                  });
                              });
                          }
                      }).catch(e => console.error(e));
              }
          }, [circuitData]);

          useEffect(() => {
              const initFirebase = () => {
                  if (!window.FirebaseAPI) {
                      setTimeout(initFirebase, 200);
                      return;
                  }
                  try {
                      const { initializeApp, getAuth, signInAnonymously, onAuthStateChanged, getFirestore } = window.FirebaseAPI;
                      
                      const customFirebaseConfig = {
                          apiKey: "AIzaSyDsIF1lRudzkGIA7dForszGEwqwOi22xGI",
                          authDomain: "studio-6811528962-4f8ab.firebaseapp.com",
                          projectId: "studio-6811528962-4f8ab",
                          storageBucket: "studio-6811528962-4f8ab.firebasestorage.app",
                          messagingSenderId: "903605684484",
                          appId: "1:903605684484:web:a30a948d5bb6d39d0b6851"
                      };

                      const app = initializeApp(customFirebaseConfig);
                      const auth = getAuth(app);
                      dbRef.current = getFirestore(app);

                      const initAuth = async () => {
                          try {
                              if (!auth.currentUser) {
                                  await signInAnonymously(auth);
                              }
                          } catch (e) { console.error("Auth error:", e); }
                      };
                      initAuth();

                      const unsubscribe = onAuthStateChanged(auth, setUser);
                      return () => unsubscribe();
                  } catch (e) { console.error("Error Firebase:", e); }
              };
              initFirebase();
          }, []);

          const handleAuthSubmit = async (e) => {
              e.preventDefault();
              setAuthError('');
              setAuthMessage('');
              const { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, updateProfile, sendEmailVerification } = window.FirebaseAPI;
              const auth = getAuth();
              auth.languageCode = lang;
              
              try {
                  if (authMode === 'register') {
                      const userCredential = await createUserWithEmailAndPassword(auth, authEmail, authPassword);
                      await updateProfile(userCredential.user, { displayName: authUsername });
                      try { await sendEmailVerification(userCredential.user); } catch (emailErr) {}
                      setUser({ ...userCredential.user, displayName: authUsername });
                      alert(t.auth.verifyMsg);
                  } else {
                      await signInWithEmailAndPassword(auth, authEmail, authPassword);
                  }
                  setShowAuthModal(false);
              } catch (error) {
                  console.error("Auth error:", error);
                  if (error.code === 'auth/email-already-in-use') setAuthError(lang === 'es' ? 'Este correo ya está registrado.' : 'Email already in use.');
                  else if (error.code === 'auth/invalid-credential') setAuthError(lang === 'es' ? 'Correo o contraseña incorrectos.' : 'Invalid credentials.');
                  else if (error.code === 'auth/weak-password') setAuthError(lang === 'es' ? 'La contraseña debe tener al menos 6 caracteres.' : 'Password should be at least 6 characters.');
                  else setAuthError(error.message);
              }
          };

          const handlePasswordReset = async () => {
              setAuthError('');
              setAuthMessage('');
              if (!authEmail) { setAuthError(t.auth.enterEmail); return; }
              try {
                  const { getAuth, sendPasswordResetEmail } = window.FirebaseAPI;
                  const auth = getAuth();
                  auth.languageCode = lang;
                  await sendPasswordResetEmail(auth, authEmail);
                  setAuthMessage(t.auth.resetMsg);
              } catch (error) {
                  if (error.code === 'auth/user-not-found') setAuthError(lang === 'es' ? 'Usuario no encontrado.' : 'User not found.');
                  else setAuthError('Error: ' + error.message);
              }
          };

          const handleSignOut = () => {
              const { getAuth, signOut } = window.FirebaseAPI;
              signOut(getAuth());
          };

          const handleCarAssetUpdate = (file, targetId, arg3) => {
              if (file && targetId) {
                  const url = URL.createObjectURL(file);
                  const isDecor = arg3 === 'decor';
                  setCustomCarAssets(prev => ({ ...prev, [targetId]: { ...prev[targetId], glb: url, glbName: file.name, isDecor: isDecor } }));
              } else if (targetId && arg3) {
                  setCustomCarAssets(prev => ({ ...prev, [targetId]: { ...prev[targetId], ...arg3 } }));
              }
          };

          useEffect(() => { 
              const ls = document.getElementById('loading-screen'); 
              const transferData = localStorage.getItem('slot_circuit_transfer');
              const validateAndLoad = (dataStr) => { try { const d = JSON.parse(dataStr); if (d.brand && d.pieces) { setCircuitData(d); return true; } } catch (e) { } return false; };

              let loaded = false;
              if (transferData) { loaded = validateAndLoad(transferData); if (loaded) localStorage.setItem('slot_last_circuit', transferData); localStorage.removeItem('slot_circuit_transfer'); } 
              else { const savedCircuit = localStorage.getItem('slot_last_circuit'); if (savedCircuit) validateAndLoad(savedCircuit); }
              if (ls) { ls.style.opacity = '0'; setTimeout(() => ls.style.display = 'none', 1000); } 
          }, []);

          const loadCircuit = (e) => { 
            const f = e.target.files[0]; if (!f) return; const r = new FileReader(); 
            r.onload = (ev) => { 
                try { const d = JSON.parse(ev.target.result); if (d.brand && d.pieces) { setCircuitData({ brand: d.brand, pieces: d.pieces }); localStorage.setItem('slot_last_circuit', JSON.stringify({ brand: d.brand, pieces: d.pieces })); } else { alert(t.invalidFormat); } } catch (err) { alert(t.errorJson); } 
            }; r.readAsText(f); e.target.value = '';
          };

          if (circuitData) {
            return ( <Telemetry3DViewer circuitData={circuitData} carSettings={carSettings} customCarAssets={customCarAssets} onCarAssetUpdate={handleCarAssetUpdate} onClose={() => { setCircuitData(null); }} lang={lang} setLang={setLang} t={t} /> );
          }

          return (
            <div className="flex flex-col h-[100dvh] w-full bg-[#0a0a0a] overflow-hidden font-sans select-none text-gray-200 justify-center items-center relative">
                <div className="absolute inset-0 opacity-20 pointer-events-none" style={{backgroundImage: 'radial-gradient(#39ff14 1px, transparent 1px)', backgroundSize: '40px 40px'}}></div>
                
                <div className="absolute top-6 right-6 z-50 flex gap-2 bg-black/50 p-2 rounded-2xl backdrop-blur-md border border-white/10 shadow-lg items-center">
                    <button onClick={() => setLang('es')} className={`w-10 h-10 flex items-center justify-center rounded-xl text-2xl transition-all ${lang === 'es' ? 'bg-[#39ff14]/20 border border-[#39ff14]/50 shadow-[0_0_15px_rgba(57,255,20,0.3)] scale-105' : 'opacity-50 hover:opacity-100 hover:bg-white/10 border border-transparent'}`} title="Español">🇪🇸</button>
                    <button onClick={() => setLang('en')} className={`w-10 h-10 flex items-center justify-center rounded-xl text-2xl transition-all ${lang === 'en' ? 'bg-[#39ff14]/20 border border-[#39ff14]/50 shadow-[0_0_15px_rgba(57,255,20,0.3)] scale-105' : 'opacity-50 hover:opacity-100 hover:bg-white/10 border border-transparent'}`} title="English">🇬🇧</button>
                </div>

                {showAuthModal && (
                    <div className="absolute inset-0 z-[110] bg-black/80 backdrop-blur-md flex items-center justify-center animate-in" onClick={() => setShowAuthModal(false)}>
                        <div className="bg-[#0f172a] w-[400px] rounded-2xl border border-[#39ff14]/30 shadow-[0_0_60px_rgba(57,255,20,0.2)] overflow-hidden" onClick={e => e.stopPropagation()}>
                            <div className="bg-black/40 p-6 text-center border-b border-white/10 relative">
                                <button onClick={() => setShowAuthModal(false)} className="absolute top-4 right-4 text-gray-500 hover:text-white"><XIcon size={20}/></button>
                                <User size={40} className="mx-auto text-[#39ff14] mb-3 drop-shadow-[0_0_10px_rgba(57,255,20,0.8)]"/>
                                <h2 className="text-xl font-black text-white tracking-widest uppercase">
                                    {authMode === 'login' ? t.auth.titleLogin : t.auth.titleReg}
                                </h2>
                            </div>
                            <form onSubmit={handleAuthSubmit} className="p-6 flex flex-col gap-4">
                                {authError && <div className="text-xs text-red-400 bg-red-900/20 border border-red-500/50 p-2 rounded text-center">{authError}</div>}
                                {authMessage && <div className="text-xs text-[#39ff14] bg-green-900/20 border border-green-500/50 p-2 rounded text-center">{authMessage}</div>}
                                
                                {authMode === 'register' && (
                                    <div>
                                        <label className="text-[10px] text-gray-400 uppercase tracking-widest font-bold mb-1 block">{t.auth.name}</label>
                                        <input type="text" required value={authUsername} onChange={e=>setAuthUsername(e.target.value)} className="w-full bg-black/60 border border-gray-700 rounded-lg px-4 py-2 text-sm text-white focus:border-[#39ff14] outline-none" placeholder="Ej: Ayrton S."/>
                                    </div>
                                )}
                                <div>
                                    <label className="text-[10px] text-gray-400 uppercase tracking-widest font-bold mb-1 block">{t.auth.email}</label>
                                    <input type="email" required value={authEmail} onChange={e=>{setAuthEmail(e.target.value); setAuthError(''); setAuthMessage('');}} className="w-full bg-black/60 border border-gray-700 rounded-lg px-4 py-2 text-sm text-white focus:border-[#39ff14] outline-none" placeholder="piloto@ejemplo.com"/>
                                </div>
                                <div>
                                    <div className="flex justify-between items-center mb-1">
                                        <label className="text-[10px] text-gray-400 uppercase tracking-widest font-bold block">{t.auth.pass}</label>
                                        {authMode === 'login' && (
                                            <button type="button" onClick={handlePasswordReset} className="text-[9px] text-cyan-400 hover:text-cyan-300 transition-colors uppercase tracking-widest">
                                                {t.auth.forgotPass}
                                            </button>
                                        )}
                                    </div>
                                    <input type="password" required value={authPassword} onChange={e=>setAuthPassword(e.target.value)} className="w-full bg-black/60 border border-gray-700 rounded-lg px-4 py-2 text-sm text-white focus:border-[#39ff14] outline-none" placeholder="******"/>
                                </div>
                                
                                <button type="submit" className="mt-2 w-full py-3 bg-[#39ff14] hover:bg-green-400 text-black font-black uppercase tracking-widest rounded-lg transition-all active:scale-95 shadow-[0_0_15px_rgba(57,255,20,0.3)] hover:shadow-[0_0_25px_rgba(57,255,20,0.5)]">
                                    {authMode === 'login' ? t.auth.submitLogin : t.auth.submitReg}
                                </button>
                                
                                <button type="button" onClick={() => { setAuthMode(authMode === 'login' ? 'register' : 'login'); setAuthError(''); setAuthMessage(''); }} className="mt-2 text-xs text-gray-500 hover:text-white transition-colors">
                                    {authMode === 'login' ? t.auth.switchReg : t.auth.switchLogin}
                                </button>
                            </form>
                        </div>
                    </div>
                )}

                <div className="z-10 flex flex-col items-center gap-8 animate-in w-full max-w-5xl px-6">
                    <div className="text-center">
                        <Activity size={80} className="text-[#39ff14] mx-auto mb-4 animate-pulse drop-shadow-[0_0_30px_rgba(57,255,20,0.6)]"/>
                        <h1 className="text-5xl md:text-7xl font-black italic tracking-tighter text-white uppercase drop-shadow-xl">{t.title}</h1>
                        <p className="text-[#39ff14] font-mono text-xl tracking-[0.5em] mt-2 font-bold mb-6">{t.subtitle}</p>
                    </div>

                    <div className="flex flex-col items-center w-full max-w-md mx-auto z-10">
                        <div className="w-full bg-black/50 p-8 rounded-3xl border border-white/10 backdrop-blur-xl shadow-2xl flex flex-col items-center gap-6">
                            <h2 className="text-xl font-bold uppercase tracking-widest text-gray-400">{t.localMode}</h2>
                            <label className="w-full group relative cursor-pointer">
                                <div className="absolute -inset-1 bg-gradient-to-r from-[#39ff14] to-emerald-600 rounded-xl blur opacity-25 group-hover:opacity-75 transition duration-1000 group-hover:duration-200"></div>
                                <div className="relative px-6 py-6 bg-gray-900 ring-1 ring-gray-900/5 rounded-xl flex flex-col items-center justify-center gap-4 h-full hover:bg-gray-800 transition-colors">
                                    <CloudUpload className="w-10 h-10 text-[#39ff14] group-hover:scale-110 transition-transform duration-300" />
                                    <span className="text-gray-300 group-hover:text-white transition-colors font-black uppercase tracking-widest text-xs text-center">{t.btnJson}</span>
                                </div>
                                <input type="file" accept=".json" onChange={loadCircuit} className="hidden" />
                            </label>

                            <button onClick={() => window.location.href = 'circuitos.html'} className="group relative w-full">
                                <div className="absolute -inset-1 bg-gradient-to-r from-blue-600 to-cyan-500 rounded-xl blur opacity-25 group-hover:opacity-75 transition duration-1000 group-hover:duration-200"></div>
                                <div className="relative px-6 py-4 bg-gray-900 ring-1 ring-gray-900/5 rounded-xl flex items-center justify-center gap-3 hover:bg-gray-800 transition-colors">
                                    <PenTool className="w-6 h-6 text-cyan-400 group-hover:scale-110 transition-transform duration-300" />
                                    <span className="text-gray-300 group-hover:text-white transition-colors font-black uppercase tracking-widest text-xs text-center">{t.btn2d}</span>
                                </div>
                            </button>
                            
                            <button onClick={() => { localStorage.removeItem('slot_last_circuit'); sessionStorage.removeItem('slot_last_circuit'); alert(t.cacheCleared); }} className="text-[10px] text-gray-600 hover:text-red-400 mt-2 uppercase tracking-widest transition-colors border-b border-transparent hover:border-red-400/50 pb-0.5">
                                {t.clearCache}
                            </button>
                        </div>
                    </div>

                    <div className="text-[10px] text-gray-600 font-mono absolute bottom-4 tracking-widest">SLOT STUDIO V.4.0 - DECO</div>
                </div>
            </div>
          );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<Slot3DPlayer />);
    </script>
</body>
</html>
